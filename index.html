                    { id: 'ch13-q25-3', src: 'CH13 Q25', en: 'Principal borrowed from banks will be included as a line in the statement of changes in equity.', cn: '从银行借入的本金将作为权益变动表中的一个行项目。', ans: false, key: '银行借款影响负债不影响权益', exp: '<b>银行借款(Bank borrowings)</b>影响的是<b>资产(Assets)</b>和<b>负债(Liabilities)</b>，不直接影响<b>权益变动表(SOCIE)</b>的行项目。借款增加了负债，而非权益。' },
                    { id: 'ch13-q25-4', src: 'CH13 Q25', en: 'Profit for the year will be included as a line in the statement of changes in equity.', cn: '年度利润将作为权益变动表中的一个行项目。', ans: true, key: '年度利润是权益变动表核心行项目', exp: '<b>年度利润(Profit for the year)</b>直接影响<b>留存收益(Retained earnings)</b>，是<b>权益变动表(SOCIE)</b>的核心内容，作为独立行项目列示。' },
                    { id: 'ch13-q25-5', src: 'CH13 Q25', en: 'Interest paid on bank borrowings will be included as a line in the statement of changes in equity.', cn: '支付的银行借款利息将作为权益变动表中的一个行项目。', ans: false, key: '借款利息是财务费用不在权益变动表', exp: '<b>银行借款利息(Interest on borrowings)</b>是<b>财务费用(Finance cost)</b>，计入<b>利润表(P/L)</b>，影响年度利润。但利息本身不作为<b>权益变动表(SOCIE)</b>的单独行项目列示。' }
                ]
            },

            // ==================== CH14: 试算平衡表、差错更正与不完整记录 (Trial Balance, Error Correction & Incomplete Records) ====================
            {
                id: 'ch14',
                title: '试算平衡表、差错更正与不完整记录 (Trial Balance, Error Correction & Incomplete Records)',
                label: 'CH14',
                items: [
                    // ===== 一、借贷规则与正常余额 =====
                    // Q1 (原题号1) - 多选题: 账户借贷方向
                    { id: 'ch14-q1-1', src: 'CH14 Q1', en: 'Sales and sales tax owed to the tax authority would both be credit balances in the trial balance.', cn: '销售额和应交税局的销售税在试算平衡表中都应为贷方余额。', ans: true, key: '收入和负债都是贷方', exp: '<b>销售(Sales)</b>是<b>收入(Income)</b>类账户，正常余额在贷方。<b>应交销售税(Sales tax owed)</b>是<b>负债(Liability)</b>类账户，正常余额也在贷方。两者都属于CLIC规则中的贷方项目。' },
                    { id: 'ch14-q1-2', src: 'CH14 Q1', en: 'Discounts received and sales returns would both be debit balances in the trial balance.', cn: '收到的折扣和销售退回在试算平衡表中都应为借方余额。', ans: false, key: '收到折扣是贷方余额', exp: '<b>收到的折扣(Discounts received)</b>是<b>其他收入(Other income)</b>或成本抵减，正常余额在<b>贷方</b>。<b>销售退回(Sales returns)</b>是销售收入的<b>备抵账户(Contra account)</b>，正常余额在<b>借方</b>。两者方向不同，因此该陈述错误。' },
                    { id: 'ch14-q1-3', src: 'CH14 Q1', en: 'Purchases and trade receivables would both be debit balances in the trial balance.', cn: '采购和应收账款在试算平衡表中都应为借方余额。', ans: true, key: '费用和资产都是借方', exp: '<b>采购(Purchases)</b>是成本/费用类，属于<b>DEAD</b>规则中的Expenses，正常余额在借方。<b>应收账款(Trade receivables)</b>是<b>资产(Asset)</b>类，正常余额在借方。两者都是借方余额。' },
                    { id: 'ch14-q1-4', src: 'CH14 Q1', en: 'Trade payables and irrecoverable debts would both be credit balances in the trial balance.', cn: '应付账款和坏账在试算平衡表中都应为贷方余额。', ans: false, key: '坏账费用是借方余额', exp: '<b>应付账款(Trade payables)</b>是负债类，正常余额在<b>贷方</b>。但<b>坏账(Irrecoverable debts)</b>是<b>费用(Expense)</b>类，正常余额在<b>借方</b>。两者方向不同。' },

                    // Q3 (原题号4) - 匹配题: 特殊账户借贷方向
                    { id: 'ch14-q3-1', src: 'CH14 Q3', en: 'Accumulated depreciation for equipment is a credit balance in the trial balance.', cn: '设备累计折旧在试算平衡表中是贷方余额。', ans: true, key: '累计折旧是资产备抵账户', exp: '<b>累计折旧(Accumulated depreciation)</b>是资产的<b>备抵账户(Contra asset)</b>，虽然与资产相关，但其正常余额在<b>贷方</b>。它抵减资产的原值以得到<b>账面价值(Carrying amount)</b>。' },
                    { id: 'ch14-q3-2', src: 'CH14 Q3', en: 'Prepayments is a credit balance in the trial balance.', cn: '预付款项在试算平衡表中是贷方余额。', ans: false, key: '预付款项是流动资产借方', exp: '<b>预付款项(Prepayments)</b>是<b>流动资产(Current asset)</b>，代表企业提前支付的、尚未享受的费用。资产类账户正常余额在<b>借方</b>，不是贷方。' },
                    { id: 'ch14-q3-3', src: 'CH14 Q3', en: 'Revaluation reserve is a credit balance in the trial balance.', cn: '重估储备在试算平衡表中是贷方余额。', ans: true, key: '重估储备属于权益贷方', exp: '<b>重估储备(Revaluation reserve)</b>是<b>股东权益(Equity)</b>的组成部分，属于<b>不可分配储备(Non-distributable reserve)</b>。权益类账户正常余额在<b>贷方</b>。' },
                    { id: 'ch14-q3-4', src: 'CH14 Q3', en: 'Allowance for receivables is a debit balance in the trial balance.', cn: '应收账款坏账准备在试算平衡表中是借方余额。', ans: false, key: '坏账准备是资产备抵账户贷方', exp: '<b>应收账款坏账准备(Allowance for receivables)</b>是<b>资产备抵账户(Contra asset)</b>，与累计折旧类似，其正常余额在<b>贷方</b>，不是借方。它抵减应收账款的总额以得到净额。' },

                    // Q4 (原题号14) - 多选题: 借方栏账户
                    { id: 'ch14-q4-1', src: 'CH14 Q4', en: 'Share premium would be included in the debit column of a trial balance.', cn: '股份溢价应包含在试算平衡表的借方栏。', ans: false, key: '股份溢价属于权益贷方', exp: '<b>股份溢价(Share premium)</b>是<b>股东权益(Equity)</b>的一部分，属于<b>资本储备(Capital reserve)</b>。权益类账户正常余额在<b>贷方</b>，不在借方栏。' },
                    { id: 'ch14-q4-2', src: 'CH14 Q4', en: 'Provisions would be included in the debit column of a trial balance.', cn: '准备金应包含在试算平衡表的借方栏。', ans: false, key: '准备金属于负债贷方', exp: '<b>准备金(Provisions)</b>通常是<b>负债(Liability)</b>性质（如保修准备、法律诉讼准备），正常余额在<b>贷方</b>。注意区分：确认准备金时的费用(Expense)在借方，但准备金账户本身在贷方。' },
                    { id: 'ch14-q4-3', src: 'CH14 Q4', en: 'Distribution costs would be included in the debit column of a trial balance.', cn: '分销成本应包含在试算平衡表的借方栏。', ans: true, key: '分销成本属于费用借方', exp: '<b>分销成本(Distribution costs)</b>是经营过程中发生的一项<b>费用(Expense)</b>。根据DEAD规则，费用类账户正常余额在<b>借方</b>。' },
                    { id: 'ch14-q4-4', src: 'CH14 Q4', en: 'Depreciation expense would be included in the debit column of a trial balance.', cn: '折旧费用应包含在试算平衡表的借方栏。', ans: true, key: '折旧费用是借方但累计折旧是贷方', exp: '<b>折旧费用(Depreciation expense)</b>是一项<b>费用(Expense)</b>，正常余额在<b>借方</b>。注意区分：<b>累计折旧(Accumulated depreciation)</b>是备抵账户，正常余额在<b>贷方</b>。两者方向相反。' },

                    // Q5 (原题号49) - 多选题: 交易与试算平衡表
                    { id: 'ch14-q5-1', src: 'CH14 Q5', en: 'Carriage outwards is included in cost of sales.', cn: '外运费包含在销货成本中。', ans: false, key: '外运费是销售费用不是销货成本', exp: '<b>外运费(Carriage outwards)</b>是将货物运送给客户的费用，属于<b>销售费用/分销成本(Distribution cost)</b>，在利润表中列于毛利之下。只有<b>内运费(Carriage inwards)</b>才计入采购成本，从而影响<b>销货成本(Cost of sales)</b>。' },
                    { id: 'ch14-q5-2', src: 'CH14 Q5', en: 'Revenue is a credit balance in the trial balance.', cn: '收入在试算平衡表中是贷方余额。', ans: true, key: '收入是贷方余额', exp: '<b>收入(Revenue/Sales)</b>是收入类账户，根据CLIC规则（Credits increase Liabilities, Income, Capital），其正常余额在<b>贷方</b>。' },
                    { id: 'ch14-q5-3', src: 'CH14 Q5', en: 'Irrecoverable debts are debited in the statement of profit or loss.', cn: '坏账在损益表中作为借项处理。', ans: true, key: '坏账是费用在利润表借方', exp: '<b>坏账(Irrecoverable debts)</b>是一项<b>费用(Expense)</b>，会减少利润。在会计分录中，坏账费用账户是<b>借方余额</b>。在利润表中，它作为费用从收入中扣除。' },
                    { id: 'ch14-q5-4', src: 'CH14 Q5', en: 'Inventory purchases during the year are always posted to the inventory account.', cn: '年内采购的存货总是过账到存货账户。', ans: false, key: '定期盘存制下记入采购账户', exp: '在<b>定期盘存制(Periodic system)</b>下，年内采购记入<b>采购(Purchases)</b>账户而非存货账户。<b>存货(Inventory)</b>账户只在期末调整。只有在<b>永续盘存制(Perpetual system)</b>下才直接记入存货账户。' },

                    // ===== 二、试算平衡表的目的与局限性 =====
                    // Q6 (原题号2) - 判断题: TB定义与目的
                    { id: 'ch14-q6-1', src: 'CH14 Q6', en: 'A trial balance is used as a summary of the balances on some of the accounts in the general ledger.', cn: '试算平衡表被用作总分类账中部分账户余额的摘要。', ans: false, key: 'TB包含所有账户不是部分', exp: '<b>试算平衡表(Trial balance)</b>是总分类账(General ledger)中<b>所有(ALL)</b>账户余额的列表，不是仅"部分(some)"账户。它的目的是完整地检查所有账户的借贷平衡。' },
                    { id: 'ch14-q6-2', src: 'CH14 Q6', en: 'In a trial balance, the total of the debit balances should equal the total of the credit balances.', cn: '在试算平衡表中，借方余额总额应等于贷方余额总额。', ans: true, key: '借贷总额必须相等', exp: '这是<b>试算平衡表(Trial balance)</b>的基本定义和核心目的——验证<b>复式记账法(Double-entry bookkeeping)</b>的算术准确性。如果借方总额等于贷方总额，说明试算平衡表"平衡(Balances)"。' },
                    { id: 'ch14-q6-3', src: 'CH14 Q6', en: 'A trial balance highlights all errors made when posting transactions to the general ledger.', cn: '试算平衡表能突显所有在过账交易到总分类账时发生的错误。', ans: false, key: 'TB无法发现所有错误', exp: '<b>试算平衡表(Trial balance)</b>只能检查出导致<b>借贷不平衡</b>的错误。它<b>无法发现</b>：<b>遗漏错误(Error of omission)</b>、<b>原则性错误(Error of principle)</b>、<b>原始分录错误(Error of original entry)</b>、<b>补偿性错误(Compensating error)</b>等。' },
                    { id: 'ch14-q6-4', src: 'CH14 Q6', en: 'A trial balance only contains balances that will be used to prepare the statement of financial position.', cn: '试算平衡表仅包含将用于编制财务状况表的余额。', ans: false, key: 'TB包含利润表和财务状况表项目', exp: '<b>试算平衡表(Trial balance)</b>包含用于编制<b>财务状况表(SFP)</b>和<b>利润表(SPL)</b>的所有账户余额，不仅限于资产负债表项目。收入、费用等损益类账户也包含在内。' },

                    // Q7 (原题号7) - 单选题: TB编制目的
                    { id: 'ch14-q7-1', src: 'CH14 Q7', en: 'The purpose of preparing a trial balance is to confirm whether the sum of all credit balances equals the sum of all debit balances.', cn: '编制试算平衡表的目的是确认所有贷方余额的总和是否等于所有借方余额的总和。', ans: true, key: 'TB核心目的是验证借贷平衡', exp: '<b>试算平衡表(Trial balance)</b>的核心目的是验证总分类账中所有账户的<b>借方余额总额</b>是否等于<b>贷方余额总额</b>，以此来初步检查<b>复式记账法(Double-entry bookkeeping)</b>的算术准确性。' },
                    { id: 'ch14-q7-2', src: 'CH14 Q7', en: 'The purpose of preparing a trial balance is to confirm whether all transactions have been recorded.', cn: '编制试算平衡表的目的是确认所有交易是否都已记录。', ans: false, key: 'TB无法确认所有交易已记录', exp: '如果整个交易被遗漏（<b>完全遗漏错误, Error of omission</b>），借方和贷方都没有记录，试算平衡表仍然会平衡。因此TB<b>无法确认</b>所有交易是否都已记录。' },
                    { id: 'ch14-q7-3', src: 'CH14 Q7', en: 'The purpose of preparing a trial balance is to highlight whether entries have been incorrectly recorded in the wrong account.', cn: '编制试算平衡表的目的是突显分录是否被错误地记录在错误的账户中。', ans: false, key: 'TB无法发现分类错误', exp: '如果分录记入错误的账户（如<b>分类错误, Error of commission</b>或<b>原则性错误, Error of principle</b>），但借贷金额相等，试算平衡表仍然会平衡，<b>无法</b>发现此类错误。' },

                    // Q8 (原题号15) - 匹配题: 错误能否被TB发现
                    { id: 'ch14-q8-1', src: 'CH14 Q8', en: 'A transposition error where different amounts are posted to the debit and credit sides will be identified by extracting a trial balance.', cn: '借贷双方过账了不同金额的换位错误会被编制试算平衡表所识别。', ans: true, key: '借贷金额不等的错误会被TB发现', exp: '如果<b>借方金额</b>与<b>贷方金额</b>不相等（如借记$124，贷记$142），这种错误会导致试算平衡表的借方总额与贷方总额不相等，因此<b>会被(Will be identified)</b>试算平衡表发现。' },
                    { id: 'ch14-q8-2', src: 'CH14 Q8', en: 'Depreciation calculated using the wrong percentage will be identified by extracting a trial balance.', cn: '使用错误百分比计算的折旧会被编制试算平衡表所识别。', ans: false, key: '金额计算错但借贷平衡不会被TB发现', exp: '虽然<b>折旧费用(Depreciation expense)</b>和<b>累计折旧(Accumulated depreciation)</b>的金额是错误的，但会计分录（借：折旧费用，贷：累计折旧）仍然以相同的（虽然错误的）金额入账，借贷平衡不受影响。' },
                    { id: 'ch14-q8-3', src: 'CH14 Q8', en: 'A journal entry that has not been posted at all will be identified by extracting a trial balance.', cn: '一笔完全未过账的日记账分录会被编制试算平衡表所识别。', ans: false, key: '完全遗漏不影响TB平衡', exp: '这是<b>遗漏错误(Error of omission)</b>。如果整个交易（包括借方和贷方）都未被记录或过账，它<b>不会影响</b>试算平衡表的平衡性。TB仍然会平衡，错误不会被发现。' },

                    // ===== 三、会计差错与暂记账户 =====
                    // Q9 (原题号19) - 单选题: 暂记账户产生原因
                    { id: 'ch14-q9-1', src: 'CH14 Q9', en: 'Inventory being overstated due to damage to some products will give rise to the creation of a suspense account.', cn: '因部分产品损坏导致存货高估会导致暂记账户的产生。', ans: false, key: '存货计价错误不导致暂记账户', exp: '存货高估是一个<b>计价错误</b>，它会影响资产负债表和利润表的准确性，但它本身不违反<b>复式记账法(Double-entry bookkeeping)</b>的借贷平衡，因此不会导致试算平衡表不平衡，也不会产生<b>暂记账户(Suspense account)</b>。' },
                    { id: 'ch14-q9-2', src: 'CH14 Q9', en: 'A cost incorrectly charged to one expense account instead of another expense account will give rise to the creation of a suspense account.', cn: '费用被错误地记入另一个费用账户会导致暂记账户的产生。', ans: false, key: '费用分类错误不影响TB平衡', exp: '将费用记入错误的费用账户是<b>分类错误(Error of commission)</b>。无论记入哪个费用账户，都有一个相等的贷方分录，借贷金额相等，试算平衡表仍然会平衡，不会产生<b>暂记账户(Suspense account)</b>。' },
                    { id: 'ch14-q9-3', src: 'CH14 Q9', en: 'An expense recorded on the debit side of one account but not recorded on the credit side of any account will give rise to the creation of a suspense account.', cn: '一笔费用只记了借方但没有记任何账户的贷方，会导致暂记账户的产生。', ans: true, key: '单边分录导致暂记账户产生', exp: '这是一个<b>单边分录错误(One-sided entry)</b>。分录中只有借方，没有对应的贷方，从而破坏了借贷平衡。试算平衡表的借方总额将高于贷方总额，必须使用<b>暂记账户(Suspense account)</b>来使其暂时平衡。' },

                    // Q10 (原题号22) - 判断题: 会计差错判断
                    { id: 'ch14-q10-1', src: 'CH14 Q10', en: 'The same transposition error posted to both sides of an accounting entry will result in the creation of a suspense account.', cn: '同一换位错误同时过账到会计分录的借贷双方会导致暂记账户的产生。', ans: false, key: '借贷同额错误不影响TB平衡', exp: '如果一个<b>换位错误(Transposition error)</b>同时以相同的错误金额影响借方和贷方（如两边都错记为$132而非$123），<b>借贷总额仍然相等</b>。试算平衡表会平衡，不会产生<b>暂记账户(Suspense account)</b>。' },
                    { id: 'ch14-q10-2', src: 'CH14 Q10', en: 'An incorrect entry into the non-current asset register will cause the trial balance not to balance.', cn: '非流动资产登记簿中的错误分录会导致试算平衡表不平衡。', ans: false, key: '非流动资产登记簿不影响TB', exp: '<b>非流动资产登记簿(Non-current asset register)</b>是一个<b>备查账簿(Memorandum book)</b>，不属于<b>复式记账系统(Double-entry system)</b>。它只是辅助记录，其错误不直接影响总分类账(General ledger)的借贷平衡。' },
                    { id: 'ch14-q10-3', src: 'CH14 Q10', en: 'An entry that debits two accounts without any corresponding credit will cause the trial balance not to balance.', cn: '一笔同时借记两个账户但没有任何对应贷方的分录会导致试算平衡表不平衡。', ans: true, key: '只有借方没有贷方破坏借贷平衡', exp: '这个分录有两个<b>借方(Debit)</b>记录，没有任何<b>贷方(Credit)</b>，违反了<b>复式记账法</b>中每笔交易借贷必须相等的原则。这将导致试算平衡表<b>不平衡</b>，并产生<b>暂记账户(Suspense account)</b>。' },
                    { id: 'ch14-q10-4', src: 'CH14 Q10', en: 'A transaction posted as a cash sale instead of a credit sale will result in a suspense account.', cn: '一笔交易被记为现金销售而不是赊销会导致暂记账户的产生。', ans: false, key: '现金销售和赊销都借贷平衡', exp: '这是<b>分类错误(Error of commission)</b>。现金销售(借:现金,贷:销售)和赊销(借:应收账款,贷:销售)都有对等的借贷方，金额相等。只是借方的资产账户不同，试算平衡表仍然平衡，不会产生<b>暂记账户</b>。' },

                    // Q15 (原题号46) - 单选题: TB正确陈述
                    { id: 'ch14-q15-1', src: 'CH14 Q15', en: 'A trial balance can only be extracted at the end of a reporting period.', cn: '试算平衡表只能在报告期末提取。', ans: false, key: 'TB可以在任何时点编制', exp: '<b>试算平衡表(Trial balance)</b>可以在会计期间的<b>任何时点(Any time)</b>编制，以检查账目的平衡情况，不限于<b>报告期末(End of reporting period)</b>。' },
                    { id: 'ch14-q15-2', src: 'CH14 Q15', en: 'A trial balance does not prove that all transactions have been recorded.', cn: '试算平衡表不能证明所有交易都已记录。', ans: true, key: 'TB无法证明所有交易已记录', exp: '<b>试算平衡表(Trial balance)</b>无法证明所有交易都已记录。例如，<b>完全遗漏错误(Error of omission)</b>——整个交易借贷双方都未记——不会被试算平衡表发现，因为借贷仍然平衡。' },
                    { id: 'ch14-q15-3', src: 'CH14 Q15', en: 'A trial balance proves the arithmetic accuracy of the ledger accounts.', cn: '试算平衡表证明了分类账账户的算术准确性。', ans: false, key: 'TB只能初步检查不能完全证明', exp: '<b>试算平衡表(Trial balance)</b>只证明<b>借方总额等于贷方总额</b>，但不能"证明"分类账的<b>算术准确性(Arithmetic accuracy)</b>。因为可能存在<b>补偿性错误(Compensating errors)</b>或其他不影响平衡的错误。' },
                    { id: 'ch14-q15-4', src: 'CH14 Q15', en: 'Financial statements can be prepared directly from a trial balance without any adjustments.', cn: '财务报表可以直接从试算平衡表编制，无需任何调整。', ans: false, key: '编制报表前需要年末调整', exp: '<b>试算平衡表(Trial balance)</b>是编制财务报表的基础，但通常在编制报表前还需要进行一系列的<b>年末调整(Year-end adjustments)</b>，如计提<b>折旧(Depreciation)</b>、<b>应计费用(Accruals)</b>、<b>预付费用(Prepayments)</b>等。' },

                    // ===== 四、差错更正与分类 =====
                    // Q16 (原题号8) - 多选题: 期初试算平衡表
                    { id: 'ch14-q16-1', src: 'CH14 Q16', en: 'Land and buildings at cost would be included in the opening trial balance of an accounting period.', cn: '土地和建筑物的成本将包含在会计期间的期初试算平衡表中。', ans: true, key: '非流动资产在期初TB中出现', exp: '<b>土地和建筑物(Land and buildings)</b>是<b>非流动资产(Non-current asset)</b>，属于<b>资产负债表项目(SFP item)</b>，是<b>永久性账户(Permanent account)</b>。其成本账户的余额会从上期结转，出现在<b>期初试算平衡表(Opening TB)</b>中。' },
                    { id: 'ch14-q16-2', src: 'CH14 Q16', en: 'Purchases would be included in the opening trial balance of an accounting period.', cn: '采购将包含在会计期间的期初试算平衡表中。', ans: false, key: '采购是临时性账户不在期初TB', exp: '<b>采购(Purchases)</b>是<b>利润表项目(P/L item)</b>，属于<b>临时性账户(Temporary account)</b>。利润表账户在每个会计期末会被结清(Closed off)，余额转入<b>留存收益(Retained earnings)</b>。下个期间开始时，采购账户期初余额为<b>零</b>。' },
                    { id: 'ch14-q16-3', src: 'CH14 Q16', en: 'Depreciation expense would be included in the opening trial balance of an accounting period.', cn: '折旧费用将包含在会计期间的期初试算平衡表中。', ans: false, key: '折旧费用是临时性账户期末结清', exp: '<b>折旧费用(Depreciation expense)</b>是<b>利润表项目(P/L item)</b>，期末会被结清。注意区分：<b>累计折旧(Accumulated depreciation)</b>是<b>资产负债表项目</b>，会出现在期初TB中；但"折旧费用"账户不会。' },
                    { id: 'ch14-q16-4', src: 'CH14 Q16', en: 'Receivables would be included in the opening trial balance of an accounting period.', cn: '应收款项将包含在会计期间的期初试算平衡表中。', ans: true, key: '应收款项是永久性账户', exp: '<b>应收款项(Receivables)</b>是<b>流动资产(Current asset)</b>，属于<b>永久性账户(Permanent account)</b>。其期末余额会结转并在<b>期初试算平衡表(Opening TB)</b>中出现。' },

                    // Q19 (原题号5) - 单选题: 更正分录方向
                    { id: 'ch14-q19-1', src: 'CH14 Q19', ctx: 'An insurance invoice was incorrectly posted to distribution costs instead of administrative expenses.', en: 'The correcting journal entry should debit administrative expenses and credit distribution costs.', cn: '更正日记账分录应借记管理费用贷记分销成本。', ans: true, key: '更正分录借正确科目贷错误科目', exp: '(1) 减少错误的<b>分销成本(Distribution costs)</b>：费用减少记<b>贷方</b>。(2) 增加正确的<b>管理费用(Administrative expenses)</b>：费用增加记<b>借方</b>。所以更正分录是 DR Admin CR Distribution。' },
                    { id: 'ch14-q19-2', src: 'CH14 Q19', ctx: 'An insurance invoice was incorrectly posted to distribution costs instead of administrative expenses.', en: 'This error will cause the trial balance not to balance.', cn: '这个错误会导致试算平衡表不平衡。', ans: false, key: '费用间分类错误不影响TB', exp: '这是<b>分类错误(Error of commission)</b>。虽然记入了错误的费用账户，但借贷金额仍然相等（对应的贷方如银行/应付账款不受影响），试算平衡表仍然<b>平衡</b>，不会产生暂记账户。' },

                    // Q20 (原题号29) - 单选题: 提款误记为费用
                    { id: 'ch14-q20-1', src: 'CH14 Q20', ctx: 'A sole trader discovered that drawings have been debited to the other expenses account in error.', en: 'The correcting entry should debit the capital account and credit the other expenses account.', cn: '更正分录应借记资本账户贷记其他费用账户。', ans: true, key: '提款误记费用需调入资本账户', exp: '(1) 减少错误的<b>其他费用(Other expenses)</b>：费用减少记<b>贷方(CR)</b>。(2) 正确记录<b>提款(Drawings)</b>减少业主权益：<b>资本(Capital)</b>减少记<b>借方(DR)</b>。更正分录为 DR Capital, CR Other expenses。' },
                    { id: 'ch14-q20-2', src: 'CH14 Q20', ctx: 'A sole trader discovered that drawings have been debited to the other expenses account in error.', en: 'This error requires the use of a suspense account to correct.', cn: '更正此错误需要使用暂记账户。', ans: false, key: '此错误不需要暂记账户', exp: '原始错误分录的借贷金额相等（借方金额=贷方金额），试算平衡表仍然平衡。这是费用和提款之间的<b>分类错误</b>，不影响借贷平衡，因此更正此错误<b>不需要</b>使用<b>暂记账户(Suspense account)</b>。' },

                    // Q23 (原题号39) - 单选题: 错误类型识别
                    { id: 'ch14-q23-1', src: 'CH14 Q23', ctx: 'Repair costs for shop fixtures have been added to the non-current asset balance in the statement of financial position.', en: 'This is an example of an error of principle.', cn: '这是原则性错误的一个例子。', ans: true, key: '收益性支出资本化是原则性错误', exp: '修理费(Repair cost)是<b>收益性支出(Revenue expenditure)</b>，应当期费用化。将其错误地当作<b>资本性支出(Capital expenditure)</b>记入<b>非流动资产(NCA)</b>，违反了基本的会计原则，是典型的<b>原则性错误(Error of principle)</b>。' },
                    { id: 'ch14-q23-2', src: 'CH14 Q23', ctx: 'Repair costs for shop fixtures have been added to the non-current asset balance in the statement of financial position.', en: 'This is an example of an error of omission.', cn: '这是遗漏错误的一个例子。', ans: false, key: '交易已记录只是记错类别', exp: '<b>遗漏错误(Error of omission)</b>是指整个交易被完全遗漏，没有记录。此处交易<b>已经被记录</b>了，只是记错了账户类别（费用记为资产）。所以不是遗漏错误，而是<b>原则性错误(Error of principle)</b>。' },

                    // ===== 五、不完整记录概念 =====
                    // Q33 (原题号41) - 多选题: 应付账款推算
                    { id: 'ch14-q33-1', src: 'CH14 Q33', en: 'The payables ledger can be used to calculate the missing figure for purchases when dealing with incomplete records.', cn: '处理不完整记录时，应付账款分类账可用于计算缺失的采购数额。', ans: true, key: '应付账款可推算采购额', exp: '通过<b>应付账款控制账户(Payables ledger control account)</b>，如果知道期初期末余额、付款额、折扣和退货等，可以作为平衡项推算出本期的<b>赊购额(Credit purchases)</b>。' },
                    { id: 'ch14-q33-2', src: 'CH14 Q33', en: 'The payables ledger can be used to calculate closing balances with customers when dealing with incomplete records.', cn: '处理不完整记录时，应付账款分类账可用于计算与客户的期末余额。', ans: false, key: '客户余额需用应收账款账户', exp: '与<b>客户(Customers)</b>的期末余额是<b>应收账款(Trade receivables)</b>，需要用<b>应收账款分类账(Receivables ledger)</b>来计算，而不是应付账款分类账。应付账款只涉及<b>供应商(Suppliers)</b>。' },
                    { id: 'ch14-q33-3', src: 'CH14 Q33', en: 'The payables ledger can be used to calculate the opening balance with suppliers when dealing with incomplete records.', cn: '处理不完整记录时，应付账款分类账可用于计算与供应商的期初余额。', ans: true, key: '应付账款可倒推供应商期初余额', exp: '如果知道应付账款的期末余额、本期采购额、付款额和折扣等，可以通过<b>应付账款控制账户(Payables control account)</b>倒推出与供应商的<b>期初余额(Opening balance)</b>。' },
                    { id: 'ch14-q33-4', src: 'CH14 Q33', en: 'The payables ledger can be used to calculate cash paid to customers when dealing with incomplete records.', cn: '处理不完整记录时，应付账款分类账可用于计算付给客户的现金。', ans: false, key: '付给客户现金不通过应付账款', exp: '付给<b>客户(Customers)</b>的现金通常是销售退款，影响的是<b>应收账款(Receivables)</b>或现金账户，而不是<b>应付账款分类账(Payables ledger)</b>。应付账款只跟踪对<b>供应商(Suppliers)</b>的付款。' },

                    // Q42 (原题号10) - 匹配题: 资本变动等式
                    { id: 'ch14-q42-1', src: 'CH14 Q42', ctx: 'Using the net assets method to calculate profit: Profit = Assets - Liabilities - Opening Capital - Capital Introduced + Drawings.', en: 'When calculating profit using the net assets method, opening capital should be deducted.', cn: '使用净资产法计算利润时，期初资本应作为减项。', ans: true, key: '期初资本是计算利润的减项', exp: '根据<b>资本变动等式(Capital reconciliation)</b>：本期利润 = 期末资本 - 期初资本 + 提款 - 追加资本。其中期末资本 = 期末资产 - 期末负债。因此<b>期初资本(Opening capital)</b>在计算利润时是<b>减项(Deducted)</b>。' },
                    { id: 'ch14-q42-2', src: 'CH14 Q42', ctx: 'Using the net assets method to calculate profit: Profit = Assets - Liabilities - Opening Capital - Capital Introduced + Drawings.', en: 'When calculating profit using the net assets method, capital introduced during the period should be added.', cn: '使用净资产法计算利润时，期内追加资本应作为加项。', ans: false, key: '追加资本是计算利润的减项', exp: '根据<b>资本变动等式</b>，<b>追加资本(Capital introduced)</b>在计算利润时是<b>减项(Deducted)</b>，不是加项。因为追加资本增加了期末净资产，但它不是通过<b>经营活动(Operating activities)</b>产生的利润。' },
                    { id: 'ch14-q42-3', src: 'CH14 Q42', ctx: 'Using the net assets method to calculate profit: Profit = Assets - Liabilities - Opening Capital - Capital Introduced + Drawings.', en: 'When calculating profit using the net assets method, drawings should be added.', cn: '使用净资产法计算利润时，提款应作为加项。', ans: true, key: '提款是计算利润的加项', exp: '根据<b>资本变动等式</b>，<b>提款(Drawings)</b>在计算利润时是<b>加项(Added)</b>。因为提款减少了期末净资产，但它不是经营亏损。提款的金额需要<b>加回</b>以反映真实的经营利润。' },
                    { id: 'ch14-q42-4', src: 'CH14 Q42', ctx: 'Using the net assets method to calculate profit: Profit = Assets - Liabilities - Opening Capital - Capital Introduced + Drawings.', en: 'When calculating profit using the net assets method, liabilities at the end of the period should be deducted.', cn: '使用净资产法计算利润时，期末负债应作为减项。', ans: true, key: '期末负债是计算利润的减项', exp: '根据<b>资本变动等式</b>，<b>期末负债(Liabilities)</b>从期末<b>资产(Assets)</b>中扣除以得到<b>期末资本(Closing capital = Assets - Liabilities)</b>。因此期末负债在计算利润时是<b>减项(Deducted)</b>。' }
                ]
            },
            {
                id: 'ch15',
                title: 'CH15 财务报表通用原则与损益表及财务状况表',
                label: 'CH15',
                items: [
                    // CH15 Q1 (原题号 2) - 判断题: 附注的目的
                    { id: 'ch15-q1-1', src: 'CH15 Q1', en: 'Disclosure notes only provide qualitative information about the accounting policies used by the entity.', cn: '披露附注仅提供关于主体所用会计政策的定性信息。', ans: false, key: '披露附注既含定性也含定量', exp: '披露附注(Disclosure notes)不仅提供关于会计政策的<b>定性信息(qualitative information)</b>，还提供大量的<b>定量信息(quantitative information)</b>。' },
                    { id: 'ch15-q1-2', src: 'CH15 Q1', en: 'Disclosure notes provide information to improve readers\' understanding of the financial statements.', cn: '披露附注提供信息以增进读者对财务报表的理解。', ans: true, key: '附注旨在增进理解', exp: '财务报表正文中的数字是高度汇总的，附注通过提供更详细的分解和解释，帮助报表使用者更好地<b>理解(understanding)</b>财务报表。' },

                    // CH15 Q2 (原题号 12) - 判断题/匹配题: 列示位置
                    { id: 'ch15-q2-1', src: 'CH15 Q2', en: 'The carrying amount of equipment at the start of the year will be shown in the statement of financial position.', cn: '年初设备账面净值将显示在财务状况表中。', ans: false, key: '年初账面净值在附注中披露', exp: '<b>年初账面净值(Carrying amount at the start of the year)</b>是非流动资产变动调节表的一部分，在<b>披露附注(Disclosure notes)</b>中详细说明，而不是在财务状况表正文列示。' },
                    { id: 'ch15-q2-2', src: 'CH15 Q2', en: 'Cash in hand will be shown in the disclosure notes.', cn: '手头现金将显示在披露附注中。', ans: false, key: '手头现金不单独列示/披露', exp: '<b>手头现金(Cash in hand)</b>通常与银行存款合并为“现金及现金等价物”在财务状况表列示，本身作为一个单独的数字通常既不在正文也不在附注中单独披露。' },
                    { id: 'ch15-q2-3', src: 'CH15 Q2', en: 'Work in progress will be shown in the disclosure notes.', cn: '在产品将显示在披露附注中。', ans: true, key: '存货的分类细节在附注', exp: '存货总额列示在财务状况表正文，而存货的构成明细（如原材料、<b>在产品/Work in progress</b>、产成品）会在<b>披露附注(Disclosure notes)</b>中分解说明。' },
                    { id: 'ch15-q2-4', src: 'CH15 Q2', en: 'Intangible assets will be shown in the statement of financial position.', cn: '无形资产将显示在财务状况表中。', ans: true, key: '无形资产列示财务状况表', exp: '<b>无形资产(Intangible assets)</b>是一个重要的资产类别，通常会在<b>财务状况表(Statement of financial position)</b>正文的非流动资产部分作为单独的行项目列示。' },

                    // CH15 Q3 (原题号 13) - 多选题: 收入确认
                    { id: 'ch15-q3-1', src: 'CH15 Q3', en: 'Revenue is included within the statement of profit or loss when an order is received.', cn: '收入在收到订单时计入损益表。', ans: false, key: '收到订单并非确认时点', exp: '收到订单时，客户尚未获得控制权，<b>履约义务(performance obligation)</b>尚未完成，因此不能确认<b>收入(revenue)</b>。' },
                    { id: 'ch15-q3-2', src: 'CH15 Q3', en: 'Revenue is included within the statement of profit or loss when the sale is made.', cn: '收入在销售达成时计入损益表。', ans: true, key: '销售达成时确认收入', exp: '当<b>销售达成(sale is made)</b>时，意味着商品控制权已转移，<b>履约义务(performance obligation)</b>完成，此时应确认收入。' },
                    { id: 'ch15-q3-3', src: 'CH15 Q3', en: 'Revenue is included within the statement of profit or loss when cash is transferred from buyer to seller.', cn: '收入在现金从买方转移到卖方时计入损益表。', ans: false, key: '收入确认不看现金收付', exp: '收入确认基于<b>权责发生制(Accruals concept)</b>而非收付实现制，不能只看是否收到了<b>现金(cash)</b>。' },
                    { id: 'ch15-q3-4', src: 'CH15 Q3', en: 'Revenue is included within the statement of profit or loss on the basis of the accruals concept.', cn: '收入基于权责发生制概念计入损益表。', ans: true, key: '收入确认基于权责发生制', exp: '<b>权责发生制(Accruals concept)</b>要求利润在赚取时（即履约义务完成时）计算确认，而不是收到现金时。' },

                    // CH15 Q4 (原题号 14) - 匹配题: SPL还是SCF
                    { id: 'ch15-q4-1', src: 'CH15 Q4', en: 'Taxation paid will be found in a statement of profit or loss.', cn: '支付的税款将出现在损益表中。', ans: false, key: '支付现金属于现金流量表', exp: '<b>支付的税款(Taxation paid)</b>是一笔实际的现金流出，应列示在<b>现金流量表(Statement of cash flows)</b>中；损益表列示的是当期应交税费(Taxation expense)。' },
                    { id: 'ch15-q4-2', src: 'CH15 Q4', en: 'Sales made on credit will be found in a statement of profit or loss.', cn: '赊销将出现在损益表中。', ans: true, key: '赊销收入属于损益表', exp: '即使未收到现金，根据<b>权责发生制(Accruals basis)</b>，<b>赊销(Sales made on credit)</b>也构成了本期收入，列示在<b>损益表(Statement of profit or loss)</b>。' },
                    { id: 'ch15-q4-3', src: 'CH15 Q4', en: 'Capital introduced will be found in a statement of profit or loss.', cn: '投入的资本将出现在损益表中。', ans: false, key: '投入资本属于现金流量表', exp: '业主<b>投入的资本(Capital introduced)</b>由于是一笔现金流入，应列示在<b>现金流量表(Statement of cash flows)</b>筹资活动中，不影响当期利润。' },
                    { id: 'ch15-q4-4', src: 'CH15 Q4', en: 'Proceeds from sale of land and buildings will be found in a statement of profit or loss.', cn: '出售土地和建筑物的所得将出现在损益表中。', ans: false, key: '出售所得款项属现金流量', exp: '出售土地/建筑物的<b>所得买款(Proceeds)</b>是实际收到的现金，属于<b>现金流量表(Statement of cash flows)</b>投资活动的流入。只有出售产生的损益(profit/loss on disposal)才列在损益表。' },

                    // CH15 Q5 (原题号 18) - 多选题: IAS 1 最低披露要求
                    { id: 'ch15-q5-1', src: 'CH15 Q5', en: 'Cost of sales is required by IAS 1 to be disclosed on the face of the Statement of Profit or Loss.', cn: 'IAS 1要求销货成本在损益表正文披露。', ans: false, key: '销货成本不是强制单独列示', exp: '如果采用按性质分类费用法，则不会单独列示<b>销货成本(Cost of sales)</b>，因此它不属于在所有情况下都强制在正文披露的项目。' },
                    { id: 'ch15-q5-2', src: 'CH15 Q5', en: 'Income tax expense is required by IAS 1 to be disclosed on the face of the Statement of Profit or Loss.', cn: 'IAS 1要求所得税费用在损益表正文披露。', ans: true, key: '税费必须单独列示在正文', exp: 'IAS 1明确要求<b>所得税费用(Income tax expense)</b>必须在损益表正文单独列示。' },
                    { id: 'ch15-q5-3', src: 'CH15 Q5', en: 'Other income is required by IAS 1 to be disclosed on the face of the Statement of Profit or Loss.', cn: 'IAS 1要求其他收入在损益表正文披露。', ans: false, key: '其他收入不强制单独列示', exp: '<b>其他收入(Other income)</b>通常会列示，但在IAS 1的最低要求中并不强制将其作为一个独立的标题进行正文列示。' },
                    { id: 'ch15-q5-4', src: 'CH15 Q5', en: 'Revenue is required by IAS 1 to be disclosed on the face of the Statement of Profit or Loss.', cn: 'IAS 1要求收入在损益表正文披露。', ans: true, key: '收入必须单独列示在正文', exp: 'IAS 1明确要求<b>收入(Revenue)</b>必须在损益表正文单独列示，这是核心的报表数字。' },

                    // CH15 Q6 (原题号 21) - 单选题: 重要性
                    { id: 'ch15-q6-1', src: 'CH15 Q6', en: 'Materiality depends on the size of an omission or misstatement.', cn: '重要性取决于错报或漏报的金额大小。', ans: false, key: '重要性取决于金额和性质', exp: '<b>重要性(Materiality)</b>不仅取决于金额大小(size)，还取决于其<b>性质(nature)</b>是否影响报表使用者的经济决策。' },
                    { id: 'ch15-q6-2', src: 'CH15 Q6', en: 'Material items may be aggregated with similar items in the financial statements.', cn: '重要项目可以与财务报表中的类似项目汇总。', ans: false, key: '重要项目要单独列示', exp: '<b>重要项目(Material items)</b>通常需要单独列示(presented separately)，汇总会掩盖其重要性。' },
                    { id: 'ch15-q6-3', src: 'CH15 Q6', en: 'Immaterial items need not be presented separately.', cn: '不重要项目无需单独列示。', ans: true, key: '不重要单独列示可汇总', exp: '为了避免财务报表过于杂乱，<b>不重要的项目(Immaterial items)</b>无需单独列示，可以进行<b>汇总(aggregated)</b>。' },
                    { id: 'ch15-q6-4', src: 'CH15 Q6', en: 'Immaterial items can be aggregated in the financial statements but not in the notes.', cn: '不重要项目可以在财务报表中汇总，但在附注中不能。', ans: false, key: '附注中也可以汇总不重要项目', exp: '<b>不重要的项目(Immaterial items)</b>无论在财务报表正文还是在<b>附注(notes)</b>中都可以按照性质和功能进行汇总。' },

                    // CH15 Q7 (原题号 22) - 单选题: 比较信息
                    { id: 'ch15-q7-1', src: 'CH15 Q7', en: 'In accordance with IAS 1, all numerical and narrative information for the previous period must be disclosed as comparative information.', cn: '根据IAS 1，必须将上一期间的所有数字和叙述性信息作为比较信息披露。', ans: false, key: '不仅是所有信息需相关', exp: '企业只需提供<b>与理解当期财务报表相关(relevant)</b>的叙述性和描述性信息，而非绝对盲从地附上所有往期叙述。' },
                    { id: 'ch15-q7-2', src: 'CH15 Q7', en: 'In accordance with IAS 1, previous period narrative which is relevant to the current period must be disclosed as comparative information.', cn: '根据IAS 1，与当期相关的上一期间叙述性信息必须作为比较信息披露。', ans: true, key: '相关性则是披露的刚需', exp: '当与理解当期报表<b>相关(relevant)</b>时，就不可或缺地必须包括上一期间的叙述性(narrative)和描述性信息以形成对比。' },

                    // CH15 Q8 (原题号 23) - 判断题: 履约时间点
                    { id: 'ch15-q8-1', src: 'CH15 Q8', en: 'The performance obligation of carrying out annual tests of car safety and roadworthiness will be satisfied over time.', cn: '进行年度汽车安全和适路性测试的履约义务将在某一时段内完成。', ans: false, key: '即时一次性测试时点完成', exp: '测试完成出报告时一次性完成交付内容，因此这是在<b>某一时点(at a point in time)</b>瞬间完成履约。' },
                    { id: 'ch15-q8-2', src: 'CH15 Q8', en: 'The performance obligation of providing service contracts with new car sales will be satisfied over time.', cn: '新车销售附带服务合同的履约义务将在某一时段内完成。', ans: true, key: '长期合约时段内累积履行', exp: '保养服务合同涵盖长期时间范围，客户在此期间匀性地同时接受并消耗这些保护服务利益，界定为在<b>某一时段内(over time)</b>完成交付。' },

                    // CH15 Q9 (原题号 24) - 单选题: 控制权转移
                    { id: 'ch15-q9-1', src: 'CH15 Q9', en: 'The customer having legal title to the goods is an indicator of the transfer of control.', cn: '客户拥有商品的法定所有权是控制权转移的指标。', ans: true, key: '法定所有权是重大指标', exp: '取得<b>法定所有权(legal title)</b>说明所有权人对其财产享有处分权，这是客户获取商品实质控制权的强有力指标。' },
                    { id: 'ch15-q9-2', src: 'CH15 Q9', en: 'The customer having paid a deposit for the goods is an indicator of the transfer of control.', cn: '客户已为商品支付定金是控制权转移的指标。', ans: false, key: '支付定金完全不发生控制转移', exp: '支付<b>定金(deposit)</b>只属交易发轫期的一种融资或担保约定，不代表客户已经获得了对该商品的<b>控制权(control)</b>。' },
                    { id: 'ch15-q9-3', src: 'CH15 Q9', en: 'The customer being obliged to pay for the goods is an indicator of the transfer of control.', cn: '客户有义务为商品付款是控制权转移的指标。', ans: true, key: '无条件付款义务是指标', exp: '当卖方完成其交付触发客户向卖方产生无条件的<b>现时实体付款义务(obliged to pay)</b>时，印证买家此时点其实已经接受并控制了货物。' },

                    // CH15 Q10 (原题号 25) - 单选题: IF15五步法
                    { id: 'ch15-q10-1', src: 'CH15 Q10', en: 'Identifying the performance obligations in a contract is one of the five steps in recognising revenue under IFRS 15.', cn: '根据IFRS 15，识别合同中的履约义务是确认收入的五个步骤之一。', ans: true, key: '履约拆解属于五步之一', exp: '<b>识别履约义务(Identify performance obligations)</b>正是五步法确认模型核心逻辑链路的第二步。' },
                    { id: 'ch15-q10-2', src: 'CH15 Q10', en: 'Assessing whether control of the goods or services has been transferred to the customer is one of the five steps in recognising revenue under IFRS 15.', cn: '根据IFRS 15，评估商品或服务的控制权是否已转移给客户是确认收入的五个步骤之一。', ans: false, key: '评估控制权不单立步', exp: '审查<b>控制权是否转移(control has been transferred)</b>的动作本质是服务于界定第五步的履约确认标准，其自身不是五步法中并列的单独步骤。' },

                    // CH15 Q11 (原题号 3) - 多选题: 必须单独披露的项目
                    { id: 'ch15-q11-1', src: 'CH15 Q11', en: 'A write-off of inventory must be disclosed either in the statement of profit or loss or in the notes.', cn: '存货核销必须在损益表或附注中披露。', ans: true, key: '强制揭示存货核销', exp: '<b>存货核销(Write-off of inventory)</b>是一项影响重大的减值动作，对主体的成本有非常态化影响，必须向外披露。' },
                    { id: 'ch15-q11-2', src: 'CH15 Q11', en: 'Wages of staff must be disclosed as a separate item either in the statement of profit or loss or in the notes.', cn: '员工工资必须在损益表或附注中作为单独项目披露。', ans: false, key: '单项工资大多予整合', exp: '员工福利通常作为费用全貌的一枝分支存在（如分配至制造费用或管理费用），纯粹单独列出<b>员工工资(Wages of staff)</b>并非强制事项。' },
                    { id: 'ch15-q11-3', src: 'CH15 Q11', en: 'Finance costs must be disclosed either in the statement of profit or loss or in the notes.', cn: '财务费用必须在损益表或附注中披露。', ans: true, key: '财务费用必单列在面', exp: '按照公允披露准则IAS 1明确的表体格式要求，<b>财务费用(Finance costs)</b>必须被单独作为一个单行的财务成果独立行项目供评判资金成本。' },

                    // CH15 Q13 (原题号 8) - 多选题: 分销成本
                    { id: 'ch15-q13-1', src: 'CH15 Q13', en: 'Marketing expenses would be included within selling and distribution costs.', cn: '营销费用将包含在销售和分销成本中。', ans: true, key: '营销费用计入分销', exp: '<b>营销活动(Marketing expenses)</b>是推售产品与获客的第一顺位手段，理应直属于<b>销售和分销成本(Selling and distribution costs)</b>序列。' },
                    { id: 'ch15-q13-2', src: 'CH15 Q13', en: 'Heating and lighting costs of the finance office would be included within selling and distribution costs.', cn: '财务办公室的暖气和照明费用将包含在销售和分销成本中。', ans: false, key: '后台费用不入前端成本', exp: '财务室等后台部门职员和资源开耗构成了整体经营护持体系，它们的开销列为<b>管理费用(Administrative expenses)</b>。' },
                    { id: 'ch15-q13-3', src: 'CH15 Q13', en: 'Depreciation of delivery vans would be included within selling and distribution costs.', cn: '送货车的折旧将包含在销售和分销成本中。', ans: true, key: '送货相关损耗计入分销', exp: '因为<b>送货车(Delivery vans)</b>专项专门用于将产品送达到客户的销售后端环节，其运力折旧对应计入<b>分销成本(Distribution costs)</b>。' },

                    // CH15 Q14 (原题号 9) - 匹配题: 费用归类
                    { id: 'ch15-q14-1', src: 'CH15 Q14', en: 'Depreciation charged on factory machinery should be allocated to cost of sales.', cn: '工厂机器的折旧应分配到销货成本。', ans: true, key: '工厂设备折旧入销货成本', exp: '<b>工厂机器(Factory machinery)</b>磨损直联核心产品成型，其折旧折算入产品制造成本并内化入<b>销货成本(Cost of sales)</b>。' },
                    { id: 'ch15-q14-2', src: 'CH15 Q14', en: 'Computer consumables for printing in the finance office should be allocated to cost of sales.', cn: '财务办公室打印用电脑耗材应分配到销货成本。', ans: false, key: '非直联耗材入管理费用', exp: '维持后台财务部办公室运转的办公消耗件属于<b>管理费用(Administrative expenses)</b>支出。' },
                    { id: 'ch15-q14-3', src: 'CH15 Q14', en: 'Interest costs on a bank overdraft should be allocated to finance costs.', cn: '银行透支的利息成本应分配到财务费用。', ans: true, key: '资金贷出成本入财务', exp: '融通款项占有而支付的代价（<b>利息/Interest costs</b>）单列划分为<b>财务费用(Finance costs)</b>。' },
                    { id: 'ch15-q14-4', src: 'CH15 Q14', en: 'Wages cost for the sales team should be allocated to administrative expenses.', cn: '销售团队的工资成本应分配到管理费用。', ans: false, key: '前线人员工资入分销', exp: '负责业务推销转化的<b>销售团队(Sales team)</b>酬金由于针对特定的前端推举被计入<b>销售和分销成本(Distribution costs)</b>。' },

                    // CH15 Q24 (原题号 1) - 多选题: 流动负债
                    { id: 'ch15-q24-1', src: 'CH15 Q24', en: 'A bank loan repayable in two years would be classified as a current liability.', cn: '两年内偿还的银行贷款将被归类为流动负债。', ans: false, key: '长期负债超限一年', exp: '预期结算远于下一营业周期的债务归于长线即<b>非流动负债(Non-current liability)</b>。' },
                    { id: 'ch15-q24-2', src: 'CH15 Q24', en: 'A bank overdraft would be classified as a current liability.', cn: '银行透支将被归类为流动负债。', ans: true, key: '随时清索皆列流动项', exp: '有条件触发银行<b>即时清偿(repayable on demand)</b>条款之银行透支等负债始终属流动负债。' },
                    { id: 'ch15-q24-3', src: 'CH15 Q24', en: 'Trade payables would be classified as a current liability.', cn: '应付账款将被归类为流动负债。', ans: true, key: '日常货账作流动负债', exp: '随常规上下游商务贸易结算的未付货款即<b>应付账款(Trade payables)</b>，处于正常营业短期期限制内判定为流动负债。' },
                    { id: 'ch15-q24-4', src: 'CH15 Q24', en: 'Capital would be classified as a current liability.', cn: '资本将被归类为流动负债。', ans: false, key: '混淆所有者权益负债', exp: '<b>资本(Capital)</b>表明了内生的净身资产剩余权益属于股东方所有者不属于对第三方的外界偿还义务即不为负债。' },

                    // CH15 Q25 (原题号 6) - 单选题: Provisions
                    { id: 'ch15-q25-1', src: 'CH15 Q25', en: 'Provisions would be found in the equity section of the statement of financial position.', cn: '预计负债将在财务状况表的权益部分中找到。', ans: false, key: '准备金性质不属业主权益', exp: '引致资源预期流出所构建的<b>预计负债(Provisions)</b>由于体现的是应对不确定外界债权的可能扣件，故不算入权益范畴。' },
                    { id: 'ch15-q25-2', src: 'CH15 Q25', en: 'Provisions would be found in the liabilities section of the statement of financial position.', cn: '预计负债将在财务状况表的负债部分中找到。', ans: true, key: '现存义务即属负债区段', exp: '既然本质依旧是一项承担了清算任务并有确切预估代价流出的义务(obligation)，将其列入<b>负债(Liabilities)</b>区域内是唯一合正义操作。' },

                    // CH15 Q26 (原题号 11) - 单选题: 识别流动负债
                    { id: 'ch15-q26-1', src: 'CH15 Q26', en: 'Accumulated depreciation would be included within current liabilities.', cn: '累计折旧将包含在流动负债中。', ans: false, key: '资产备抵与负债无关', exp: '用以反映历年已磨耗抵减额的账目如<b>累计折旧(Accumulated depreciation)</b>仅仅位于资产边且作为减项，并非真正对外产生债务。' },
                    { id: 'ch15-q26-2', src: 'CH15 Q26', en: 'An allowance for receivables would be included within current liabilities.', cn: '应收账款坏账准备将包含在流动负债中。', ans: false, key: '剥离虚假负债错觉', exp: '用以抵减应接账款预期缩水的<b>坏账准备(Allowance for receivables)</b>即扣减对应款目额，而不属确认一项新负债。' },
                    { id: 'ch15-q26-3', src: 'CH15 Q26', en: 'A bank overdraft would be included within current liabilities.', cn: '银行透支将包含在流动负债中。', ans: true, key: '立付借期透支属流动项', exp: '随时有被要求无条件填归的性质迫使<b>银行透支(Bank overdraft)</b>无条件归案于刚性的短期流动负债。' },

                    // CH15 Q27 (原题号 15) - 判断题: SFP 列报
                    { id: 'ch15-q27-1', src: 'CH15 Q27', ctx: 'A company has a bank overdraft and has had a similar balance for the last four years. There are no plans to change this in the next two years.', en: 'It should be included as a non-current liability.', cn: '它应作为非流动负债列示。', ans: false, key: '透支本质定性属流动项', exp: '借贷协议上所赋予银行方可启动<b>随时收回(repayable on demand)</b>权利锁死了其呈报必须定性，无论透支存续历经多长皆被看作流动负债(current liability)。' },
                    { id: 'ch15-q27-2', src: 'CH15 Q27', ctx: 'A company has purchased a motor vehicle for use by their sales manager. After 12 months it will be sold.', en: 'They should include it as part of inventory.', cn: '他们应将其作为存货的一部分列示。', ans: false, key: '非自制营业存货不可跨权', exp: '为销售助力而不是作本行营业流向核心倒手交易的汽车为<b>非流动资产(Non-current asset)</b>。即便打算短期出售也不能作正常的待售存货。' },

                    // CH15 Q28 (原题号 20) - 匹配题: 各种余额归哪类
                    { id: 'ch15-q28-1', src: 'CH15 Q28', en: 'Accruals would be included in the current liabilities in the Statement of Financial Position.', cn: '应计费用将包含在财务状况表的流动负债中。', ans: true, key: '临期费用入流动负债', exp: '收益已生但延持留存未付清的营运<b>应计费用(Accruals)</b>必然界定为需短期清账的<b>流动负债(Current liabilities)</b>。' },
                    { id: 'ch15-q28-2', src: 'CH15 Q28', en: 'Dividends paid would be included in the non-current liabilities in the Statement of Financial Position.', cn: '已付股息将包含在财务状况表的非流动负债中。', ans: false, key: '支付股息分化减权益', exp: '因为钱款动作上已经打出其记录直接挂靠抵除<b>留存收益(Retained earnings)</b>，属于所有者权益板块变化不属任何长短负债。' },
                    { id: 'ch15-q28-3', src: 'CH15 Q28', en: 'Accumulated depreciation would be included in the non-current assets in the Statement of Financial Position.', cn: '累计折旧将包含在财务状况表的非流动资产中。', ans: true, key: '折旧定资产计落非流动端', exp: '虽为逆向负数(备抵)，但<b>累计折旧(Accumulated depreciation)</b>列报时随扣附属定在原母账旁直接归列连排于<b>非流动资产(Non-current assets)</b>条线下。' }
                ]
            },

            // ==================== CH16: 现金流量表 (IAS 7 Statement of Cash Flows) ====================
            {
                id: 'ch16',
                title: '现金流量表 (IAS 7 Statement of Cash Flows)',
                label: 'CH16',
                items: [
                    // ===== 一、现金流量表的目的、原则与局限性 =====
                    // Q1 (原题号1) - 判断题: 现金流量表描述
                    { id: 'ch16-q1-1', src: 'CH16 Q1', en: 'A cash flow statement is a future record of cash paid and received.', cn: '现金流量表是对未来支付和收到的现金的记录。', ans: false, key: '历史记录而非未来预测', exp: '<b>现金流量表(Statement of cash flows)</b>是关于过去一个会计期间内现金流入和流出的<b>历史记录(historical record)</b>，而不是对未来的记录或预测。' },
                    { id: 'ch16-q1-2', src: 'CH16 Q1', en: 'Cash flow statements include non-cash transactions that will have a significant impact on cash flows in the future.', cn: '现金流量表包含对未来现金流有重大影响的非现金交易。', ans: false, key: '不包含非现金交易', exp: '<b>现金流量表(Statement of cash flows)</b>不包含<b>非现金交易(non-cash transactions)</b>，例如以发行股票方式购置资产。这些重大的非现金交易应在<b>财务报表附注(notes)</b>中单独披露。' },
                    { id: 'ch16-q1-3', src: 'CH16 Q1', en: 'Cash flow statements allow users to see how much cash investment is being made in new assets.', cn: '现金流量表允许使用者看到对新资产进行了多少现金投资。', ans: true, key: '投资活动展示资产现金投入', exp: '购置新资产的现金支出会作为<b>投资活动(investing activities)</b>的一部分在现金流量表中列示，让使用者可以看到企业在新资产上的现金投资规模。' },
                    { id: 'ch16-q1-4', src: 'CH16 Q1', en: 'Users of the financial statements can see whether increases in cash have come from trading activities.', cn: '财务报表使用者可以看到现金的增加是否来自交易活动。', ans: true, key: '经营活动揭示交易性现金来源', exp: '现金流量表将现金流分为经营、投资和筹资三类活动。使用者可以通过查看<b>经营活动(operating activities)</b>产生的现金流量，来判断企业的现金增长是否主要来自其核心交易活动。' },

                    // Q2 (原题号5) - 判断题: 现金流量表描述（变体）
                    { id: 'ch16-q2-1', src: 'CH16 Q2', en: 'A statement of cash flows is only prepared by limited companies.', cn: '现金流量表仅由有限公司编制。', ans: false, key: '不限于有限公司', exp: '根据<b>IAS 7</b>，所有需要编制财务报表的实体都应编制<b>现金流量表(Statement of cash flows)</b>。虽然小型个体经营者或合伙企业可能因豁免而无需编制，但并非只限定于<b>有限公司(limited companies)</b>。' },
                    { id: 'ch16-q2-2', src: 'CH16 Q2', en: 'A statement of cash flows provides information that can already be found in the statement of profit or loss and the statement of financial position.', cn: '现金流量表提供的信息已经可以在损益表和财务状况表中找到。', ans: false, key: '提供其他报表无法直接提供的信息', exp: '现金流量表将<b>权责发生制(accruals basis)</b>下的利润调节为<b>收付实现制(cash basis)</b>下的现金流，提供了关于现金来源和去向的独特信息，这是<b>损益表(SPL)</b>和<b>财务状况表(SFP)</b>无法直接展示的。' },
                    { id: 'ch16-q2-3', src: 'CH16 Q2', en: 'A statement of cash flows that shows an increase in cash and cash equivalents tells the user that the business is solvent.', cn: '显示现金及现金等价物增加的现金流量表告诉使用者该企业具有偿付能力。', ans: false, key: '现金增加不等于偿付能力', exp: '<b>偿付能力(Solvency)</b>是指企业长期偿还债务的能力。现金增加可能来自于<b>借款(borrowings)</b>（增加负债），这并不能说明企业具有偿付能力。企业可能有大量短期内到期的债务。' },
                    { id: 'ch16-q2-4', src: 'CH16 Q2', en: 'A statement of cash flows that shows a decrease in cash and cash equivalents tells the user that the business has overspent this year.', cn: '显示现金及现金等价物减少的现金流量表告诉使用者该企业本年度超支了。', ans: false, key: '现金减少不等于超支', exp: '"超支(overspent)"是一个主观且模糊的词。现金减少可能有很多原因，例如进行了大规模的<b>长期投资(long-term investment)</b>或偿还了大量<b>债务(debts)</b>。这些可能是良好规划和健康发展的表现，不一定是"超支"。' },

                    // Q3 (原题号13) - 多选题: 管理现金流的原因
                    { id: 'ch16-q3-1', src: 'CH16 Q3', en: 'The timing of cash receipts from customers will affect sales revenue.', cn: '从客户处收到现金的时间将影响销售收入。', ans: false, key: '现金收款时间不影响收入确认', exp: '客户收款的时间影响的是<b>现金流(cash flow)</b>，而不是<b>销售收入(sales revenue)</b>。销售收入根据<b>权责发生制(accruals basis)</b>在销售达成时确认，与何时收到现金无关。' },
                    { id: 'ch16-q3-2', src: 'CH16 Q3', en: 'Overdraft interest may be avoided if cash is transferred on time.', cn: '如果现金及时转移，可以避免透支利息。', ans: true, key: '现金管理避免透支利息', exp: '良好的<b>现金流管理(cash flow management)</b>，例如及时将闲置资金转移到可能透支的账户，可以避免产生不必要的<b>银行透支利息(overdraft interest)</b>，从而节约成本。' },
                    { id: 'ch16-q3-3', src: 'CH16 Q3', en: 'Non-payment by customers would result in the customer being denied goods in the future.', cn: '客户不付款将导致未来该客户被拒绝提供商品。', ans: false, key: '客户不付款是信用控制问题而非现金流管理原因', exp: '虽然客户不付款的后果可能是未来被拒绝提供商品，但这更多是<b>信用控制政策(credit control policy)</b>的结果，而不是管理层控制<b>现金流(cash flow)</b>的原因。控制现金流的目的是确保有足够现金运营。' },
                    { id: 'ch16-q3-4', src: 'CH16 Q3', en: 'Discounts might be obtained for prompt payment.', cn: '及时付款可能会获得折扣。', ans: true, key: '及时付款获取折扣', exp: '控制<b>现金流(cash flow)</b>，确保有足够的现金及时支付给供应商，可以利用供应商提供的<b>现金折扣(prompt payment discounts)</b>，从而降低采购成本，增加利润。' },

                    // Q4 (原题号17) - 判断题: 现金与利润
                    { id: 'ch16-q4-1', src: 'CH16 Q4', en: 'If cash is not controlled then the business will cost more to run and profits will be lower.', cn: '如果现金不受控制，那么企业的运营成本会更高，利润会更低。', ans: true, key: '现金管理不善导致利润降低', exp: '如果<b>现金管理(cash management)</b>不善，企业可能会产生不必要的成本，例如：因账户<b>透支(overdraft)</b>而支付高额利息、错过供应商提供的<b>现金折扣(cash discounts)</b>、产生额外的银行手续费等。这些额外成本会直接降低利润。' },
                    { id: 'ch16-q4-2', src: 'CH16 Q4', en: 'The difference between cash flow and profit is just timing.', cn: '现金流和利润之间的差异仅仅是时间问题。', ans: false, key: '差异不仅是时间还有非现金项目', exp: '现金流和利润之间的差异并不仅仅是<b>时间性差异(timing differences)</b>（如赊销导致收入确认时间和现金收款时间不同）。另一个重要原因是<b>非现金项目(non-cash items)</b>，例如<b>折旧(depreciation)</b>、<b>摊销(amortisation)</b>、资产减值损失和出售资产的损益。这些项目影响利润的计算，但本身不涉及当期的现金收支。' },

                    // Q5 (原题号31) - 判断题: 现金流量表描述（另一变体）
                    { id: 'ch16-q5-1', src: 'CH16 Q5', en: 'A statement of cash flows provides information that cannot be found in the statement of profit or loss and the statement of financial position.', cn: '现金流量表提供了在损益表和财务状况表中找不到的信息。', ans: true, key: '提供独特的现金信息', exp: '现金流量表通过将<b>权责发生制(accruals basis)</b>调节为<b>收付实现制(cash basis)</b>，提供了关于现金如何产生和使用的独特信息，这是<b>损益表(SPL)</b>和<b>财务状况表(SFP)</b>无法直接提供的。' },
                    { id: 'ch16-q5-2', src: 'CH16 Q5', en: 'A statement of cash flows that shows a decrease in cash and cash equivalents tells the user that the business is insolvent.', cn: '显示现金及现金等价物减少的现金流量表告诉使用者该企业已丧失偿付能力。', ans: false, key: '现金减少不等于丧失偿付能力', exp: '现金减少并不意味着<b>丧失偿付能力(insolvent)</b>。企业可能用现金进行了有价值的<b>投资(investment)</b>或偿还了<b>债务(debts)</b>。这些行为可能是积极的财务管理决策。' },
                    { id: 'ch16-q5-3', src: 'CH16 Q5', en: 'A statement of cash flows is a useful indicator of a company\'s profitability.', cn: '现金流量表是公司盈利能力的一个有用指标。', ans: false, key: '衡量流动性而非盈利能力', exp: '<b>现金流量表(Statement of cash flows)</b>是<b>流动性(liquidity)</b>和<b>偿付能力(solvency)</b>的一个指标，而不是<b>盈利能力(profitability)</b>的指标。盈利能力主要通过<b>损益表(Statement of profit or loss)</b>来衡量。' },

                    // ===== 二、现金交易 vs 非现金交易 & 活动分类 =====
                    // Q6 (原题号4) - 多选题: 包含在现金流量表中的项目
                    { id: 'ch16-q6-1', src: 'CH16 Q6', en: 'Receipt of a bank loan will be included in a statement of cash flows.', cn: '收到银行贷款将包含在现金流量表中。', ans: true, key: '收到贷款是现金流入', exp: '<b>收到银行贷款(Receipt of a bank loan)</b>代表公司实际从银行收到了现金，是一笔<b>现金流入(cash inflow)</b>，通常归类为<b>筹资活动(financing activities)</b>。' },
                    { id: 'ch16-q6-2', src: 'CH16 Q6', en: 'Dividends received from investments will be included in a statement of cash flows.', cn: '从投资中收到的股息将包含在现金流量表中。', ans: true, key: '收到的股息是实际现金流入', exp: '<b>从投资中收到的股息(Dividends received)</b>是公司实际收到的现金，是一笔<b>现金流入(cash inflow)</b>，通常归类为<b>经营活动(operating activities)</b>或<b>投资活动(investing activities)</b>。' },
                    { id: 'ch16-q6-3', src: 'CH16 Q6', en: 'An increase in market value of investments will be included in a statement of cash flows.', cn: '投资市价的增加将包含在现金流量表中。', ans: false, key: '未实现的公允价值变动不涉及现金', exp: '<b>投资市值的增加(Increase in market value)</b>是一种未实现的<b>公允价值变动(fair value change)</b>，它只是一种账面调整，没有实际的现金流入，直到该投资被出售。这是一种<b>非现金交易(non-cash transaction)</b>。' },
                    { id: 'ch16-q6-4', src: 'CH16 Q6', en: 'Write off of irrecoverable debts will be included in a statement of cash flows.', cn: '坏账核销将包含在现金流量表中。', ans: false, key: '坏账核销无现金流动', exp: '<b>核销坏账(Write off of irrecoverable debts)</b>的会计分录通常是（借：坏账准备，贷：应收账款），它不涉及现金的收支，只是两个<b>资产负债表(SFP)</b>账户之间的调整。' },

                    // Q7 (原题号9) - 匹配题: 交易对现金的影响时间
                    { id: 'ch16-q7-1', src: 'CH16 Q7', en: 'Depreciation of a motor vehicle will never affect cash.', cn: '机动车折旧永远不会影响现金。', ans: true, key: '折旧永不影响现金', exp: '<b>折旧(Depreciation)</b>是一项<b>非现金费用(non-cash expense)</b>，它只是对资产成本的账面分摊，不涉及任何现金的流动。因此，它永远不会影响现金。' },
                    { id: 'ch16-q7-2', src: 'CH16 Q7', en: 'Declaration of a dividend will affect cash now.', cn: '宣布股息将立即影响现金。', ans: false, key: '宣布股息时无现金流出', exp: '<b>宣布股息(Declaration of a dividend)</b>只是董事会的一个意向声明，此时会确认一项<b>应付股息负债(dividend payable)</b>，但没有现金流出。现金流出发生在未来实际<b>支付股息(payment of dividend)</b>时。' },
                    { id: 'ch16-q7-3', src: 'CH16 Q7', en: 'A rights issue of shares will affect cash now.', cn: '供股将立即影响现金。', ans: true, key: '供股产生即时现金流入', exp: '<b>供股(Rights issue)</b>是向现有股东发行新股以筹集资金。当股东认购并支付股款时，公司会收到现金。这是一个现在的<b>现金流入(cash inflow)</b>。' },
                    { id: 'ch16-q7-4', src: 'CH16 Q7', en: 'An accrual for electricity will affect cash now.', cn: '应计电费将立即影响现金。', ans: false, key: '应计费用是未来的现金流出', exp: '<b>应计电费(Accrual for electricity)</b>是指已消耗但尚未支付的电费。它在当期确认为费用和负债，但现金流出发生在未来实际支付账单时。' },

                    // Q8 (原题号15) - 单选题: 以股换股交易
                    { id: 'ch16-q8-1', src: 'CH16 Q8', ctx: 'A company has issued shares in exchange for shares in a subsidiary (a share-for-share exchange).', en: 'The share-for-share exchange should be recorded as a cash inflow in investing activities.', cn: '以股换股交易应记录为投资活动的现金流入。', ans: false, key: '以股换股是非现金交易', exp: '以股换股是一种<b>非现金交易(non-cash transaction)</b>。公司发行自己的股票去交换子公司的股票，整个过程中没有发生<b>现金(cash)</b>的流入或流出。不应在现金流量表中做任何分录。' },
                    { id: 'ch16-q8-2', src: 'CH16 Q8', ctx: 'A company has issued shares in exchange for shares in a subsidiary (a share-for-share exchange).', en: 'The share-for-share exchange should be recorded as a cash inflow in financing activities.', cn: '以股换股交易应记录为筹资活动的现金流入。', ans: false, key: '非现金交易不入报表正文', exp: '虽然发行股票通常属于<b>筹资活动(financing activities)</b>，但这里没有收到现金。根据<b>IAS 7</b>，<b>非现金的(non-cash)</b>投资和筹资活动不应包含在<b>现金流量表正文(body of the statement)</b>中。' },
                    { id: 'ch16-q8-3', src: 'CH16 Q8', ctx: 'A company has issued shares in exchange for shares in a subsidiary (a share-for-share exchange).', en: 'No entries should be made in the statement of cash flows for the share-for-share exchange.', cn: '对于以股换股交易，现金流量表中不应做任何分录。', ans: true, key: '非现金交易不计入现金流量表', exp: '这是正确的。根据<b>IAS 7</b>，现金流量表只记录<b>现金及现金等价物(cash and cash equivalents)</b>的流入和流出。<b>以股换股(share-for-share exchange)</b>是非现金交易，不应记入报表正文。如果重大，应在<b>附注(notes)</b>中披露。' },

                    // Q9 (原题号23) - 判断题: 是否计入现金流量表
                    { id: 'ch16-q9-1', src: 'CH16 Q9', en: 'Tax paid would be included in the statement of cash flows.', cn: '已付税款会包含在现金流量表中。', ans: true, key: '已付税款是实际现金流出', exp: '<b>已付税款(Tax paid)</b>是向税务机关的实际现金支付，是<b>经营活动(operating activities)</b>中的一项典型<b>现金流出(cash outflow)</b>，因此会出现在现金流量表中。' },
                    { id: 'ch16-q9-2', src: 'CH16 Q9', en: 'Receipt from sale of motor vehicle would be included in the statement of cash flows.', cn: '出售机动车的收款会包含在现金流量表中。', ans: true, key: '资产出售收款是实际现金流入', exp: '<b>出售机动车的收款(Receipt from sale)</b>是出售资产收到的实际现金，是<b>投资活动(investing activities)</b>中的一项<b>现金流入(cash inflow)</b>。' },
                    { id: 'ch16-q9-3', src: 'CH16 Q9', en: 'Proposed dividends would be included in the statement of cash flows.', cn: '建议股息会包含在现金流量表中。', ans: false, key: '建议股息无实际现金流出', exp: '<b>建议股息(Proposed dividends)</b>是董事会提议但尚未支付给股东的股息。由于没有发生实际的<b>现金流出(cash outflow)</b>，它是一个<b>非现金项目(non-cash item)</b>。只有在股息被实际<b>支付(dividends paid)</b>时，才会作为<b>筹资活动(financing activities)</b>的现金流出记入报表。' },

                    // Q10 (原题号27) - 单选题: 哪些出现在现金流量表
                    { id: 'ch16-q10-1', src: 'CH16 Q10', en: 'Proposed dividends might appear in a company\'s statement of cash flows.', cn: '建议股息可能出现在公司的现金流量表中。', ans: false, key: '建议股息是非现金项目', exp: '<b>建议的股息(Proposed dividends)</b>在被批准和支付前，没有<b>现金流出(cash outflow)</b>。是<b>非现金项目(non-cash item)</b>，不出现在现金流量表中。' },
                    { id: 'ch16-q10-2', src: 'CH16 Q10', en: 'A rights issue of shares might appear in a company\'s statement of cash flows.', cn: '供股可能出现在公司的现金流量表中。', ans: true, key: '供股产生现金流入', exp: '<b>供股(Rights issue)</b>是向现有股东发行新股筹集现金。这是一个<b>现金流入(cash inflow)</b>项目，属于<b>筹资活动(financing activities)</b>。' },
                    { id: 'ch16-q10-3', src: 'CH16 Q10', en: 'A bonus issue of shares might appear in a company\'s statement of cash flows.', cn: '红股发行可能出现在公司的现金流量表中。', ans: false, key: '红股发行无现金收支', exp: '<b>红股发行(Bonus issue)</b>是将<b>储备(reserves)</b>资本化，不涉及任何现金收支。是<b>非现金交易(non-cash transaction)</b>，不出现在现金流量表中。' },
                    { id: 'ch16-q10-4', src: 'CH16 Q10', en: 'Repayment of loan might appear in a company\'s statement of cash flows.', cn: '偿还贷款可能出现在公司的现金流量表中。', ans: true, key: '偿还贷款是现金流出', exp: '<b>偿还贷款(Repayment of loan)</b>本金涉及现金的流出。这是一个<b>现金流出(cash outflow)</b>项目，属于<b>筹资活动(financing activities)</b>。' },

                    // ===== 三、经营活动现金流（间接法） =====
                    // Q12 (原题号2) - 多选题: 间接法包含的项目
                    { id: 'ch16-q12-1', src: 'CH16 Q12', en: 'Increases in inventory will be included in the cash flows from operating activities section when using the indirect method.', cn: '使用间接法时，存货增加将包含在经营活动现金流部分。', ans: true, key: '存货变动是间接法调整项', exp: '<b>存货(Inventory)</b>是<b>营运资本(working capital)</b>的一部分。在<b>间接法(indirect method)</b>下，存货增加意味着企业用现金购买了存货但尚未售出，作为<b>现金流出调整项(adjustment)</b>从利润中减去。' },
                    { id: 'ch16-q12-2', src: 'CH16 Q12', en: 'Cash paid to employees will be included in the cash flows from operating activities section when using the indirect method.', cn: '使用间接法时，支付给员工的现金将包含在经营活动现金流部分。', ans: false, key: '支付给员工的现金是直接法项目', exp: '"<b>支付给员工的现金(Cash paid to employees)</b>"是<b>直接法(direct method)</b>下的一个具体现金流出项目。<b>间接法(indirect method)</b>不直接列示此项，而是从税前利润开始调整。' },
                    { id: 'ch16-q12-3', src: 'CH16 Q12', en: 'Profit before taxation will be included in the cash flows from operating activities section when using the indirect method.', cn: '使用间接法时，税前利润将包含在经营活动现金流部分。', ans: true, key: '税前利润是间接法的起点', exp: '<b>间接法(indirect method)</b>的基本逻辑是：从<b>税前利润(Profit before tax)</b>出发，调整非现金项目和营运资本变动，最终得到经营活动产生的现金流量净额。税前利润是间接法的<b>起点(starting point)</b>。' },
                    { id: 'ch16-q12-4', src: 'CH16 Q12', en: 'Cash paid for goods and services will be included in the cash flows from operating activities section when using the indirect method.', cn: '使用间接法时，为商品和服务支付的现金将包含在经营活动现金流部分。', ans: false, key: '直接支付项目属于直接法', exp: '"<b>为商品和服务支付的现金(Cash paid for goods and services)</b>"是<b>直接法(direct method)</b>下的一个主要现金流出项目。<b>间接法(indirect method)</b>不直接列示此项。' },

                    // Q14 (原题号12) - 多选题: 间接法非现金调整项
                    { id: 'ch16-q14-1', src: 'CH16 Q14', en: 'Interest expense would be included as a non-cash adjustment when using the indirect method.', cn: '使用间接法时，利息费用将作为非现金调整项包含在内。', ans: true, key: '利息费用需要从利润中调整', exp: '在<b>间接法(indirect method)</b>下，损益表中的<b>利息费用(Interest expense)</b>通常会被加回利润（因为它不是经营性费用，而是<b>融资成本(finance cost)</b>），然后在现金流量表的底部单独扣除实际"<b>支付的利息(Interest paid)</b>"。利息费用本身是一个需要调整的项目。' },
                    { id: 'ch16-q14-2', src: 'CH16 Q14', en: 'Depreciation would be included as a non-cash adjustment when using the indirect method.', cn: '使用间接法时，折旧将作为非现金调整项包含在内。', ans: true, key: '折旧是典型的非现金调整项', exp: '<b>折旧(Depreciation)</b>是一项典型的<b>非现金费用(non-cash expense)</b>。它在损益表中减少了利润，但没有导致<b>现金流出(cash outflow)</b>。因此，在间接法下，需要将折旧费用<b>加回(added back)</b>到利润中。' },
                    { id: 'ch16-q14-3', src: 'CH16 Q14', en: 'Taxation paid would be included as a non-cash adjustment when using the indirect method.', cn: '使用间接法时，支付的税款将作为非现金调整项包含在内。', ans: false, key: '已付税款是实际现金流出', exp: '<b>支付的税款(Taxation paid)</b>是实际的<b>现金流出(cash outflow)</b>，不是<b>非现金调整项(non-cash adjustment)</b>。它会在计算经营活动现金流的最后阶段被扣除。' },
                    { id: 'ch16-q14-4', src: 'CH16 Q14', en: 'Interest paid would be included as a non-cash adjustment when using the indirect method.', cn: '使用间接法时，支付的利息将作为非现金调整项包含在内。', ans: false, key: '已付利息是实际现金流出', exp: '<b>支付的利息(Interest paid)</b>是实际的<b>现金流出(cash outflow)</b>，不是非现金调整项。它在经营活动现金流中作为一笔实际的现金支出被扣除。' },

                    // Q17 (原题号25) - 多选题: 间接法错误处理识别
                    { id: 'ch16-q17-1', src: 'CH16 Q17', ctx: 'Ross prepared a draft operating activities section showing: Depreciation added, Loss on sale deducted, Increase in inventory deducted, Decrease in receivables added, Increase in payables deducted.', en: 'Ross treated depreciation correctly by adding it back to profit.', cn: 'Ross通过将折旧加回利润来处理，这是正确的。', ans: true, key: '折旧加回是正确处理', exp: '<b>折旧(Depreciation)</b>是<b>非现金费用(non-cash expense)</b>，在<b>间接法(indirect method)</b>下需要<b>加回(added back)</b>到利润中。Ross的处理是正确的。' },
                    { id: 'ch16-q17-2', src: 'CH16 Q17', ctx: 'Ross prepared a draft operating activities section showing: Depreciation added, Loss on sale deducted, Increase in inventory deducted, Decrease in receivables added, Increase in payables deducted.', en: 'Ross treated the loss on sale of non-current assets correctly by deducting it from profit.', cn: 'Ross通过从利润中减去出售非流动资产损失来处理，这是正确的。', ans: false, key: '出售损失应加回而非减去', exp: '出售资产的<b>损失(Loss on sale)</b>是一项非现金费用，它减少了利润但没有<b>现金流出(cash outflow)</b>。在间接法下，损失应<b>加回(added back)</b>到利润中，而非减去。Ross的处理是<b>错误的</b>。' },
                    { id: 'ch16-q17-3', src: 'CH16 Q17', ctx: 'Ross prepared a draft operating activities section showing: Depreciation added, Loss on sale deducted, Increase in inventory deducted, Decrease in receivables added, Increase in payables deducted.', en: 'Ross treated the increase in inventory correctly by deducting it from profit.', cn: 'Ross通过从利润中减去存货增加来处理，这是正确的。', ans: true, key: '存货增加减去是正确处理', exp: '<b>存货(Inventory)</b>增加意味着企业用现金购买了存货，是<b>现金流出(cash outflow)</b>。在间接法下，存货增加应从利润中<b>减去(deducted)</b>。Ross的处理是正确的。' },
                    { id: 'ch16-q17-4', src: 'CH16 Q17', ctx: 'Ross prepared a draft operating activities section showing: Depreciation added, Loss on sale deducted, Increase in inventory deducted, Decrease in receivables added, Increase in payables deducted.', en: 'Ross treated the decrease in receivables correctly by adding it back to profit.', cn: 'Ross通过将应收账款减少加回利润来处理，这是正确的。', ans: true, key: '应收减少加回是正确处理', exp: '<b>应收账款(Receivables)</b>减少表示以前赊销的款项已收回现金，是<b>现金流入(cash inflow)</b>。在间接法下，应收账款减少应<b>加回(added back)</b>到利润中。Ross的处理是正确的。' },
                    { id: 'ch16-q17-5', src: 'CH16 Q17', ctx: 'Ross prepared a draft operating activities section showing: Depreciation added, Loss on sale deducted, Increase in inventory deducted, Decrease in receivables added, Increase in payables deducted.', en: 'Ross treated the increase in payables correctly by deducting it from profit.', cn: 'Ross通过从利润中减去应付账款增加来处理，这是正确的。', ans: false, key: '应付增加应加回而非减去', exp: '<b>应付账款(Payables)</b>增加表示企业延迟支付现金，相当于<b>现金流入(cash inflow)</b>效果。在间接法下，应付账款增加应<b>加回(added back)</b>到利润中，而非减去。Ross的处理是<b>错误的</b>。' },

                    // ===== 四、投资活动现金流 =====
                    // Q23 (原题号10) - 多选题: 投资活动包含的项目
                    { id: 'ch16-q23-1', src: 'CH16 Q23', en: 'Purchase of non-current assets will be included in the cash flows from investing activities.', cn: '购置非流动资产将包含在投资活动现金流中。', ans: true, key: '购置非流动资产是投资活动', exp: '购置<b>非流动资产(Non-current assets)</b>是典型的<b>投资活动(investing activities)</b>现金流出，包括购买<b>不动产、厂房和设备(PPE)</b>及<b>无形资产(intangible assets)</b>。' },
                    { id: 'ch16-q23-2', src: 'CH16 Q23', en: 'Proceeds from issue of share capital will be included in the cash flows from investing activities.', cn: '发行股本所得将包含在投资活动现金流中。', ans: false, key: '发行股票属于筹资活动', exp: '<b>发行股票(Issue of share capital)</b>是向所有者筹集资金，属于<b>筹资活动(financing activities)</b>，不是<b>投资活动(investing activities)</b>。' },
                    { id: 'ch16-q23-3', src: 'CH16 Q23', en: 'Dividends received will be included in the cash flows from investing activities.', cn: '收到的股息将包含在投资活动现金流中。', ans: true, key: '收到的股息可归类为投资活动', exp: '根据<b>IAS 7</b>，<b>收到的股息(Dividends received)</b>可以分类为<b>投资活动(investing activities)</b>（因为它们是投资的回报）或经营活动。将其归为投资活动是允许的。' },
                    { id: 'ch16-q23-4', src: 'CH16 Q23', en: 'Dividends paid will be included in the cash flows from investing activities.', cn: '支付的股息将包含在投资活动现金流中。', ans: false, key: '支付的股息属于筹资活动', exp: '<b>支付给股东的股息(Dividends paid)</b>通常被归类为<b>筹资活动(financing activities)</b>（因为是给资金提供者的回报）或经营活动。不属于<b>投资活动(investing activities)</b>。' },

                    // Q28 (原题号24) - 判断题: 投资活动中的项目
                    { id: 'ch16-q28-1', src: 'CH16 Q28', en: 'Dividends received would be included in investing activities in the statement of cash flows.', cn: '收到的股息将包含在现金流量表的投资活动中。', ans: true, key: '收到的股息可归为投资活动', exp: '<b>收到的股息(Dividends received)</b>是从其他公司的股权投资中获得的回报。根据<b>IAS 7</b>，可以被归类为<b>投资活动(investing activities)</b>（作为投资的回报）或经营活动。' },
                    { id: 'ch16-q28-2', src: 'CH16 Q28', en: 'Tax paid would be included in investing activities in the statement of cash flows.', cn: '已付税款将包含在现金流量表的投资活动中。', ans: false, key: '已付税款属于经营活动', exp: '<b>支付的所得税(Tax paid)</b>通常被归类为<b>经营活动(operating activities)</b>现金流出，而不是<b>投资活动(investing activities)</b>。' },
                    { id: 'ch16-q28-3', src: 'CH16 Q28', en: 'Repayment of bank loan would be included in investing activities in the statement of cash flows.', cn: '偿还银行贷款将包含在现金流量表的投资活动中。', ans: false, key: '偿还贷款属于筹资活动', exp: '<b>偿还贷款本金(Repayment of bank loan)</b>是与企业<b>资本结构(capital structure)</b>变化相关的现金流，属于<b>筹资活动(financing activities)</b>，不是投资活动。' },
                    { id: 'ch16-q28-4', src: 'CH16 Q28', en: 'Depreciation expense would be included in investing activities in the statement of cash flows.', cn: '折旧费用将包含在现金流量表的投资活动中。', ans: false, key: '折旧是非现金项目不出现在任何活动中', exp: '<b>折旧(Depreciation)</b>是一个<b>非现金项目(non-cash item)</b>。它不涉及任何现金流动，因此不会出现在现金流量表的任何部分中。它仅在<b>间接法(indirect method)</b>下作为对利润的调整项出现。' },

                    // Q29 (原题号26) - 单选题: 投资活动分类
                    { id: 'ch16-q29-1', src: 'CH16 Q29', en: 'Purchase of a machine would be classified under investing activities in a statement of cash flows.', cn: '购买一台机器将在现金流量表中归类为投资活动。', ans: true, key: '购买机器属于投资活动', exp: '购买<b>机器(Machine)</b>是购置<b>非流动资产(non-current asset)</b>，是典型的<b>投资活动(investing activities)</b>的现金流出。' },
                    { id: 'ch16-q29-2', src: 'CH16 Q29', en: 'Repayment of a loan from a bank would be classified under investing activities in a statement of cash flows.', cn: '偿还银行贷款将在现金流量表中归类为投资活动。', ans: false, key: '偿还贷款属于筹资活动', exp: '<b>偿还贷款本金(Repayment of a loan)</b>是向资金提供者返还资金，属于<b>筹资活动(financing activities)</b>，不是投资活动。' },
                    { id: 'ch16-q29-3', src: 'CH16 Q29', en: 'Proceeds from a new issue of shares would be classified under investing activities in a statement of cash flows.', cn: '新发行股票所得将在现金流量表中归类为投资活动。', ans: false, key: '发行股票属于筹资活动', exp: '<b>发行股票(Issue of shares)</b>是向所有者筹集资金，属于<b>筹资活动(financing activities)</b>。' },
                    { id: 'ch16-q29-4', src: 'CH16 Q29', en: 'Dividend payments to shareholders would be classified under investing activities in a statement of cash flows.', cn: '向股东支付股息将在现金流量表中归类为投资活动。', ans: false, key: '支付股息属于筹资活动', exp: '<b>支付股息(Dividend payments)</b>是给所有者的回报，通常归类为<b>筹资活动(financing activities)</b>。' },

                    // Q30 (原题号30) - 多选题: 投资活动项目
                    { id: 'ch16-q30-1', src: 'CH16 Q30', en: 'Payments to acquire intangible non-current assets would appear under investing activities.', cn: '为购置无形非流动资产的付款将出现在投资活动项下。', ans: true, key: '购置无形资产属于投资活动', exp: '购置<b>非流动资产(non-current assets)</b>（无论是<b>无形的(intangible)</b>还是有形的）是典型的<b>投资活动(investing activities)</b>。' },
                    { id: 'ch16-q30-2', src: 'CH16 Q30', en: 'Profit on disposal of tangible non-current assets would appear under investing activities.', cn: '处置有形非流动资产的利润将出现在投资活动项下。', ans: false, key: '处置利润是间接法调整项而非投资活动现金流', exp: '出售资产的<b>利润(Profit on disposal)</b>不是现金流。它是一个非现金项目，在<b>间接法(indirect method)</b>下用于调整利润。实际的现金流是"<b>出售所得(proceeds)</b>"，后者才属于投资活动。' },
                    { id: 'ch16-q30-3', src: 'CH16 Q30', en: 'Cash received on sale of non-current asset investments would appear under investing activities.', cn: '出售非流动资产投资收到的现金将出现在投资活动项下。', ans: true, key: '出售资产收到的现金属于投资活动', exp: '出售<b>非流动资产(non-current assets)</b>收到的现金（即<b>出售所得/proceeds</b>）是典型的<b>投资活动(investing activities)</b>的<b>现金流入(cash inflow)</b>。' },
                    { id: 'ch16-q30-4', src: 'CH16 Q30', en: 'Cash proceeds from issuing shares would appear under investing activities.', cn: '发行股票的现金所得将出现在投资活动项下。', ans: false, key: '发行股票属于筹资活动', exp: '<b>发行股票(Issuing shares)</b>是筹资行为，属于<b>筹资活动(financing activities)</b>，不是<b>投资活动(investing activities)</b>。' }
                ]
            },

            // ==================== CH17: 集团会计 (Group Accounting / IFRS 10 & IAS 28) ====================
            {
                id: 'ch17',
                title: '集团会计 (Group Accounting / IFRS 10 & IAS 28)',
                label: 'CH17',
                items: [
                    // ===== 一、集团会计基础与投资分类 =====
                    // Q1 (原题号1) - 单选题: 简单投资的持股阈值
                    { id: 'ch17-q1-1', src: 'CH17 Q1', en: 'An investment would be regarded as a trade/simple investment if ordinary share ownership is below 50%.', cn: '如果普通股持股比例低于50%，一项投资将被视为交易性/简单投资。', ans: false, key: '简单投资的阈值是低于20%', exp: '投资分类的阈值是：低于<b>20%</b>为<b>简单投资(trade/simple investment)</b>；<b>20%-50%</b>通常为<b>联营企业(associate)</b>；超过<b>50%</b>通常为<b>子公司(subsidiary)</b>。50%这个阈值划分的是联营与子公司，不是简单投资。' },
                    { id: 'ch17-q1-2', src: 'CH17 Q1', en: 'An investment would be regarded as a trade/simple investment if ordinary share ownership is below 20%.', cn: '如果普通股持股比例低于20%，一项投资将被视为交易性/简单投资。', ans: true, key: '低于20%为简单投资', exp: '根据会计准则的一般推定，当投资者持有被投资方<b>普通股(ordinary shares)</b>比例低于<b>20%</b>时（且无其他证据表明有重大影响），该投资通常被视为<b>交易性投资/简单投资(trade/simple investment)</b>。' },

                    // Q2 (原题号86) - 单选题: 子公司的判断标准
                    { id: 'ch17-q2-1', src: 'CH17 Q2', en: 'The criterion for treating a company as a subsidiary is ownership of all the shares.', cn: '将一家公司视为子公司的标准是拥有其全部股份。', ans: false, key: '控制权而非全部持股', exp: '拥有全部股份虽然意味着控制，但并非将一家公司视为<b>子公司(subsidiary)</b>的必要条件。判断标准是<b>能否行使控制权(ability to exercise control)</b>，即使持股不到100%也可构成控制。' },
                    { id: 'ch17-q2-2', src: 'CH17 Q2', en: 'The criterion for treating a company as a subsidiary is ownership of 51% of the shares.', cn: '将一家公司视为子公司的标准是拥有51%的股份。', ans: false, key: '51%只是推定非必要条件', exp: '拥有超过50%的<b>表决权股份(voting shares)</b>通常可推定控制权存在，但这不是绝对的。可能存在协议或其他安排导致即使超过50%也不一定构成控制，或持股低于50%但通过其他方式实现了控制。' },
                    { id: 'ch17-q2-3', src: 'CH17 Q2', en: 'The criterion for treating a company as a subsidiary is the ability to exercise control.', cn: '将一家公司视为子公司的标准是能够行使控制权。', ans: true, key: '控制权是子公司的核心标准', exp: '根据<b>IFRS 10</b>，将一家公司视为<b>子公司(subsidiary)</b>的核心标准是投资方对其拥有<b>控制权(control)</b>。控制权包括对被投资方的权力、面临或有权获得可变回报，以及有能力利用这些权力影响回报。' },
                    { id: 'ch17-q2-4', src: 'CH17 Q2', en: 'The criterion for treating a company as a subsidiary is the ability to exercise significant influence.', cn: '将一家公司视为子公司的标准是能够施加重大影响。', ans: false, key: '重大影响是联营企业的标准', exp: '<b>重大影响(significant influence)</b>是判断一项投资是否为<b>联营企业(associate)</b>的标准，而不是<b>子公司(subsidiary)</b>的标准。子公司要求的是<b>控制(control)</b>。' },

                    // Q3 (原题号21) - 单选题: 母子关系的建立
                    { id: 'ch17-q3-1', src: 'CH17 Q3', en: 'A purchase of 60% of ordinary share capital would give rise to a parent-subsidiary relationship.', cn: '购买60%的普通股股本会产生母公司-子公司关系。', ans: true, key: '超过50%普通股推定控制', exp: '持有<b>60%</b>的<b>普通股(ordinary share capital)</b>超过了50%的控制权推定阈值，因此通常会形成<b>母子公司关系(parent-subsidiary relationship)</b>。' },
                    { id: 'ch17-q3-2', src: 'CH17 Q3', en: 'A purchase of 80% of preference share capital would give rise to a parent-subsidiary relationship.', cn: '购买80%的优先股股本会产生母公司-子公司关系。', ans: false, key: '优先股通常无表决权不构成控制', exp: '<b>优先股(preference share capital)</b>通常不具备与<b>普通股(ordinary shares)</b>相同的<b>投票权(voting rights)</b>和控制力。仅持有优先股通常不足以构成控制，不会形成母子公司关系。' },
                    { id: 'ch17-q3-3', src: 'CH17 Q3', en: 'A purchase of 40% of ordinary share capital and power to appoint some of the board members would give rise to a parent-subsidiary relationship.', cn: '购买40%的普通股股本并有权任命部分董事会成员会产生母公司-子公司关系。', ans: false, key: '任命部分董事不等于控制', exp: '有权任命<b>部分(some)</b>董事并不等同于<b>控制(control)</b>董事会。需要能够任命或罢免<b>多数(majority)</b>董事才能体现控制力。40%的持股加上任命部分董事，更可能构成<b>重大影响(significant influence)</b>。' },
                    { id: 'ch17-q3-4', src: 'CH17 Q3', en: 'A purchase of 20% of ordinary share capital and power to govern the financial and operating policies of the company would give rise to a parent-subsidiary relationship.', cn: '购买20%的普通股股本并有权主导公司的财务和经营政策会产生母公司-子公司关系。', ans: true, key: '主导财务和经营政策即为控制', exp: '<b>主导财务和经营政策(govern the financial and operating policies)</b>是<b>控制权(control)</b>的核心体现。即使持股比例仅为20%，如果实质上拥有这种权力，也可形成<b>母子公司关系(parent-subsidiary relationship)</b>。' },

                    // Q4 (原题号63) - 判断题组合: 母子关系的指标
                    { id: 'ch17-q4-1', src: 'CH17 Q4', en: 'An investor holding 50% of equity shares indicates the existence of a parent-subsidiary relationship.', cn: '投资者持有50%的股权股份表明存在母公司-子公司关系。', ans: false, key: '恰好50%不足以推定控制', exp: '单独持有恰好<b>50%</b>的股权并不必然构成<b>控制(control)</b>。通常需要持有<b>超过50%</b>的表决权股份才能推定控制权存在。持有恰好50%可能导致共同控制或需要其他证据证明控制。' },
                    { id: 'ch17-q4-2', src: 'CH17 Q4', en: 'An investor having a seat on the board of directors indicates the existence of a parent-subsidiary relationship.', cn: '投资者在董事会占有一个席位表明存在母公司-子公司关系。', ans: false, key: '一个席位只是重大影响指标', exp: '在董事会有<b>一个(a)</b>席位通常表明投资者有能力参与决策，可能构成<b>重大影响(significant influence)</b>，指向<b>联营企业(associate)</b>关系，但并不等同于<b>控制(control)</b>。' },
                    { id: 'ch17-q4-3', src: 'CH17 Q4', en: 'An investor being able to appoint a majority of directors indicates the existence of a parent-subsidiary relationship.', cn: '投资者能够任命多数董事表明存在母公司-子公司关系。', ans: true, key: '控制董事会多数即为控制', exp: '能够任命或罢免<b>多数董事(majority of directors)</b>意味着能够<b>控制(control)</b>董事会，从而主导公司的经营和财务政策。这是控制权的重要体现，表明存在<b>母子公司关系(parent-subsidiary relationship)</b>。' },

                    // Q5 (原题号22) - 判断题组合: 合并报表的编制条件
                    { id: 'ch17-q5-1', src: 'CH17 Q5', ctx: 'Determining whether consolidated financial statements are required.', en: 'An investment of 40% of ordinary shares and an agreement with other parties to control the voting rights of the company requires consolidated financial statements.', cn: '持有40%的普通股股份，并与其他方达成协议共同控制该公司的投票权，需要编制合并财务报表。', ans: true, key: '通过协议控制投票权即为控制', exp: '如果通过<b>协议(agreement)</b>能够与其他方共同<b>控制投票权(control the voting rights)</b>，从而对公司形成实际控制，即使持股比例低于50%，也需要编制<b>合并财务报表(consolidated financial statements)</b>。' },
                    { id: 'ch17-q5-2', src: 'CH17 Q5', ctx: 'Determining whether consolidated financial statements are required.', en: 'An investment of 51% ordinary shares with a legal agreement that gives power to the remaining investors to control the membership of the board requires consolidated financial statements.', cn: '持有51%的普通股股份，但存在法律协议授予其余投资者控制董事会成员组成的权力，需要编制合并财务报表。', ans: false, key: '实质控制权被其他方掌握则不合并', exp: '虽然51%的持股比例通常意味着控制权，但如果存在具有约束力的<b>法律协议(legal agreement)</b>，将实质性的控制权（如控制董事会）赋予了其他方，那么母公司可能并未实际<b>控制(control)</b>该公司，不应作为子公司合并。' },

                    // Q6 (原题号44) - 多选题: 联营企业的定义
                    { id: 'ch17-q6-1', src: 'CH17 Q6', en: '"Special influence" can be used to help define an associate.', cn: '"特殊影响"可用于帮助定义联营企业。', ans: false, key: '特殊影响不是标准术语', exp: '"<b>特殊影响(Special influence)</b>"不是会计准则中用于定义<b>联营企业(associate)</b>或任何投资类型的标准术语。正确的术语是"<b>重大影响(Significant influence)</b>"。' },
                    { id: 'ch17-q6-2', src: 'CH17 Q6', en: '"Power to control policy making" can be used to help define an associate.', cn: '"控制决策制定的权力"可用于帮助定义联营企业。', ans: false, key: '控制决策指向子公司而非联营', exp: '"<b>控制决策制定的权力(Power to control policy making)</b>"是<b>控制权(control)</b>的体现，通常意味着被投资单位是<b>子公司(subsidiary)</b>，而非<b>联营企业(associate)</b>。' },
                    { id: 'ch17-q6-3', src: 'CH17 Q6', en: '"Significant influence" can be used to help define an associate.', cn: '"重大影响"可用于帮助定义联营企业。', ans: true, key: '重大影响是联营的核心标准', exp: '<b>重大影响(Significant influence)</b>是定义<b>联营企业(associate)</b>的核心标准。根据<b>IAS 28</b>，联营企业是投资者对其具有重大影响的企业。' },
                    { id: 'ch17-q6-4', src: 'CH17 Q6', en: '"Majority representation on the board" can be used to help define an associate.', cn: '"在董事会占多数席位"可用于帮助定义联营企业。', ans: false, key: '多数席位指向控制即子公司', exp: '在董事会占<b>多数席位(Majority representation on the board)</b>是<b>控制权(control)</b>的标志，指向<b>子公司(subsidiary)</b>关系，而非<b>联营企业(associate)</b>。' },
                    { id: 'ch17-q6-5', src: 'CH17 Q6', en: '"Power to participate in policy making" can be used to help define an associate.', cn: '"参与决策制定的权力"可用于帮助定义联营企业。', ans: true, key: '参与决策是重大影响的表现', exp: '有权<b>参与(participate in)</b>被投资单位的财务和经营<b>政策制定(policy making)</b>过程，但不是控制这些政策，是<b>重大影响(significant influence)</b>的表现形式之一。' },

                    // Q7 (原题号52) - 多选题: 联营企业的迹象
                    { id: 'ch17-q7-1', src: 'CH17 Q7', en: 'The investor having majority representation on the board of directors is an indication that an investment is an associate.', cn: '投资者在董事会中占多数席位表明一项投资是联营企业。', ans: false, key: '多数董事席位指向控制即子公司', exp: '投资者在董事会中占<b>多数席位(majority representation)</b>是<b>控制权(control)</b>的标志，通常意味着被投资单位是<b>子公司(subsidiary)</b>，而非<b>联营企业(associate)</b>。' },
                    { id: 'ch17-q7-2', src: 'CH17 Q7', en: 'The investor and investee swapping management personnel is an indication that an investment is an associate.', cn: '投资者与被投资单位之间交换管理人员表明一项投资是联营企业。', ans: true, key: '交换管理人员是重大影响迹象', exp: '投资者与被投资单位之间<b>交换管理人员(swap management personnel)</b>表明投资者有能力参与被投资单位的管理决策，是<b>重大影响(significant influence)</b>的迹象之一。' },
                    { id: 'ch17-q7-3', src: 'CH17 Q7', en: 'The investor controlling the investee\'s policy-making is an indication that an investment is an associate.', cn: '投资者控制被投资单位的决策制定表明一项投资是联营企业。', ans: false, key: '控制决策指向子公司', exp: '投资者<b>控制(controls)</b>被投资单位的决策制定是<b>控制权(control)</b>的体现，指向<b>子公司(subsidiary)</b>关系，而非<b>联营企业(associate)</b>。联营企业的特征是"参与"而非"控制"。' },
                    { id: 'ch17-q7-4', src: 'CH17 Q7', en: 'Significant technical information passing between the investor and the investee is an indication that an investment is an associate.', cn: '投资者与被投资单位之间存在重要的技术信息传递表明一项投资是联营企业。', ans: true, key: '重要技术信息传递是重大影响迹象', exp: '投资者与被投资单位之间存在<b>重要技术信息(significant technical information)</b>的传递，表明投资者对被投资单位的运营有实质性参与和影响，是<b>重大影响(significant influence)</b>的迹象之一。' },

                    // ===== 二、合并原则与报表列报 =====
                    // Q13 (原题号73) - 判断题组合: 集团规则
                    { id: 'ch17-q13-1', src: 'CH17 Q13', en: 'The process of consolidation creates a group as a separate legal entity.', cn: '合并过程创建了一个作为独立法律实体的集团。', ans: false, key: '集团不是独立法律实体', exp: '<b>合并(consolidation)</b>是为了会计报告目的将母公司和子公司视为一个<b>单一经济实体(single economic entity)</b>，但并不创建一个新的独立<b>法律实体(legal entity)</b>。母公司和子公司仍然各自保持法律上的独立。' },
                    { id: 'ch17-q13-2', src: 'CH17 Q13', en: 'If Company 1 holds less than 50% of Company 2\'s share capital, Company 2 cannot be Company 1\'s subsidiary.', cn: '如果公司1持有公司2少于50%的股本，则公司2不可能是公司1的子公司。', ans: false, key: '低于50%仍可能通过其他方式控制', exp: '虽然持有超过50%是判断<b>控制权(control)</b>的主要依据，但即使持股少于50%，如果公司1通过其他方式（如<b>合同约定(contractual arrangements)</b>、有权<b>任免多数董事(appoint majority of directors)</b>等）能够控制公司2，公司2仍可能是<b>子公司(subsidiary)</b>。' },
                    { id: 'ch17-q13-3', src: 'CH17 Q13', en: 'The non-controlling interest shown in the consolidated SOFP includes the non-controlling interest\'s share of post-acquisition profits.', cn: '合并财务状况表中列示的非控制性权益包括非控制性权益应占的收购后利润份额。', ans: true, key: 'NCI包含收购日公允价值加收购后利润份额', exp: '<b>非控制性权益(NCI)</b>在报告日的金额 = <b>收购日NCI的公允价值(FV of NCI at acquisition)</b> + NCI应占子公司自收购日以来<b>净资产变动(post-acquisition changes)</b>的份额（包括收购后利润）。' },
                    { id: 'ch17-q13-4', src: 'CH17 Q13', en: 'Goodwill arising from the acquisition of a subsidiary will appear in the parent company\'s financial statements.', cn: '收购子公司产生的商誉将出现在母公司的财务报表中。', ans: false, key: '商誉只在合并报表中而非母公司个别报表', exp: '<b>商誉(Goodwill)</b>仅在<b>合并财务报表(consolidated financial statements)</b>中确认和列示。它不出现在母公司自身的<b>个别报表(individual financial statements)</b>中。母公司个别报表中列示的是<b>对子公司的投资成本(cost of investment)</b>。' },

                    // Q14 (原题号65) - 判断题组合: 合并SFP vs 母公司SFP
                    { id: 'ch17-q14-1', src: 'CH17 Q14', en: 'Goodwill on acquisition is included in equity in the consolidated Statement of Financial Position.', cn: '收购产生的商誉包含在合并财务状况表的权益部分。', ans: false, key: '商誉是无形资产非权益', exp: '<b>商誉(Goodwill)</b>是一项<b>无形非流动资产(intangible non-current asset)</b>，在合并财务状况表的<b>资产(assets)</b>部分列示，而不是<b>权益(equity)</b>部分。' },
                    { id: 'ch17-q14-2', src: 'CH17 Q14', en: 'The investment in the subsidiary is included as an asset in the parent\'s individual company Statement of Financial Position.', cn: '对子公司的投资作为一项资产包含在母公司的个别公司财务状况表中。', ans: true, key: '母公司个别报表列示投资成本', exp: '在母公司自身的<b>个别财务报表(individual financial statements)</b>中，其对子公司的投资通常作为一项<b>长期股权投资(investment in subsidiary)</b>资产列示。在编制<b>合并报表(consolidated statements)</b>时，这项投资会被<b>抵销(eliminated)</b>。' },
                    { id: 'ch17-q14-3', src: 'CH17 Q14', en: 'The share capital figure in the consolidated Statement of Financial Position is: parent\'s share capital + subsidiary\'s share capital.', cn: '合并财务状况表中的股本金额是：母公司股本 + 子公司股本。', ans: false, key: '合并股本仅为母公司股本', exp: '合并财务状况表中的<b>股本(share capital)</b>仅反映<b>母公司(parent)</b>的股本金额。<b>子公司(subsidiary)</b>的股本在合并过程中会被<b>抵销(eliminated)</b>。' },

                    // Q15 (原题号58) - 单选题: 集团会计的正确陈述
                    { id: 'ch17-q15-1', src: 'CH17 Q15', en: 'Only the group\'s share of the assets of a subsidiary is included in the consolidated statement of financial position.', cn: '合并财务状况表中仅包含集团应占子公司的资产份额。', ans: false, key: '子公司资产100%全额合并', exp: '在合并财务状况表中，子公司的<b>全部(100%)</b>资产和负债都应与母公司的资产和负债<b>逐行合并(line by line)</b>，以反映母公司对子公司的<b>控制(control)</b>。<b>非控制性权益(NCI)</b>则在权益部分单独列示。' },
                    { id: 'ch17-q15-2', src: 'CH17 Q15', en: 'Only the group\'s share of the net assets of an associate is reflected in the consolidated statement of financial position.', cn: '合并财务状况表中仅反映集团应占联营企业的净资产份额。', ans: true, key: '联营按权益法反映集团份额', exp: '对于<b>联营企业(associate)</b>，采用<b>权益法(equity method)</b>核算。在合并财务状况表中，对联营企业的投资以一个<b>单列项目(one-line entry)</b>列示，金额反映了集团在联营企业<b>净资产(net assets)</b>中所占的份额。' },
