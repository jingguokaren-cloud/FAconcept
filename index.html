<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACCA FA概念判断练习</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 25px;
        }

        header h1 {
            font-size: 2.2em;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        /* 章节选择器 */
        .chapter-selector {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .chapter-selector h3 {
            color: white;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .chapter-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chapter-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
        }

        .chapter-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .chapter-btn.active {
            background: #4ade80;
            border-color: #4ade80;
            color: #1e3a5f;
            font-weight: bold;
        }

        /* 统计 */
        .stats-bar {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            font-size: 0.9em;
        }

        .stat-item .num {
            font-weight: bold;
            font-size: 1.2em;
        }

        .stat-item.correct .num {
            color: #4ade80;
        }

        .stat-item.wrong .num {
            color: #f87171;
        }

        .stat-item.mastered .num {
            color: #4ade80;
        }

        .stat-item.not-mastered .num {
            color: #fbbf24;
        }

        .stat-item.total .num {
            color: #60a5fa;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            height: 8px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #4ade80, #22c55e);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 20px;
        }

        /* 筛选 */
        .filter-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .filter-btn.active {
            background: white;
            color: #1e3a5f;
            font-weight: bold;
        }

        .filter-btn .count {
            background: rgba(0, 0, 0, 0.2);
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
            font-size: 0.85em;
        }

        .filter-btn.active .count {
            background: rgba(30, 58, 95, 0.2);
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            color: #1e3a5f;
            transition: all 0.3s;
        }

        .control-btn:hover {
            background: white;
            transform: scale(1.02);
        }

        /* 卡片 */
        .cards-container {
            display: grid;
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
            border-left: 5px solid #3b82f6;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.25);
        }

        .card.mastered {
            border-left-color: #22c55e;
        }

        .card.not-mastered {
            border-left-color: #f59e0b;
        }

        .card.answered-correct {
            border-left-color: #22c55e;
        }

        .card.answered-wrong {
            border-left-color: #ef4444;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .card-tags {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .card-section-tag {
            background: linear-gradient(135deg, #1e3a5f, #2d5a87);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
        }

        .card-source {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
        }

        .card-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: bold;
        }

        .card-status.mastered {
            background: #dcfce7;
            color: #166534;
        }

        .card-status.not-mastered {
            background: #fef3c7;
            color: #92400e;
        }

        .card-number {
            color: #999;
            font-size: 0.85em;
        }

        /* 题目背景 */
        .card-context {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 15px;
            font-size: 0.9em;
            color: #64748b;
            line-height: 1.5;
        }

        .card-context::before {
            content: '📋 Scenario: ';
            font-weight: bold;
            color: #475569;
        }

        /* 陈述 - 只显示英文 */
        .card-statement {
            font-size: 1.15em;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.8;
            padding: 10px 0;
        }

        /* T/F 选择按钮 */
        .tf-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
        }

        .tf-btn {
            width: 52px;
            height: 40px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.2s;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tf-btn:hover {
            transform: scale(1.05);
        }

        .tf-btn.btn-true {
            color: #166534;
        }

        .tf-btn.btn-true:hover {
            background: #f0fdf4;
            border-color: #4ade80;
        }

        .tf-btn.btn-false {
            color: #991b1b;
        }

        .tf-btn.btn-false:hover {
            background: #fef2f2;
            border-color: #f87171;
        }

        .tf-btn:disabled {
            cursor: not-allowed;
            opacity: 0.5;
            transform: none !important;
        }

        .tf-btn.selected-correct {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            opacity: 1 !important;
        }

        .tf-btn.selected-wrong {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            opacity: 1 !important;
            text-decoration: line-through;
        }

        .tf-btn.correct-highlight {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            opacity: 1 !important;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 掌握按钮 */
        .mastery-buttons {
            display: none;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .mastery-buttons.show {
            display: flex;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-mastered {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
        }

        .btn-mastered:hover {
            background: linear-gradient(135deg, #16a34a, #15803d);
        }

        .btn-mastered.is-mastered {
            background: #dcfce7;
            color: #166534;
            border: 2px solid #22c55e;
        }

        .btn-not-mastered {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }

        .btn-not-mastered:hover {
            background: linear-gradient(135deg, #d97706, #b45309);
        }

        .btn-not-mastered.is-not-mastered {
            background: #fef3c7;
            color: #92400e;
            border: 2px solid #f59e0b;
        }

        .btn-retry {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
        }

        .btn-retry:hover {
            background: linear-gradient(135deg, #4f46e5, #4338ca);
        }

        /* 答案展示区 - 统一一个模块 */
        .answer-panel {
            display: none;
            margin-top: 18px;
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 18px;
            animation: slideDown 0.3s ease;
            font-size: 0.95em;
            line-height: 1.7;
            color: #334155;
        }

        .answer-panel.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .answer-line {
            margin-bottom: 8px;
        }

        .answer-label {
            font-weight: bold;
            color: #1e3a5f;
        }

        .answer-correct {
            color: #166534;
            font-weight: bold;
        }

        .answer-wrong {
            color: #991b1b;
            font-weight: bold;
        }

        .answer-keypoint {
            color: #d2042d;
            font-weight: bold;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .empty-state p {
            opacity: 0.8;
        }

        footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 40px;
            padding: 20px;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.6em;
            }

            .card-statement {
                font-size: 1em;
            }

            .tf-btn {
                padding: 12px 16px;
                font-size: 1em;
            }

            .btn {
                padding: 8px 14px;
                font-size: 0.85em;
            }

            .chapter-btn {
                padding: 6px 10px;
                font-size: 0.8em;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>ACCA FA概念判断练习</h1>
            <p>Study Hub 01 · True or False · 判断对错练习</p>
        </header>

        <!-- 章节选择 -->
        <div class="chapter-selector">
            <h3>章节导航 Chapter Navigation</h3>
            <div class="chapter-grid" id="chapterGrid"></div>
        </div>

        <!-- 统计 -->
        <div class="stats-bar">
            <div class="stat-item correct">✅ 答对: <span class="num" id="correctCount">0</span></div>
            <div class="stat-item wrong">❌ 答错: <span class="num" id="wrongCount">0</span></div>
            <div class="stat-item mastered">已掌握: <span class="num" id="masteredCount">0</span></div>
            <div class="stat-item not-mastered">未掌握: <span class="num" id="notMasteredCount">0</span></div>
            <div class="stat-item total">显示: <span class="num" id="showingCount">0</span></div>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- 筛选 -->
        <div class="filter-tabs">
            <button class="filter-btn active" data-filter="all">全部<span class="count" id="fAll">0</span></button>
            <button class="filter-btn" data-filter="not-mastered">未掌握<span class="count" id="fNot">0</span></button>
            <button class="filter-btn" data-filter="mastered">已掌握<span class="count" id="fMas">0</span></button>
            <button class="filter-btn" data-filter="unmarked">未标记<span class="count" id="fUnm">0</span></button>
        </div>

        <!-- 控制 -->
        <div class="controls">
            <button class="control-btn" id="expandAllBtn" onclick="toggleExpandAll()"
                style="background:linear-gradient(135deg,#f59e0b,#d97706);color:white;">📖 一键展开</button>
            <button class="control-btn" onclick="resetAllAnswers()"
                style="background:linear-gradient(135deg,#6366f1,#4f46e5);color:white;">🔄 重做所有题目</button>
            <button class="control-btn" onclick="resetProgress()">🗑 重置掌握状态</button>
        </div>

        <!-- 卡片 -->
        <div class="cards-container" id="cardsContainer"></div>

        <footer>ACCA FA · Study Hub 01 · 概念判断练习 · 共 <span id="totalItemCount">0</span> 道</footer>
    </div>

    <script>
        // ==================== 数 据 ====================
        const sections = [
            {
                id: 'ch1',
                title: 'CH1 商业组织与报告基础',
                label: 'CH1',
                items: [
                    {
                        id: 'q1a', src: 'Q1-A',
                        en: 'Sole traders can vote themselves a dividend as a form of payment.',
                        cn: '个体户可以通过投票给自己发放股利(dividend)作为支付方式。',
                        ans: false,
                        key: 'Dividend vs Drawings | 股利 vs 提取',
                        exp: '股利(Dividend)是<b>公司(Company)</b>特有的利润分配方式。个体户(Sole Trader)从企业中取钱叫做<b>提取(Drawings)</b>，不能给自己分红。'
                    },
                    {
                        id: 'q1b', src: 'Q1-B',
                        en: 'There is a legal distinction between the owner\'s assets and the assets of the business for a sole trader.',
                        cn: '对于个体户，所有者的资产和企业的资产在法律上是有区别的。',
                        ans: false,
                        key: 'Separate Legal Entity | 独立法律实体',
                        exp: '个体户<b>没有独立的法律地位(no separate legal entity)</b>，企业和所有者在法律上不分离。注意：虽然法律上不分，但会计上仍然将企业视为独立的<b>会计主体(Business Entity)</b>。'
                    },
                    {
                        id: 'q1c', src: 'Q1-C',
                        en: 'A sole trader\'s business can be sold as a going concern by its owner.',
                        cn: '个体户的业务可以作为持续经营体(going concern)由其所有者出售。',
                        ans: true,
                        key: 'Going Concern Sale | 持续经营体出售',
                        exp: '个体户的业务可以作为一个整体（持续经营体 / going concern）出售给他人。买方可以继续经营该业务(continue operating the business)。'
                    },
                    {
                        id: 'q1d', src: 'Q1-D',
                        en: 'Sole traders cannot employ anyone else to do work.',
                        cn: '个体户不能雇佣其他人来工作。',
                        ans: false,
                        key: 'Sole = Sole Owner | Sole = 唯一所有者',
                        exp: '"Sole"指的是<b>唯一的所有者(sole owner)</b>，而不是只能一个人工作。个体户完全可以雇佣员工(employees)。'
                    },

                    {
                        id: 'q2a', src: 'Q2-①',
                        en: '"Less regulation and governance rules to follow" is an ADVANTAGE of being in partnership compared with a limited liability company.',
                        cn: '"需要遵守的法规和治理规则较少"是合伙企业(Partnership)相比有限责任公司(LLC)的优点。',
                        ans: true,
                        key: 'Less Regulation = Advantage | 法规约束少 = 优点',
                        exp: '与有限公司(Limited Liability Company)相比，合伙企业(Partnership)的设立和运营受到的法律法规约束(regulation)较少、更为灵活，不需要提交年度财务报表(annual financial statements)给注册机构。这是一个<b>优点(Advantage)</b>。'
                    },
                    {
                        id: 'q2b', src: 'Q2-②',
                        en: '"Partners are jointly and severally liable" is an ADVANTAGE of being in partnership compared with a limited liability company.',
                        cn: '"合伙人承担连带责任(jointly and severally liable)"是合伙企业相比有限责任公司的优点。',
                        ans: false,
                        key: 'Jointly and Severally Liable = Disadvantage | 无限连带责任 = 缺点',
                        exp: '连带责任(jointly and severally liable)意味着每个合伙人(partner)都要对企业的<b>全部债务(all debts)</b>负责，甚至可能需要用个人财产(personal assets)来偿还。这是<b>缺点(Disadvantage)</b>，不是优点。'
                    },
                    {
                        id: 'q2c', src: 'Q2-③',
                        en: '"No perpetual succession" is an ADVANTAGE of being in partnership compared with a limited liability company.',
                        cn: '"没有永久继承权(perpetual succession)"是合伙企业相比有限责任公司的优点。',
                        ans: false,
                        key: 'No Perpetual Succession = Disadvantage | 无永久存续 = 缺点',
                        exp: '没有永久继承权(perpetual succession)意味着合伙企业可能因某个合伙人的<b>退出(withdrawal)或去世(death)而解散(dissolve)</b>。公司(Company)则具有永久存续的特点。这是<b>缺点(Disadvantage)</b>。'
                    },
                    {
                        id: 'q2d', src: 'Q2-④',
                        en: '"Financial information is given only to tax authorities and lenders" is an ADVANTAGE of being in partnership compared with a limited liability company.',
                        cn: '"财务信息仅提供给税务机关(tax authorities)和贷款人(lenders)"是合伙企业相比有限责任公司的优点。',
                        ans: true,
                        key: 'Financial Privacy = Advantage | 财务保密性 = 优点',
                        exp: '合伙企业的财务报表(financial statements)通常<b>不需要对公众公开(not publicly available)</b>，保护了商业隐私(business privacy)。相比之下，有限公司必须公开披露(disclose)。这是<b>优点(Advantage)</b>。'
                    },

                    {
                        id: 'q3a', src: 'Q3-①',
                        en: '"Owners take drawings from the business" applies to a Limited Liability Company.',
                        cn: '"所有者从企业中提取款项(Drawings)"适用于有限责任公司(LLC)。',
                        ans: false,
                        key: 'Drawings vs Dividends | 提取 vs 股利',
                        exp: '<b>提取(Drawings)</b>是个体户(Sole Trader)或合伙企业(Partnership)所有者从企业中提取资金的专有术语。在公司(Company)里，所有者（股东/Shareholders）通过<b>股利(Dividends)</b>获得回报。'
                    },
                    {
                        id: 'q3b', src: 'Q3-②',
                        en: '"Business has a separate legal identity" applies to a Limited Liability Company.',
                        cn: '"企业具有独立的法律身份(separate legal identity)"适用于有限责任公司(LLC)。',
                        ans: true,
                        key: 'Separate Legal Identity | 独立法律身份',
                        exp: '<b>独立法律身份(Separate legal identity)</b>是公司(Company)的核心特征，意味着公司本身可以以自己的名义签订合同(enter into contracts)、拥有资产(own assets)和承担债务(incur debts)。个体户和合伙企业<b>不具备</b>此特征。'
                    },
                    {
                        id: 'q3c', src: 'Q3-③',
                        en: '"Owners of the business can be separate from those running the business" applies to a Sole Trader or Partnership.',
                        cn: '"企业的所有者(owners)可以与经营者(those running the business)分离"适用于个体户或合伙企业。',
                        ans: false,
                        key: 'Separation of Ownership and Management | 所有权与经营权分离（两权分离）',
                        exp: '<b>所有权与经营权分离(Separation of ownership and management)</b>是公司(Company)的特征。在公司中，所有者（股东/Shareholders）可以不参与日常经营，而是选举董事会(Board of Directors)来管理。个体户和合伙企业的所有者通常<b>直接参与经营(owner-managed)</b>。'
                    },
                    {
                        id: 'q3d', src: 'Q3-④',

                    { id: 'ch2-q2-c', src: 'CH2 Q2-C', ctx: 'Which of the following items is an asset of a business?', en: 'Share capital is an asset of a business.', cn: '股本是企业的资产。', ans: false, key: '股本是权益', exp: '<b>股本(Share capital)</b>是所有者投入的资本，属于<b>所有者权益(Equity)</b>。' },
                    { id: 'ch2-q2-d', src: 'CH2 Q2-D', ctx: 'Which of the following items is an asset of a business?', en: 'Money owed by customers is an asset of a business.', cn: '客户欠款是企业的资产。', ans: true, key: '客户欠款是资产', exp: '客户欠款是<b>应收账款(Trade Receivables)</b>，代表企业未来收取现金的权利，属于<b>资产(Asset)</b>。' },
                    { id: 'ch2-q3', src: 'CH2 Q3', en: 'The residual interest in the assets of the entity after deducting all its liabilities represents Equity.', cn: '在扣除所有负债后，实体资产中的剩余权益代表权益。', ans: true, key: '权益定义', exp: '“在扣除所有负债后，实体资产中的剩余权益” 这是《概念框架》中对<b>所有者权益(Equity)</b>的精确定义。代表了在清偿所有债务后，资产归属于所有者的部分。' },
                    { id: 'ch2-q4', src: 'CH2 Q4', en: 'A present economic resource controlled by an entity as a result of past events defines an asset.', cn: '由主体因过去事项而控制的现时经济资源定义了资产。', ans: true, key: '资产定义', exp: '“由主体因过去事项而控制的现时经济资源” 这是《概念框架》中对<b>资产(Asset)</b>的精确定义。' },
                    { id: 'ch2-q5-a', src: 'CH2 Q5-A', en: 'Damages expected to be received from a legal case would be classified as a non-current asset.', cn: '预计从法律案件中收到的赔偿金将被归类为非流动资产。', ans: false, key: '或有资产或流动资产', exp: '预计收到的赔偿金如果确认，通常作为<b>流动资产(Current asset)</b>（应收款项）或<b>或有资产(Contingent asset)</b>披露。' },
                    { id: 'ch2-q5-b', src: 'CH2 Q5-B', en: 'A warehouse used to store inventory would be classified as a non-current asset.', cn: '用于储存存货的仓库将被归类为非流动资产。', ans: true, key: '长期使用的有形资产', exp: '用于储存存货的仓库是长期使用的<b>有形非流动资产(Tangible non-current asset)</b>。' },
                    { id: 'ch2-q5-c', src: 'CH2 Q5-C', en: 'A licence to reprint a book would be classified as a non-current asset.', cn: '重印书籍的许可证将被归类为非流动资产。', ans: true, key: '长期无形资产', exp: '重印书籍的许可证是赋予企业长期权利的<b>无形非流动资产(Intangible non-current asset)</b>。 ' },
                    { id: 'ch2-q5-d', src: 'CH2 Q5-D', en: 'A motor vehicle held by a car dealer would be classified as a non-current asset.', cn: '汽车经销商持有的机动车将被归类为非流动资产。', ans: false, key: '持有待售属存货', exp: '汽车经销商持有的机动车是用于销售的商品，属于<b>存货(Inventory)</b>，即流动资产。' },
                    { id: 'ch2-q6-1', src: 'CH2 Q6-①', en: 'For an economic resource to be classified as an asset, the resource must be owned by the business.', cn: '要将一项经济资源归类为资产，该资源必须由企业拥有。', ans: false, key: '重控制而非拥有', exp: '资产的关键是<b>控制(Control)</b>，而非法律上的拥有。例如，<b>融资租赁(Finance lease)</b>下的资产，企业控制并使用它，但法律所有权可能不属于企业。' },
                    { id: 'ch2-q6-2', src: 'CH2 Q6-②', en: 'For an economic resource to be classified as an asset, the resource must be controlled by the entity as a result of past events.', cn: '要将一项经济资源归类为资产，该资源必须由主体因过去事项而控制。', ans: true, key: '资产定义的必要条件', exp: '<b>由过去事项产生(Result of past events)</b>是资产定义的必要条件。' },
                    { id: 'ch2-q6-3', src: 'CH2 Q6-③', en: 'For an economic resource to be classified as an asset, it must be probable (more likely than not) that the resource will produce economic benefits.', cn: '要将一项经济资源归类为资产，它很可能会产生经济利益。', ans: false, key: '可能性只是确认标准', exp: '“很可能(Probable)”是资产的<b>确认标准(Recognition criteria)</b>之一，而不是其定义的一部分。一个项目可能符合资产的定义，但因其流入可能性不高而不能在报表中确认。' },
                    { id: 'ch2-q6-4', src: 'CH2 Q6-④', en: 'For an economic resource to be classified as an asset, the resource must have the potential to produce economic benefits.', cn: '要将各项经济资源归类为资产，该资源必须具有产生经济利益的潜力。', ans: true, key: '资产需具潜力', exp: '资产的定义要求经济资源具有<b>产生经济利益的潜力(Potential to produce economic benefits)</b>。' },
                    { id: 'ch2-q7', src: 'CH2 Q7', en: 'An asset should be classified as a current asset in the statement of financial position if it satisfies any one of the four criteria: normal operating cycle, held for trading, cash or cash equivalent, or realised within 12 months.', cn: '如果在财务状况表中满足这四个标准中的任何一个：在正常营业周期内变现、为交易目的持有、现金或现金等价物、或在12个月内变现，资产就应归类为流动资产。', ans: true, key: '满足任意条件即为流动', exp: '根据 IAS 1《财务报表列报》，一项资产只要满足以上四个标准中的<b>任何一个</b>，就应被归类为<b>流动资产(Current asset)</b>。这四个标准是并列关系，而非必须同时满足的关系。' },
                    { id: 'ch2-q8-1', src: 'CH2 Q8-①', en: 'A present obligation as a result of past events exists when a restaurant business is taken to court by a poisoned customer, admits fault, and compensation is almost certain.', cn: '餐厅因食物中毒被顾客起诉，餐厅承认过失且几乎肯定会赔偿，这种情况下存在因过去事项产生的现时义务。', ans: true, key: '毒害行为导致义务', exp: '“毒害顾客”是<b>过去的事项(Past events)</b>，导致了赔偿的<b>现时义务(Present obligation)</b>。' },
                    { id: 'ch2-q8-2', src: 'CH2 Q8-②', en: 'A present obligation as a result of past events exists for a fine payable due to a breach of environmental regulations last month, even if notification has not been received yet.', cn: '因上月违反环保法规应付的罚款（尚未收到通知），存在因过去事项产生的现时义务。', ans: true, key: '违反法规导致义务', exp: '“违反法规”是<b>过去的事项(Past events)</b>。即使尚未收到正式通知，<b>现时义务(Present obligation)</b>已经产生。' },
                    { id: 'ch2-q8-3', src: 'CH2 Q8-③', en: 'A present obligation as a result of past events exists for costs relating to a new project that management are thinking of undertaking next period.', cn: '与管理层考虑在下一财年进行的新项目相关的成本，存在由过去事项产生的现时义务。', ans: false, key: '计划不产生现时义务', exp: '管理层仅仅是“考虑”项目，尚未承诺或开始执行，没有导致义务的<b>过去事项(Past events)</b>。不存在义务。' },
                    { id: 'ch2-q8-4', src: 'CH2 Q8-④', en: 'A present obligation as a result of past events exists for interest for the next period on a loan taken out during the current period.', cn: '本期借入的贷款在下一期间的利息，存在由过去事项产生的现时义务。', ans: false, key: '未来利息尚未发生', exp: '利息是随时间的推移而产生的。对于下一期间的利息，在当前时点还没有产生支付义务。义务将在下一期间随着时间的流逝而产生，<b>不存在现时义务(No present obligation)</b>。' },
                    { id: 'ch2-q9', src: 'CH2 Q9', en: 'According to the IFRS Conceptual Framework, equity is correctly defined as the residual interest in the assets of the entity after deducting its liabilities.', cn: '根据IFRS概念框架，权益被正确定义为在扣除其负债后，实体资产中的剩余权益。', ans: true, key: '权益定义', exp: '“在扣除所有负债后，实体资产中的剩余权益”，这是《概念框架》中对<b>权益(Equity)</b>的官方定义。' },
                    { id: 'ch2-q10-1', src: 'CH2 Q10-①', en: 'Capital contributions made by the owners during the year would be classified as income.', cn: '年内所有者投入的资本将被归类为收入。', ans: false, key: '所有者投入不是收入', exp: '所有者投入直接增加了权益，但属于所有者出资，根据《概念框架》的定义被明确排除在<b>收入(Income)</b>之外。' },
                    { id: 'ch2-q10-2', src: 'CH2 Q10-②', en: 'Interest received on loans would be classified as income.', cn: '收到的贷款利息将被归类为收入。', ans: true, key: '资产增加带来收入', exp: '收到的贷款利息增加了资产（现金），从而增加了权益，符合<b>收入(Income)</b>的定义。' },
                    { id: 'ch2-q10-3', src: 'CH2 Q10-③', en: 'Increases in the market value of the business land and buildings would be classified as income.', cn: '企业土地和建筑市场价值的增加将被归类为收入。', ans: true, key: '资产增值带来收入', exp: '土地和建筑市价增加导致资产价值增加，从而增加了权益（通过<b>重估储备(Revaluation surplus)</b>），也符合收入的广义定义（通常在<b>其他综合收益(OCI)</b>中报告）。' },
                    { id: 'ch2-q11-1', src: 'CH2 Q11-①', en: 'A license awarded by authorities giving an airline the right to operate a profitable route meets the definition of an asset.', cn: '当局授予航空公司运营高利润航线的许可证符合资产的定义。', ans: true, key: '无形资产', exp: '航空公司<b>控制(Control)</b>这项权利，它能带来未来的<b>经济利益(Economic benefits)</b>（利润）。符合资产定义。' },
                    { id: 'ch2-q11-2', src: 'CH2 Q11-②', en: 'Knowledge and expertise of qualified staff in the accounting department meets the definition of an asset.', cn: '会计部门拥有专业资格员工的知识和专长符合资产的定义。', ans: false, key: '员工不可控', exp: '企业无法<b>控制(Control)</b>员工，员工可以离职，因此不符合资产的“控制”标准。' },
                    { id: 'ch2-q11-3', src: 'CH2 Q11-③', en: 'A well-known brand name developed internally that enables charging higher prices meets the definition of an asset.', cn: '内部开发的知名品牌（能卖高价）符合资产的定义。', ans: true, key: '内部品牌符合定义但通常不确认', exp: '品牌由企业<b>控制(Control)</b>，并能带来超额收益（经济利益）。符合资产定义。（虽然由于计量困难，内部开发的品牌通常<b>不在报表中确认</b>，但它在概念上符合定义）。' },
                    { id: 'ch2-q11-4', src: 'CH2 Q11-④', en: 'Research expenditure spent on a certain illness that has not led to commercially viable products meets the definition of an asset.', cn: '未导致商业可行产品的研究支出符合资产的定义。', ans: false, key: '无潜在经济利益', exp: '如果研究未能带来任何具有商业可行性的新产品，意味着它没有产生<b>经济利益的潜力(Potential to produce economic benefits)</b>。不符合资产定义。' },
                    { id: 'ch2-q12', src: 'CH2 Q12', ctx: 'Zeta business has opening capital of $100,000, added capital of $30,000, profit of $50,000, and closing net assets of $160,000.', en: 'According to the accounting equation, Zeta took drawings of $20,000 during this year.', cn: '根据会计等式，Zeta在当年提取了$20,000款项。', ans: true, key: '会计等式变动计算', exp: '根据变动公式：<b>期末净资产 = 期初资本 + 本期投入资本 + 本期利润 - 本期提取(Drawings)</b>。$160,000 = $100,000 + $30,000 + $50,000 - 提取，得提取 = $20,000。' },
                    { id: 'ch2-q13', src: 'CH2 Q13', en: 'At the end of the first accounting period, Net assets = Capital introduced - Loss - Drawings.', cn: '在第一个会计期末，净资产 = 投入资本 - 亏损 - 提取。', ans: true, key: '会计等式变动公式', exp: '这是一个正确的变动公式。<b>净资产(Net assets)</b>代表所有者权益。它等于起初投入资本，减去发生的<b>亏损(Loss)</b>，减去提取的<b>款项(Drawings)</b>。' },
                    { id: 'ch2-q14', src: 'CH2 Q14', ctx: 'Minhui has opening net assets $50,000, closing net assets $120,000, drawings $30,000, and capital introduced $40,000.', en: 'Minhui net profit for the year was $60,000.', cn: 'Minhui当年的净利润是$60,000。', ans: true, key: '会计等式变动计算', exp: '<b>期末净资产 = 期初净资产 + 投入资本 + 本期利润 - 提取(Drawings)</b>。$120,000 = $50,000 + $40,000 + 本期利润 - $30,000，解得利润 = $60,000。' },
                    { id: 'ch2-q15', src: 'CH2 Q15', en: 'Drawings can be calculated as: Opening net assets - Closing net assets + Capital introduced + Net profit for the period.', cn: '提取款项计算公式为：期初净资产 - 期末净资产 + 投入资本 + 本期净利润。', ans: true, key: '推导提取款项公式', exp: '通过变动公式 <b>期末净资产 = 期初净资产 + 投入资本 + 利润 - 提取(Drawings)</b> 移项可得：提取 = 期初净资产 + 投入资本 + 利润 - 期末净资产。' },
                    { id: 'ch2-q16', src: 'CH2 Q16', en: 'Profit can be calculated as: Closing capital + Drawings - Capital introduced - Opening capital.', cn: '利润计算公式为：期末资本 + 提取 - 投入资本 - 期初资本。', ans: true, key: '推导利润公式', exp: '通过变动公式 <b>期末资本 = 期初资本 + 投入资本 + 利润 - 提取(Drawings)</b> 移项可得：利润 = 期末资本 - 期初资本 - 投入资本 + 提取。' },
                    { id: 'ch2-q17', src: 'CH2 Q17', ctx: 'Lin has a profit of $20,000, opening net assets $100,000, closing net assets $160,000, and capital introduced $50,000.', en: 'Lin withdrew $10,000 cash from the business for the year.', cn: 'Lin当年从企业中提取了$10,000现金。', ans: true, key: '会计等式变动计算', exp: '<b>期末净资产 = 期初净资产 + 投入资本 + 利润 - 提取(Drawings)</b>。$160,000 = $100,000 + $50,000 + $20,000 - 提取，解得：提取 = $10,000。' },
                    { id: 'ch2-q18-1', src: 'CH2 Q18-①', en: 'The accounting equation can be correctly arranged as: Liabilities - Assets = Capital.', cn: '会计等式可以被正确排列为：负债 - 资产 = 资本。', ans: false, key: '基础会计等式', exp: '正确的排列应为：<b>资产 - 负债 = 资本(Capital)</b>。' },
                    { id: 'ch2-q18-2', src: 'CH2 Q18-②', en: 'The accounting equation can be correctly arranged as: Assets = Capital + Liabilities.', cn: '会计等式可以正确排列为：资产 = 资本 + 负债。', ans: true, key: '基础会计等式', exp: '这是会计等式的标准形态：<b>资产(Assets) = 所有者权益/资本(Capital) + 负债(Liabilities)</b>。' },
                    { id: 'ch2-q18-3', src: 'CH2 Q18-③', en: 'The accounting equation can be correctly arranged as: Net assets = Capital.', cn: '会计等式可以正确排列为：净资产 = 资本。', ans: true, key: '净资产定义', exp: '<b>净资产(Net assets)</b>的定义就是资产减去负债，其结果等于<b>资本(Capital)</b>或所有者权益。' },
                    { id: 'ch2-q19', src: 'CH2 Q19', en: 'The concept of duality means that each business transaction has two effects on the accounts.', cn: '复式记账（Duality）的概念意味着每笔业务交易对账户都有两个影响。', ans: true, key: '复式记账核心', exp: '复式记账的核心是“有借必有贷，借贷必相等”。这意味着每一笔经济交易都会至少包含<b>借方(Debit)</b>和<b>贷方(Credit)</b>，即至少两个影响（不论是同增、同减还是一增一减）。' },
                    { id: 'ch2-q20-a', src: 'CH2 Q20-A', en: 'Purchase of a computer for office use is classified as a revenue expense.', cn: '购买办公用电脑被归类为收益性费用。', ans: false, key: '电脑属于非流动资产', exp: '电脑是长期使用的非流动资产，属于<b>资本性支出(Capital Expenditure)</b>。' },
                    { id: 'ch2-q20-b', src: 'CH2 Q20-B', en: 'Repairs to factory equipment are classified as revenue expenses.', cn: '修理工厂设备被归类为收益性费用。', ans: true, key: '日常维修属于费用', exp: '这是为了维持设备正常运转而发生的日常维护，属于<b>费用(Expenses)</b>（收益性支出）。' },
                    { id: 'ch2-q20-c', src: 'CH2 Q20-C', en: 'Purchase of goods for resale to customers is classified as a revenue expense.', cn: '购买用于转售的商品被归类为收益性费用。', ans: true, key: '采购商品属于费用', exp: '这是采购成本，在商品售出时将转为<b>销售成本(Cost of Sales)</b>，是一种费用（收益性支出）。' },
                    { id: 'ch2-q20-d', src: 'CH2 Q20-D', en: 'Purchase of a software licence is classified as a revenue expense.', cn: '购买软件许可证被归类为收益性费用。', ans: false, key: '无形资产属于资本性支出', exp: '软件许可是长期使用的无形资产，属于<b>资本性支出(Capital Expenditure)</b>。' },
                    { id: 'ch2-q21-1', src: 'CH2 Q21-①', ctx: 'A car dealer buys a car at auction that will be sold to a customer.', en: 'To reflect the acquisition of this car, the Tangible non-current assets account should be debited.', cn: '为了反映这辆车的购入，应当借记“有形非流动资产”账户。', ans: false, key: '待售商品为存货', exp: '对于汽车经销商来说，用于销售的汽车是其商品，即<b>存货(Inventory)</b>。购买存货应借记<b>“采购(Purchases)”</b>账户。' },
                    { id: 'ch2-q21-2', src: 'CH2 Q21-②', ctx: 'A car dealer buys a car at auction that will be used by a manager for the next 18 months.', en: 'To reflect the acquisition of this car, the Tangible non-current assets account should be debited.', cn: '为了反映这辆车的购入，应当借记“有形非流动资产”账户。', ans: true, key: '自用资产为非流动资产', exp: '这辆车是企业为了长期运营而持有的，属于固定资产。因此，应借记<b>“有形非流动资产(Tangible non-current assets)”</b>账户。' },
                    { id: 'ch2-q22-1', src: 'CH2 Q22-①', en: 'Quarterly rent for the retail outlet should be classed as an expense.', cn: '零售店的季度租金应归类为费用。', ans: true, key: '租金是期间费用', exp: '这是由于日常运营引发的期间成本，必须计入<b>费用(Expenses)</b>。' },
                    { id: 'ch2-q22-2', src: 'CH2 Q22-②', en: 'Computer equipment purchased for resale should be classed as an asset expenditure.', cn: '购买用于转售的计算机设备应归类为资产性支出。', ans: false, key: '待售商品属于成本费用', exp: '用于转售的电脑是<b>存货(Inventory)</b>，售出时将确认为<b>销售成本(Cost of Sales)</b>，归类为当期费用(Expenses)而非长期资产支出。' },
                    { id: 'ch2-q22-3', src: 'CH2 Q22-③', en: 'Building insurance should be classed as an expense.', cn: '建筑保险应归类为费用。', ans: true, key: '保险是期间费用', exp: '这是由于日常运营引发的期间成本，计入<b>费用(Expenses)</b>。' },
                    { id: 'ch2-q22-4', src: 'CH2 Q22-④', en: 'Fixtures and fittings should be classed as an asset expenditure.', cn: '固定装置与配件应归类为资产性支出。', ans: true, key: '长期装置为资产', exp: '这些是为长期使用而购置的资产，应作为<b>资本性支出(Capital expenditure)</b>，计入同名<b>非流动资产(Non-current assets)</b>科目。' },
                    { id: 'ch2-q23-a', src: 'CH2 Q23-A', en: 'Purchase of shares in a company for investment purposes is classified as revenue expenditure.', cn: '为投资目的购买公司股份被归类为收益性支出。', ans: false, key: '长期投资是资本性支出', exp: '购买用于投资的股份是<b>长期投资(Long-term Investment)</b>，属于<b>资本性支出(Capital Expenditure)</b>。' },
                    { id: 'ch2-q23-b', src: 'CH2 Q23-B', en: 'Purchase of building insurance is classified as revenue expenditure.', cn: '购买建筑保险被归类为收益性支出。', ans: true, key: '日常保险是收益性支出', exp: '收益性支出是为了维持公司运营发生、效益仅及该会计期的支出。购买保险的目的是日常运营保护，属于<b>费用(Expenses)</b>。' },
                    { id: 'ch2-q23-c', src: 'CH2 Q23-C', en: 'Purchase of computer equipment for the administration office is classified as revenue expenditure.', cn: '为行政办公室购买计算机设备被归类为收益性支出。', ans: false, key: '电脑属于资本性支出', exp: '购置可以提供长期利益的电脑等固定资产，属于<b>资本性支出(Capital Expenditure)</b>。' },
                    { id: 'ch2-q23-d', src: 'CH2 Q23-D', en: 'Payment of sales staff wages is classified as revenue expenditure.', cn: '支付销售人员工资被归类为收益性支出。', ans: true, key: '工资属于收益性支出', exp: '员工工资即人工成本属于维持经营运转的日常支持，属于<b>费用(Expenses)</b>即收益性支出。' },
                    { id: 'ch2-q24-a', src: 'CH2 Q24-A', ctx: 'Writing off an irrecoverable balance of $450.', en: 'The correct entry is to Debit Trade receivables ledger account $450 and Credit Irrecoverable debts account $450.', cn: '正确分录为借记应收账款$450，贷记坏账费用$450。', ans: false, key: '坏账核销分录方向', exp: '核销坏账时发生费用增加并冲减资产。应为：借记(DR) <b>不可收回债务(Irrecoverable debts)</b> 即坏账费用；贷记(CR) <b>应收账款(Trade receivables)</b> 冲减坏账余额。' },
                    { id: 'ch2-q24-b', src: 'CH2 Q24-B', ctx: 'Bonus issue of 80,000 shares of $0.50 each.', en: 'The correct entry is to Debit Share premium account $40,000 and Credit Share capital account $40,000.', cn: '正确分录为借记股本溢价$40,000，贷记股本$40,000。', ans: true, key: '发放红股使用储备', exp: '发放<b>红股(Bonus issue)</b>不仅不增发现金，还会将现有股东权益的留存项转化为正式股本。分录为：借记(DR) <b>股本溢价(Share premium)</b> $40,000；贷记(CR) <b>股本(Share capital)</b> $40,000。' },
                    { id: 'ch2-q24-c', src: 'CH2 Q24-C', ctx: 'Correction of error where debit side of Motor vehicles account was undercast by $1,000.', en: 'The correct entry is to Debit Suspense account $1,000 and Credit Motor vehicles account $1,000.', cn: '正确分录为借记暂记账户$1,000，贷记机动车账户$1,000。', ans: false, key: '更正少记的错账方向', exp: '机动车账户的借方少记，说明我们需要为其调增余额。应为：借记(DR) <b>机动车(Motor vehicles)</b> 即调增资产；贷记(CR) <b>暂记账户(Suspense account)</b> 平补试算不平衡差异。' },
                    { id: 'ch2-q24-d', src: 'CH2 Q24-D', ctx: 'Capitalisation of labour costs on a self-constructed building for $2,500.', en: 'The correct entry is to Debit Wages $2,500 and Credit Buildings $2,500.', cn: '正确分录为借记工资费用$2,500，贷记建筑资产$2,500。', ans: false, key: '自选资产资本化方向', exp: '资本化意味着这笔人工成本应作为资产增加而不是当期费用核销。应为：借记(DR) <b>建筑物(Buildings)</b>；贷记(CR) <b>工资(Wages)</b>以冲减原本记入费用的工资额度。' },
                    { id: 'ch2-q25', src: 'CH2 Q25', en: 'To record goods taken from inventory by the owner, you should debit Drawings and credit Purchases.', cn: '要记录所有者从库存取走商品，应当借记提取，贷记采购。', ans: true, key: '提取商品冲减采购', exp: '所有者提取商品自用，减少了企业本期的采购成本。因此，借记(DR)<b>提取(Drawings)</b>以反映所有者权益减少；贷记(CR)<b>采购(Purchases)</b>冲销未用于销售部分的成本。' },
                    { id: 'ch2-q26-a', src: 'CH2 Q26-①', ctx: 'Ewan, a sole trader, takes goods from inventory for his own use, but it is not recorded yet.', en: 'Accounting for these drawings will lead to an increase in profit.', cn: '记录这笔提取将导致利润增加。', ans: true, key: '冲销采购导致利润增加', exp: '正确分录是 DR Drawings, CR Purchases。由于<b>贷记采购(Purchases)</b>减少了当期销售成本(Cost of Sales)，从而导致最终计算得出的<b>利润(Profit)上升</b>。' },
                    { id: 'ch2-q26-b', src: 'CH2 Q26-②', ctx: 'Ewan, a sole trader, takes goods from inventory for his own use, but it is not recorded yet.', en: 'Accounting for Ewan unrecorded drawings of goods will lead to a decrease in assets.', cn: '记录Ewan这笔未入账的提取商品将导致企业资产减少。', ans: false, key: '存货量靠实地盘点', exp: '期末存货资产是基于实物盘点数量核算的，被拿走的货天然没有计入盘点值，所以从头到尾对<b>资产(Assets)</b>账户都<b>无影响(No effect)</b>。' },
                    { id: 'ch2-q27-a', src: 'CH2 Q27-A', en: 'Goods taken from a business by a sole trader for personal use is an appropriation of profit.', cn: '个体户取走商品自用属于利润分配。', ans: true, key: '所有者提取为利润分配', exp: '个体户从企业中拿取现金或物品（<b>提取/Drawings</b>），实质上都是所有者对企业利润结果的最早分配手段。属于<b>利润分配(Appropriation of profit)</b>。' },
                    { id: 'ch2-q27-b', src: 'CH2 Q27-B', en: 'Interest payments to providers of finance is an appropriation of profit.', cn: '向资金提供者支付的利息属于利润分配。', ans: false, key: '利息属于费用', exp: '向银行或其他机构支付的利息，是筹资引发的成本支出，应当在计算净利润的环节前扣除为<b>财务费用(Finance expense)</b>，不属于对企业成果（利润）的分配。' },
                    { id: 'ch2-q27-c', src: 'CH2 Q27-C', en: 'Dividends paid to shareholders is an appropriation of profit.', cn: '向股东派发股利属于利润分配。', ans: true, key: '派发股利为利润分配', exp: '一旦计算出净利，向参与持股者支付<b>股利(Dividends)</b>也是对税后运营成果最标准的分配方式。' },
                    { id: 'ch2-q27-d', src: 'CH2 Q27-D', en: 'Salaries paid to partners is an appropriation of profit.', cn: '向合伙人支付工资属于利润分配。', ans: true, key: '合伙人薪酬为分配项', exp: '在合伙组织下，给予执行管理任务者的“工资”，其实质是以固定方式拨付一部分企业未分配成果给成员，会计处理上也被视作<b>利润分配(Appropriation of profit)</b>。' },
                    { id: 'ch2-q28-1', src: 'CH2 Q28-①', en: 'The Accruals account will be a debit balance in the statement of financial position.', cn: '应计费用在财务状况表中呈现为借方余额。', ans: false, key: '应计费用为负债', exp: '<b>应计费用(Accruals)</b>表示发生但尚未偿付的资金，属于负债类，余额呈<b>贷方(Credit)</b>。' },
                    { id: 'ch2-q28-2', src: 'CH2 Q28-②', en: 'The Tax payable account will be a debit balance in the statement of financial position.', cn: '应付税款在财务状况表中呈现为借方余额。', ans: false, key: '应付税款为负债', exp: '<b>应交税费(Tax payable)</b>代表我们欠税务机关还未打入的欠税，属于流动负债类，应当结余为<b>贷方(Credit)</b>。' },
                    { id: 'ch2-q28-3', src: 'CH2 Q28-③', en: 'The Prepayments account will be a debit balance in the statement of financial position.', cn: '预付款项在财务状况表中呈现为借方余额。', ans: true, key: '预付项目是资产', exp: '提前预付给供应商的账款代表了公司的一种获取服务的权利(<b>Prepayments</b>)，归类于流动资产类，呈现出<b>借方(Debit)</b>。' },
                    { id: 'ch2-q28-4', src: 'CH2 Q28-④', en: 'The Inventory account will be a debit balance in the statement of financial position.', cn: '存货账户在财务状况表中呈现为借方余额。', ans: true, key: '存货是流动资产', exp: '库内待变现及流转的<b>存货(Inventory)</b>属于具有直接价值的经济资源即流动资产，账目体现为<b>借方(Debit)</b>。' },
                    { id: 'ch2-q29-1', src: 'CH2 Q29-①', en: 'Revenue is likely to appear in the Statement of Financial Position.', cn: '收入很可能出现在财务状况表中。', ans: false, key: '收入出现在损益表中', exp: '<b>收入(Revenue)</b>反映企业在一个时期内的经营成果，是<b>损益表(Statement of Profit or Loss)</b>的核心项目。' },
                    { id: 'ch2-q29-2', src: 'CH2 Q29-②', en: 'Trade Receivables are likely to appear in the Statement of Financial Position.', cn: '应收账款很可能出现在财务状况表中。', ans: true, key: '应收账款为资产', exp: '<b>应收账款(Trade Receivables)</b>代表外部主张未收资金，是企业在某个时点具备收益潜力的资产，列报在<b>财务状况表(Statement of Financial Position)</b>之中。' },
                    { id: 'ch2-q29-3', src: 'CH2 Q29-③', en: 'Tax Payable is likely to appear in the Statement of Profit or Loss.', cn: '应交税费很可能出现在损益表中。', ans: false, key: '应交税负属于负债', exp: '<b>应交税费(Tax Payable)</b>是企业在时间截点所背负资金返纳义务。这种负债项要明确向外界申报到期日的欠款总额，需要列出在<b>财务状况表(Statement of Financial Position)</b>。' },
                    { id: 'ch2-q29-4', src: 'CH2 Q29-④', en: 'Retained Earnings are likely to appear in the Statement of Financial Position.', cn: '留存收益很可能出现在财务状况表中。', ans: true, key: '留存属于权益', exp: '<b>留存收益(Retained Earnings)</b>是企业历年累积用于内生发展循环的最终积累额（即所有者权益）。它作为一个余额反映于<b>财务状况表(Statement of Financial Position)</b>中。' }
                ]
            },
            {
                id: 'ch3',
                title: 'CH3 概念框架与会计准则',
                label: 'CH3',
                items: [
                    { id: 'ch3-q1-a', src: 'CH3 Q1-A', ctx: 'Which activity would happen immediately prior to the issue of an IFRS Accounting Standard to check that the standard is workable and of appropriate quality?', en: 'Release of a discussion paper to encourage debate about the accounting issue.', cn: '发布讨论稿以鼓励对会计问题的辩论。', ans: false, key: '制定程序顺序', exp: '在正式发布准则之前，紧接着的活动是发布<b>征求意见稿(Exposure Draft)</b>。发布<b>讨论稿(Discussion Paper)</b>是更早期的阶段。' },
                    { id: 'ch3-q1-b', src: 'CH3 Q1-B', ctx: 'Which activity would happen immediately prior to the issue of an IFRS Accounting Standard to check that the standard is workable and of appropriate quality?', en: 'IFRS Interpretations Committee would promote its usage.', cn: 'IFRS解释委员会将推广其使用。', ans: false, key: '解释委员会职责', exp: '<b>IFRS解释委员会(IFRIC)</b>负责解释现有准则，而不是推广新准则。' },
                    { id: 'ch3-q1-c', src: 'CH3 Q1-C', ctx: 'Which activity would happen immediately prior to the issue of an IFRS Accounting Standard to check that the standard is workable and of appropriate quality?', en: 'It would be trialled in the UK and comments invited.', cn: '它将在英国试行并征求意见。', ans: false, key: '准则的全球性', exp: 'IFRS是全球性的标准，不会只在单个国家试行以代替标准制定流程。' },
                    { id: 'ch3-q1-d', src: 'CH3 Q1-D', ctx: 'Which activity would happen immediately prior to the issue of an IFRS Accounting Standard to check that the standard is workable and of appropriate quality?', en: 'An exposure draft would be released inviting readers to comment.', cn: '发布征求意见稿以邀请读者评论。', ans: true, key: '制定程序顺序', exp: '正式发布准则之前，紧随其后的活动是发布<b>征求意见稿(Exposure Draft)</b>，这是准则草案的公开版本，旨在广泛征求公众意见。' },

                    { id: 'ch3-q2-a', src: 'CH3 Q2-A', ctx: 'Which ONE of the following international accounting regulatory bodies takes account of the needs of emerging economies and small to medium-sized entities?', en: 'IFRS Foundation', cn: 'IFRS基金会', ans: true, key: '基金会的目标', exp: '<b>国际财务报告准则基金会(IFRS Foundation)</b>作为监督机构，其目标之一就是促进全球高质量准则的应用，并在过程中考虑新兴经济体和中小实体(SMEs)的需求。' },
                    { id: 'ch3-q2-b', src: 'CH3 Q2-B', ctx: 'Which ONE of the following international accounting regulatory bodies takes account of the needs of emerging economies and small to medium-sized entities?', en: 'IASB', cn: 'IASB', ans: false, key: 'IASB为核心制定主体', exp: '<b>国际会计准则理事会(IASB)</b>负责具体准则的制定，但关注中小实体的战略性需求归属于其母机构IFRS基金会的使命。' },
                    { id: 'ch3-q2-c', src: 'CH3 Q2-C', ctx: 'Which ONE of the following international accounting regulatory bodies takes account of the needs of emerging economies and small to medium-sized entities?', en: 'IFRS Advisory Council', cn: 'IFRS咨询委员会', ans: false, key: '咨询委员会职责', exp: '<b>咨询委员会(Advisory Council)</b>主要为IASB的议程提供战略层面的建议。' },
                    { id: 'ch3-q2-d', src: 'CH3 Q2-D', ctx: 'Which ONE of the following international accounting regulatory bodies takes account of the needs of emerging economies and small to medium-sized entities?', en: 'IFRS Interpretations Committee', cn: 'IFRS解释委员会', ans: false, key: '解释委员会职责', exp: '<b>IFRS解释委员会(IFRIC)</b>负责对现有准则中规定不明确或存在争议的会计问题提供权威解释。' },

                    { id: 'ch3-q3-a', src: 'CH3 Q3-A', ctx: 'Which of the following accounting regulatory bodies is responsible for providing guidance on disclosure requirements where there is uncertainty in the original standard?', en: 'IFRS Foundation', cn: 'IFRS基金会', ans: false, key: '基金会的职责', exp: '基金会主要负责监督、筹资并任命理事会成员。' },
                    { id: 'ch3-q3-b', src: 'CH3 Q3-B', ctx: 'Which of the following accounting regulatory bodies is responsible for providing guidance on disclosure requirements where there is uncertainty in the original standard?', en: 'IFRS Interpretations Committee', cn: 'IFRS解释委员会', ans: true, key: '解释争议和不确定性', exp: '<b>IFRS解释委员会(IFRIC)</b>的主要职责是对现有IFRS准则中规定不明确或存在争议的问题及时提供权威的指引。' },
                    { id: 'ch3-q3-c', src: 'CH3 Q3-C', ctx: 'Which of the following accounting regulatory bodies is responsible for providing guidance on disclosure requirements where there is uncertainty in the original standard?', en: 'IASB', cn: 'IASB', ans: false, key: 'IASB发布新准则', exp: 'IASB负责起草和发布新的具体准则，而细枝末节的解释指引通常交由IFRIC处理。' },

                    { id: 'ch3-q4-1', src: 'CH3 Q4-①', en: 'An objective of the IASB in formulating IFRS Accounting Standards is to raise the standard of financial reporting.', cn: 'IASB制定准则的一个目标是提高财务报告的标准。', ans: true, key: 'IASB总体目标', exp: 'IASB旨在制定一套高质量、可执行的准则，从而<b>提高(raise)</b>全球财务报告的标准。' },
                    { id: 'ch3-q4-2', src: 'CH3 Q4-②', en: 'An objective of the IASB is to reduce the information gap between managers and investors.', cn: 'IASB的一个目标是减少管理者与投资者之间的信息差距。', ans: true, key: '减少信息不对称', exp: '通过提升透明度和可比性，可以有效填平管理者和外部使用者之间的信息差距。' },
                    { id: 'ch3-q4-3', src: 'CH3 Q4-③', en: 'An objective of the IASB is to ensure compliance with national standards.', cn: 'IASB的一个目标是确保企业遵守各国的国家标准。', ans: false, key: 'IASB推行全球趋同', exp: 'IASB致力于推动各国标准的<b>全球趋同(Convergence)</b>，而不是确保遵守本地的个别国家标准。' },
                    { id: 'ch3-q4-4', src: 'CH3 Q4-④', en: 'An objective of the IASB is to aid comparison with financial statements of other entities.', cn: 'IASB的一个目标是帮助报表使用者将财务状况与其他实体相比较。', ans: true, key: '提升可比性', exp: '采用统一的高质量国际准则，可极大提升报表在横向之间的<b>可比性(Comparability)</b>。' },

                    { id: 'ch3-q5-a', src: 'CH3 Q5-A', ctx: 'Which ONE of the following describes a role of the International Accounting Standards Board (IASB)?', en: 'Provide guidance on issues not addressed in IFRS Accounting Standards', cn: '对准则中未涉及的问题提供指南', ans: false, key: 'IFRIC职能', exp: '这是<b>IFRS解释委员会(IFRIC)</b>的工作内容。' },
                    { id: 'ch3-q5-b', src: 'CH3 Q5-B', ctx: 'Which ONE of the following describes a role of the International Accounting Standards Board (IASB)?', en: 'Develop and publish IFRS Accounting Standards', cn: '制定并发布IFRS会计准则', ans: true, key: 'IASB核心职能', exp: '制定和出台会计准则是<b>国际会计准则理事会(IASB)</b>唯一且最核心的职责。' },

                    { id: 'ch3-q6-1', src: 'CH3 Q6-①', en: 'Issuing a new IFRS Accounting Standard may cause an existing standard to be partially or completely withdrawn.', cn: '发布新的IFRS准则可能会导致现有准则被部分或完全撤销。', ans: true, key: '新老交替', exp: '新准则的发布往往伴随着旧有相关文件的废止。' },
                    { id: 'ch3-q6-2', src: 'CH3 Q6-②', en: 'Issuing a new IFRS Accounting Standard may cover issues that are not in the scope of an existing standard.', cn: '发布新准则可能涵盖以前准则范围外的新领域。', ans: true, key: '填补空白', exp: '随着商业模式更新，新准则也会出台来填补过去的空白区。' },
                    { id: 'ch3-q6-3', src: 'CH3 Q6-③', en: 'Issuing a new IFRS Accounting Standard often explains and clarifies issues raised by users of existing standards.', cn: '发布新准则通常会解释和澄清读者的疑问。', ans: false, key: '澄清问题是IFRIC的职责', exp: '答疑解惑、澄清条款属于发布解释公告范畴，是<b>IFRS解释委员会(IFRIC)</b>的职能。' },
                    { id: 'ch3-q6-4', src: 'CH3 Q6-④', en: 'Issuing a new IFRS Accounting Standard modifies current financial reporting practice.', cn: '发布新的IFRS会计准则会修改当前的财务报告实务。', ans: true, key: '新准则的后果' },

                    { id: 'ch3-q7-1', src: 'CH3 Q7-①', en: 'Issuing a discussion paper that sets out the possible options for a new standard is a stage in the due process of developing a new IFRS.', cn: '发布一份列出选项的讨论稿是制定新准则的正当程序阶段。', ans: true, key: '制定流程第一步', exp: '<b>讨论稿(Discussion Paper)</b>往往是早期征求意见的第一步。' },
                    { id: 'ch3-q7-2', src: 'CH3 Q7-②', en: 'Publishing clarification on the interpretation of an IFRS Accounting Standard is a stage in the due process of developing a new IFRS.', cn: '发布对解释的澄清是制定新准则的正当程序。', ans: false, key: '澄清属于IFRIC发文', exp: '出台解释不是“开发新准则的正当程序”。' },
                    { id: 'ch3-q7-3', src: 'CH3 Q7-③', en: 'Drafting an IFRS Accounting Standard for public comment is a stage in the due process of developing a new IFRS.', cn: '起草一份供公众评论的准则是制定新准则的正当程序。', ans: true, key: '制定流程核心部分', exp: '这即是发布<b>征求意见稿(Exposure Draft)</b>环节，是准则草案公开化必经之路。' },
                    { id: 'ch3-q7-4', src: 'CH3 Q7-④', en: 'Analysing the feedback received on a discussion paper is a stage in the due process of developing a new IFRS.', cn: '分析收到的关于讨论稿的反馈是制定新IFRS的正当程序阶段。', ans: true, key: '制定正当程序' },

                    { id: 'ch3-q8', src: 'CH3 Q8', en: 'The International Accounting Standards Board (IASB) has the sole responsibility and authority to issue an International Financial Reporting Standard.', cn: '只有IASB有此项专有职权去发布国际财务报告准则。', ans: true, key: '制定权排他性', exp: 'IFRS体系下的最高业务制定机构就是<b>IASB</b>。' },

                    { id: 'ch3-q9', src: 'CH3 Q9', en: 'The IFRS Interpretations Committee provides guidance on financial reporting issues that are not specifically addressed in IFRS Accounting Standards.', cn: 'IFRS解释委员会对那些准则未具体规定的实务漏洞提供处理指导。', ans: true, key: '解释委员会填仓补漏', exp: '补充、解释、明晰准则应用中的争议是<b>IFRIC</b>设立的目的。' },

                    { id: 'ch3-q10-1', src: 'CH3 Q10-①', en: 'IFRS Accounting Standards are compulsory in a country only if they are adopted by the country\'s standard-setting body.', cn: 'IFRS会计准则仅在一个国家的准则制定机构采纳后才在该国具有强制性。', ans: true, key: 'IASB缺乏执法权', exp: 'IASB发布的准则是行业倡议与模板，必须要通过各主权国家的会计立法机构或监管单位正式将其<b>落地采纳(adopt)</b>，才能在这个国家形成法律层面的约束。' },
                    { id: 'ch3-q10-2', src: 'CH3 Q10-②', en: 'When asking for opinions about a potential new accounting standard, the IASB will first publish an exposure draft and then, a discussion paper.', cn: '当面临新准则征询意见时，IASB会先发布征求意见稿，然后再发讨论稿。', ans: false, key: '文书发布次序倒置', exp: '正确的顺序是应先发概念性的<b>讨论稿(Discussion Paper)</b>，之后才会形成具体的<b>征求意见稿(Exposure Draft)</b>。' },
                    { id: 'ch3-q10-3', src: 'CH3 Q10-③', en: 'The IASB oversees the work of the IFRS Foundation.', cn: 'IASB负责监督IFRS基金会的工作。', ans: false, key: '上下级颠倒', exp: '机构层级中，是<b>IFRS基金会(Foundation)</b>负责监督、拨款并选任<b>IASB</b>成员。' },
                    { id: 'ch3-q10-4', src: 'CH3 Q10-④', en: 'The IFRS Interpretations Committee may consider issues that are not specifically covered in IFRS Accounting Standards.', cn: 'IFRS解释委员会可以考虑IFRS会计准则未具体涵盖的问题。', ans: true, key: '解释争议和空白', exp: '这是IFRIC的核心职能之一。' },

                    { id: 'ch3-q11-1', src: 'CH3 Q11-①', en: 'ISSB standards aim to provide information about sustainability related risks and opportunities.', cn: 'ISSB准则旨在提供关于可持续性相关的风险和机遇信息。', ans: true, key: 'ISSB设立目标', exp: '随着气候生态话题升温，<b>国际可持续发展准则理事会(ISSB)</b>的任务就是统一全球关于企业可持续发展风险的披露规范。' },
                    { id: 'ch3-q11-2', src: 'CH3 Q11-②', en: 'The disclosure required by the ISSB standards is primarily for investors, and other capital market participants.', cn: 'ISSB准则要求的披露主要面向投资者和其他资本市场参与者。', ans: true, key: 'ISSB服务对象', exp: '它与财务报表一样，主要目的都是服务于外部投资者和资本市场的参与者决策。' },
                    { id: 'ch3-q11-3', src: 'CH3 Q11-③', en: 'The standards ignore any existing sustainability standards that may already have been in use, as the ISSB believed that existing standards were inadequate.', cn: 'ISSB准则完全无视了任何现存框架并另起炉灶。', ans: false, key: 'ISSB寻求互操作性', exp: 'ISSB在建立初始就大量吸纳、统合了过去的碳报告框架(如SASB框架等)，并积极寻求着不同体系的<b>互操作性(Interoperability)</b>，并未做到推翻一切。' },

                    { id: 'ch3-q12', src: 'CH3 Q12', ctx: 'Who set up the International Sustainability Standards Board (ISSB)?', en: 'The IFRS Foundation set up the ISSB.', cn: 'IFRS基金会设立了ISSB。', ans: true, key: 'ISSB上级机构', exp: 'ISSB是在2021年由<b>IFRS基金会(The IFRS Foundation)</b>宣布成立的。' },

                    { id: 'ch3-q13-1', src: 'CH3 Q13-①', en: 'Faithful representation is one of the qualitative characteristics expected of financial information.', cn: '“如实反映”是财务信息应具备的质量特征。', ans: true, key: '基本特征之一', exp: '《概念框架》明确指出：<b>相关性(Relevance)</b>与<b>如实反映(Faithful Representation)</b>是两个最高级的基本质量特征。' },
                    { id: 'ch3-q13-2', src: 'CH3 Q13-②', en: 'Financial statements are expected to be fundamentally precise and accurate.', cn: '财务报表预期是需要做到绝对精准与绝对无误的。', ans: false, key: '会计报表充斥着估算', exp: '会计处理涉及到大量主观预估与折旧等模型参数选择，只追求真实记录，不苛求绝对<b>精确(Precise/Accurate)</b>。只能做到<b>公允且无重大报表错报(Free from material error)</b>。' },
                    { id: 'ch3-q13-3', src: 'CH3 Q13-③', en: 'Verifiability is an expected qualitative characteristic of financial statements.', cn: '“可验证性”是财报预期质量特征之一。', ans: true, key: '增强特征项', exp: '<b>可验证性(Verifiability)</b>、及时性、可理解性和可比性，同属于财报提升效能的增强特征。' },

                    { id: 'ch3-q14-1', src: 'CH3 Q14-①', en: 'Notes to the financial statements explain how a business accounts for its transactions, which ensures understandability.', cn: '报表附注解释账目处理过程，这是为了确保可理解性。', ans: true, key: '附注促进信息可理解', exp: '如果只有光秃秃的报表数字，读者将无从得知计算依据。加入解释性的<b>附注(Notes)</b>无疑是响应了<b>可理解性(Understandability)</b>。' },
                    { id: 'ch3-q14-2', src: 'CH3 Q14-②', en: 'Financial information is backed up by documentation that provides evidence of its occurrence, ensuring comparability.', cn: '财务信息由单据底稿证实其真实发生，这是为了确保信息的可比性。', ans: false, key: '底据提供可验证信度', exp: '有据可查、由原单追溯验证这一行为对应的是<b>可验证性(Verifiability)</b>特质，而不是可比性。' },
                    { id: 'ch3-q14-3', src: 'CH3 Q14-③', en: 'Financial information is prepared on a regular basis to ensure management can react quickly. This is an example of timeliness.', cn: '定期编制以使管理层迅速反应，体现了及时性。', ans: true, key: '信息随用随取', exp: '这是对<b>及时性(Timeliness)</b>最直白的阐释。' },

                    { id: 'ch3-q15', src: 'CH3 Q15', ctx: 'Majid matches his purchase order with the goods received note and the invoice before he pays his supplier.', en: 'This action relates to the qualitative characteristic of Verifiability.', cn: '这种将三单相匹配核对的行为关乎于“可验证性”特质。', ans: true, key: '原单凭证可被追溯检查', exp: '单据一一印证能够帮助独立第三方复原并信服一项开支发生经过，即信息拥有<b>可验证性(Verifiability)</b>。' },

                    { id: 'ch3-q16-1', src: 'CH3 Q16-①', en: 'The IASB Conceptual Framework for Financial Reporting does not change because it sets out underlying concepts.', cn: '概念框架由于只阐述原则所以它永不改变。', ans: false, key: '框架也在改版', exp: '业务环境会变化，概念指引同样会有更新（比如2010年和2018年分别经历过大修）。' },
                    { id: 'ch3-q16-2', src: 'CH3 Q16-②', en: 'The IASB Conceptual Framework for Financial Reporting is intended to assist users in preparing financial statements.', cn: '该框架旨在协助使用者编制财务报表。', ans: true, key: '概念框架帮助编制者', exp: '不仅指导了准则拟定，同时也为平时遇到盲区的编制者提供处理疑难杂症的兜底法则。' },
                    { id: 'ch3-q16-3', src: 'CH3 Q16-③', en: 'The IASB Conceptual Framework is an International Financial Reporting Standard.', cn: '《概念框架》本身也就是一项IFRS准则。', ans: false, key: '框架不是准则', exp: '它只是一部提供逻辑底色的系统性方法论指导书籍，并不等同于任何专门指向特定业务领域的强制规定，地位上<b>不能凌驾(not override)</b>特定的IFRS准则。' },

                    { id: 'ch3-q17-1', src: 'CH3 Q17-①', ctx: 'Myoung continually values inventory using FIFO and documents the detailed description in notes.', en: 'This relates to both Understandability and Comparability.', cn: '她的行为涉及可理解性以及可比性。', ans: true, key: '一贯性操作确保可比', exp: '五年保持同一准则不间断，践行了<b>一贯性(Consistency)</b>即确保了信息的<b>可比性(Comparability)</b>；在附注披露细节手法符合了<b>可理解性(Understandability)</b>。' },

                    { id: 'ch3-q18-1', src: 'CH3 Q18-①', en: 'The concept of consistency should always take precedence over the concept of faithful representation.', cn: '一贯性在任何情况下都应该优先于核心基本层的如实反映。', ans: false, key: '提升特征不可逆乱序', exp: '如若原处理不再反映现时状况，放弃一贯性而去使用新会计政策以达到“如实反映”才是必须选择，<b>基本特征优先级高于增强特征</b>。' },
                    { id: 'ch3-q18-2', src: 'CH3 Q18-②', en: 'Verifiability means classifying and presenting information clearly and concisely.', cn: '"可验证性"意味着将信息分类并清晰简洁地呈现。', ans: false, key: '可验证性的定义混淆', exp: '清晰简洁地分类和呈现信息是<b>可理解性(Understandability)</b>的要求，而非可验证性。' },

                    { id: 'ch3-q19-1', src: 'CH3 Q19-①', ctx: 'Which of the following is NOT an example of faithful representation?', en: 'Materiality is not an example of faithful representation.', cn: '重要性不属于“如实反映”的具体维度。', ans: true, key: '重要性归于相关维度', exp: '<b>重要性(Materiality)</b>属于信息是否有用（Relevance相关性）范畴下需要评估的一个关键阈值点。' },
                    { id: 'ch3-q19-2', src: 'CH3 Q19-②', ctx: 'Which of the following is an example of faithful representation?', en: 'Completeness is an example of faithful representation.', cn: '完整且并无遗漏属于典型的如实反映例证。', ans: true, key: '如实反映完整', exp: '要如实，信息就不应当藏头漏尾。如实反映三大基石：<b>完整性(Completeness)、中立性(Neutrality)、以及免于差错(Free from error)</b>。' },

                    { id: 'ch3-q20', src: 'CH3 Q20', en: 'The main purpose of the IFRS Conceptual Framework is to assist the IASB in developing and reviewing standards.', cn: '概念框架的核心及首要目的是协助IASB自身去制定和审阅准则。', ans: true, key: '框架的最原始目的', exp: '对内约束、统领准则制定逻辑是首要任务。至于便利财会行业和监管受众都是附加意义。' },

                    { id: 'ch3-q22-1', src: 'CH3 Q22-①', en: 'For financial information to be a faithful representation, there should be no errors in the information.', cn: '为了能使记录保持如实反映，财务资料里不应当有任何错差。', ans: true, key: '无错报为如实三项其一', exp: '不仅是要中立完整，也必有<b>无误差(Free from error)</b>的保障承诺。' },
                    { id: 'ch3-q22-2', src: 'CH3 Q22-②', en: 'For financial information to be a faithful representation, the information should be comparable from one year to the next.', cn: '为了实现如实反映要求，信息跨年度应该具备可比性。', ans: false, key: '跨年跨期为可比概念', exp: '这是对增强特征<b>可比性(Comparability)</b>要求，并不是“如实反映”核心下辖的细分点。' },

                    { id: 'ch3-q23', src: 'CH3 Q23', ctx: 'Xiu unilaterally altered the expense categorization from cost of sales to administrative expenses without disclosure. ', en: 'In making this change, the characteristic of consistency has been breached.', cn: 'Xiu这种擅自切换损益项目列报类目的做法破坏了一贯性原则。', ans: true, key: '列报手法乱改乱变', exp: '未经披露及充分理由而变换记法，即违背<b>一贯性(Consistency)</b>要求。这也连带致伤了下一年的<b>可比性(Comparability)</b>。' },

                    { id: 'ch3-q24-1', src: 'CH3 Q24-①', en: 'The phrase going concern relates to a business that is currently profitable and liquid.', cn: '"持续经营"这一概念仅适用于当前盈利且资金充裕的企业。', ans: false, key: '亏损企业也可能是持续经营的', exp: '企业即使当期亏损，只要没有面临破产清算的威胁，仍然可以被认定为<b>持续经营(Going Concern)</b>。持续经营并不要求企业必须盈利。' },
                    { id: 'ch3-q24-2', src: 'CH3 Q24-②', en: 'Going concern means the business will continue in existence for the foreseeable future.', cn: '持续经营意味着企业在可预见的未来将继续经营下去。', ans: true, key: '持续经营的标准定义', exp: '持续经营假设认为企业将在<b>可预见的未来(foreseeable future，通常至少12个月)</b>继续正常经营，不会进入清算或破产程序。' },

                    { id: 'ch3-q25-1', src: 'CH3 Q25-①', en: 'The business entity concept dictates that the business and its owners are always legally separate entities.', cn: '企业主体概念规定企业与其所有者在法律上始终是独立的实体。', ans: false, key: '个体户在法律上并非独立实体', exp: '对于有限公司(Company)来说，企业与所有者在法律上确实是独立的。但对于<b>个体户(Sole Trader)</b>，法律上企业与所有者并不分离，所有者需对企业债务承担无限责任。' },
                    { id: 'ch3-q25-2', src: 'CH3 Q25-②', en: 'For accounting purposes the business is always treated separately from its owner based on the business entity concept.', cn: '基于企业主体概念，在会计核算中企业始终与其所有者分开处理。', ans: true, key: '会计核算中严格区分企业与个人', exp: '<b>企业主体(Business Entity)</b>假设要求无论法律地位如何，在会计上始终将企业的交易与所有者的个人交易分开记录和核算。' },

                    { id: 'ch3-q26', src: 'CH3 Q26', en: 'Recording leased vehicles over which an entity has control but not ownership as non-current assets is an application of the substance over form concept.', cn: '将企业拥有控制权但不拥有所有权的租赁车辆记录为非流动资产，是实质重于形式概念的应用。', ans: true, key: '实质重于形式', exp: '虽然企业没有法律上的所有权，但由于企业实际控制并使用该资产，根据<b>实质重于形式(Substance over Form)</b>原则，应将其确认为非流动资产。' },
                    { id: 'ch3-q40', src: 'CH3 Q40', en: 'Although ultimate responsibility cannot be delegated, everyday practical details can of course be delegated to the finance director.', cn: '虽然最终责任不能被授权出去，但日常实务细节当然可以委派给财务总监处理。', ans: true, key: '日常事务可授权委派', exp: '尽管最终责任不可推卸，但实务中的日常具体操作细节当然可以<b>向下授权(Delegate)</b>委派给财务总监等专业人员负责处理。' },

                    { id: 'ch3-q41', src: 'CH3 Q41', en: 'Acting in the best interest of the company is always deemed one of the main duties of a director.', cn: '以公司的最大利益行事始终被视为董事的主要职责之一。', ans: true, key: '董事的首要职责：为公司利益行事', exp: '董事作为公司的受托人，其首要和根本的<b>受托责任(Fiduciary duty)</b>便是始终为公司的整体和最大利益行事。' }
                ]
            },
            {
                id: 'ch4',
                title: 'CH4 业务凭证与会计系统',
                label: 'CH4',
                items: [
                    { id: 'ch4-q1-a', src: 'CH4 Q1-A', en: 'A purchase order is sent by a business to their customer.', cn: '采购订单由企业发送给其客户。', ans: false, key: '采购订单由买方发出', exp: '<b>采购订单(Purchase order)</b>是由买方(客户)发出给卖方(供应商)的文件，用于确认订购意向。题目说"发给客户"是错误的。' },
                    { id: 'ch4-q1-b', src: 'CH4 Q1-B', en: 'A quotation is sent by a business to their customer.', cn: '报价单由企业发送给其客户。', ans: true, key: '卖方报价格', exp: '<b>报价单(Quotation)</b>由卖方（企业）发出，向潜在买方（客户）告知商品或服务的价格。' },
                    { id: 'ch4-q1-c', src: 'CH4 Q1-C', en: 'A remittance advice is sent by a business to their customer.', cn: '付款通知单由企业发送给其客户。', ans: false, key: '付款通知单由付款方发出', exp: '<b>付款通知单(Remittance advice)</b>是由付款方(客户)发出的，用于在付款时告知卖方该笔付款所对应的发票。不是由企业发给客户。' },
                    { id: 'ch4-q1-d', src: 'CH4 Q1-D', en: 'A customer (sales) invoice is sent by a business to their customer.', cn: '销售发票由企业发送给其客户。', ans: true, key: '卖方开发票收款', exp: '最核心的催讨账单：<b>销售发票(Sales invoice)</b>由卖方发出，用于通知买方所购商品详情及应付金额。' },

                    { id: 'ch4-q2-1', src: 'CH4 Q2-①', en: 'A quotation is issued by the customer.', cn: '报价单是由客户签发的。', ans: false, key: '供应商报价', exp: '客户只询价，而<b>报价单(Quotation)</b>自然是由提供产品的供应商发出的。' },
                    { id: 'ch4-q2-2', src: 'CH4 Q2-②', en: 'A goods dispatched note is issued by the supplier.', cn: '发货单是由供应商签发的。', ans: true, key: '供应商发货出单', exp: '<b>发货单(Goods dispatched note)</b>是货物离开发运点时伴随的清单，由供应商签发。' },
                    { id: 'ch4-q2-3', src: 'CH4 Q2-③', en: 'A customer (sales) invoice is issued by the customer.', cn: '客户(销售)发票是由客户签发的。', ans: false, key: '发票由出让方开具', exp: '发票本质上索取货款通知，必须由销售方签发递给客户买单。' },
                    { id: 'ch4-q2-4', src: 'CH4 Q2-④', en: 'A remittance advice is issued by the customer.', cn: '付款通知单是由客户签发的。', ans: true, key: '客户付款后附发通知单', exp: '只有付款一方才知道打过去的钱对应的是哪笔交易，因此<b>付款通知单(Remittance advice)</b>由付款的客户签发。' },

                    { id: 'ch4-q3-1', src: 'CH4 Q3-①', en: 'A goods received note is used to provide internal evidence of the items delivered by a supplier.', cn: '收货单用于提供供应商所交付物品的内部证据。', ans: true, key: '收货单是买方内部存档文件', exp: '<b>收货单(Goods Received Note, GRN)</b>是由收货方企业内部制作的记录文件，详细载明所收到货物的品名和状况。' },
                    { id: 'ch4-q3-2', src: 'CH4 Q3-②', en: 'A goods received note is used to ensure that the business only pays for goods that have been delivered.', cn: '收货单用于确保企业只为已交付验货的商品付款。', ans: true, key: '付款控制核心三单凭据', exp: '财务付款前的基石审查：将发票、原始订单与<b>收货单(GRN)</b>进行匹配，以此确保不被欺诈虚报。' },
                    { id: 'ch3-q3-3', src: 'CH4 Q3-③', en: 'A goods received note provides written confirmation from the supplier of goods that have been delivered.', cn: '收货单提供了供应商关于已交付货物的书面确认。', ans: false, key: '收货单是买方文件而非供应商确认', exp: '供应商随货附带的确认文件叫做<b>发货单(Goods Despatched Note)</b>，而收货单(GRN)是买方自己的工作人员填写的内部文件。' },
                    { id: 'ch4-q3-4', src: 'CH4 Q3-④', en: 'A goods received note indicates how much is owed to the supplier for the goods that have been delivered.', cn: '收货单标明了因收货而欠供应商的具体金额。', ans: false, key: '收货单通常不含价格信息', exp: '仓库人员填写的收货单通常只包含数量和品相状态，不会记录价格信息。具体的欠款金额需要凭<b>发票(Invoice)</b>来确定。' },

                    { id: 'ch4-q4', src: 'CH4 Q4', ctx: 'Johan bought $1,000 goods on credit. Discovering faults valued at $200, Ludwig (the supplier) issued a credit note for $200.', en: 'To reflect this credit note, Ludwig should Debit Sales $200 and Credit Trade receivables $200.', cn: '为了记录这个折让退单，供应商Ludwig应当借记销售账户$200并在贷方计入应收账款$200。', ans: true, key: '卖方冲销账目', exp: '<b>贷项通知单(Credit Note)</b>代表取消部分订单。作为卖方，需要调减营收与债权要求。即冲减资产：贷记(CR)<b>应收账款(Trade Receivables)</b>；冲减确认过的收入项：借记(DR)<b>销售(Sales)</b>。' },

                    { id: 'ch4-q5-1', src: 'CH4 Q5-①', ctx: 'A system integrates sales and purchases modules with general ledger. Cash system is NOT integrated.', en: 'A year-end adjustment to record an un-invoiced amount owing to a supplier would be recorded automatically.', cn: '一笔为还没收到发票的应付货款做的年终调整结账会被系统自动录入转账。', ans: false, key: '意外调整均需手工拔款', exp: '这种暂估入账或者事后补充都超脱了流水线运作的常规采购模块范围（因为没发票作为单据核发），因此必须通过<b>手动日记账凭证(Manual journal entry)</b>去冲记。' },
                    { id: 'ch4-q5-2', src: 'CH4 Q5-②', ctx: 'A system integrates sales and purchases modules with general ledger. Cash system is NOT integrated.', en: 'The correction of identified errors in the general ledger accounts would be processed by using a manual journal entry.', cn: '总账中已确定的过账偏差或挂账谬误可以经由手工干预制作补报调节凭单加以化消更正。', ans: true, key: '特殊除错需人工干预', exp: '系统不懂自动修复人为录入走偏了的挂账失误，这类修补须人为操作定制<b>手工分录(Manual entry)</b>调平。' },
                    { id: 'ch4-q5-3', src: 'CH4 Q5-③', ctx: 'A system integrates sales and purchases modules with general ledger. Cash system is NOT integrated.', en: 'The sale of goods on credit to a new customer would be recorded by using a manual journal entry.', cn: '向一个新鲜接洽的客商挂赊走货出单据会需依靠着后台人员人工敲分录做登记才能完成记录。', ans: false, key: '前端销售联动总账', exp: '既然明盘系统说明了销售及应收分类账已属于<b>集成的(Integrated)</b>范围圈落，那么一旦确认出发票，流水账必自行结转入册无须人力二次搬抬转录。' },
                    { id: 'ch4-q5-4', src: 'CH4 Q5-④', ctx: 'A system integrates sales and purchases modules with general ledger. Cash system is NOT integrated.', en: 'The purchase of a motor vehicle for cash for long-term use in the business would be recorded by using a manual journal entry.', cn: '用现金购买供企业长期使用的机动车辆，需要通过手工分录记录。', ans: true, key: '现金系统未集成需手工录入', exp: '由于题目明确指出现金系统未与总账集成(NOT integrated)，因此涉及现金支付的非常规交易（如购买固定资产）需要通过<b>手工分录(Manual journal entry)</b>来记录。' },

                    { id: 'ch4-q6-1', src: 'CH4 Q6-①', en: 'An accounting system allows management to monitor their spending in areas such as capital expenditure and payment of utility bills.', cn: '会计系统允许管理层监控资本支出和水电费等各领域的支出情况。', ans: true, key: '科目分类实现支出监控', exp: '通过精细化的账户设置和总账结构，各类支出被分类记录，为管理层提供各领域的支出监控和分析基础。' },
                    { id: 'ch4-q6-2', src: 'CH4 Q6-②', en: 'An accounting system allows management to place a market value on their business entity.', cn: '会计系统能够帮助管理层确定企业的市场价值。', ans: false, key: '账面价值不等于市场价值', exp: '会计系统记录的是基于<b>历史成本(Historical cost)</b>的账面数据，且许多有价值的无形资源（如品牌、人才）不会在账面上反映。因此会计系统无法确定企业的<b>市场价值(Market value)</b>。' },

                    { id: 'ch4-q7', src: 'CH4 Q7', en: 'Allowing multiple users to use the accounting software remotely is a universal feature of all computerised accounting systems.', cn: '允许多用户远程使用会计软件是所有电算化会计系统的通用功能。', ans: false, key: '远程多用户是云会计特有功能', exp: '远程多用户共享访问是<b>云会计系统(Cloud Accounting)</b>的特有功能。许多传统的单机版财务软件虽然也属于电算化系统，但并不支持远程访问。' },

                    { id: 'ch4-q8', src: 'CH4 Q8', ctx: 'Silvia runs an online store. Sales module is integrated with general ledger. After receiving and confirming an order, a delivery note was issued. Later, a sales invoice was produced.', en: 'The credit sale would be reflected in the sales and trade receivables ledger accounts when the delivery note was issued.', cn: '当送货单签发后，该笔赊销就会反映在销售和应收账款分类账中。', ans: false, key: '销售发票才是确认收入的触发点', exp: '在集成系统中，无论是接单还是发货（送货单签发），都不会自动触发财务记录。只有当<b>销售发票(Sales Invoice)</b>被开具并录入系统后，赊销才会被反映在销售收入和应收账款的分类账中。' }
                ]
            },
            {
                id: 'ch5',
                title: 'CH5 记账交易与对账调节',
                label: 'CH5',
                items: [
                    { id: 'ch5-q1', src: 'CH5 Q1', en: 'The correct journal entry for making a credit sale is DR Trade receivables, CR Revenue.', cn: '进行赊销的正确日记账分录是：借记应收账款，贷记收入。', ans: true, key: '赊销双边影响', exp: '一笔赊销(Credit Sale)增加了一项被欠款的资产：借记(DR) <b>应收账款(Trade receivables)</b>；同时也发生经济利益的流入：贷记(CR) <b>收入(Revenue)</b>。' },

                    { id: 'ch5-q2-1', src: 'CH5 Q2-①', en: 'Cash receipts are posted to the credit side of the trade receivables ledger account.', cn: '现金收款过账到应收账款分类账的贷方。', ans: true, key: '收钱抵消应收资产', exp: '收到现金款清偿结掉之前的挂账。应收资产减少，记贷方(CR)。' },
                    { id: 'ch5-q2-2', src: 'CH5 Q2-②', en: 'Credit purchases are posted to the debit side of the trade payables ledger account.', cn: '赊购过账到应付账款分类账的借方。', ans: false, key: '赊购物负债增加应贷记', exp: '赊购物增添了一笔欠人家的货款。应付账款属于负债(Liability) ，其增多须记录为贷记(CR)。' },
                    { id: 'ch5-q2-3', src: 'CH5 Q2-③', en: 'Cash sales are not recorded in the trade receivables ledger account.', cn: '现金销售不记录在应收账款分类账中。', ans: true, key: '现结不挂赊账', exp: '一手交钱一手交货交易(Cash sales)不产生后期追讨发生额，根本不用搭理<b>应收账款(Trade receivables)</b>。' },

                    { id: 'ch5-q3-1', src: 'CH5 Q3-①', en: 'A cash receipt is a credit entry in the cash account.', cn: '现金收款是现金账户中的一笔贷方分录。', ans: false, key: '收钱进账必为借', exp: '收到现金会让公司掌握的货币资产上升。资产项变鼓必然登记在其借方(Debit entry)。' },
                    { id: 'ch5-q3-2', src: 'CH5 Q3-②', en: 'Payments made to credit suppliers are debited to purchases.', cn: '向信用供应商的付款被借记到采购账户。', ans: false, key: '还债冲抵负债与采购无关', exp: '向供应商偿还旧账是为了抵消以往挂住的那个欠债坑（即记账为借记：DR <b>应付账款(Trade payables)</b>），而非此时重新发生一遍买办开出<b>采购(Purchases)</b>费用。' },

                    { id: 'ch5-q4', src: 'CH5 Q4', ctx: 'Jai received $2,000 from a customer and made cash sales of $800.', en: 'The ledger entries to record these cash receipts will be DR Bank $2,800, CR Trade Receivables $2,000, CR Sales $800.', cn: '记录这些现金收入的会计分录是：借记银行 $2,800，贷记应收账款 $2,000，贷记销售 $800。', ans: true, key: '总入账分摊拆解结转', exp: '银行总收到$2,800故借记(DR)全款，其中源于之前赊账归还故去贷记抵消<b>应收账款(Trade Receivables)</b>，另外这天实打实现结卖出的则顺势贷记生出<b>销售(Sales)</b>盈余。' },

                    { id: 'ch5-q5', src: 'CH5 Q5', ctx: 'Sales returns of $500 have arrived. These sales were originally made on credit.', en: 'These sales returns will result in an increase in the sales returns account and a decrease in the trade receivables balance.', cn: '这些退货将导致销售退回账户增加以及应收账款余额减少。', ans: true, key: '赊销退货的双重影响', exp: '原赊销的货物被退回时：一方面借记<b>销售退回(Sales returns)</b>以记录退货；另一方面贷记<b>应收账款(Trade receivables)</b>以减少客户的欠款余额。' },

                    { id: 'ch5-q6', src: 'CH5 Q6', ctx: 'Hussan made payments to settle credit suppliers.', en: 'Making payments from the bank to settle credit suppliers will cause the Trade Payables ledger to be debited.', cn: '从银行付款以结清信用供应商的货款，会导致应付账款分类账被借记。', ans: true, key: '付款减少负债需借记处理', exp: '向供应商付款是为了清偿之前的应付账款。负债减少时需要<b>借记(Debit)</b>处理，因此应付账款分类账会被借记。' },

                    { id: 'ch5-q7-1', src: 'CH5 Q7-①', en: 'Credit sales are recorded in the individual receivables ledger accounts.', cn: '赊销记录在各客户的明细应收账款分类账中。', ans: true, key: '赊销记入客户明细账', exp: '每位客户的具体欠款金额保存在<b>明细分类账(Individual receivables ledger accounts)</b>中，方便逐笔追踪和催收。' },
                    { id: 'ch5-q7-2', src: 'CH5 Q7-②', en: 'Payments made to credit suppliers are recorded in the purchases ledger account.', cn: '付给信用供应商的钱会被记录在采购大类账里面。', ans: false, key: '还钱和采购是两码事', exp: '支付行为发生时是用来磨平旧有的欠单（借出冲减<b>应付账款(payables ledger)</b>并扣储行水），此时并没有真发生添新库存的买进行为，绝不去蹭惹<b>采购账户(purchases ledger)</b>。' },
                    { id: 'ch5-q7-3', src: 'CH5 Q7-③', en: 'The general ledger is basically just a list of business transactions.', cn: '总账大体上就是把各类发生的商业交易做成的一串清单列表而已。', ans: false, key: '总账是全科目大水池而非日记流', exp: '<b>总分类账(General ledger)</b>里按着所有分门别类的财务“小匣子”（如资产、负债等科目账户）井井有条地归类垒砌，它绝不是那种单调流水账记事的备忘清单日记簿！' },

                    { id: 'ch5-q8', src: 'CH5 Q8', ctx: 'Mingyue purchased goods with a price of $500. She was given a trade discount of 10%.', en: 'The correct journal entry to account for this purchase is DR Purchases $450, CR Trade payables $450.', cn: '记录该次打折进货的标准分录应当是直接用折净结账价：借采购450，贷应付450。', ans: true, key: '商业折扣隐身制不单立账', exp: '交易台前直接抹掉的纯议价折减即<b>商业折扣(Trade Discount)</b>不享受落账待遇，凭证只按照折减剥离完成后的骨折净价（即$450）过一次账就完事了。' },

                    { id: 'ch5-q9-1', src: 'CH5 Q9-①', en: 'Settlement discount claimed by customers who consistently pay promptly should be charged to interest expenses.', cn: '经常及时付款的客户所享受的结算折扣应计入利息费用。', ans: false, key: '结算折扣不属于利息费用', exp: '<b>结算折扣(Settlement Discount)</b>是为了鼓励客户提前付款而给予的价格减让，属于收入的减项，不是向金融机构借款产生的利息费用。' },
                    { id: 'ch5-q9-2', src: 'CH5 Q9-②', en: 'Trade discounts given to customers are not separately recognised within the accounts.', cn: '给予客户的商业折扣不在账簿中单独确认。', ans: true, key: '商业折扣不单独入账', exp: '<b>商业折扣(Trade discount)</b>在开具发票前就已扣除，账面上只记录扣除折扣后的净额，不需要为折扣金额单独设立账户。' },

                    { id: 'ch5-q10', src: 'CH5 Q10', ctx: 'Vlad offers a 5% settlement discount to customers paying within 14 days. He invoices Customer A (a consistent prompt payer) net of discount ($285 instead of $300). Customer A paid $285.', en: 'To record this payment, Vlad should simply DR Bank $285, CR Trade Receivables $285.', cn: '由于对方肯定提前付款而且已经贴额折净预先开出应收票据了，收到这285块时只要平进平出抵消掉债务即可。', ans: true, key: '预期享受且收妥即直接对消', exp: '根据IFRS 15标准，面对常来蹭奖励熟客们由于开出票据时早就默认按了骨折价$285登记为应收款大盘，后期如果真按金额给这笔打款汇过来了，只要自然平复掉这对双胞胎借贷头寸，不用节外生枝记打折账。' },

                    { id: 'ch5-q11', src: 'CH5 Q11', ctx: 'Shadi purchased goods for $600 with a prompt payment discount of 10%.', en: 'If Shadi settles the debt within the discount period, she will only debit trade payables $540.', cn: '如果该买手在限定宽限快线期付清账单抵得了10%福利（即少掏60块款），她偿债做分录时就只需核销冲借$540应付账龄了。', ans: false, key: '要抹初挂负债必须使用全额', exp: '就算你利用履约条件真实只给人家转账打了拔毛之后的$540八折小碎银！但既然债务恩怨已勾买卖就算两清，打欠条时高挂的那个$600沉重的旧坑洞必须被100%全数连根拔借平掉不可留尾巴！(此时产生的差价填补就是额外收入：<b>CR 收到折扣(Discounts Received) $60</b> )。' },

                    { id: 'ch5-q12', src: 'CH5 Q12', ctx: 'Joe purchased goods with a retail price of $500, a trade discount of 10%, and an optional settlement discount of 5% if paid in 14 days.', en: 'At the time of purchase, the ledger is initially recorded as DR Purchases $450, CR Trade payables $450 without anticipating whether the settlement discount will be taken or not.', cn: '购买时，分类账最初按扣除商业折扣后的净额入账（$450），不预先考虑是否会享受结算折扣。', ans: true, key: '买方初始按全额挂账（保守原则）', exp: '作为买方，进货时只扣除商业折扣后按净额$450入账。在实际付款并享受结算折扣之前，不能提前减少应付金额。这体现了会计的<b>保守性原则</b>。' },

                    { id: 'ch5-q14', src: 'CH5 Q14', en: 'A settlement discount allowed to a customer, who had not been expected to take the discount originally, must later be recorded as a deduction from revenue.', cn: '原本指望慢吞吞的客官不会捡这起早的提钱结单羊毛优惠（全额开发票应收了），但万万没料到却被他反杀蹭准期点拿走了，此等临时失血只能后续靠列入主营营收冲抵削薄来给抹平找补。', ans: true, key: '未料的早付奖励扣收入', exp: '若是期初开发票由于不抱奢望按全额确认为了利润。但他老人家真抠那三瓜两枣把账按快行结价划过来了，此时只能乖乖新辟个项作为冲减来平账，记录在<b>主营收入的减项(Deduction from revenue)</b>。' },

                    { id: 'ch5-q15-1', src: 'CH5 Q15-①', en: 'When a settlement discount is expected to be allowed, revenue can be recognised straight net of the discount.', cn: '当预期客户将享受结算折扣时，可以直接按扣除折扣后的净额确认收入。', ans: true, key: '可预期的结算折扣可按净额确认', exp: '根据IFRS 15，对于高度可能发生的折扣，可作为<b>可变对价(Variable consideration)</b>处理，直接按扣除预期折扣后的净额确认收入。' },
                    { id: 'ch5-q15-2', src: 'CH5 Q15-②', en: 'When a trade discount is allowed, naturally a sale should be recognised at the gross amount.', cn: '当给予商业折扣时，销售收入自然应按总额（未折扣前）确认。', ans: false, key: '商业折扣后按净额入账', exp: '<b>商业折扣(Trade discount)</b>在交易前就已确定扣除。会计上只按折扣后的实际交易净额入账记录，不需要按总额（毛价）入账。' },

                    { id: 'ch5-q16', src: 'CH5 Q16', en: 'When a registered business purchases goods, the sales tax they paid is formally known as output tax.', cn: '正当经营大掌柜门他们从外买进商品被上头加配的那一抹进货税，正式官方学名便唤作销项税。', ans: false, key: '自家买进负担垫付称进项', exp: '出摊摆卖外销收下商家额外头金的时候才叫作<b>销项税(Output tax)</b>。自己买进商品垫给供货商的税是对税局的一种求偿资产，名为<b>进项税(Input tax)</b>等着拿回或相抵出项！' },

                    { id: 'ch5-q18', src: 'CH5 Q18', ctx: 'Mona purchased goods on credit for $450 plus a sales tax of 20%.', en: 'The correct journal entry to record this purchase is DR Purchases $450, DR Sales tax control account $90, CR Trade payables $540.', cn: '赊着账买这批外挂了两成税码商品（合计540元巨款欠落），对自家的记录处理规程该是：净进成本借记450，剩下那90划给国家金库借条，末尾把这加总出的五百四大口锅安放在长期负债栏贷面上。', ans: true, key: '标准采购涉税剥落公式', exp: '账面剖解极其精准确凿：吃进作为大本的业务成本(借记：<b>采购$450</b>)，为帮官府跑腿而垫出去的抽头算暂替付垫存金资产(借记：<b>销售税款$90</b>)，只有全包全揽大债主才不管你啥税它认总底(贷记：<b>应付外债负债 $540</b>)。' },
