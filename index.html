                    { id: 'ch5-q19', src: 'CH5 Q19', ctx: 'Desmond purchased goods for $600 (gross, including 20% sales tax). He sold them for $800 (net, excluding 20% sales tax).', en: 'The net balance owed to the tax authority is $60.', cn: 'Desmond欠税务机关的净税款为$60。', ans: true, key: '进项税与销项税的相抵差额', exp: '进项税(Input tax)：$600×(20/120)=$100；销项税(Output tax)：$800×20%=$160。应缴纳的净税额=销项税$160-进项税$100=<b>$60</b>。' },

                    { id: 'ch5-q20', src: 'CH5 Q20', ctx: 'Saleem sold goods on credit for $2,600 net of a 20% sales tax.', en: 'To accurately record this sales transaction, Sales should be credited with $2,600 and Sales tax should be debited with $520.', cn: '为准确记录该销售交易，销售收入应贷记$2,600，销售税应借记$520。', ans: false, key: '代收的销售税是负债应贷记', exp: '净销售额$2,600贷记收入没有问题。但代客户收取的$520销售税是企业欠税务局的款项，属于<b>负债(Liability)</b>，应该<b>贷记(CR Sales tax)</b>而非借记。' },

                    { id: 'ch5-q21', src: 'CH5 Q21', ctx: 'Ravi sold $1,800 of goods on credit including a 20% sales tax. A customer unexpectedly returned 25% of these goods.', en: 'To record the returned goods, Ravi should DR Sales returns $375, DR Sales tax $75, CR Trade receivables $450.', cn: '当砸单退场。原发原消：收入端被削下375(借)，原来头上的官债紧箍咒脱脱重负掉75(借)，那原指望收到腰包沉淀的450客户总欠盘当然一笔勾消变云烟虚空为贷。', ans: true, key: '全原路全比例镜像反冲', exp: '卖货出现黄摊重装，所发所报要用原记号一等比例原路下拨全折拆：打出去的原挂满税金重石虚高巨单大盘额倒吐退款共占$450（总单贷记削减：<b>CR 应收资产狂泄</b>）。拆分剥下给上府的不用再付大包(借：债跌<b>DR 销售税$75</b>)，抽去水分剩那心坎疼的骨痛毛利润跌出(借：主利反打：<b>DR 销售返冲销$375</b>)。' },

                    { id: 'ch5-q25', src: 'CH5 Q25', ctx: 'Kin uses $34 from an imprest petty cash system during the month.', en: 'Under the imprest petty cash system, Kin will draw out $34 cash from the main bank to replace the exact amount spent during the particular period and hence restore the set original float.', cn: '在那种严格定额制小金斗体系下走出的账口，哪怕月末只是花费走这三十多金币，补仓操作就是必须凭花纸又从主行倒腾回拿这34真现将底池抽回填顶复原至基干初刻。', ans: true, key: '花耗多少精确还填多少重驻基限', exp: '该项备用强严体系“<b>定额备用制定死基制(Imprest System)</b>”主核心就在这守持如初平衡池大律。出纳随便你怎么折零腾细碎打出款走，末尾凭条一兜一抄对盘：花了多少零渣凑拢直接按单数抽来真库提纯去完全塞平这个被啃下的补给巨洞令它恒指重立如峰！' },

                    { id: 'ch5-q26', src: 'CH5 Q26', en: 'A permanently employed part-time employee’s weekly wages of $200 could occasionally be paid out of the business petty cash tin limit.', cn: '面对需要开销的那雷打不动长期留任小短工的两百块薪给，为图方便从零花兜顺手拨点凑现过去也未尝不可。', ans: false, key: '备用金决抵受不了薪酬铁网正典', exp: '小边角边花“Petty Cash”零备抽只用做修水补缝顺纸抽钉点墨这种三脚猫应时火救急边角小耗上头。只要是上了“<b>正式聘员在账编(Permanently employed/Wages)</b>”的，管他干的多残边边段干得多小多短，人事薪税流系铁账不可挑逗避跨，更绝不允许私接私掏零用铁盘暗结脱轨规网。' },

                    { id: 'ch5-q29', src: 'CH5 Q29', en: 'One of the principal reasons for preparing a periodic bank reconciliation statement is to identify any undetected omissions in the entity cash ledger.', cn: '编制银行对账调节表的主要原因之一是识别企业现金账簿中未被发现的遗漏。', ans: true, key: '银行对账可发现账簿中的遗漏', exp: '一些自动扣款（如直接借记/Direct debit）或银行手续费可能未被企业及时记录。通过<b>银行对账(Bank reconciliation)</b>，可以将银行对账单与企业现金账簿进行比对，从而发现并纠正这些遗漏。' },

                    { id: 'ch5-q30-1', src: 'CH5 Q30-①', en: 'Unpresented cheques are valid reconciling items when preparing a bank reconciliation statement.', cn: '开脱送走却尚未被提款大爷给收罗至他们地头柜口落签入库而变空票转兑的单子，它们正是清正名分下用来解释公司和行内两者存底总差调和正规大指标。', ans: true, key: '悬空时间差票子入表做调停', exp: '自身水库在签抛落笔刻早就全垒减损扣没（这账面自己已料理完毕无可纠葛）。但既然那大主顾非压箱搁着死活不提现拿款，那就叫他那客观天然飞空单：被定义名谓作“<b>悬在未兑区空列(Unpresented cheques)</b>”，必然是要妥妥置摆列陈在大调节分明报调列表上证明其差异不是丢钱是丢命时间的最佳铁证！' },
                    { id: 'ch5-q30-2', src: 'CH5 Q30-②', en: 'A dishonoured cheque from a customer is a valid reconciling item on the bank reconciliation statement rather than an adjustment that requires immediate entering into the business cash ledger.', cn: '客户的跳票支票（被退票）只是银行对账表的调节项，不需要在企业现金账簿中调整。', ans: false, key: '退票需要立即更正现金账簿', exp: '企业在收到客户支票时已将其记为银行存款增加。一旦该支票被<b>退票(Dishonoured)</b>，说明款项实际并未收到，企业必须立即更正自己的现金账簿(Update Cash Ledger)——冲减已记录的银行存款，而不能仅作为对账调节项。' },

                    { id: 'ch5-q31', src: 'CH5 Q31', en: 'The adjusted correct cash ledger balance can be correctly derived by taking the Bank statement balance, adding or subtracting Bank errors, adding Outstanding lodgements, and subtracting Unpresented cheques.', cn: '调整后的正确现金账簿余额可通过以下方式得出：银行对账单余额 ± 银行差错 + 未入账存款 - 未兑现支票。', ans: true, key: '银行对账调节的标准公式', exp: '正确的现金余额 = <b>银行对账单余额(Bank statement balance)</b> ± <b>银行差错(Bank errors)</b> + <b>未入账存款(Outstanding lodgements)</b> - <b>未兑现支票(Unpresented cheques)</b>。' },

                    { id: 'ch5-q37-1', src: 'CH5 Q37-①', en: 'A regular but initially unrecorded direct debit requires a correction entry in the cash ledger rather than merely appearing on the bank reconciliation statement.', cn: '一笔已签约但未在现金账簿中记录的直接借记扣款，需要在现金账簿中补记，而不仅仅是列为对账调节项。', ans: true, key: '遗漏的直接借记需更新现金账簿', exp: '签约的<b>直接借记(Direct debit)</b>如银行自动扣款等，如果企业未及时记录，属于现金账簿的遗漏。发现后必须在现金账簿中<b>补记更正(Update cash ledger)</b>，而非仅列为对账调节项。' },
                    { id: 'ch5-q37-2', src: 'CH5 Q37-②', en: 'Outstanding cheques awaiting presentation require an additional entry in the business internal cash ledger.', cn: '等待兑现的未到期支票需要在企业内部现金账簿中额外补记一笔。', ans: false, key: '未兑现支票无需额外调整现金账簿', exp: '企业在签发支票时已经在现金账簿中做了减少银行存款的记录。<b>未兑现支票(Outstanding cheques)</b>只是收款方尚未将支票提交银行兑现，企业无需再做任何账簿调整，仅在对账调节表中列示即可。' },

                    { id: 'ch5-q46', src: 'CH5 Q46', ctx: 'Said has a trade payables balance of $3,236 at year-end (31 Dec 20X3). He received two supplier invoices for goods delivered before the year-end totaling $1,750, and two for goods delivered after the year-end.', en: 'Said should show his trade payables as $4,986 ($3,236 + $1,750) as at 31 December 20X3.', cn: 'Said年末应显示应付账款为$4,986（$3,236 + $1,750）。', ans: true, key: '年末前已收货的发票应计入当期负债', exp: '根据<b>权责发生制/截止日原则(Accruals/Cut-off)</b>，虽然发票在年后才收到，但货物在年末前已交付入库，因此相关的$1,750应付款必须计入本期的<b>应付账款(Trade payables)</b>中，使年末余额为$4,986。' },

                    { id: 'ch5-q47', src: 'CH5 Q47', ctx: 'In a trade receivables ledger: Debit items (opening, sales) total $100,235. Credit items (Bank, Irrecoverable debts) total $46,620. There is also an unrecorded sales returns of $3,560.', en: 'To balance the ledger, the unrecorded sales return should be recorded on the debit side.', cn: '为使分类账平衡，未入账的销售退回应记录在借方。', ans: false, key: '销售退回应记在应收账款的贷方', exp: '<b>销售退回(Sales returns)</b>会减少应收账款（资产减少），因此应记录在应收账款分类账的<b>贷方(Credit side)</b>。记在借方会导致应收账款虚增，是错误的。' },

                    { id: 'ch5-q48', src: 'CH5 Q48', ctx: 'A direct debit was found to be omitted from the cash ledger.', en: 'This omitted direct debit will merely appear as a reconciling item in the bank reconciliation working rather than being corrected and entered into the cash ledger.', cn: '遗漏的直接借记仅作为银行对账调节项列示，不需要在现金账簿中更正录入。', ans: false, key: '现金账簿遗漏必须补记更正', exp: '直接借记的遗漏属于企业现金账簿的<b>记录遗漏(Omission)</b>。必须在现金账簿中<b>补记更正(Update/Correct Cash Ledger)</b>，不能仅作为对账调节项敷衍了事。' }
                ]
            },
            {
                id: 'ch6',
                title: 'CH6 应收账款与应付账款管理',
                label: 'CH6',
                items: [
                    { id: 'ch6-q1-1', src: 'CH6 Q1', en: 'Offering credit would increase the amount of money tied up in current assets.', cn: '向客户提供赊销信用会增加被占用在流动资产中的资金量。', ans: false, key: '资金占用属于赊销的劣势而非优势', exp: '题目问的是赊销的好处（Benefits）。而"增加流动资产中的资金占用"以及"推高坏账风险"均属于赊销的<b>缺点(Drawbacks)</b>，不能作为赊销的优势来论证。' },
                    { id: 'ch6-q1-2', src: 'CH6 Q1', en: 'Offering credit should minimise the loss of customers to competitors offering credit terms.', cn: '提供赊销账期应能最大限度地减少客户因竞争对手提供赊账条件而流失的情况。', ans: true, key: '赊销是维持竞争力的防御手段', exp: '当市场中的竞争对手普遍提供赊账条件时，企业若拒绝提供信用，客户很可能转向竞争对手。因此，<b>提供信用(Offering credit)</b>能够有效留住现有客户、维护销售基本盘。' },

                    { id: 'ch6-q2', src: 'CH6 Q2', en: 'Additional marketing costs could directly be an additional cost incurred from offering credit to customers.', cn: '额外的市场营销费用可以被视为向客户提供赊销所直接引发的一项额外成本。', ans: false, key: '赊销的直接成本不包含营销费用', exp: '赊销所引发的直接额外成本主要包括：增加对账催收人员的<b>管理费用(Admin costs)</b>、资金占用导致的<b>透支利息(Overdraft interest)</b>以及坏账损失等。而市场营销费用并非因赊销行为而必然产生的直接关联成本。' },

                    { id: 'ch6-q3', src: 'CH6 Q3', en: 'Offering credit to customers may require additional security or guarantee to manage risks.', cn: '向客户提供赊销可能需要额外的担保或保证措施来管控风险。', ans: true, key: '赊销风险管理需要额外担保', exp: '赊销使企业面临客户违约的风险。为控制该风险，企业往往需要额外要求客户提供担保人或抵押物，这会增加交易的复杂性和成本，构成赊销的一项重要<b>劣势(Disadvantage)</b>。' },

                    { id: 'ch6-q4-1', src: 'CH6 Q4', en: 'Businesses set credit limits for their customers to encourage more customers to purchase goods from them.', cn: '企业为客户设定信用限额，主要目的是鼓励更多客户前来购货。', ans: false, key: '信用限额的目的是控制风险而非促销', exp: '提供赊销本身才是为了促进销售。而设定<b>信用限额(Credit limits)</b>的目的恰恰相反——它是一种内部风险控制手段，旨在将单个客户违约时企业可能遭受的最大损失限定在可控范围内。' },
                    { id: 'ch6-q4-2', src: 'CH6 Q4', en: 'Businesses set credit limits to minimize the risk of loss due to customers defaulting on their debts.', cn: '企业设定信用限额是为了将客户违约不还款所带来的损失风险降至最低。', ans: true, key: '信用限额是坏账风险的防控工具', exp: '信用限额为每个客户的赊账总额设定了上限。即使客户完全<b>违约(Defaulting)</b>，企业的损失也不会超过该限额所规定的金额，从而有效控制了坏账风险的敞口。' },

                    { id: 'ch6-q5', src: 'CH6 Q5', en: 'Credit limits are typically set in order to fulfil external regulatory requirements.', cn: '信用限额的设定通常是为了满足外部监管法规的强制要求。', ans: false, key: '信用限额属于企业内部风控决策', exp: '赊账额度的设定纯属企业基于自身商业判断做出的内部风险管理决策，其目的在于保护企业自身免受过度信用风险的损害，并非来自外部监管部门的法定强制要求。' },

                    { id: 'ch6-q6-1', src: 'CH6 Q6', en: 'Aged trade receivables analysis provides information for credit controllers to send reminder letters to customers with overdue balances.', cn: '应收账款账龄分析能够为信用控制人员提供信息依据，以便向逾期未付的客户发送催款函。', ans: true, key: '账龄分析为催收提供信息支持', exp: '<b>账龄分析(Aged analysis)</b>是一份按逾期时长分类列示各客户应收款的内部管理报表，它能够清晰展示哪些客户的欠款已经逾期以及逾期了多长时间，是信用控制部门制定催收策略的重要工具。' },
                    { id: 'ch6-q6-2', src: 'CH6 Q6', en: 'Aging trade receivables is useful in determining the allowance for irrecoverable debts.', cn: '对应收账款进行账龄分析有助于确定坏账准备的计提金额。', ans: true, key: '账龄分析辅助确定坏账准备比率', exp: '逾期时间越长的应收款，收回的可能性越低。通过分析各逾期时间段的应收款比例，企业可以更准确地估算出应当计提多少比例的<b>坏账准备(Allowance for irrecoverable debts)</b>。' },
                    { id: 'ch6-q6-3', src: 'CH6 Q6', en: 'The aged trade receivables analysis acts as a reliable external source of information to confirm the trade receivables ledger account balance.', cn: '应收账款账龄分析表可以作为可靠的外部信息来源，用以验证应收账款分类账的余额。', ans: false, key: '账龄分析属于内部文件而非外部信息', exp: '账龄分析表是企业自身会计系统生成的<b>内部(Internal)</b>管理工具，而非来自第三方的外部文件。不能将企业自己生成的内部报表用作验证自身账目准确性的"外部证据"。' },

                    { id: 'ch6-q7', src: 'CH6 Q7', en: 'When an irrecoverable debt is written off during the year, it must be subtracted from the year-end trade receivables balance before calculating the final allowance for receivables.', cn: '当年内有一笔坏账被核销时，在计算年末坏账准备之前，必须先将该核销金额从年末应收账款余额中扣除。', ans: true, key: '计提坏账准备前须先扣除已核销的坏账', exp: '已被正式<b>核销(Written-off)</b>的坏账不再属于应收账款的组成部分。因此，在用百分比法计算<b>年末坏账准备(Year-end allowance)</b>时，必须以扣除已核销坏账后的净应收款为基数，再乘以相应的准备率。' },

                    { id: 'ch6-q8', src: 'CH6 Q8', en: 'A decrease in the allowance for irrecoverable debts at year-end acts as a credit (income) and reduces the general and administrative expenses in the statement of profit or loss.', cn: '年末坏账准备的减少将作为一笔贷方收入，以削减损益表中的管理费用。', ans: true, key: '坏账准备减少等同于当期费用的冲减', exp: '当本期所需的坏账准备低于上期余额时，说明此前多计提的部分已不再需要。<b>准备金的减少(Decrease in Allowance)</b>在会计上以贷记收入的形式反映，实际效果是冲减了当期损益表中的坏账费用总额。' },

                    { id: 'ch6-q10', src: 'CH6 Q10', en: 'When calculating the combined receivables expense for the year, an unexpectedly recovered irrecoverable debt should be deducted as it reduces the final expense.', cn: '在计算全年应收款综合费用时，意外收回的已核销坏账应予以扣减，因为它降低了最终的费用总额。', ans: true, key: '已核销坏账的收回冲减当期费用', exp: '此前已被核销的坏账如果被意外<b>收回(Recovered debt)</b>，该收回款项应作为一项收入，从当年的坏账<b>费用(Expense)</b>总额中予以扣减，从而降低当期的净坏账费用。' },

                    { id: 'ch6-q14', src: 'CH6 Q14', ctx: 'Customer unexpectedly paid a debt that had been previously written off.', en: 'When a customer unexpectedly pays a debt that had been previously written off, the correct journal entry is to DR Bank and CR Bad debt expense.', cn: '当客户意外偿还了此前已被核销的坏账时，正确的会计分录应为：借记银行存款，贷记坏账费用。', ans: true, key: '坏账收回的分录：DR Bank, CR 坏账费用', exp: '收到款项时，现金增加应<b>借记银行存款(Bank)</b>。由于该笔应收款已在之前被核销且从账面上清除，无需恢复原应收账款科目，而是直接将收回金额<b>贷记坏账费用(Bad debt expense)</b>以冲减当期的费用支出。' },

                    { id: 'ch6-q15', src: 'CH6 Q15', en: 'To record an increase in the allowance for irrecoverable debts, the bookkeeping entry should be DR Irrecoverable debt expense, CR Allowance for irrecoverable debts.', cn: '记录坏账准备增加的会计分录应为：借记坏账费用，贷记坏账准备。', ans: true, key: '增提坏账准备的标准分录', exp: '增加坏账准备意味着企业预期未来无法收回的应收款额增大。借方记入当期<b>坏账费用(DR Irrecoverable debt expense)</b>以反映利润的减少，贷方增加<b>坏账准备(CR Allowance)</b>以抵减应收账款在资产负债表上的账面价值。' },

                    { id: 'ch6-q17', src: 'CH6 Q17', en: 'If a business writes off an irrecoverable debt with no previous allowance made against it, the business\'s profits will decrease and assets will decrease, while liabilities remain unaffected.', cn: '如果企业核销一笔此前未计提过坏账准备的坏账，则企业的利润和资产均会减少，而负债不受影响。', ans: true, key: '无准备的坏账核销同时减少利润和资产', exp: '核销分录为：借记<b>坏账费用(Bad debt expense)</b>——导致利润减少；贷记<b>应收账款(Trade receivables)</b>——导致资产减少。由于该笔分录不涉及任何负债科目，因此负债总额不受影响。' },

                    { id: 'ch6-q18', src: 'CH6 Q18', en: 'The allowance for irrecoverable debts will be presented as a current liability in the Statement of Financial Position.', cn: '坏账准备将在财务状况表中列示为一项流动负债。', ans: false, key: '坏账准备是应收账款的抵减项而非负债', exp: '坏账准备并非一项独立的负债，而是<b>应收账款(Trade Receivables)</b>的<b>资产抵减项</b>。它应当在财务状况表的资产方紧随应收账款列示并从中扣除，以反映应收账款的可回收净值。将其归入负债类别是错误的。' },

                    { id: 'ch6-q19', src: 'CH6 Q19', en: 'If a supplier has issued an invoice but it has not been received by the business, this will cause a reconciling difference between the supplier statement balance and the individual payables ledger.', cn: '如果供应商已开具发票但企业尚未收到，这将导致供应商对账单余额与企业应付分类账之间产生对账差异。', ans: true, key: '未收到的发票构成对账差异', exp: '供应商方面已将该发票记入其应收账款，而企业因未收到发票而未做任何账务处理。这种时间差导致双方记录不一致，在对账时会产生<b>对账差异(Reconciling difference)</b>。该差异需在对账工作底稿中予以识别和说明。' },

                    { id: 'ch6-q20', src: 'CH6 Q20', en: 'When reconciling the individual payables ledger to the supplier statement, bank fees and charges shown on the bank statement can also be cross-entered into the payables ledgers.', cn: '在将应付分类账与供应商对账单进行核对时，银行对账单上显示的银行手续费也可以一并录入应付分类账。', ans: false, key: '银行费用与供应商对账是两个独立的核对过程', exp: '银行手续费属于企业与银行之间的往来事项，应在<b>银行对账(Bank reconciliation)</b>中处理和调整，而非在与供应商的应付账款对账中交叉录入。两者是完全独立的对账程序，不应混淆。' },

                    { id: 'ch6-q23', src: 'CH6 Q23', en: 'A payment made by the business that is not yet reflected in the supplier\'s statement must be corrected by adding it back to the business\'s trade payables ledger balance.', cn: '企业已支付但尚未反映在供应商对账单上的款项，必须通过将其加回企业应付分类账余额来进行更正。', ans: false, key: '企业账簿已正确记录无需调整', exp: '企业的<b>应付分类账(Payables Ledger)</b>已正确记录了该笔付款。供应商对账单中未反映该笔款项，仅仅是因为供应商尚未收到或处理该付款，属于对方的时间性差异。正确的做法是在供应商对账单上标注该差异项，而非反向修改企业自身已正确的账簿记录。' },

                    { id: 'ch6-q24', src: 'CH6 Q24', en: 'If the business\'s record of supplier outstanding balance is higher than the supplier\'s statement balance, it could be because the supplier allowed a cash discount that was not entered into the business ledgers.', cn: '如果企业记录的供应商应付余额高于供应商对账单上的余额，可能是因为供应商给予了现金折扣但企业未入账。', ans: true, key: '未入账的现金折扣导致企业记录偏高', exp: '供应商可能已按约定条件扣除了<b>现金折扣(Cash discount)</b>并相应减少了其应收账款记录，但企业由于不知晓或疏忽而未在自身账簿中做出相应的减少调整。这导致企业的应付账款记录高于供应商对账单上的金额，形成了对账差异。' },

                    { id: 'ch6-q25', src: 'CH6 Q25', en: 'To make a contra entry connecting trade receivables and payables between two trading entities, the business should debit trade payables and credit trade receivables using the larger of the two owed amounts.', cn: '在对两个交易实体之间的应收和应付进行对冲抵销时，企业应以两笔欠款中较大的金额进行借记应付、贷记应收的处理。', ans: false, key: '对冲抵销应以较小金额为准', exp: '当两个企业互为客户和供应商时，可以进行应收应付的对冲抵销。为避免任何一方的账面余额出现负数，对冲金额必须取<b>两者中较小的金额(The lower of the two amounts)</b>作为抵销基准，分别借记应付、贷记应收。' },

                    { id: 'ch6-q26', src: 'CH6 Q26', en: 'When constructing a Trade Receivables Control Account to algebraically find the total credit sales, cash sales must be excluded from the total cash receipts entered on the credit side.', cn: '在编制应收账款控制账户并以代数法反推赊销总额时，须将现金销售从贷方的现金收入总额中剔除。', ans: true, key: '控制账户反推赊销须排除现金销售', exp: '<b>现金销售(Cash sales)</b>属于即时收款的交易，不会经过应收账款科目。在通过应收账款控制账户反推赊销总额时，贷方的现金收入总额中如果包含了现金销售部分，必须予以剔除，否则会虚增倒推出的赊销金额。' },
                ]
            },
            {
                id: 'ch7',
                title: 'CH7 准备与或有事项',
                label: 'CH7',
                items: [
                    { id: 'ch7-q1-1', src: 'CH7 Q1/Q2', en: 'A provision exists when there is a liability of uncertain timing or amount.', cn: '当存在一项时间或金额不确定的负债时，即产生了一项准备金 (Provision)。', ans: true, key: '准备的定义：时间或金额不确定的现时义务', exp: '根据 IAS 37，确认一项<b>准备(Provision)</b>必须满足三个条件：由<b>过去事项(Past events)</b>引起的现时义务；经济利益很可能流出企业<b>(Probable)</b>；且该义务的金额能够进行可靠估计。满足这些条件后，应将其作为一项正式的负债在财务状况表中确认。' },
                    { id: 'ch7-q1-2', src: 'CH7 Q1', en: 'A possible legal or constructive obligation exists for a provision to be recognised.', cn: '只要存在一项可能的法律或推定义务，就应确认一项准备。', ans: false, key: '准备的确认门槛：必须是“很可能”', exp: '确认一项准备的必要条件是经济利益的流出“<b>很可能(Probable)</b>”。如果某项义务仅仅是“<b>可能(Possible)</b>”发生，则其不满足确认准备的条件，应将其归类为<b>或有负债(Contingent Liability)</b>，并在财务报表附注中予以披露，而不能在财务报表中确认。' },
                    { id: 'ch7-q1-3', src: 'CH7 Q1', en: 'A provision can be established for an obligation that will exist as a result of future transactions or events.', cn: '可以因未来交易或事项将引发的义务而预先确立一项准备。', ans: false, key: '准备的起因：必须源于过去事项', exp: '财务会计不记录对未来预期损失的准备。一项负债或准备的核心特征在于，它必须是由<b>过去事项(Past events)</b>所直接导致的现时义务。单纯的未来交易或预期的未来费用不能作为当前确认准备的依据。' },

                    { id: 'ch7-q2', src: 'CH7 Q2', en: 'Future obligations to transfer economic benefits that are classified as contingent liabilities are recognised in the statement of financial position.', cn: '被分类为或有负债的未来经济利益转移义务，应当在财务状况表中予以确认。', ans: false, key: '或有负债的处理：仅披露不确认', exp: '<b>或有负债(Contingent liabilities)</b>由于尚未达到“很可能发生”的门槛或者金额无法可靠计量，因此不能满足负债的确认条件，即不能在此阶段<b>在财务状况表中确认(Recognised in SFP)</b>。除非经济利益流出的可能性极小，否则它们应当在财务报表附注中予以<b>披露(Disclosed in notes)</b>。' },

                    { id: 'ch7-q3-1', src: 'CH7 Q3', ctx: 'A customer is claiming damages. His solicitor believes the claim is unlikely to succeed.', en: 'This claim should be disclosed as a contingent liability in the notes to the financial statements.', cn: '当某项索赔不太可能成功时，该索赔应作为或有负债在财务报表附注中披露。', ans: false, key: '极小可能发生的潜在负债：既不确认也不披露', exp: '根据律师的专业意见，如果索赔成功的可能性被评估为“<b>极小或不太可能(Remote / Unlikely)</b>”，则在会计准则下无需采取任何行动。企业既不需要确认它(Recognise)，也不需要在财务报表附注中进行披露(Disclose)。应归类为<b>两者都不是(Neither)</b>。' },
                    { id: 'ch7-q3-2', src: 'CH7 Q3', ctx: 'A new product has been released with known faults and expects 10% to be returned.', en: 'The business should recognise this expected return rate as a provision in the financial statements.', cn: '企业预期新产品存在缺陷并将有 10% 会被退回，企业应当在财务报表中确认这一预期退货率作为一项准备。', ans: true, key: '可预见的退换货构成实质义务', exp: '出售带有已知缺陷的产品，构成了产生退货推定义务的过去事项。当退换货的可能性达到“<b>很可能(Probable)</b>”且能以合理比率（10%）可靠估计出金额时，企业就完全满足了准则要求，必须据此确认一项正式的<b>准备(Provision)</b>。' },

                    { id: 'ch7-q4', src: 'CH7 Q4', ctx: 'Ana\'s business is being sued for $100,000. Her lawyer informs her there is only a 30% chance the claim will be successful.', en: 'Ana should provide for $30,000 as the expected value of the claim to maintain prudence.', cn: '出于审慎考虑，安娜应以 30% 胜算率作为索赔的期望值，计提 30,000 美元的准备金。', ans: false, key: '可能性判定优先于金额计算', exp: '在决定金额计量前，必须首先判断事件发生的概率。“30%”的可能性在会计准则中仅属于“<b>可能(Possible)</b>”，而未达到“很可能(Probable)”的确认门槛。因此，这笔潜在款项不满足确认准备的条件，不能采用期望值法计提任何金额，而应作为或有负债在附注中<b>披露(Disclose)</b>。' },

                    { id: 'ch7-q5', src: 'CH7 Q5', ctx: 'Fin sued a competitor for $150,000. His lawyer advised the claim is at best probable and more likely only possible.', en: 'Fin should not include it as an asset or disclose it because the inflow of economic benefit is only possible.', cn: '由于经济利益的流入仅仅是“可能”的，芬恩不应将此次索赔作为资产入账，也不应予以披露。', ans: true, key: '或有资产的确认与披露门槛', exp: '对于潜在获取收益的“<b>或有资产(Contingent Asset)</b>”，会计准则采用了更保守的标准：当利益流入仅为“可能(Possible)”时，既不确认也不披露；当“很可能(Probable)”时，仅在附注中予以披露；只有当经济利益的流入“<b>基本确定(Virtually certain)</b>”时，才能在财务报表中正式确认为一项资产。' },

                    { id: 'ch7-q6', src: 'CH7 Q6', en: 'When measuring a provision for a large population of items, the best estimate is one which weights all possible outcomes according to their probabilities.', cn: '在对涉及大量项目的准备进行计量时，最佳估计应是根据所有可能结果及其发生的概率进行加权计算得出的金额。', ans: true, key: '大量同类项目的最佳估计：期望值法', exp: '当准备涉及大量同类项目（例如广泛的产品退保或维修承诺）时，由于样本量大，最佳估计方法应当是应用“<b>期望值法(Expected Value)</b>”。即将所有可能出现的结果根据其对应的发生概率进行加权平均计算，以真实反映整体的预计流出额。' },

                    { id: 'ch7-q7', src: 'CH7 Q7', ctx: 'Inspire is sued for patent infringement. 30% chance to pay nothing. 20% chance to pay $200,000. 80% chance to pay $100,000 if losing. (overall > 50% chance to pay).', en: 'The best estimate of the provision that should be recognised by Inspire is $100,000 representing the most likely outcome.', cn: '代表最可能结果的 100,000 美元应作为 Inspire 确认该准备的最佳估计。', ans: true, key: '单一义务的最佳估计：最可能结果法', exp: '当事件发生的概率（败诉可能性达 70%）满足确认准备的门槛后，对于单一诉讼这类“<b>单一义务(Single Obligation)</b>”，不宜使用多结果的期望加权值法。最佳估计值应当直接采用其中概率最大的一项，即发生机率达 80% 的“<b>最可能的结果(The most likely outcome)</b>”，即确认为 100,000 美元。' },

                    { id: 'ch7-q8', src: 'CH7 Q8', ctx: 'Customer seeks $85k damages. Pern\'s lawyer indicates the court is almost certain to accept it. Settlement is over 12 months after year-end.', en: 'This matter should be dealt with as a non-current liability of $85,000 in Pern\'s financial statements.', cn: 'Pern 公司在财务报表中应当将该事项作为一项 85,000 美元的非流动负债进行处理。', ans: true, key: '金额的可靠估计与负债期限划分', exp: '由于法律专家认定接受客户 85,000 美元索赔之事“几乎确定”，所以应全额按该金额计量准备，而非折中认领公司部分提议款。同时，因案件结案支付期安排在财务年度结束后的 12 个月以外，该准备必须按逾期长度归类为“<b>非流动负债(Non-current liability)</b>”。' },

                    { id: 'ch7-q9', src: 'CH7 Q9', ctx: 'Roc will probably be fined $500,000 in a legal action. The settlement will likely take longer than 12 months.', en: 'The correct accounting entry to recognise the provision is to debit Expenses and credit Non-current liabilities: provisions for $500,000.', cn: '确认该准备的正确会计分录是：借记费用 500,000 美元，贷记非流动负债：准备 500,000 美元。', ans: true, key: '确认准备的复式记账分录', exp: '确认准备意味着企业承担了一项将减少本期利润的费用。因此，分录的借方必须记录当期耗费（借：<b>费用 DR Expenses</b>）。由于罚金的赔付预计将需要超过 12 个月的时间，因此贷方应建立远期负债（贷：<b>非流动负债：准备 CR Non-current provisions</b>），而非直接动用银行存款。' },

                    { id: 'ch7-q10', src: 'CH7 Q10', ctx: 'Sven creates a warranty provision based on 5% returns. 20X6 eligible sales $32,000. 20X7 eligible sales $54,000.', en: 'The amount charged to the statement of profit or loss for the warranty provision in 20X7 is $1,100.', cn: '在 20X7 年度，因保修准备而计入损益表的费用金额应为 1,100 美元。', ans: true, key: '损益表的费用等同于准备余额变动额', exp: '当期应计入损益表的费用并非基于当年销售额的全额计算结果，而是基于准备金余额的调整变动。期末准备金目标总额应为 $54,000 的 5%（即 $2,700），减去期初带入的准备金余额（上期的 $32,000 乘以 5% 即 $1,600）。企业只需就<b>准备的变动额(Movement in provision)</b>——即差额 $1,100——在当期损益表内确认为费用。' },

                    { id: 'ch7-q11', src: 'CH7 Q11', ctx: 'Black Co had a sales return provision of $7,500. The following year-end, the provision should be $8,000.', en: 'An amount of $500 should be included as a charge in Black Co\'s statement of profit or loss for the movement in the provision.', cn: 'Black 公司应就准备金变动在损益表中列示一笔 500 美元的费用支出（Charge）。', ans: true, key: '准备金额外增加构成当期亏损支出', exp: '在多期比较下，如果期末“<b>准备金(Provision)</b>”所需的余额从 $7,500 增加至 $8,000，这表明企业预期未来赔付的负担加重。这 $500 的增加额必须在当期的利润表中补充确认为一笔额外减少利润的“<b>费用或支出(Charge/Expense)</b>”。' },

                    { id: 'ch7-q12', src: 'CH7 Q12', ctx: 'At the start of the year the warranty provision is $40,000. At the end of the year it should be $36,000.', en: 'Rajid should account for this decrease by debiting Current liabilities for $4,000 and crediting Expenses for $4,000.', cn: 'Rajid 应通过借记流动负债 4,000 美元、贷记费用 4,000 美元的方式，来入账准备金缩减的情况。', ans: true, key: '准备金减少将转回费用并降减负债', exp: '本年度保修准备由 $40,000 减少到了 $36,000。准备金的下降意味着企业早前多记的负面耗费得以重新释放并增加账面利润。记账时应冲减降低原有负债金额（<b>借记流动负债 DR Current Liabilities</b>），并将节余部分回转列为费用的减项或将其视作等同于收益（<b>贷记转回费用 CR Expenses</b>）。' },

                    { id: 'ch7-q13', src: 'CH7 Q13', en: 'Information included in a disclosure note about provisions should contain a description of the nature of the provision and its carrying amount at the beginning of the period.', cn: '关于准备的披露附注中，应包含有关准备性质的说明以及在期初该款项的账面本金金额。', ans: true, key: '准备附注需详实披露期末流动与性质', exp: '根据 IAS 37 准则，关于准备事项的正规披露必须向报表阅读者清晰陈述该负债的产生起因及其<b>准备性质(Nature of provision)</b>，并完整呈现准备金由于时间推移所发生的<b>账面金额变动(Carrying amounts movement)</b>情况。同时还需要披露预计(Expected)将导致经济流出的时日，而非毫无预知的实际事件发生期。' },

                    { id: 'ch7-q14', src: 'CH7 Q14', ctx: 'Following the year-end, an employee had a serious accident and sued the employer.', en: 'This is a non-adjusting event, but because it is significant it must be disclosed in the notes to the financial statements.', cn: '由于该事件属于一项非调整事项，但因其情况极其重大，所以依然必须在财务报表的附注中明确予以披露。', ans: true, key: '期后重大偶发事故只能做非调整披露', exp: '事故、伤损以及伴随发生的诉讼爆发在上一财务周期结束（即<b>报告期后(After the year end)</b>），由于不在过去财年中构成事实存在的基础因此不能对过往财务报表作追回重计。但是这类不可调整过往的重大事件通常会深度影响财情，所以它们被定性为必须予以文字公开通报的<b>重大非调整事项(Significant non-adjusting event requiring disclosure)</b>。' },

                    { id: 'ch7-q15', src: 'CH7 Q15', ctx: 'Tingle recorded a $125,000 insurance receivable before year-end. After year-end, the insurer advised only $12,500 would be reimbursed due to non-compliance.', en: 'Tingle should adjust the financial statements to recognise an expense of $112,500 and reduce the receivable to $12,500.', cn: 'Tingle 公司应调整其财务报表，确认由拒赔带来的 112,500 美元费用损失，并将保险的应收账款数额缩减下调至 12,500 美元。', ans: true, key: '对期末已有事实补充确证必须调整往期账目', exp: '企业在结案期过后获悉保险公司因违约查勘导致拒赔的消息，这实质上也为报告期末（当年）早已发生并存在的既成“工厂大火及潜在合规缺漏情况”提供了极具决定性改变的新补充证据。因此应当立将其追溯判定为<b>一项必须补改的调整事项(Adjusting event)</b>，需要立刻返回旧账冲减掉预期的不实资产，转而认列真实的费损减值。' }
                ]
            },
            {
                id: 'ch8',
                title: 'CH8 存货计量与核算',
                label: 'CH8',
                items: [
                    { id: 'ch8-q1-1', src: 'CH8 Q1', en: 'Raw materials are allowed to be included in the cost of inventory.', cn: '企业应当将原材料计入存货的成本中。', ans: true, key: '原材料计入成本', exp: '<b>原材料(Raw materials)</b>是构成存货实体的基础，属于采购成本，必须计入存货价值内。' },
                    { id: 'ch8-q1-2', src: 'CH8 Q1', en: 'Import duties are allowed to be included in the cost of inventory.', cn: '进口关税允许被计入存货成本中。', ans: true, key: '进口关税属于可归属成本', exp: '<b>进口关税(Import duties)</b>是取得存货不可退回的税费，属于使存货达到当前场所和状态的必要支出，应计入存货成本。' },
                    { id: 'ch8-q1-3', src: 'CH8 Q1', en: 'Abnormal wastage costs are allowed to be included in the cost of inventory.', cn: '非正常损耗成本允许被计入存货成本中。', ans: false, key: '非正常损耗不得计入存货成本', exp: '任何超出正常范围的<b>非正常消耗(Abnormal wastage)</b>（如材料、人工的其他浪费）不能资本化，必须在其发生当期直接确认为费用。' },
                    { id: 'ch8-q1-4', src: 'CH8 Q1', en: 'Carriage outwards is allowed to be included in establishing the cost of inventory.', cn: '运出费用允许被包含在存货计价内核算。', ans: false, key: '运出费用为销售费用', exp: '<b>运出费用(Carriage outwards)</b>是将存货运送给客户的离库运费，属于损益表中的分销或销售费用，不能计入存货成本。' },

                    { id: 'ch8-q2-1', src: 'CH8 Q2', en: 'Carriage inwards is an expense which can be validly included in establishing the cost of inventory.', cn: '运入费用是可以有效包含在存货成本核算中的一项支出。', ans: true, key: '运入费用计入存货成本', exp: '<b>运入费用(Carriage inwards)</b>是将存货运至企业当前场所和状态所发生的必要运费，应予以资本化，计入存货的采购成本。' },

                    { id: 'ch8-q5-1', src: 'CH8 Q5', en: 'Continuous inventory records ensure that inventory balances are readily available compared with period-end records.', cn: '与定期盘存相比，永续盘存记录能够确保随时获取存货余额。', ans: true, key: '永续盘存随时提供余额', exp: '<b>永续盘存制(Continuous inventory)</b>对每次实物入库和出库进行连续记录，因此管理层可以随时获取实时的存货账面余额。' },
                    { id: 'ch8-q5-2', src: 'CH8 Q5', en: 'Keeping continuous inventory records makes it more likely to identify damaged or lost inventory than period-end records.', cn: '保持永续盘存记录比定期盘存更有可能发现损坏或丢失的存货。', ans: false, key: '账面记录无法直接发现实物损毁', exp: '账面记录无法反映物理上的真实状态。要发现存货的损坏或丢失，必须依赖实地的<b>实物盘点(Physical count)</b>，两者在发现实物损毁方面并无差异。' },

                    { id: 'ch8-q6-1', src: 'CH8 Q6', en: 'Period-end inventory records can be used to identify damaged and lost inventory.', cn: '期末存货盘点记录可用于识别损坏和丢失的存货。', ans: true, key: '实地盘点识别实物损毁', exp: '<b>定期盘存制(Period-end records)</b>主要依靠期末的实地实物清点，能够直观地检查出存货的损坏或遗失情况。' },
                    { id: 'ch8-q6-2', src: 'CH8 Q6', en: 'Period-end inventory records will provide an accurate record of the volume of inventory held at the period end.', cn: '期末存货盘点记录将提供期末持有存货数量的准确记录。', ans: true, key: '实地盘点确认实有数量', exp: '客观全面的实地盘点能够准确确认在期末节点上企业到底实际持有多少存货的<b>实有数量(Volume held)</b>。' },
                    { id: 'ch8-q6-3', src: 'CH8 Q6', en: 'Period-end inventory recording is carried out during normal working hours and does not affect the operational side of the business.', cn: '期末存货盘点通常在正常工作时间内进行，并且不会影响企业的日常运营。', ans: false, key: '期末全面盘点会影响日常运营', exp: '全面的期末实地盘点往往需要停止仓库的收发货，因此必定会中断或影响到企业的<b>日常运营(Operational side)</b>。' },
                    { id: 'ch8-q6-4', src: 'CH8 Q6', en: 'Staff may be required to work overtime during the period end inventory recording.', cn: '在期末存货盘点期间，员工可能会被要求加班。', ans: true, key: '期末盘点通常需要加班', exp: '为了尽量减少对日常运营的干扰，企业通常会安排在周末或非工作时间进行全面盘点，这就需要员工<b>加班(Work overtime)</b>。' },

                    { id: 'ch8-q11-1', src: 'CH8 Q11/14', en: 'In times of rising prices, using the FIFO approach will result in a higher gross profit compared to the average cost approach.', cn: '在物价上涨的时期，使用先进先出法（FIFO）将比加权平均法产生更高的毛利。', ans: true, key: '物价上涨时FIFO导致毛利较高', exp: '在物价上升期间，<b>先进先出法(FIFO)</b>将把早期较低成本的存货结转为销售成本，使得当期销售成本偏低，从而计算出相对较高的<b>毛利(Gross profit)</b>。' },
                    { id: 'ch8-q11-2', src: 'CH8 Q11/14', en: 'In times of rising prices, using the FIFO approach will result in a lower inventory valuation compared to the average cost approach.', cn: '在物价上涨时期，使用先进先出法（FIFO）计算出的存货估值将低于加权平均法。', ans: false, key: '物价上涨时FIFO存货估值较高', exp: '在物价高涨期，FIFO假设早期便宜的存货先售出，留在资产负债表期末存货中的是最近期的高价存货。因此其<b>存货估值(Inventory valuation)</b>会高于加权平均法。' },
                    { id: 'ch8-q13-1', src: 'CH8 Q13', en: 'In times of falling prices, using the FIFO approach will result in a higher profit.', cn: '在物价下跌的时期，使用先进先出法（FIFO）将产生更高的利润。', ans: false, key: '物价下跌时FIFO导致低利润', exp: '在物价持续下降时，采用<b>先进先出法(FIFO)</b>意味着早期高价购入的货物结转为销售成本。较高销售成本会拉低当期的账面<b>利润(Profit)</b>。' },
                    { id: 'ch8-q13-2', src: 'CH8 Q13', en: 'Inventory valuation will always be lower when using average cost rather than FIFO.', cn: '使用加权平均法的存货估值总是低于先进先出法（FIFO）。', ans: false, key: '估值高低取决于物价变动趋势', exp: '这并不是绝对的。在物价持续下跌的趋势下，加权平均法因为混合了过往较高单价的存货成分，其计算出的<b>最终估值(Valuation)</b>反而会高于先进先出法。' },

                    { id: 'ch8-q15-1', src: 'CH8 Q15', en: 'According to IAS 2, inventories should be valued at the lower of cost or selling price.', cn: '根据IAS 2规定，存货应按成本与售价两者孰低者进行估值计价。', ans: false, key: '存货按成本与可变现净值孰低计价', exp: 'IAS 2准则要求存货应按成本与<b>可变现净值(Net realisable value, NRV)</b>两者孰低进行计价。售价尚未扣除估计的完工成本和销售费用，不等同于可变现净值。' },
                    { id: 'ch8-q15-2', src: 'CH8 Q15', en: 'According to IAS 2, each item of inventory should normally be valued separately.', cn: '根据IAS 2规定，每一项存货通常应当单独进行估值计价。', ans: true, key: '单项比较原则', exp: '为防止不同类别存货的较高可变现净值掩盖其他劣质存货的跌价损失，准则一般要求必须对存货进行<b>逐项(Item by item)</b>减值测试与比较。' },
                    { id: 'ch8-q15-3', src: 'CH8 Q15', en: 'According to IAS 2, each class of inventory should normally be valued as a whole.', cn: '根据IAS 2规定，每一类别的存货通常应当作为一个整体进行估值计价。', ans: false, key: '禁止类别整体抵销比较', exp: '将一个产品类别或整体合并对比，会导致跌价损失被其他表现优良存货的未确认溢价所抵销，这违反了<b>审慎性(Prudence)</b>原则，因此通常不被允许。' },

                    { id: 'ch8-q16-1', src: 'CH8 Q16', en: 'If an inventory item costing $80 can only be sold if the selling price is reduced to $75, it should be valued at $75 in the financial statements based on the fair presentation concept.', cn: '如果成本为$80的存货只有在售价降至$75时才能售出，基于公允列报概念，该存货在财务报表中应当估值为$75。', ans: true, key: '跌价存货按NRV入账', exp: '由于成本已高于能产生经济利益的净值，必须将期末存货减记至$75以反映资产的真实账面价值，这遵循了<b>公允列报(Fair presentation)</b>和审慎性原则。' },

                    { id: 'ch8-q24-1', src: 'CH8 Q24', en: 'When $2,000 of inventory is bought on credit, purchases will increase by $2,000 and the bank account will decrease by $2,000.', cn: '赊购$2,000的存货时，采购将增加$2,000，同时银行账户将减少$2,000。', ans: false, key: '赊购不立即影响银行存款', exp: '这是一笔<b>赊购(On credit)</b>交易。企业收到货物但尚未支付现金，因此其实质是增加了流动负债，并不立即导致银行存款流出缩减。' },
                    { id: 'ch8-q24-2', src: 'CH8 Q24', en: 'When $2,000 of inventory is bought on credit, purchases will increase by $2,000 and trade payables will increase by $2,000.', cn: '赊购$2,000的存货时，采购将增加$2,000，同时应付账款增加$2,000。', ans: true, key: '赊购增加采购与应付账款', exp: '赊购的正确分录为：借记(DR)<b>采购(Purchases)</b>$2,000以记录存货增加，同时由于款项未付，需贷记(CR)<b>应付账款(Trade payables)</b>$2,000以增加当期负债。' },

                    { id: 'ch8-q25-1', src: 'CH8 Q25', en: 'The correct general ledger entry for closing inventory includes debiting Closing Inventory in the Statement of Financial Position and crediting the Statement of Profit or Loss.', cn: '期末存货的正确总账分录包括借记财务状况表中的期末存货，并贷记损益表。', ans: true, key: '期末存货转出销售成本进入资产', exp: '期末未售出的存货作为留存的资产，应被借记确认为<b>资产负债表项目(SFP)</b>的存货；同时应当贷记冲减损益表中的<b>销售成本(Cost of sales)</b>，以调整并计算出本期的准确利润。' },
                    { id: 'ch8-q25-2', src: 'CH8 Q25', en: 'The correct general ledger entry for opening inventory includes debiting Closing Inventory and crediting Opening Inventory.', cn: '期初存货的正确总账分录包括借记期末存货，并贷记期初存货。', ans: false, key: '期初存货应转入损益表销售成本', exp: '期初存货在本期默认被出售转为成本。规范的账务调整处理为：借记损益表中的<b>销售成本(Cost of sales)</b>科目作为费用增加，并贷记冲平起初留存的期初存货资产。' }
                ]
            },
            {
                id: 'ch9',
                title: 'CH9 不动产厂房和设备',
                label: 'CH9',
                items: [
                    // ===== 一、初始计量与资本化 =====
                    { id: 'ch9-q1-1', src: 'CH9 Q1-i', en: 'Insurance costs incurred during the construction of machinery are allowed to be capitalised under IAS 16 as part of the cost of that machinery.', cn: '在建造机器期间发生的保险成本，根据 IAS 16 可以作为该机器成本的一部分予以资本化。', ans: false, key: '保险一般不可资本化', exp: '<b>保险成本(Insurance costs)</b>通常是一项运营费用，不属于使资产达到预定可使用状态所必需的<b>直接归属成本(Directly attributable costs)</b>，因此一般不予资本化。' },
                    { id: 'ch9-q1-2', src: 'CH9 Q1-ii', en: 'Training costs incurred for staff to operate new machinery are allowed to be capitalised under IAS 16.', cn: '为使员工操作新机器而发生的培训成本，根据 IAS 16 可以资本化。', ans: false, key: '培训费绝不可资本化', exp: '<b>员工培训费(Training costs)</b>不能资本化，因为企业无法控制受训员工带来的未来经济利益（员工可能离职）。这是IAS 16中明确排除的支出项目，应作为当期<b>费用(Expense)</b>处理。' },
                    { id: 'ch9-q1-3', src: 'CH9 Q1-iii', en: 'Installation and assembly costs for new machinery are allowed to be capitalised under IAS 16 as part of the cost of the asset.', cn: '新机器的安装和调试成本，根据 IAS 16 可以作为资产成本的一部分予以资本化。', ans: true, key: '安装和调试费用必须资本化', exp: '<b>安装和调试成本(Installation and assembly costs)</b>是使机器达到可工作状态所必需的支出，属于<b>直接归属成本(Directly attributable costs)</b>，应予以资本化并计入资产成本。' },


                    { id: 'ch9-q3-1', src: 'CH9 Q3', ctx: 'Rashid, a sole trader, purchased a new machine for long-term use, financed by a bank loan. Capital repayments start in two years.', en: 'The correct journal entry to record the purchase is: DR Non-current assets: machinery, CR Non-current liabilities: loan.', cn: '记录购买的正确分录是：借记非流动资产：机器；贷记非流动负债：贷款。', ans: true, key: '贷款两年后偿还属于非流动负债', exp: '购买机器增加了<b>非流动资产(Non-current assets)</b>（借方）；通过银行贷款融资增加了负债。由于本金在两年后才开始偿还，该负债在报告期末的偿还期限超过一年，应归类为<b>非流动负债(Non-current liabilities)</b>（贷方）。' },
                    { id: 'ch9-q3-2', src: 'CH9 Q3', ctx: 'Rashid, a sole trader, purchased a new machine for long-term use, financed by a bank loan. Capital repayments start in two years.', en: 'The loan used to purchase the machine should be classified as a current liability because it is a bank loan.', cn: '用于购买机器的贷款应归类为流动负债，因为它是银行贷款。', ans: false, key: '负债分类取决于偿还时间而非贷款类型', exp: '负债的分类取决于<b>偿还时间(Repayment timing)</b>而非贷款类型。本金在两年后才开始偿还，超过一个报告期，因此是<b>非流动负债(Non-current liabilities)</b>而非<b>流动负债(Current liabilities)</b>。' },

                    // ===== 二、折旧定义与概念 =====
                    { id: 'ch9-q4-1', src: 'CH9 Q4', en: 'The depreciation charge should be debited to the statement of profit or loss as a depreciation expense.', cn: '折旧费用应借记到损益表中作为折旧费用。', ans: true, key: '折旧费用借记损益表', exp: '计提折旧的标准分录：借记<b>折旧费用(Depreciation Expense)</b>——这是一项费用，会减少当期利润，因此计入<b>损益表(SPL)</b>。' },
                    { id: 'ch9-q4-2', src: 'CH9 Q4', en: 'The depreciation charge should be credited to the accumulated depreciation account in the statement of financial position.', cn: '折旧费用应贷记到财务状况表中的累计折旧账户。', ans: true, key: '累计折旧贷记资产负债表', exp: '计提折旧的标准分录：贷记<b>累计折旧(Accumulated Depreciation)</b>——这是资产的<b>备抵账户(Contra account)</b>，在<b>资产负债表(SOFP)</b>上从资产成本中扣减，以得出资产的<b>账面价值(Carrying amount)</b>。' },
                    { id: 'ch9-q4-3', src: 'CH9 Q4', en: 'The depreciation charge should be debited to the accumulated depreciation account on the statement of financial position.', cn: '折旧费用应借记到资产负债表上的累计折旧账户。', ans: false, key: '累计折旧是贷方余额', exp: '<b>累计折旧(Accumulated Depreciation)</b>是资产的备抵账户，余额始终在<b>贷方(Credit)</b>。计提折旧时应<b>贷记(Credit)</b>累计折旧账户使其增加，而非借记。' },

                    { id: 'ch9-q5-1', src: 'CH9 Q5-A', en: 'Depreciation and amortisation are the means of spreading the cost of an asset over its lifetime.', cn: '折旧和摊销是在资产的使用寿命内分摊其成本的方法。', ans: true, key: '折旧本质是成本分摊', exp: '<b>折旧(Depreciation)</b>（用于有形资产）和<b>摊销(Amortisation)</b>（用于无形资产）的本质是系统地将资产成本在其<b>使用寿命(Useful life)</b>内分摊为费用的过程。折旧是成本分摊过程，不是资产估值过程。' },
                    { id: 'ch9-q5-2', src: 'CH9 Q5-B', en: 'Depreciation is the cost of financing the asset.', cn: '折旧是为资产融资的成本。', ans: false, key: '折旧不是融资成本', exp: '<b>融资成本(Cost of financing)</b>是利息费用，与折旧完全不同。折旧是将资产的<b>购置成本(Purchase cost)</b>在使用寿命内系统分摊的过程。' },
                    { id: 'ch9-q5-3', src: 'CH9 Q5-C', en: 'Depreciation is the estimation of the replacement cost of the asset.', cn: '折旧是对资产重置成本的估计。', ans: false, key: '折旧不涉及重置成本', exp: '折旧与<b>重置成本(Replacement cost)</b>无关。折旧仅仅是将资产的<b>历史成本(Historical cost)</b>在使用寿命内进行系统性分摊。' },
                    { id: 'ch9-q5-4', src: 'CH9 Q5-D', en: 'Depreciation is used to highlight the decline in market value of the asset.', cn: '折旧用于反映资产市场价值的下降。', ans: false, key: '折旧不反映市价变动', exp: '折旧反映的是资产<b>经济利益的消耗(Consumption of economic benefits)</b>，不等同于其<b>市场价值(Market value)</b>的下降。资产市价可能上涨但依然需要计提折旧。' },

                    { id: 'ch9-q6-1', src: 'CH9 Q6-A', en: 'Under IAS 16, "carrying amount" means the amount at which an asset is recognised after deducting any accumulated depreciation.', cn: '根据 IAS 16，"账面价值"是指资产在扣除任何累计折旧后被确认的金额。', ans: true, key: '账面价值 = 成本 − 累计折旧', exp: '<b>账面价值(Carrying amount)</b>的定义是：资产在确认后，减去任何<b>累计折旧(Accumulated depreciation)</b>和<b>累计减值损失(Accumulated impairment losses)</b>后的金额。' },
                    { id: 'ch9-q6-2', src: 'CH9 Q6-B', en: 'Under IAS 16, "depreciable amount" means the amount at which an asset is recognised after deducting any accumulated depreciation.', cn: '根据 IAS 16，"应折旧金额"是指资产在扣除任何累计折旧后被确认的金额。', ans: false, key: '应折旧金额 = 成本 − 残值', exp: '<b>应折旧金额(Depreciable amount)</b>是指资产成本减去其<b>残值(Residual value)</b>后的金额，即需要在使用寿命内分摊的总额。而"扣除累计折旧后的金额"描述的是<b>账面价值(Carrying amount)</b>。' },
                    { id: 'ch9-q6-3', src: 'CH9 Q6-C', en: 'Under IAS 16, "residual value" means the amount at which an asset is recognised after deducting any accumulated depreciation.', cn: '根据 IAS 16，"残值"是指资产在扣除任何累计折旧后被确认的金额。', ans: false, key: '残值是寿命终了的预估处置收入', exp: '<b>残值(Residual value)</b>是指资产<b>使用寿命结束时(At the end of useful life)</b>，预计可以从处置中获得的金额。这个定义与"扣除累计折旧后的金额"完全不同。' },

                    // ===== 二续、折旧方法选择 =====
                    { id: 'ch9-q13-1', src: 'CH9 Q13', en: 'Motor vehicles should be depreciated using the diminishing balance method rather than straight-line, because their value drops more rapidly in the earlier years.', cn: '机动车辆应使用余额递减法而非直线法折旧，因为其价值在早期下降更快。', ans: true, key: '车辆适合加速折旧法', exp: '<b>机动车辆(Motor vehicles)</b>通常在使用早期价值下降得非常快，后期下降速度减缓。这种消耗模式最适合使用<b>加速折旧法(Accelerated depreciation)</b>如<b>余额递减法(Diminishing balance)</b>。' },
                    { id: 'ch9-q13-2', src: 'CH9 Q13', en: 'Computer equipment should be depreciated using the straight-line method over a short useful life, because technology updates quickly.', cn: '计算机设备应使用直线法在较短的使用寿命内折旧，因为技术更新换代快。', ans: true, key: '电脑适合直线法短期折旧', exp: '<b>计算机设备(Computer equipment)</b>技术更新换代快，通常使用寿命较短且固定。在固定年限内平均分摊其成本（<b>直线法(Straight-line)</b>）是常见且合理的做法。' },



                    // ===== 三、会计估计变更 =====
                    { id: 'ch9-q20-1', src: 'CH9 Q20-A', en: 'When a depreciation method is changed, the change is permitted, but the carrying amount of the asset at the date of the change will reflect the old depreciation method.', cn: '当折旧方法变更时，变更是允许的，但变更日的资产账面价值仍反映旧的折旧方法。', ans: true, key: '估计变更采用未来适用法', exp: '根据IAS 16，折旧方法、使用寿命和残值的变动属于<b>会计估计变更(Change in accounting estimate)</b>，采用<b>未来适用法(Prospective application)</b>。这意味着变更从决定变更的当期开始生效，<b>不追溯调整(Not retrospective)</b>以前年度。变更日的账面价值基于旧方法计算。' },
                    { id: 'ch9-q20-2', src: 'CH9 Q20-B', en: 'When a depreciation method is changed, the carrying amount of the asset at the date of the change will reflect the new depreciation method.', cn: '当折旧方法变更时，变更日的资产账面价值将反映新的折旧方法。', ans: false, key: '变更日账面价值基于旧方法', exp: '<b>未来适用法(Prospective application)</b>要求：在变更日，资产的账面价值是基于旧的折旧方法计算得出的。新的折旧方法将从这个账面价值开始，在剩余使用寿命内应用。不会追溯重新计算变更日的账面价值。' },
                    { id: 'ch9-q20-3', src: 'CH9 Q20-C', en: 'No change is permitted to the depreciation method, useful economic life or the residual value of an asset once it has been set.', cn: '资产的折旧方法、使用寿命和残值一经设定，不得更改。', ans: false, key: '折旧方法和估计可以变更', exp: 'IAS 16明确规定，企业应至少每年复核资产的<b>残值(Residual value)</b>、<b>使用寿命(Useful life)</b>和<b>折旧方法(Depreciation method)</b>。如有必要，变更是允许的，适用<b>未来适用法(Prospective application)</b>。' },

                    { id: 'ch9-q21-1', src: 'CH9 Q21-A', en: 'An entity cannot change its depreciation approach during the life of the asset.', cn: '企业不能在资产使用寿命期间更改折旧方法。', ans: false, key: '折旧方法随时可以变更', exp: 'IAS 16允许并要求企业至少每年复核折旧方法。如果资产经济利益的预期消耗模式发生变化，<b>折旧方法(Depreciation method)</b>可以随时变更，属于<b>会计估计变更(Change in accounting estimate)</b>。' },
                    { id: 'ch9-q21-2', src: 'CH9 Q21-C', en: 'When a change in accounting estimate occurs, the entity will need to restate the previous years\' depreciation.', cn: '当发生会计估计变更时，企业需要重述前几年的折旧。', ans: false, key: '估计变更不追溯调整', exp: '<b>会计估计变更(Change in accounting estimate)</b>采用<b>未来适用法(Prospective application)</b>，从变更当期开始生效。<b>不需要(Not required)</b>追溯重述以前年度的折旧，过去年份的财务报表保持不变。' },




                    // ===== 五、资产重估 =====
                    { id: 'ch9-q41-1', src: 'CH9 Q41-1', en: 'Interest earned but not yet credited should be recognised in other comprehensive income as an unrealised gain.', cn: '已赚取但尚未入账的利息应作为未实现收益在其他综合收益中确认。', ans: false, key: '应计利息是损益表收入', exp: '已赚取但未入账的利息是<b>应计收入(Accrued income)</b>，应计入当期<b>损益(Profit or Loss)</b>，而非<b>其他综合收益(OCI)</b>。' },
                    { id: 'ch9-q41-2', src: 'CH9 Q41-2', en: 'Rental income received in advance for a future period should be recognised in other comprehensive income as an unrealised gain.', cn: '为未来期间预收的租金收入应作为未实现收益在其他综合收益中确认。', ans: false, key: '预收租金是负债不是收益', exp: '预收的租金收入是<b>预收收入(Deferred revenue)</b>，是一项<b>负债(Liability)</b>，在未来提供服务期间才确认为<b>损益(Profit or Loss)</b>中的收入。' },
                    { id: 'ch9-q41-3', src: 'CH9 Q41-3', en: 'An increase in the value of a non-current asset should be recognised in other comprehensive income as an unrealised gain.', cn: '非流动资产价值的增加应作为未实现收益在其他综合收益中确认。', ans: true, key: '重估增值计入其他综合收益', exp: '如果企业采用<b>重估模型(Revaluation model)</b>，非流动资产的重估增值是<b>未实现的(Unrealised)</b>，应计入<b>其他综合收益(OCI)</b>，并在权益中作为<b>重估盈余(Revaluation surplus)</b>累积。' },
                    { id: 'ch9-q41-4', src: 'CH9 Q41-4', en: 'A gain on the sale of shares held in a quoted company should be recognised in other comprehensive income as an unrealised gain.', cn: '出售持有的上市公司股票的收益应作为未实现收益在其他综合收益中确认。', ans: false, key: '已实现的出售收益计入损益', exp: '出售股票的收益是<b>已实现的(Realised)</b>交易收益，应计入当期<b>损益(Profit or Loss)</b>。只有未实现的价值变动才可能计入OCI。' },



                    { id: 'ch9-q46-1', src: 'CH9 Q46', en: 'A revaluation gain on a building should be reflected in the statement of profit or loss.', cn: '建筑物的重估增值应反映在损益表中。', ans: false, key: '首次重估增值不入损益表', exp: '首次<b>重估增值(Revaluation gain)</b>不影响<b>损益表(SPL)</b>。它是未实现的利得，应计入<b>其他综合收益(OCI)</b>，并在<b>财务状况表(SOFP)</b>的权益中作为<b>重估盈余(Revaluation surplus)</b>反映。' },
                    { id: 'ch9-q46-2', src: 'CH9 Q46', en: 'A revaluation gain on a building should be reflected in other comprehensive income, the statement of financial position, and the statement of changes in equity.', cn: '建筑物的重估增值应反映在其他综合收益、财务状况表和权益变动表中。', ans: true, key: '重估增值影响三张报表', exp: '重估增值的影响：(1)<b>其他综合收益(OCI)</b>中报告增值；(2)<b>财务状况表(SOFP)</b>上资产价值增加、权益中重估盈余增加；(3)<b>权益变动表(SOCIE)</b>中列示重估盈余的变动。' },

                    { id: 'ch9-q47-1', src: 'CH9 Q47-D', en: 'Under IAS 16, a revalued asset is included in the statement of financial position at its revalued amount.', cn: '根据 IAS 16，重估资产在财务状况表中按其重估金额列示。', ans: true, key: '重估资产按重估金额列报', exp: '根据IAS 16，<b>重估金额(Revalued amount)</b>的定义是：资产在重估日的公允价值减去任何<b>后续的</b>累计折旧和<b>后续的</b>累计减值损失。因此资产在SOFP中列示的是重估金额，不是单纯的公允价值。' },
                    { id: 'ch9-q47-2', src: 'CH9 Q47-A', en: 'Under IAS 16, a revalued asset is included in the statement of financial position at its fair value at the reporting date.', cn: '根据 IAS 16，重估资产在财务状况表中按报告日的公允价值列示。', ans: false, key: '重估资产不等于报告日公允价值', exp: '重估后的报告期末，资产需要扣除<b>后续折旧(Subsequent depreciation)</b>。因此在SOFP中列示的金额是<b>重估金额(Revalued amount)</b>而非重估日当天的<b>公允价值(Fair value)</b>。' },

                    { id: 'ch9-q48-1', src: 'CH9 Q48-A', en: 'If any asset within a company is revalued, then all assets in the company must be revalued.', cn: '如果公司中任何一项资产被重估，则公司所有资产都必须重估。', ans: false, key: '重估按资产类别进行', exp: '重估应按<b>资产类别(Class of assets)</b>进行。如果对某一类资产中的一项进行了重估，则该类别的所有资产都应重估，但并非公司的<b>全部(All)</b>资产。' },
                    { id: 'ch9-q48-2', src: 'CH9 Q48-B', en: 'Revalued assets must be revalued annually.', cn: '重估资产必须每年重估。', ans: false, key: '重估频率没有强制年度要求', exp: 'IAS 16要求重估应足够<b>频繁(Sufficiently regular)</b>，以确保账面价值与公允价值没有重大差异，但<b>并未规定(Not required)</b>必须每年进行。' },
                    { id: 'ch9-q48-3', src: 'CH9 Q48-C', en: 'Revaluations must be carried out by an independent valuer.', cn: '重估必须由独立评估师进行。', ans: false, key: '不强制要求独立评估师', exp: 'IAS 16<b>没有强制要求(Not mandatory)</b>必须由独立评估师进行重估。企业可以自行评估，但如果进行了独立评估，应在附注中予以披露。' },
                    { id: 'ch9-q48-4', src: 'CH9 Q48-D', en: 'If a market value cannot be determined for an asset, the fair value may be estimated using other valuation techniques.', cn: '如果无法确定资产的市场价值，可以使用其他估值技术来估计公允价值。', ans: true, key: '无市价时可用其他估值技术', exp: '<b>公允价值(Fair value)</b>通常基于<b>市场价值(Market value)</b>。但如果没有活跃的市场，可以使用其他<b>估值技术(Valuation techniques)</b>如折现现金流法或重置成本法来估计公允价值。' },

                    // ===== 五续、超额折旧转移 =====
                    { id: 'ch9-q53-1', src: 'CH9 Q53', en: 'The journal entry to transfer excess depreciation on a revalued asset is: DR Revaluation surplus, CR Retained earnings.', cn: '转移重估资产超额折旧的日记账分录是：借记重估盈余，贷记留存收益。', ans: true, key: '超额折旧从重估盈余转入留存收益', exp: '重估资产的每年折旧费用增加部分称为<b>超额折旧(Excess depreciation)</b>。IAS 16允许企业每年将此差额从<b>重估盈余(Revaluation surplus)</b>转入<b>留存收益(Retained earnings)</b>，将未实现收益逐步转化为已实现收益。分录：DR重估盈余，CR留存收益。' },
                    { id: 'ch9-q53-2', src: 'CH9 Q53', en: 'The transfer of excess depreciation on a revalued asset should be recorded through the statement of profit or loss.', cn: '重估资产超额折旧的转移应通过损益表记录。', ans: false, key: '超额折旧转移是权益内部调整', exp: '超额折旧转移是在<b>权益内部(Within equity)</b>的调整——从<b>重估盈余(Revaluation surplus)</b>转到<b>留存收益(Retained earnings)</b>。这个转移<b>不影响(Does not affect)</b>当期<b>损益(Profit or Loss)</b>。' },

                    // ===== 六、资产登记簿与披露 =====
                    { id: 'ch9-q60-1', src: 'CH9 Q60-A', en: 'The purpose of an asset register is to provide a record of the double entry posted when each asset is purchased.', cn: '资产登记簿的用途是提供购买每项资产时所过账的复式分录记录。', ans: false, key: '资产登记簿不是复式记账的一部分', exp: '<b>资产登记簿(Asset register)</b>是总分类账的<b>备查记录(Memorandum record)</b>，不是<b>复式记账系统(Double entry system)</b>的一部分。它用于追踪和管理资产，但不记录复式分录。' },
                    { id: 'ch9-q60-2', src: 'CH9 Q60-D', en: 'The purpose of an asset register is to provide a memorandum record of all assets.', cn: '资产登记簿的用途是提供所有资产的备查记录。', ans: true, key: '资产登记簿是备查记录', exp: '<b>资产登记簿(Asset register)</b>是一个详细的<b>备查记录(Memorandum record)</b>，用于追踪公司的所有非流动资产，包括购买日期、成本、折旧方法、位置等详细信息。' },

                    { id: 'ch9-q61-1', src: 'CH9 Q61-1', en: 'The asset register provides a record of the carrying amount of each asset.', cn: '资产登记簿提供每项资产的账面价值记录。', ans: true, key: '登记簿记录成本和折旧可计算账面价值', exp: '<b>资产登记簿(Asset register)</b>记录了每项资产的<b>成本(Cost)</b>和<b>累计折旧(Accumulated depreciation)</b>，因此可以计算出每项资产的<b>账面价值(Carrying amount)</b> = 成本 − 累计折旧。' },
                    { id: 'ch9-q61-2', src: 'CH9 Q61-2', en: 'The asset register provides information about the financing of each asset and the balance outstanding.', cn: '资产登记簿提供关于每项资产融资和未偿余额的信息。', ans: false, key: '登记簿不包含融资信息', exp: '<b>资产登记簿(Asset register)</b>关注的是资产本身的管理和核算，通常<b>不包含(Does not include)</b>该资产的融资方式（如贷款、租赁）或相关负债的详细信息。融资信息记录在<b>负债相关账户(Liability accounts)</b>中。' },

                    { id: 'ch9-q62-1', src: 'CH9 Q62-1', en: 'An asset register lists only the description of the asset, asset number and location so that it can be used as a checklist.', cn: '资产登记簿只列出资产的描述、编号和位置，以便用作清单。', ans: false, key: '登记簿包含成本折旧等财务信息', exp: '<b>资产登记簿(Asset register)</b>包含的信息远不止描述、编号和位置。它还包括<b>成本(Cost)</b>、<b>购买日期(Date of purchase)</b>、<b>供应商(Supplier)</b>、<b>折旧方法(Depreciation method)</b>、<b>累计折旧(Accumulated depreciation)</b>和<b>账面价值(Carrying amount)</b>等关键财务信息。' },
                    { id: 'ch9-q62-2', src: 'CH9 Q62-2', en: 'All businesses must maintain an asset register.', cn: '所有企业都必须保留资产登记簿。', ans: false, key: '登记簿不是法律强制要求', exp: '虽然保留<b>资产登记簿(Asset register)</b>是良好的<b>内部控制(Internal control)</b>和公司治理实践，但并没有法律或会计准则<b>强制要求(Mandatory)</b>所有企业都必须保留。' },

                    { id: 'ch9-q63-1', src: 'CH9 Q63-B', en: 'Increases in value due to revaluation must be disclosed in the notes to the financial statements for tangible non-current assets.', cn: '因重估导致的价值增加必须在有形非流动资产的财务报表附注中披露。', ans: true, key: '重估增值必须在附注中披露', exp: '根据IAS 16，非流动资产附注需要提供一个<b>调节表(Reconciliation)</b>，显示期初与期末账面价值之间的变动，包括<b>重估增值(Revaluation increases)</b>。' },
                    { id: 'ch9-q63-2', src: 'CH9 Q63-D', en: 'Accumulated depreciation at the start of the period must be disclosed in the notes to the financial statements for tangible non-current assets.', cn: '期初的累计折旧必须在有形非流动资产的财务报表附注中披露。', ans: true, key: '期初累计折旧必须披露', exp: '根据IAS 16的<b>附注披露要求(Disclosure requirements)</b>，必须披露期初和期末的<b>总成本(Gross amount)</b>和<b>累计折旧(Accumulated depreciation)</b>。' },
                    { id: 'ch9-q63-3', src: 'CH9 Q63-A', en: 'A breakdown of the individual assets sold during the accounting period must be disclosed in the notes.', cn: '会计期间内售出的各项资产的明细必须在附注中披露。', ans: false, key: '附注不要求逐项列明已处置资产', exp: '附注中的调节表需要显示处置的整体影响，但通常<b>不要求(Not required)</b>提供本期售出每项具体资产的逐条明细清单。' },
                    { id: 'ch9-q63-4', src: 'CH9 Q63-C', en: 'Proceeds received for assets sold during the year must be disclosed in the notes to the financial statements.', cn: '年内售出资产收到的款项必须在财务报表附注中披露。', ans: false, key: '处置收入不是附注必须披露项', exp: 'IAS 16的非流动资产附注调节表要求披露处置对<b>成本和累计折旧</b>的影响，但<b>处置收入(Proceeds)</b>本身不是附注中必须单独披露的项目。' }
                ]
            },

            // ==================== CH10: 无形资产 (IAS 38 Intangible Assets) ====================
            {
                id: 'ch10',
                title: '无形资产 (IAS 38 Intangible Assets)',
                label: 'CH10',
                items: [
                    // ===== 一、无形资产的识别与分类 =====
                    // Q1 (原题号1) - 匹配题: 能否资本化为无形资产
                    { id: 'ch10-q1-1', src: 'CH10 Q1', en: 'A software program can be capitalised as an intangible non-current asset under IAS 38.', cn: '根据 IAS 38，软件程序可以资本化为无形非流动资产。', ans: true, key: '外购软件属于无形资产', exp: '\u003cb\u003e软件程序(Software program)\u003c/b\u003e没有实物形态，是可辨认的非货币性资产，能为企业带来未来经济利益。外购软件满足IAS 38的确认条件，可以资本化为\u003cb\u003e无形非流动资产(Intangible non-current asset)\u003c/b\u003e。' },
                    { id: 'ch10-q1-2', src: 'CH10 Q1', en: 'A franchise agreement can be capitalised as an intangible non-current asset under IAS 38.', cn: '根据 IAS 38，特许经营协议可以资本化为无形非流动资产。', ans: true, key: '特许经营权属于无形资产', exp: '\u003cb\u003e特许经营协议(Franchise agreement)\u003c/b\u003e赋予企业在特定条件下经营的权利，没有实物形态，能带来未来经济利益且成本可计量，是典型的\u003cb\u003e无形资产(Intangible asset)\u003c/b\u003e。' },
                    { id: 'ch10-q1-3', src: 'CH10 Q1', en: 'Internally generated goodwill can be capitalised as an intangible non-current asset under IAS 38.', cn: '根据 IAS 38，内部产生的商誉可以资本化为无形非流动资产。', ans: false, key: '内部商誉禁止确认', exp: 'IAS 38明确规定，\u003cb\u003e内部产生的商誉(Internally generated goodwill)\u003c/b\u003e不能资本化确认为资产，因为它无法可靠地计量其价值。只有在\u003cb\u003e企业合并(Business combination)\u003c/b\u003e中外购的商誉才可以确认。' },
                    { id: 'ch10-q1-4', src: 'CH10 Q1', en: 'Research costs can be capitalised as an intangible non-current asset under IAS 38.', cn: '根据 IAS 38，研究成本可以资本化为无形非流动资产。', ans: false, key: '研究成本必须费用化', exp: 'IAS 38明确规定，\u003cb\u003e研究成本(Research costs)\u003c/b\u003e必须在发生时\u003cb\u003e费用化(Expensed)\u003c/b\u003e，计入当期损益。研究阶段的未来经济利益具有高度不确定性，不能资本化。' },

                    // Q2 (原题号5) - 多选题: 资本化为无形非流动资产
                    { id: 'ch10-q2-1', src: 'CH10 Q2', en: 'Goodwill arising from the purchase of a business can be capitalised as an intangible non-current asset.', cn: '因购买业务而产生的商誉可以资本化为无形非流动资产。', ans: true, key: '外购商誉必须资本化', exp: '在\u003cb\u003e企业合并(Business combination)\u003c/b\u003e中外购的\u003cb\u003e商誉(Goodwill)\u003c/b\u003e是一种无形资产，必须资本化。它代表购买价格超出被收购企业可辨认净资产公允价值的部分。' },
                    { id: 'ch10-q2-2', src: 'CH10 Q2', en: 'Specialist computer software purchased for a six-month project should be capitalised as an intangible non-current asset.', cn: '为一个为期六个月的项目购买的专业计算机软件应资本化为无形非流动资产。', ans: false, key: '使用期不足一年不属于非流动', exp: '虽然软件本身是无形资产，但该软件仅用于一个为期六个月的项目，其使用寿命不足一年。因此它不符合\u003cb\u003e非流动资产(Non-current asset)\u003c/b\u003e的定义（预期超过一个报告期受益），应作为当期\u003cb\u003e费用(Expense)\u003c/b\u003e处理。' },
                    { id: 'ch10-q2-3', src: 'CH10 Q2', en: 'A 10-year licence to manufacture a patented product can be capitalised as an intangible non-current asset.', cn: '制造专利产品的10年期许可证可以资本化为无形非流动资产。', ans: true, key: '长期许可证属于无形资产', exp: '10年期的\u003cb\u003e制造许可证(Manufacturing licence)\u003c/b\u003e没有实物形态，可辨认，且预期在超过一个会计期间内为企业带来经济利益，是典型的\u003cb\u003e无形非流动资产(Intangible non-current asset)\u003c/b\u003e。' },
                    { id: 'ch10-q2-4', src: 'CH10 Q2', en: 'A 25-year lease of property should be classified as an intangible non-current asset.', cn: '25年期的物业租赁应归类为无形非流动资产。', ans: false, key: '租赁使用权资产属于有形资产范畴', exp: '根据IFRS 16《租赁》，物业租赁会产生一项\u003cb\u003e使用权资产(Right-of-use asset)\u003c/b\u003e。虽然使用权资产在资产负债表上单独列示，但它代表的是对一项\u003cb\u003e有形资产(Tangible asset)\u003c/b\u003e即物业的使用权，其性质归属于有形资产类别，不是\u003cb\u003e无形资产(Intangible asset)\u003c/b\u003e。' },

                    // Q3 (原题号7) - 多选题: 员工技能不能确认为资产
                    { id: 'ch10-q3-1', src: 'CH10 Q3', en: 'Staff expertise can be classified as an intangible asset in the statement of financial position.', cn: '员工专业技能可以在财务状况表中归类为无形资产。', ans: false, key: '企业无法控制员工技能', exp: '虽然\u003cb\u003e员工技能(Staff expertise)\u003c/b\u003e对企业很有价值，但企业无法\u003cb\u003e控制(Control)\u003c/b\u003e员工（员工可以离职）。不满足资产确认条件中的"控制"要素，因此不能确认为\u003cb\u003e无形资产(Intangible asset)\u003c/b\u003e。' },

                    // Q4 (原题号13) - 匹配题: 识别无形NCA
                    { id: 'ch10-q4-1', src: 'CH10 Q4', en: 'The cost of constructing a pre-production prototype of a new device can be recognised as an intangible non-current asset.', cn: '建造新设备预生产原型的成本可以确认为无形非流动资产。', ans: true, key: '开发阶段的原型成本可资本化', exp: '建造\u003cb\u003e预生产原型(Pre-production prototype)\u003c/b\u003e属于\u003cb\u003e开发活动(Development)\u003c/b\u003e。如果满足IAS 38的全部六项资本化标准，这些成本可以被资本化为一项\u003cb\u003e无形资产(Intangible asset)\u003c/b\u003e。' },
                    { id: 'ch10-q4-2', src: 'CH10 Q4', en: 'A patent for a new drug purchased from the developer can be recognised as an intangible non-current asset.', cn: '从开发商处购买的新药专利可以确认为无形非流动资产。', ans: true, key: '外购专利属于无形资产', exp: '\u003cb\u003e专利(Patent)\u003c/b\u003e是典型的无形资产。外购的专利拥有明确的成本，没有实物形态，能为企业带来可辨认的未来经济利益，可以被\u003cb\u003e资本化(Capitalised)\u003c/b\u003e。' },
                    { id: 'ch10-q4-3', src: 'CH10 Q4', en: 'A laboratory built to carry out new research can be recognised as an intangible non-current asset.', cn: '为进行新研究而建造的实验室可以确认为无形非流动资产。', ans: false, key: '实验室是有形资产', exp: '实验室是具有物理形态的\u003cb\u003e建筑物(Building)\u003c/b\u003e，它是一项\u003cb\u003e有形非流动资产(Tangible non-current asset)\u003c/b\u003e，应按\u003cb\u003eIAS 16\u003c/b\u003e核算，而不是按IAS 38确认为无形资产。' },
                    { id: 'ch10-q4-4', src: 'CH10 Q4', en: 'Publishing rights purchased from an author can be recognised as an intangible non-current asset.', cn: '从作者处购买的出版权可以确认为无形非流动资产。', ans: true, key: '外购出版权属于无形资产', exp: '\u003cb\u003e出版权(Publishing rights)\u003c/b\u003e是外购的合法权利，没有实物形态，能带来经济利益，满足\u003cb\u003e无形资产(Intangible asset)\u003c/b\u003e的确认条件。' },

                    // ===== 二、研究与开发的会计处理 =====
                    // Q5 (原题号3) - 多选题: R&D成本处理
                    { id: 'ch10-q5-1', src: 'CH10 Q5', en: 'Research costs may be capitalised if certain criteria are met.', cn: '如果满足特定条件，研究成本可以被资本化。', ans: false, key: '研究成本无论如何不可资本化', exp: 'IAS 38规定，\u003cb\u003e研究(Research)\u003c/b\u003e阶段的支出，由于其未来经济利益具有高度不确定性，\u003cb\u003e必须(Must)\u003c/b\u003e在发生时费用化。不存在任何条件可以使研究成本被资本化。' },
                    { id: 'ch10-q5-2', src: 'CH10 Q5', en: 'Research costs must be treated as an expense in the period in which they are incurred.', cn: '研究成本必须在发生的期间作为费用处理。', ans: true, key: '研究成本必须当期费用化', exp: 'IAS 38明确规定，\u003cb\u003e研究成本(Research costs)\u003c/b\u003e必须在发生时\u003cb\u003e费用化(Expensed)\u003c/b\u003e，计入当期\u003cb\u003e损益(Profit or loss)\u003c/b\u003e。这是一条强制性规定，没有例外。' },
                    { id: 'ch10-q5-3', src: 'CH10 Q5', en: 'Development costs may be capitalised if certain criteria are met.', cn: '如果满足特定条件，开发成本可以被资本化。', ans: true, key: '开发成本满足条件时必须资本化', exp: 'IAS 38规定，如果\u003cb\u003e开发(Development)\u003c/b\u003e支出同时满足全部六项资本化标准（\u003cb\u003ePIRATE\u003c/b\u003e），则必须资本化。"may be capitalised"在此表示"有可能被资本化"，这是正确的——取决于是否满足条件。' },

                    // Q6 (原题号8) - 单选题: Must vs May 的关键区别
                    { id: 'ch10-q6-1', src: 'CH10 Q6', en: 'Assuming that all relevant IAS 38 criteria are met, development expenditure must be capitalised rather than being optionally capitalised.', cn: '假设所有相关 IAS 38 标准已满足，开发支出必须资本化，而非可选择性资本化。', ans: true, key: '满足条件时资本化是强制的', exp: '这是IAS 38的一个关键考点。当开发支出满足全部六项资本化标准时，资本化是\u003cb\u003e强制性的(Mandatory)\u003c/b\u003e，不是可选择的。使用"\u003cb\u003e必须(Must)\u003c/b\u003e"而非"可以(May)"。' },

                    // Q7 (原题号12) - 判断题
                    { id: 'ch10-q7-1', src: 'CH10 Q7', en: 'If the IAS 38 criteria are met, a company can decide whether or not to capitalise development expenditure.', cn: '如果满足 IAS 38 的标准，公司可以自行决定是否资本化开发支出。', ans: false, key: '资本化是强制的不是可选的', exp: '如果开发支出满足IAS 38的资本化标准，公司\u003cb\u003e必须(Is required to)\u003c/b\u003e资本化，而不是"可以决定(Can decide)"。资本化是\u003cb\u003e强制性的(Mandatory)\u003c/b\u003e，不是一种选择。' },
                    { id: 'ch10-q7-2', src: 'CH10 Q7', en: 'Internally generated goodwill must be amortised over a period not exceeding 10 years.', cn: '内部产生的商誉必须在不超过10年的期间内摊销。', ans: false, key: '内部商誉根本不能确认为资产', exp: '\u003cb\u003e内部产生的商誉(Internally generated goodwill)\u003c/b\u003e根本\u003cb\u003e不能(Cannot)\u003c/b\u003e被资本化确认为资产。既然不能成为资产，也就无从谈起\u003cb\u003e摊销(Amortisation)\u003c/b\u003e。' },
                    { id: 'ch10-q7-3', src: 'CH10 Q7', en: 'Research costs, other than expenditure on tangible non-current assets, must be written off to profit or loss.', cn: '研究成本（除用于有形非流动资产的支出外）必须计入损益。', ans: true, key: '研究成本必须费用化但设备除外', exp: 'IAS 38明确规定，\u003cb\u003e研究成本(Research costs)\u003c/b\u003e必须在发生时费用化。唯一的例外是，如果研究过程中购买了具有替代用途的\u003cb\u003e有形非流动资产(Tangible NCA)\u003c/b\u003e（如设备），该设备本身应作为有形资产按\u003cb\u003eIAS 16\u003c/b\u003e处理，而不是费用化。' },

                    // ===== 三、开发成本的可资本化项目 =====
                    // Q10 (原题号11) - 匹配题: 开发项目成本分类
                    { id: 'ch10-q10-1', src: 'CH10 Q10', en: 'Wages of the development team associated with a project can be capitalised as part of an intangible asset under IAS 38.', cn: '与项目相关的开发团队工资可以作为无形资产成本的一部分资本化。', ans: true, key: '开发团队工资可资本化', exp: '\u003cb\u003e开发团队的工资(Wages of development team)\u003c/b\u003e是直接与项目相关的\u003cb\u003e直接归属成本(Directly attributable costs)\u003c/b\u003e，可以资本化为无形资产的一部分。' },
                    { id: 'ch10-q10-2', src: 'CH10 Q10', en: 'Testing equipment purchased for use on a development project should be capitalised as part of the intangible asset.', cn: '为开发项目购买的测试设备应作为无形资产的一部分资本化。', ans: false, key: '购买的设备是有形资产', exp: '购买的\u003cb\u003e测试设备(Testing equipment)\u003c/b\u003e本身是一项\u003cb\u003e有形非流动资产(Tangible NCA)\u003c/b\u003e，应按\u003cb\u003eIAS 16\u003c/b\u003e核算。注意：设备本身不能计入无形资产成本，但设备在开发项目期间的\u003cb\u003e折旧费(Depreciation)\u003c/b\u003e可以资本化为无形资产成本。' },
                    { id: 'ch10-q10-3', src: 'CH10 Q10', en: 'A share of general administrative overheads can be capitalised as part of the cost of an intangible asset.', cn: '分摊的一般管理费用可以作为无形资产成本的一部分资本化。', ans: false, key: '一般管理费用不可资本化', exp: '\u003cb\u003e一般管理费用(General administrative overheads)\u003c/b\u003e不是直接归属于开发项目的支出，不能作为无形资产成本的一部分\u003cb\u003e资本化(Capitalised)\u003c/b\u003e。只有直接与开发活动相关的成本才能计入。' },
                    { id: 'ch10-q10-4', src: 'CH10 Q10', en: 'Depreciation of testing equipment used on a development project can be capitalised as part of the intangible asset cost.', cn: '用于开发项目的测试设备的折旧费可以作为无形资产成本的一部分资本化。', ans: true, key: '开发设备折旧可计入无形资产', exp: '在开发项目期间，用于该项目的测试设备的\u003cb\u003e折旧费(Depreciation)\u003c/b\u003e是开发活动消耗的经济资源，可以\u003cb\u003e直接归属(Directly attributable)\u003c/b\u003e于该项目，因此可以资本化为\u003cb\u003e无形资产(Intangible asset)\u003c/b\u003e的成本。注意与设备本身（有形资产）的区分。' },
                    { id: 'ch10-q10-5', src: 'CH10 Q10', en: 'Energy costs for the room used by the project development team can be capitalised as part of the intangible asset cost.', cn: '项目开发团队使用的房间的能源成本可以作为无形资产成本的一部分资本化。', ans: true, key: '开发专用能源费可资本化', exp: '为开发团队使用的房间所产生的\u003cb\u003e能源费用(Energy costs)\u003c/b\u003e是直接支持开发活动的成本，可以\u003cb\u003e直接归属(Directly attributable)\u003c/b\u003e于开发项目，因此可以资本化为无形资产成本。' }
                ]
            },

            // ==================== CH12: 报告期后事项 (IAS 10 Events After the Reporting Period) ====================
            {
                id: 'ch12',
                title: '报告期后事项 (IAS 10 Events After the Reporting Period)',
                label: 'CH12',
                items: [
                    // ===== 一、基础定义与期间 =====
                    // Q1 (原题号1) - 单选题: 报告期后事项期间的定义
                    { id: 'ch12-q1-1', src: 'CH12 Q1', en: 'Events after the reporting period are those that occur between the reporting date and the date of the annual general meeting.', cn: '报告期后事项是指在报告日和年度股东大会日之间发生的事件。', ans: false, key: '期间截止是批准报出日而非股东大会日', exp: '根据<b>IAS 10</b>，报告期后事项的期间截止点是<b>财务报表批准报出日(Date authorised for issue)</b>，而不是<b>年度股东大会(Annual general meeting)</b>日。批准报出日通常早于股东大会日。' },
                    { id: 'ch12-q1-2', src: 'CH12 Q1', en: 'Events after the reporting period are those that occur between the reporting date and the date on which the financial statements are authorised for issue.', cn: '报告期后事项是指在报告日和财务报表批准报出日之间发生的事件。', ans: true, key: '报告期后事项期间的定义', exp: '这完全符合<b>IAS 10</b>对<b>报告期后事项(Events after the reporting period)</b>的定义。期间是从<b>报告期末(Reporting date)</b>到<b>财务报表批准报出日(Date authorised for issue)</b>。' },
                    { id: 'ch12-q1-3', src: 'CH12 Q1', en: 'The period for events after the reporting period is a fixed length of time, such as three or six months after the reporting date.', cn: '报告期后事项的期间是一个固定的时间长度，例如报告日后三个月或六个月。', ans: false, key: '期间不是固定时长', exp: 'IAS 10没有使用固定的时间长度来定义报告期后事项期间。期间的结束点是<b>财务报表批准报出日(Date authorised for issue)</b>，这个日期因公司而异，不是固定的三个月或六个月。' },

                    // ===== 二、调整事项与非调整事项的判断 =====
                    // Q2 (原题号2) - 匹配题
                    { id: 'ch12-q2-1', src: 'CH12 Q2', en: 'A customer who owed money at the year end being declared bankrupt after the year end is an adjusting event.', cn: '在年末欠款的客户在年末后被宣布破产是一个调整事项。', ans: true, key: '期末欠款客户期后破产属于调整事项', exp: '客户在<b>报告期末</b>已经欠款，其在期后<b>破产(Bankrupt)</b>为报告期末该<b>应收账款(Trade receivable)</b>的可回收性提供了额外证据。表明在报告期末，这笔款项的收回已存在问题，因此是<b>调整事项(Adjusting event)</b>。' },
                    { id: 'ch12-q2-2', src: 'CH12 Q2', en: 'A fire occurring after the year end that destroys inventory is an adjusting event.', cn: '年末后发生的火灾烧毁了存货，这是一个调整事项。', ans: false, key: '期后发生的火灾属于非调整事项', exp: '<b>火灾(Fire)</b>及其发生条件是在报告期后才出现的，它不能证明报告期末<b>存货(Inventory)</b>的状况存在问题。因此，这是一个<b>非调整事项(Non-adjusting event)</b>。如果金额重大，应在附注中<b>披露(Disclose)</b>。' },

                    // Q3 (原题号3) - 单选题
                    { id: 'ch12-q3-1', src: 'CH12 Q3', en: 'Goods bought before the year end and sold for less than cost after the year end give rise to an adjusting event.', cn: '年末前购买的商品在年末后以低于成本的价格售出，产生了一个调整事项。', ans: true, key: '期后低价售出为期末存货估值提供证据', exp: '在报告期后以低于<b>成本(Cost)</b>的价格出售了报告期末已存在的存货，这为报告期末该存货的<b>可变现净值(NRV)</b>低于成本提供了证据。根据<b>IAS 2</b>，存货应按<b>成本与NRV孰低(Lower of cost and NRV)</b>计量，因此需要调整。' },
                    { id: 'ch12-q3-2', src: 'CH12 Q3', en: 'A material amount outstanding in trade receivables being written off just after the year end is an adjusting event.', cn: '一笔重大的应收账款余额在年末后不久被核销是一个调整事项。', ans: true, key: '期后核销应收款为期末可回收性提供证据', exp: '在报告期后不久核销一笔重大的<b>应收账款(Trade receivable)</b>，通常表明该客户的财务状况在报告期末已经恶化。这为报告期末应收账款的<b>可回收性(Recoverability)</b>提供了证据，因此是<b>调整事项(Adjusting event)</b>。' },
                    { id: 'ch12-q3-3', src: 'CH12 Q3', en: 'A situation arising after the year end that gives rise to a potential legal claim is a non-adjusting event.', cn: '年末后出现的导致潜在法律索赔的情况是一个非调整事项。', ans: true, key: '期后才出现的法律情况属于非调整事项', exp: '导致该潜在<b>法律索赔(Legal claim)</b>的情况是在<b>报告期后</b>才出现的，在报告期末企业并没有<b>现时义务(Present obligation)</b>。因此，这是一个<b>非调整事项(Non-adjusting event)</b>。如果金额重大，应在附注中<b>披露(Disclose)</b>。' },
                    { id: 'ch12-q3-4', src: 'CH12 Q3', en: 'A fraud discovered after the year end that affects the financial statements of the reporting period is a non-adjusting event.', cn: '年末后发现的影响报告期财务报表的舞弊是一个非调整事项。', ans: false, key: '影响报告期的舞弊属于调整事项', exp: '如果发现的<b>舞弊(Fraud)</b>影响了报告期内的财务状况或经营成果，无论何时发现，都需要<b>调整(Adjust)</b>报表以反映真实情况。这通常被视为<b>调整事项(Adjusting event)</b>。' },

                    // Q4 (原题号5) - 单选题: 4个场景
                    { id: 'ch12-q4-1', src: 'CH12 Q4', en: 'Notification after the year end that a customer owing money at the year end has gone into liquidation is an adjusting event.', cn: '年末后收到通知，一名在年末欠款的客户已进入清算程序，这是一个调整事项。', ans: true, key: '期末欠款客户期后清算属于调整事项', exp: '客户在报告期末已<b>欠款(Owed money)</b>，其在期后进入<b>清算(Liquidation)</b>为报告期末<b>应收账款(Receivable)</b>不可收回提供了证据。这是<b>调整事项(Adjusting event)</b>。' },
                    { id: 'ch12-q4-2', src: 'CH12 Q4', en: 'A fire after the year end that destroyed a substantial amount of inventory is an adjusting event.', cn: '年末后的一场火灾烧毁了大量存货，这是一个调整事项。', ans: false, key: '期后火灾属于非调整事项', exp: '<b>火灾(Fire)</b>及其发生条件是在报告期后才出现的，它不反映报告期末存货的状况。这是<b>非调整事项(Non-adjusting event)</b>，如果重大应在附注中披露。' },
                    { id: 'ch12-q4-3', src: 'CH12 Q4', en: 'The discovery after the year end of a material fraud that had overstated salaries during the reporting period is an adjusting event.', cn: '年末后发现的一项重大舞弊，该舞弊高估了报告期内的薪金，这是一个调整事项。', ans: true, key: '影响报告期数据的舞弊属于调整事项', exp: '该<b>舞弊(Fraud)</b>活动发生在报告期内并高估了<b>薪金(Salaries)</b>，这表明报告期内的财务数据是错误的。必须进行<b>调整(Adjust)</b>以纠正错误。' },
                    { id: 'ch12-q4-4', src: 'CH12 Q4', en: 'The settlement after the year end of a legal case for which a provision had already been made at the year end is an adjusting event.', cn: '年末后和解了一宗在年末已计提准备金的法律案件，这是一个调整事项。', ans: true, key: '期末已计提准备金的案件期后结算属于调整', exp: '在报告期末已经就该<b>法律案件(Legal case)</b>计提了<b>准备金(Provision)</b>，这表明在报告期末已经存在<b>现时义务(Present obligation)</b>。期后的最终结算金额为该义务的最佳估计提供了更准确的证据，因此需要<b>调整(Adjust)</b>准备金的金额。' },

                    // Q5 (原题号6) - 单选题: 鞋店场景
                    { id: 'ch12-q5-1', src: 'CH12 Q5', en: 'Inventory held at cost at the year end that is sold after the year end for less than cost gives rise to an adjusting event.', cn: '年末以成本计价的存货在年末后以低于成本的价格售出，产生了一个调整事项。', ans: true, key: '期后低价售出证明期末存货应减值', exp: '在报告期后以低于<b>成本(Cost)</b>的价格售出了报告期末的存货，这为报告期末存货的<b>可变现净值(NRV)</b>低于其成本提供了证据。根据<b>IAS 2</b>，存货应按成本与NRV孰低计量，因此需要<b>调整(Adjust)</b>将存货减记至NRV。' },
                    { id: 'ch12-q5-2', src: 'CH12 Q5', en: 'A dividend proposed to shareholders after the reporting period is an adjusting event that requires recognition as a liability.', cn: '在报告期后向股东建议的股息是一个需要确认为负债的调整事项。', ans: false, key: '期后建议的股息是非调整事项', exp: '在报告期后<b>建议(Proposed)</b>的股息，在报告期末企业并无支付义务。这是一个<b>非调整事项(Non-adjusting event)</b>，不应在报告期末确认<b>应付股息负债(Dividend payable liability)</b>。但需要在附注中<b>披露(Disclose)</b>。' },
                    { id: 'ch12-q5-3', src: 'CH12 Q5', en: 'A flood occurring after the year end that destroyed inventory in the warehouse is an adjusting event.', cn: '年末后发生的洪水摧毁了仓库中的存货，这是一个调整事项。', ans: false, key: '期后自然灾害属于非调整事项', exp: '发生在报告期后的<b>洪水(Flood)</b>，其状况（洪水事件本身）是在报告期后才出现的。它不能证明报告期末存货的状况存在问题。因此，这是一个<b>非调整事项(Non-adjusting event)</b>。' },
                    { id: 'ch12-q5-4', src: 'CH12 Q5', en: 'Damage to a building following a storm occurring after the year end is an adjusting event.', cn: '年末后发生的风暴导致建筑物受损是一个调整事项。', ans: false, key: '期后风暴损坏属于非调整事项', exp: '发生在报告期后的<b>风暴(Storm)</b>及其导致的建筑物损坏，其状况是在报告期后才出现的。它不能证明报告期末建筑物的状况存在问题。因此，这是一个<b>非调整事项(Non-adjusting event)</b>。' },

                    // ===== 三、会计处理与披露 =====
                    // Q6 (原题号4) - 单选题: 调整 vs 非调整的报告方式
                    { id: 'ch12-q6-1', src: 'CH12 Q6', en: 'An adjusting event gives rise to a disclosure in the notes, whereas a non-adjusting event does not require any reporting.', cn: '调整事项引起附注中的披露，而非调整事项不需要任何报告。', ans: false, key: '调整事项需调整报表数字而非仅披露', exp: '<b>调整事项(Adjusting event)</b>需要<b>调整(Adjust)</b>财务报表中的金额，而不仅仅是披露。<b>非调整事项(Non-adjusting event)</b>如果<b>重大(Material)</b>也需要在附注中<b>披露(Disclose)</b>。' },
                    { id: 'ch12-q6-2', src: 'CH12 Q6', en: 'Non-adjusting events may be disclosed in the notes, whereas adjusting events require the financial statements to be adjusted.', cn: '非调整事项可能在附注中披露，而调整事项要求调整财务报表。', ans: true, key: '调整事项调整报表非调整事项披露', exp: '这是两者最核心的区别。<b>调整事项(Adjusting event)</b>需要<b>调整(Adjust)</b>财务报表中的金额。<b>非调整事项(Non-adjusting event)</b>不调整报表金额，但如果重大，需要在附注中<b>披露(Disclose)</b>其性质和财务影响的估计。' },
                    { id: 'ch12-q6-3', src: 'CH12 Q6', en: 'An adjusting event is one whose conditions arose after the reporting period, while a non-adjusting event provides further information about conditions existing at the reporting date.', cn: '调整事项是其状况在报告期后才出现的事件，而非调整事项为报告日已存在的状况提供进一步信息。', ans: false, key: '定义说反了', exp: '这个描述把两者的定义说<b>反了</b>。<b>调整事项(Adjusting event)</b>是为报告期末<b>已存在</b>状况提供证据的事件；<b>非调整事项(Non-adjusting event)</b>是其状况在<b>报告期后才出现</b>的事件。' },
                    { id: 'ch12-q6-4', src: 'CH12 Q6', en: 'The distinction between adjusting and non-adjusting events is based on whether their financial impact is material or immaterial.', cn: '调整事项和非调整事项的区别在于其财务影响是否重大。', ans: false, key: '区别在于状况的时间点而非重大性', exp: '调整事项和非调整事项都需要是<b>重大的(Material)</b>才值得关注。它们的区别不在于影响是否重大，而在于其<b>状况(Conditions)</b>是在报告期末已存在还是在报告期后才出现。' },

                    // ===== 四、报告期后宣告的股息 =====
                    // Q7 (原题号7) - 判断题
                    { id: 'ch12-q7-1', src: 'CH12 Q7', en: 'A dividend declared after the reporting period is an event that requires adjustment to the financial statements.', cn: '在报告期后宣告的股息是需要调整财务报表的事件。', ans: false, key: '期后宣告的股息不需调整', exp: '根据<b>IAS 10</b>，在报告期后<b>宣告的股息(Dividend declared)</b>，由于在报告期末企业并无支付该股息的<b>现时义务(Present obligation)</b>，因此它是一个<b>非调整事项(Non-adjusting event)</b>，不需要调整财务报表中的数字。' },
                    { id: 'ch12-q7-2', src: 'CH12 Q7', en: 'A dividend declared after the reporting period requires disclosure in the notes to the financial statements.', cn: '在报告期后宣告的股息需要在财务报表附注中披露。', ans: true, key: '期后股息必须在附注中披露', exp: '虽然报告期后宣告的<b>股息(Dividend)</b>是<b>非调整事项(Non-adjusting event)</b>，但<b>IAS 10</b>明确要求必须在<b>附注(Notes)</b>中<b>披露(Disclose)</b>该股息的总额和每股金额，因为这对报表使用者的决策很重要。' }
                ]
            },

            // ==================== CH13: 资本结构与权益交易 (Capital Structure & Equity Transactions) ====================
            {
                id: 'ch13',
                title: '资本结构与权益交易 (Capital Structure & Equity Transactions)',
                label: 'CH13',
                items: [
                    // ===== 一、资本结构与融资工具的基础 =====
                    // Q1 (原题号24) - 匹配题: 融资工具特征
                    { id: 'ch13-q1-1', src: 'CH13 Q1', en: 'Entitling the holder to a fixed rate of dividend is a unique characteristic of ordinary shares.', cn: '赋予持有人固定股息率的权利是普通股的独特特征。', ans: false, key: '固定股息率是优先股的特征', exp: '<b>固定股息率(Fixed rate of dividend)</b>是<b>优先股(Preference shares)</b>的典型特征，而非<b>普通股(Ordinary shares)</b>。普通股的股息率不固定，取决于公司盈利和董事会决定。' },
                    { id: 'ch13-q1-2', src: 'CH13 Q1', en: 'Entitling the holder to a fixed rate of dividend is a unique characteristic of preference shares.', cn: '赋予持有人固定股息率的权利是优先股的独特特征。', ans: true, key: '固定股息率是优先股的特征', exp: '<b>优先股(Preference shares)</b>通常在发行时就确定了<b>固定股息率(Fixed rate of dividend)</b>，持有人有权按此固定利率获得股息。这是优先股区别于普通股的核心特征之一。' },
                    { id: 'ch13-q1-3', src: 'CH13 Q1', en: 'Entitling the holder to vote on important decisions of a company is a unique characteristic of ordinary shares.', cn: '赋予持有人对公司重要决策投票的权利是普通股的独特特征。', ans: true, key: '投票权是普通股的特征', exp: '<b>投票权(Voting rights)</b>是<b>普通股(Ordinary shares)</b>股东的核心权利。普通股股东可以对公司的重大决策进行投票，如选举董事会成员等。优先股通常没有投票权。' },
                    { id: 'ch13-q1-4', src: 'CH13 Q1', en: 'Loan notes will always be redeemed at a set date in the future.', cn: '贷款票据总是在未来某个确定日期被赎回。', ans: true, key: '贷款票据有确定的到期日', exp: '<b>贷款票据(Loan notes)</b>有明确的<b>到期日(Set date)</b>，公司必须在到期时偿还本金。这是它作为<b>金融负债(Financial liability)</b>的核心特征——公司有在未来偿还本金的<b>合同义务(Contractual obligation)</b>。' },

                    // Q2 (原题号16) - 判断题: 优先股特性
                    { id: 'ch13-q2-1', src: 'CH13 Q2', en: 'Redeemable preference shares are recorded as non-current liabilities.', cn: '可赎回优先股记录为非流动负债。', ans: true, key: '可赎回优先股属于负债', exp: '<b>可赎回优先股(Redeemable preference shares)</b>由于公司有在未来赎回（偿还本金）的<b>合同义务(Contractual obligation)</b>，根据<b>IAS 32</b>，它们在性质上更接近<b>负债(Liability)</b>。如果赎回期限超过一年，则归类为<b>非流动负债(Non-current liabilities)</b>。' },
                    { id: 'ch13-q2-2', src: 'CH13 Q2', en: 'Irredeemable preference shares are a form of debt finance.', cn: '不可赎回优先股是一种债务融资形式。', ans: false, key: '不可赎回优先股属于权益融资', exp: '<b>不可赎回优先股(Irredeemable preference shares)</b>由于公司没有赎回的义务，它们在性质上更接近<b>权益(Equity)</b>。因此，它们通常被视为<b>权益融资(Equity finance)</b>的一种形式，而不是<b>债务融资(Debt finance)</b>。' },
                    { id: 'ch13-q2-3', src: 'CH13 Q2', en: 'Preference shares have a fixed rate of dividend.', cn: '优先股有固定的股息率。', ans: true, key: '优先股股息率固定', exp: '这是<b>优先股(Preference shares)</b>的一个典型特征。<b>股息率(Dividend rate)</b>通常在发行时就已确定，持有人有权按此固定利率获得股息。' },
                    { id: 'ch13-q2-4', src: 'CH13 Q2', en: 'Ordinary shareholders have priority over preference shareholders when dividends are paid.', cn: '支付股息时，普通股股东优先于优先股股东。', ans: false, key: '优先股股息优先于普通股', exp: '恰恰相反。<b>优先股(Preference shares)</b>之所以称为"优先"，其中一个重要方面就是其在<b>股息分配(Dividend distribution)</b>上的优先权。当公司宣布支付股息时，必须首先满足<b>优先股股东</b>的股息要求，之后才能分配给<b>普通股股东(Ordinary shareholders)</b>。' },

                    // Q3 (原题号6) - 多选题: 资本结构
                    { id: 'ch13-q3-1', src: 'CH13 Q3', en: 'Redeemable preference shares are shown as part of equity in the statement of financial position.', cn: '可赎回优先股在财务状况表中显示为权益的一部分。', ans: false, key: '可赎回优先股是负债不是权益', exp: '<b>可赎回优先股(Redeemable preference shares)</b>由于公司有在未来赎回的义务，根据<b>IAS 32</b>，它们通常被分类为<b>金融负债(Financial liability)</b>，而不是<b>权益(Equity)</b>。只有<b>不可赎回优先股(Irredeemable)</b>通常才被分类为权益。' },
                    { id: 'ch13-q3-2', src: 'CH13 Q3', en: 'Loan notes are usually secured on the assets of the company.', cn: '贷款票据通常以公司资产作抵押。', ans: true, key: '贷款票据通常有资产抵押', exp: '<b>贷款票据(Loan notes)</b>常常会附带<b>抵押条款(Security)</b>，即以公司的特定资产（如土地、建筑物）作为偿还贷款的担保。如果公司无法偿还贷款，贷款人有权处置这些<b>抵押资产(Secured assets)</b>以收回欠款。' },
                    { id: 'ch13-q3-3', src: 'CH13 Q3', en: 'Ordinary shareholders must be paid a dividend each year.', cn: '普通股股东每年必须获得股息。', ans: false, key: '普通股股息非强制性', exp: '公司是否向<b>普通股股东(Ordinary shareholders)</b>支付<b>股息(Dividend)</b>以及支付多少，是由<b>董事会(Board of directors)</b>决定的。没有法律规定必须每年支付。如果公司亏损或需要资金再投资，完全可以决定不支付股息。' },
                    { id: 'ch13-q3-4', src: 'CH13 Q3', en: 'Redeemable preference dividends are included under finance costs in the statement of profit or loss.', cn: '可赎回优先股的股息计入利润表的财务费用。', ans: true, key: '可赎回优先股股息属于财务费用', exp: '由于<b>可赎回优先股(Redeemable preference shares)</b>通常被分类为<b>负债(Liability)</b>，支付给这类优先股的股息在性质上更像是<b>利息(Interest)</b>。因此，这些股息通常被作为<b>财务费用(Finance costs)</b>计入<b>利润表(Statement of profit or loss)</b>。' },

                    // ===== 二、权益交易的会计处理 =====
                    // Q8 (原题号5) - 多选题: 红股发行
                    { id: 'ch13-q8-1', src: 'CH13 Q8', en: 'In a bonus issue, both ordinary share capital and share premium may increase.', cn: '在红股发行中，普通股股本和股份溢价都可能增加。', ans: false, key: '红股发行时股份溢价不会增加', exp: '<b>红股发行(Bonus issue)</b>时，<b>普通股股本(Ordinary share capital)</b>会增加（因为发行了新股），但<b>股份溢价(Share premium)</b>通常是用来提供红股发行的资金来源之一，所以它会减少或不变，不可能两者都增加。' },
                    { id: 'ch13-q8-2', src: 'CH13 Q8', en: 'In a bonus issue, ordinary share capital will increase and share premium may decrease.', cn: '在红股发行中，普通股股本将增加，股份溢价可能减少。', ans: true, key: '红股发行增股本减储备', exp: '发行<b>红股(Bonus shares)</b>导致<b>普通股股本(Ordinary share capital)</b>按新发行股份的面值总额增加。如果红股发行是用<b>股份溢价(Share premium)</b>账户的余额来支付的，那么股份溢价就会减少。如果用其他储备支付，则股份溢价不变。' },
                    { id: 'ch13-q8-3', src: 'CH13 Q8', en: 'Retained earnings may be affected by a bonus issue.', cn: '留存收益可能受红股发行的影响。', ans: true, key: '红股可从留存收益中发行', exp: '<b>红股发行(Bonus issue)</b>可以用<b>留存收益(Retained earnings)</b>来支付。在这种情况下，留存收益会减少，同时<b>普通股股本(Ordinary share capital)</b>增加。所以留存收益确实可能受到影响（减少）。' },
                    { id: 'ch13-q8-4', src: 'CH13 Q8', en: 'A bonus issue of shares will increase total equity.', cn: '红股发行将增加总权益。', ans: false, key: '红股发行不改变总权益', exp: '<b>红股发行(Bonus issue)</b>只是公司<b>股东权益(Equity)</b>内部各个项目之间的转换（例如留存收益或股份溢价减少，普通股股本增加）。公司并没有收到新的资金流入，因此<b>股东权益总额(Total equity)</b>保持不变。' },

                    // Q11 (原题号10) - 多选题: 供股的优缺点
                    { id: 'ch13-q11-1', src: 'CH13 Q11', en: 'A disadvantage of a rights issue is that it limits the offer of shares to existing shareholders only.', cn: '供股的一个缺点是它将股份的发行对象仅限于现有股东。', ans: true, key: '供股仅面向现有股东是缺点', exp: '<b>供股(Rights issue)</b>的特点是只向<b>现有股东(Existing shareholders)</b>按其持股比例发行新股。这意味着公司无法吸引新的外部投资者，可能会错失潜在的<b>战略投资者(Strategic investors)</b>或更广泛的资金来源。' },
                    { id: 'ch13-q11-2', src: 'CH13 Q11', en: 'A disadvantage of a rights issue is that shares are offered at a discount, so more shares need to be sold.', cn: '供股的一个缺点是股票以折扣价发行，因此需要出售更多股票。', ans: true, key: '折扣发行导致更大的股权稀释', exp: '为吸引现有股东认购，<b>供股(Rights issue)</b>价格通常低于当前<b>市价(Market price)</b>。以<b>折扣(Discount)</b>价发行需要发行更多股票来筹集相同数额的资金，这会导致更大的<b>股权稀释(Dilution)</b>效应。' },
                    { id: 'ch13-q11-3', src: 'CH13 Q11', en: 'A disadvantage of a rights issue is that the balance of ownership is unchanged if current shareholders use their right to buy shares.', cn: '供股的一个缺点是如果现有股东行使其购买权，所有权结构保持不变。', ans: false, key: '所有权不变是供股的优点', exp: '<b>供股(Rights issue)</b>的一个主要目的是保护现有股东的<b>持股比例(Ownership proportion)</b>。如果所有现有股东都全额认购，他们的持股比例将保持不变。这通常被视为供股的<b>优点(Advantage)</b>，而非缺点。' },
