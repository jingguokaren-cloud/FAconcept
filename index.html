                    { id: 'ch13-q11-4', src: 'CH13 Q11', en: 'A disadvantage of a rights issue is that it is cheaper than an issue of shares to the market place.', cn: '供股的一个缺点是它比向市场公开发行股票更便宜。', ans: false, key: '成本低是供股的优点', exp: '与<b>公开发行(Public offer)</b>相比，<b>供股(Rights issue)</b>的发行成本通常较低，不需要复杂的承销安排和广泛的市场推广。<b>成本较低(Cheaper)</b>是供股的<b>优点(Advantage)</b>，而非缺点。' },

                    // ===== 三、留存收益与会计差错 =====
                    // Q20 (原题号14) - 判断题: 留存收益
                    { id: 'ch13-q20-1', src: 'CH13 Q20', en: 'Retained earnings is included in a company statement of financial position to reflect the increase in net assets that has occurred because the business has made a profit.', cn: '留存收益包含在公司财务状况表中，以反映因企业盈利而发生的净资产增加。', ans: true, key: '留存收益反映盈利带来的净资产增长', exp: '当公司实现盈利时，其<b>净资产(Net assets)</b>会增加。这部分由盈利带来的净资产增加，在权益方就体现为<b>留存收益(Retained earnings)</b>的增加。留存收益是公司历年来累积的未分配给股东的利润。' },
                    { id: 'ch13-q20-2', src: 'CH13 Q20', en: 'Retained earnings is included in the statement of financial position as part of equity as it represents profit owed to the shareholders.', cn: '留存收益作为权益的一部分包含在财务状况表中，因为它代表欠股东的利润。', ans: true, key: '留存收益属于股东权益', exp: '<b>留存收益(Retained earnings)</b>确实是<b>股东权益(Equity)</b>的重要组成部分，代表了公司赚取的、但尚未以<b>股息(Dividend)</b>形式分配给股东的累积利润。股东最终对这部分价值拥有索取权。' },
                    { id: 'ch13-q20-3', src: 'CH13 Q20', en: 'If a company makes a profit each year, its retained earnings in the statement of financial position will decrease each year.', cn: '如果一家公司每年都盈利，其财务状况表中的留存收益每年都会减少。', ans: false, key: '盈利通常增加留存收益', exp: '如果公司每年都盈利，且没有将全部利润作为<b>股息(Dividend)</b>分配出去，<b>留存收益(Retained earnings)</b>通常会<b>增加(Increase)</b>。公式：期末留存收益 = 期初留存收益 + 本期净利润 - 本期分配的股息。只有当分配的股息超过利润，或公司亏损时，留存收益才会减少。' },
                    { id: 'ch13-q20-4', src: 'CH13 Q20', en: 'Retained earnings is a non-distributable reserve so must be shown separately under equity in the statement of financial position.', cn: '留存收益是一种不可分配储备，因此必须在财务状况表的权益项下单列显示。', ans: false, key: '留存收益是可分配储备', exp: '<b>留存收益(Retained earnings)</b>是典型的<b>可分配储备(Distributable reserve)</b>，公司可以从中支付股息。<b>不可分配储备(Non-distributable reserve)</b>的例子包括<b>重估储备(Revaluation surplus)</b>或<b>股份溢价(Share premium)</b>。' },

                    // Q21 (原题号12) - 单选题: 会计差错影响
                    { id: 'ch13-q21-1', src: 'CH13 Q21', ctx: 'An accountant has posted an interest charge to other income instead of finance costs. The other side of the double entry to the bank account was correctly posted.', en: 'This error has no impact on either net assets or net profit.', cn: '这个错误对净资产和净利润均无影响。', ans: true, key: '利润表内分类错误不影响净利润', exp: '此错误导致<b>财务费用(Finance costs)</b>少记（利润倾向增加），同时<b>其他收入(Other income)</b>也少记（利润倾向减少），两个影响相互抵消。<b>净利润(Net profit)</b>不受影响。银行账户正确记录，所以<b>净资产(Net assets)</b>也不受影响。' },
                    { id: 'ch13-q21-2', src: 'CH13 Q21', ctx: 'An accountant has posted an interest charge to other income instead of finance costs. The other side of the double entry to the bank account was correctly posted.', en: 'This error will cause profit before interest and tax to be too high.', cn: '这个错误将导致息税前利润偏高。', ans: false, key: '其他收入被减少导致息税前利润偏低', exp: '<b>利息费用</b>被错误地借记到<b>其他收入(Other income)</b>，导致其他收入被减少。由于<b>息税前利润(PBIT)</b>的计算包含其他收入但不扣除财务费用，其他收入减少会导致PBIT偏<b>低(Too low)</b>而非偏高。' },
                    { id: 'ch13-q21-3', src: 'CH13 Q21', ctx: 'An accountant has posted an interest charge to other income instead of finance costs. The other side of the double entry to the bank account was correctly posted.', en: 'This error has no impact on net assets but net profit will be too low.', cn: '这个错误对净资产无影响，但净利润会偏低。', ans: false, key: '净利润不受影响', exp: '<b>财务费用(Finance costs)</b>少记使利润倾向增加，<b>其他收入(Other income)</b>少记使利润倾向减少，两者完全抵消。因此<b>净利润(Net profit)</b>不受影响，不是偏低。' },

                    // ===== 四、财务报表的综合列报 =====
                    // Q22 (原题号18) - 单选题: TCI构成
                    { id: 'ch13-q22-1', src: 'CH13 Q22', en: 'A gain on revaluation of property should be included in the calculation of total comprehensive income for the year.', cn: '财产重估增值应包含在年度总综合收益的计算中。', ans: true, key: '重估增值属于其他综合收益', exp: '<b>财产重估增值(Gain on revaluation)</b>通常计入<b>其他综合收益(OCI)</b>。<b>总综合收益(TCI)</b> = 净利润 + OCI，因此重估增值是TCI的一部分。' },
                    { id: 'ch13-q22-2', src: 'CH13 Q22', en: 'An interest charge on long-term borrowings should be included in the calculation of total comprehensive income for the year.', cn: '长期借款的利息费用应包含在年度总综合收益的计算中。', ans: true, key: '利息费用通过净利润进入总综合收益', exp: '<b>长期借款利息费用(Interest charge)</b>计入<b>利润表(Statement of profit or loss)</b>计算<b>净利润(Net profit)</b>，净利润是<b>总综合收益(TCI)</b>的一部分。因此利息费用间接包含在TCI的计算中。' },
                    { id: 'ch13-q22-3', src: 'CH13 Q22', en: 'Dividends paid to equity shareholders should be included in the calculation of total comprehensive income for the year.', cn: '支付给权益股东的股息应包含在年度总综合收益的计算中。', ans: false, key: '股息支付不影响总综合收益', exp: '<b>股息支付(Dividends paid)</b>是<b>利润的分配(Distribution of profit)</b>，不是费用或收入。它不影响<b>总综合收益(TCI)</b>的计算。TCI只包括<b>净利润(Profit or loss)</b>和<b>其他综合收益(OCI)</b>。' },

                    // Q24 (原题号3) - 判断题: SOCIE构成
                    { id: 'ch13-q24-1', src: 'CH13 Q24', en: 'An upward revaluation of land will be included as a component in the statement of changes in equity.', cn: '土地增值重估将作为构成部分包含在股东权益变动表中。', ans: true, key: '重估增值在权益变动表中反映', exp: '土地的<b>增值重估(Upward revaluation)</b>会产生<b>重估储备(Revaluation surplus)</b>，这是<b>股东权益(Equity)</b>的一个组成部分。这个增值通过<b>其他综合收益(OCI)</b>确认，并在<b>权益变动表(SOCIE)</b>中列示。' },
                    { id: 'ch13-q24-2', src: 'CH13 Q24', en: 'Redeemable preference dividend will be included as a component in the statement of changes in equity.', cn: '可赎回优先股股息将作为构成部分包含在股东权益变动表中。', ans: false, key: '可赎回优先股股息不在权益变动表', exp: '<b>可赎回优先股(Redeemable preference shares)</b>通常被视为<b>负债(Liability)</b>，其股息通常被视为<b>财务费用(Finance cost)</b>，计入<b>利润表(Statement of profit or loss)</b>。它不是<b>权益变动表(SOCIE)</b>中直接列示的权益变动项目。' },
                    { id: 'ch13-q24-3', src: 'CH13 Q24', en: 'Profit for the year will be included as a component in the statement of changes in equity.', cn: '年度利润将作为构成部分包含在股东权益变动表中。', ans: true, key: '年度利润是权益变动表核心内容', exp: '<b>年度利润(Profit for the year)</b>直接增加<b>留存收益(Retained earnings)</b>，而留存收益是<b>股东权益(Equity)</b>的核心组成部分。<b>权益变动表(SOCIE)</b>会明确列示本期利润对留存收益的影响。' },
                    { id: 'ch13-q24-4', src: 'CH13 Q24', en: 'An issue of ordinary shares will be included as a component in the statement of changes in equity.', cn: '发行普通股将作为构成部分包含在股东权益变动表中。', ans: true, key: '发行股票在权益变动表中反映', exp: '发行<b>普通股(Ordinary shares)</b>直接导致<b>股本(Share capital)</b>增加，可能还有<b>股份溢价(Share premium)</b>增加。这些都是<b>股东权益(Equity)</b>的组成部分，其变动会在<b>权益变动表(SOCIE)</b>中反映。' },

                    // Q25 (原题号25) - 匹配题: SOCIE行项目
                    { id: 'ch13-q25-1', src: 'CH13 Q25', en: 'Dividends on redeemable preference shares will be included as a line in the statement of changes in equity.', cn: '可赎回优先股的股息将作为权益变动表中的一个行项目。', ans: false, key: '可赎回优先股股息是财务费用', exp: '<b>可赎回优先股股息(Redeemable preference dividends)</b>通常视为<b>财务费用(Finance cost)</b>，计入<b>利润表(P/L)</b>，不直接在<b>权益变动表(SOCIE)</b>中作为独立行项目列示。' },
                    { id: 'ch13-q25-2', src: 'CH13 Q25', en: 'Dividends paid on equity shares will be included as a line in the statement of changes in equity.', cn: '支付给权益股（普通股）的股息将作为权益变动表中的一个行项目。', ans: true, key: '普通股股息在权益变动表列示', exp: '<b>普通股股息(Equity dividends)</b>是<b>利润分配(Distribution)</b>，减少<b>留存收益(Retained earnings)</b>。它在<b>权益变动表(SOCIE)</b>中作为独立行项目列示。' },
                    { id: 'ch13-q25-3', src: 'CH13 Q25', en: 'Principal borrowed from banks will be included as a line in the statement of changes in equity.', cn: '从银行借入的本金将作为权益变动表中的一个行项目。', ans: false, key: '银行借款影响负债不影响权益', exp: '<b>银行借款(Bank borrowings)</b>影响的是<b>资产(Assets)</b>和<b>负债(Liabilities)</b>，不直接影响<b>权益变动表(SOCIE)</b>的行项目。借款增加了负债，而非权益。' },
                    { id: 'ch13-q25-4', src: 'CH13 Q25', en: 'Profit for the year will be included as a line in the statement of changes in equity.', cn: '年度利润将作为权益变动表中的一个行项目。', ans: true, key: '年度利润是权益变动表核心行项目', exp: '<b>年度利润(Profit for the year)</b>直接影响<b>留存收益(Retained earnings)</b>，是<b>权益变动表(SOCIE)</b>的核心内容，作为独立行项目列示。' },
                    { id: 'ch13-q25-5', src: 'CH13 Q25', en: 'Interest paid on bank borrowings will be included as a line in the statement of changes in equity.', cn: '支付的银行借款利息将作为权益变动表中的一个行项目。', ans: false, key: '借款利息是财务费用不在权益变动表', exp: '<b>银行借款利息(Interest on borrowings)</b>是<b>财务费用(Finance cost)</b>，计入<b>利润表(P/L)</b>，影响年度利润。但利息本身不作为<b>权益变动表(SOCIE)</b>的单独行项目列示。' }
                ]
            }
        ];


        // ==================== 状态管理 ====================
        const STORAGE_KEY = 'sh01-tf-progress';
        const ANSWER_KEY = 'sh01-tf-answers';
        let cardProgress = {};
        let userAnswers = {}; // {itemId: true/false}
        let currentChapter = 'all';
        let currentFilter = 'all';

        function loadProgress() {
            try {
                const s1 = localStorage.getItem(STORAGE_KEY);
                if (s1) cardProgress = JSON.parse(s1);
                const s2 = localStorage.getItem(ANSWER_KEY);
                if (s2) userAnswers = JSON.parse(s2);
            } catch (e) { }
        }
        function saveProgress() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(cardProgress));
                localStorage.setItem(ANSWER_KEY, JSON.stringify(userAnswers));
            } catch (e) { }
        }

        // ==================== 数据查询 ====================
        function getAllItems() {
            let items = [];
            sections.forEach(sec => {
                sec.items.forEach(item => {
                    items.push({ ...item, sectionId: sec.id, sectionTitle: sec.title, sectionLabel: sec.label });
                });
            });
            return items;
        }

        function getFilteredItems() {
            let items = getAllItems();
            if (currentChapter !== 'all') {
                items = items.filter(i => i.sectionLabel === currentChapter);
            }
            if (currentFilter === 'mastered') {
                items = items.filter(i => cardProgress[i.id] === 'mastered');
            } else if (currentFilter === 'not-mastered') {
                items = items.filter(i => cardProgress[i.id] === 'not-mastered');
            } else if (currentFilter === 'unmarked') {
                items = items.filter(i => !cardProgress[i.id]);
            }
            return items;
        }

        // ==================== 渲染 ====================
        function initChapterButtons() {
            const grid = document.getElementById('chapterGrid');
            grid.innerHTML = '<button class="chapter-btn active" data-sec="all">全部 Chapters</button>';

            // 提取所有不重复的 Chapter 标签
            const uniqueLabels = [...new Set(sections.map(s => s.label))];
            uniqueLabels.forEach(label => {
                if (!label) return;
                const btn = document.createElement('button');
                btn.className = 'chapter-btn';
                btn.dataset.sec = label;
                btn.textContent = label;
                grid.appendChild(btn);
            });

            grid.querySelectorAll('.chapter-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    grid.querySelectorAll('.chapter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentChapter = this.dataset.sec;
                    renderCards();
                    updateStats();
                });
            });
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            const items = getFilteredItems();

            if (items.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>暂无题目</h3><p>当前筛选条件下没有题目，请调整筛选条件</p></div>';
                return;
            }

            container.innerHTML = items.map((item, idx) => createCardHTML(item, idx + 1)).join('');
        }

        function createCardHTML(item, displayNum) {
            const status = cardProgress[item.id];
            const statusClass = status || '';
            const statusBadge = status === 'mastered'
                ? '<span class="card-status mastered">已掌握</span>'
                : status === 'not-mastered'
                    ? '<span class="card-status not-mastered">未掌握</span>'
                    : '';

            const userAns = userAnswers[item.id];
            const hasAnswered = userAns !== undefined;
            const isCorrect = hasAnswered && (userAns === item.ans);

            const contextHTML = item.ctx
                ? `<div class="card-context">${item.ctx}</div>`
                : '';

            // T/F 按钮状态
            let trueBtnClass = 'tf-btn btn-true';
            let falseBtnClass = 'tf-btn btn-false';
            let disabled = '';

            if (hasAnswered) {
                disabled = 'disabled';
                if (userAns === true) {
                    trueBtnClass += item.ans === true ? ' selected-correct' : ' selected-wrong';
                    if (item.ans === false) falseBtnClass += ' correct-highlight';
                } else {
                    falseBtnClass += item.ans === false ? ' selected-correct' : ' selected-wrong';
                    if (item.ans === true) trueBtnClass += ' correct-highlight';
                }
            }

            // 答错后的额外class
            let cardExtraClass = '';
            let resultLine = '';
            if (hasAnswered) {
                cardExtraClass = isCorrect ? 'answered-correct' : 'answered-wrong';
                resultLine = isCorrect
                    ? '<div class="answer-line" style="color:#166534;font-weight:bold;font-size:1.05em;border-bottom:1px solid #cbd5e1;padding-bottom:8px;margin-bottom:10px;">✅ 回答正确</div>'
                    : '<div class="answer-line" style="color:#991b1b;font-weight:bold;font-size:1.05em;border-bottom:1px solid #cbd5e1;padding-bottom:8px;margin-bottom:10px;">❌ 回答错误</div>';
            }

            // 考点只保留中文（取 | 后面的部分）
            const keyText = item.key.includes('|') ? item.key.split('|').pop().trim() : item.key;

            return `
        <div class="card ${statusClass} ${cardExtraClass}" data-id="${item.id}">
            <div class="card-header">
                <div class="card-tags">
                    <span class="card-section-tag">${item.sectionLabel}</span>
                    <span class="card-source">${item.src}</span>
                    ${statusBadge}
                </div>
                <span class="card-number">#${displayNum}</span>
            </div>
            ${contextHTML}
            <div class="card-statement">${item.en}</div>
            <div class="tf-buttons">
                <button class="${trueBtnClass}" ${disabled} onclick="submitAnswer('${item.id}', true)">T</button>
                <button class="${falseBtnClass}" ${disabled} onclick="submitAnswer('${item.id}', false)">F</button>
            </div>
            <div class="answer-panel ${hasAnswered ? 'show' : ''}" id="answer-${item.id}">
                ${resultLine}
                <div class="answer-line"><span class="answer-label">答案：</span><span class="${item.ans ? 'answer-correct' : 'answer-wrong'}">${item.ans ? '对 (T)' : '错 (F)'}</span></div>
                <div class="answer-line"><span class="answer-label">翻译：</span>${item.cn}</div>
                <div class="answer-line"><span class="answer-label">考点：</span><span class="answer-keypoint">${keyText}</span></div>
                <div class="answer-line"><span class="answer-label">解析：</span>${item.exp}</div>
            </div>
            <div class="mastery-buttons ${hasAnswered ? 'show' : ''}" id="mastery-${item.id}">
                <button class="btn btn-mastered ${status === 'mastered' ? 'is-mastered' : ''}" onclick="markCard('${item.id}', 'mastered')">
                    <span>${status === 'mastered' ? '✓' : '☐'}</span> 已掌握
                </button>
                <button class="btn btn-not-mastered ${status === 'not-mastered' ? 'is-not-mastered' : ''}" onclick="markCard('${item.id}', 'not-mastered')">
                    <span>${status === 'not-mastered' ? '!' : '☐'}</span> 未掌握
                </button>
                <button class="btn btn-retry" onclick="retryItem('${item.id}')">
                    <span>🔄</span> 重做
                </button>
            </div>
        </div>
    `;
        }

        function updateStats() {
            let baseItems = getAllItems();
            if (currentChapter !== 'all') {
                baseItems = baseItems.filter(i => i.sectionLabel === currentChapter);
            }

            const mastered = baseItems.filter(i => cardProgress[i.id] === 'mastered').length;
            const notMastered = baseItems.filter(i => cardProgress[i.id] === 'not-mastered').length;
            const unmarked = baseItems.filter(i => !cardProgress[i.id]).length;
            const showing = getFilteredItems().length;

            const correctCount = baseItems.filter(i => userAnswers[i.id] !== undefined && userAnswers[i.id] === i.ans).length;
            const wrongCount = baseItems.filter(i => userAnswers[i.id] !== undefined && userAnswers[i.id] !== i.ans).length;

            document.getElementById('masteredCount').textContent = mastered;
            document.getElementById('notMasteredCount').textContent = notMastered;
            document.getElementById('showingCount').textContent = showing;
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('wrongCount').textContent = wrongCount;

            document.getElementById('fAll').textContent = baseItems.length;
            document.getElementById('fMas').textContent = mastered;
            document.getElementById('fNot').textContent = notMastered;
            document.getElementById('fUnm').textContent = unmarked;

            const total = baseItems.length;
            const pct = total > 0 ? (mastered / total) * 100 : 0;
            document.getElementById('progressFill').style.width = pct + '%';

            document.getElementById('totalItemCount').textContent = getAllItems().length;
        }

        // ==================== 交互 ====================
        function submitAnswer(id, answer) {
            userAnswers[id] = answer;
            saveProgress();
            renderCards();
            updateStats();

            // 滚动到答案区域
            setTimeout(() => {
                const panel = document.getElementById('answer-' + id);
                if (panel) {
                    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }, 100);
        }

        function markCard(id, status) {
            if (cardProgress[id] === status) {
                delete cardProgress[id];
            } else {
                cardProgress[id] = status;
            }
            saveProgress();
            renderCards();
            updateStats();
        }

        function retryItem(id) {
            delete userAnswers[id];
            saveProgress();
            renderCards();
            updateStats();
        }

        function resetAllAnswers() {
            if (confirm('确定要重做所有题目吗？掌握状态不会被清除。')) {
                userAnswers = {};
                saveProgress();
                renderCards();
                updateStats();
            }
        }

        function resetProgress() {
            if (confirm('确定要重置所有掌握状态吗？此操作不可撤销。')) {
                cardProgress = {};
                userAnswers = {};
                saveProgress();
                renderCards();
                updateStats();
            }
        }

        let isExpandedAll = false;

        function toggleExpandAll() {
            isExpandedAll = !isExpandedAll;
            const btn = document.getElementById('expandAllBtn');

            if (isExpandedAll) {
                btn.textContent = '📕 一键收起';
                btn.style.background = 'linear-gradient(135deg,#ef4444,#dc2626)';
                // Reveal all answer panels and mastery buttons
                document.querySelectorAll('.answer-panel').forEach(p => p.classList.add('show'));
                document.querySelectorAll('.mastery-buttons').forEach(p => p.classList.add('show'));
                // Mark T/F buttons with correct answer highlight (without recording user answers)
                const items = getFilteredItems();
                items.forEach(item => {
                    if (userAnswers[item.id] === undefined) {
                        const card = document.querySelector(`.card[data-id="${item.id}"]`);
                        if (card) {
                            const trueBtn = card.querySelector('.btn-true');
                            const falseBtn = card.querySelector('.btn-false');
                            if (item.ans === true && trueBtn) trueBtn.classList.add('correct-highlight');
                            if (item.ans === false && falseBtn) falseBtn.classList.add('correct-highlight');
                        }
                    }
                });
            } else {
                btn.textContent = '📖 一键展开';
                btn.style.background = 'linear-gradient(135deg,#f59e0b,#d97706)';
                // Hide ALL answer panels and mastery buttons
                document.querySelectorAll('.answer-panel').forEach(p => p.classList.remove('show'));
                document.querySelectorAll('.mastery-buttons').forEach(p => p.classList.remove('show'));
                document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('correct-highlight'));
            }
        }

        // ==================== 初始化 ====================
        function init() {
            loadProgress();
            initChapterButtons();
            renderCards();
            updateStats();

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    renderCards();
                    updateStats();
                });
            });
        }

        init();
    </script>
</body>

</html>
