                    { id: 'ch17-q15-3', src: 'CH17 Q15', en: 'Share capital in a consolidated statement of financial position includes the share capital of both the parent and the subsidiary.', cn: '合并财务状况表中的股本包括母公司和子公司的股本。', ans: false, key: '合并股本仅为母公司', exp: '合并财务状况表中的<b>股本(share capital)</b>仅包括<b>母公司(parent)</b>的股本。子公司的股本在合并过程中会被<b>抵销(eliminated)</b>。' },

                    // Q16 (原题号24) - 判断题组合: 合并SFP金额
                    { id: 'ch17-q16-1', src: 'CH17 Q16', en: 'Consolidated current assets equal the current assets of the parent plus the group share of current assets of the subsidiary.', cn: '合并流动资产等于母公司流动资产加上集团所占子公司流动资产份额。', ans: false, key: '子公司资产100%全额合并非按比例', exp: '在合并财务报表中，子公司的资产（包括<b>流动资产(current assets)</b>）和负债应<b>100%</b>全额与母公司逐行合并，不应只按集团持股比例合并。母公司对子公司拥有<b>控制权(control)</b>，控制其全部资产。' },
                    { id: 'ch17-q16-2', src: 'CH17 Q16', en: 'Share capital in the consolidated statement of financial position equals share capital of parent plus share capital of subsidiary.', cn: '合并财务状况表中的股本等于母公司股本加上子公司股本。', ans: false, key: '合并股本仅为母公司股本', exp: '合并财务状况表中的<b>股本(share capital)</b>仅反映<b>母公司(parent)</b>的股本金额。<b>子公司(subsidiary)</b>的股本在合并过程中已被<b>抵销(eliminated)</b>。' },

                    // Q18 (原题号14) - 单选题: 商誉的列报位置
                    { id: 'ch17-q18-1', src: 'CH17 Q18', en: 'Goodwill would be found under tangible non-current assets in the consolidated statement of financial position.', cn: '在合并财务状况表中，商誉归类于有形非流动资产。', ans: false, key: '商誉无实物形态不是有形资产', exp: '<b>商誉(Goodwill)</b>没有<b>实物形态(physical substance)</b>，因此它不是<b>有形资产(tangible asset)</b>。它应归类为<b>无形非流动资产(intangible non-current asset)</b>。' },
                    { id: 'ch17-q18-2', src: 'CH17 Q18', en: 'Goodwill would be found under intangible non-current assets in the consolidated statement of financial position.', cn: '在合并财务状况表中，商誉归类于无形非流动资产。', ans: true, key: '商誉是无形非流动资产', exp: '<b>商誉(Goodwill)</b>没有实物形态且预期使用寿命超过一个会计年度，因此被归类为<b>无形非流动资产(intangible non-current asset)</b>。' },
                    { id: 'ch17-q18-3', src: 'CH17 Q18', en: 'Goodwill would be found under current assets in the consolidated statement of financial position.', cn: '在合并财务状况表中，商誉归类于流动资产。', ans: false, key: '商誉是长期资产非流动资产', exp: '<b>商誉(Goodwill)</b>的预期使用寿命超过一个会计年度（12个月），因此它是一项<b>非流动资产(non-current asset)</b>，不属于<b>流动资产(current assets)</b>。' },
                    { id: 'ch17-q18-4', src: 'CH17 Q18', en: 'Goodwill would be found under equity in the consolidated statement of financial position.', cn: '在合并财务状况表中，商誉归类于权益。', ans: false, key: '商誉是资产非权益', exp: '<b>商誉(Goodwill)</b>是一项<b>资产(asset)</b>，代表未来经济利益。<b>权益(equity)</b>代表的是所有者对企业净资产的<b>要求权(residual interest)</b>，与商誉性质不同。' },

                    // Q19 (原题号15) - 单选题: NCI的列报位置
                    { id: 'ch17-q19-1', src: 'CH17 Q19', en: 'Non-controlling interests would be found in equity after ordinary share capital but before retained earnings.', cn: '非控制性权益在权益部分，位于普通股股本之后但在留存收益之前。', ans: false, key: 'NCI在母公司权益小计之后', exp: '<b>非控制性权益(NCI)</b>应在合并权益部分中，先列示完归属于<b>母公司所有者(parent\'s equity)</b>的所有项目并计出小计后，再单独列示。不应穿插在母公司权益的中间。' },
                    { id: 'ch17-q19-2', src: 'CH17 Q19', en: 'Non-controlling interests would be found in equity after retained earnings but before the subtotal for parent\'s equity.', cn: '非控制性权益在权益部分，位于留存收益之后但在母公司权益小计之前。', ans: false, key: 'NCI在母公司权益小计之后而非之前', exp: '<b>NCI</b>应在<b>母公司权益小计(subtotal for parent\'s equity)</b>之后列示，以清晰区分归属于母公司所有者和归属于NCI的部分。' },
                    { id: 'ch17-q19-3', src: 'CH17 Q19', en: 'Non-controlling interests would be found in equity after retained earnings and after the subtotal for parent\'s equity.', cn: '非控制性权益在权益部分，位于留存收益之后且在母公司权益小计之后。', ans: true, key: 'NCI在母公司权益小计之后单独列示', exp: '在合并财务状况表的权益部分，通常会先列示归属于<b>母公司所有者(parent\'s owners)</b>的权益（包括股本、留存收益等），然后计出<b>母公司权益小计(subtotal)</b>，最后再单独列示<b>非控制性权益(NCI)</b>。' },
                    { id: 'ch17-q19-4', src: 'CH17 Q19', en: 'Non-controlling interests would be found under non-current liabilities in the consolidated statement of financial position.', cn: '非控制性权益在合并财务状况表的非流动负债项下。', ans: false, key: 'NCI是权益而非负债', exp: '<b>非控制性权益(NCI)</b>代表外部股东对子公司净资产的<b>要求权(claim)</b>，是<b>权益(equity)</b>的一部分，而不是<b>负债(liabilities)</b>。' },

                    // Q20 (原题号89) - 单选题: 不出现在权益部分的项目
                    { id: 'ch17-q20-1', src: 'CH17 Q20', en: 'Parent\'s share capital will NOT appear in the equity section of a consolidated statement of financial position.', cn: '母公司股本不会出现在合并财务状况表的权益部分。', ans: false, key: '母公司股本是合并权益核心', exp: '<b>母公司股本(Parent\'s share capital)</b>是合并<b>权益(equity)</b>的核心组成部分，会出现在合并财务状况表的权益部分。' },
                    { id: 'ch17-q20-2', src: 'CH17 Q20', en: 'Goodwill on acquisition will NOT appear in the equity section of a consolidated statement of financial position.', cn: '收购产生的商誉不会出现在合并财务状况表的权益部分。', ans: true, key: '商誉是无形资产列在资产部分', exp: '<b>商誉(Goodwill on acquisition)</b>是一项<b>无形资产(intangible asset)</b>，应在合并财务状况表的<b>资产(assets)</b>部分（通常是非流动资产）列示，而不是<b>权益(equity)</b>部分。' },
                    { id: 'ch17-q20-3', src: 'CH17 Q20', en: 'Non-controlling interest will NOT appear in the equity section of a consolidated statement of financial position.', cn: '非控制性权益不会出现在合并财务状况表的权益部分。', ans: false, key: 'NCI在权益部分单独列示', exp: '<b>非控制性权益(NCI)</b>代表外部股东在子公司净资产中的权益，在合并<b>权益(equity)</b>部分<b>单独列示(separately presented)</b>。' },
                    { id: 'ch17-q20-4', src: 'CH17 Q20', en: 'Revaluation surplus will NOT appear in the equity section of a consolidated statement of financial position.', cn: '重估盈余不会出现在合并财务状况表的权益部分。', ans: false, key: '重估盈余是权益组成部分', exp: '<b>重估盈余(Revaluation surplus)</b>是<b>其他综合收益(OCI)</b>的累积额，作为<b>权益(equity)</b>的一部分列示在合并财务状况表中。' },

                    // ===== 三、购买对价与公允价值调整（概念部分） =====
                    // Q22 (原题号25) - 判断题组合: 对价形式
                    { id: 'ch17-q22-1', src: 'CH17 Q22', en: 'Shares can be used as a form of consideration to purchase shares in another company.', cn: '股份可以用作购买另一家公司股份的对价形式。', ans: true, key: '以股换股是常见对价形式', exp: '<b>股份交换(Share exchange)</b>是购买另一公司股份的常见<b>对价(consideration)</b>形式，按母公司<b>收购日(acquisition date)</b>发行股份的<b>公允价值(fair value)</b>计量。' },
                    { id: 'ch17-q22-2', src: 'CH17 Q22', en: 'A combination of cash and shares can be used as a form of consideration to purchase shares in another company.', cn: '现金和股份的组合可以用作购买另一家公司股份的对价形式。', ans: true, key: '现金加股份组合是常见对价形式', exp: '购买对价可以采取多种形式，<b>现金和股份的组合(combination of cash and shares)</b>是最常见的对价形式之一，两部分均需按<b>收购日公允价值(fair value at acquisition date)</b>计量。' },
                    { id: 'ch17-q22-3', src: 'CH17 Q22', en: 'Tangible non-current assets, such as land and buildings, can be used as a form of consideration to purchase shares in another company.', cn: '有形非流动资产，如土地和建筑物，可以用作购买另一家公司股份的对价形式。', ans: true, key: '非现金资产也可作为对价', exp: '对价也可以是<b>其他资产(non-cash assets)</b>，如<b>土地和建筑物(land and buildings)</b>，只要这些资产具有可确定的<b>公允价值(fair value)</b>，就可以用作交换股份的对价。' },
                    { id: 'ch17-q22-4', src: 'CH17 Q22', en: 'Skilled labour can be used as a form of consideration to purchase shares in another company.', cn: '熟练劳动力可以用作购买另一家公司股份的对价形式。', ans: false, key: '劳动力无法可靠计量公允价值', exp: '<b>熟练劳动力(Skilled labour)</b>通常没有一个易于确定的、可靠的<b>公允价值(fair value)</b>，并且不符合<b>可辨认资产(identifiable asset)</b>的定义，难以作为<b>对价(consideration)</b>转移。' },

                    // Q25 (原题号7) - 判断题组合: 公允价值调整
                    { id: 'ch17-q25-1', src: 'CH17 Q25', en: 'Fair value adjustment for land and buildings will affect goodwill.', cn: '土地和建筑物的公允价值调整会影响商誉。', ans: true, key: '公允价值调整改变净资产从而影响商誉', exp: '<b>商誉(Goodwill)</b>的计算是购买对价加NCI公允价值减去子公司收购日可辨认<b>净资产的公允价值(FV of net assets)</b>。如果土地和建筑物的公允价值不同于其账面价值，<b>公允价值调整(fair value adjustment)</b>会改变净资产总额，从而直接<b>影响商誉(affect goodwill)</b>。' },
                    { id: 'ch17-q25-2', src: 'CH17 Q25', en: 'A subsidiary\'s tangible non-current assets are included at carrying amount in the consolidated statement of financial position.', cn: '子公司的有形非流动资产在合并财务状况表中按账面金额列示。', ans: false, key: '按收购日公允价值而非账面价值列示', exp: '根据<b>IFRS 3</b>，在企业合并中，子公司的可辨认资产和负债应按其在收购日的<b>公允价值(fair value)</b>进行计量并入合并财务报表。因此应以<b>公允价值(fair value)</b>而非<b>账面金额(carrying amount)</b>反映。' },

                    // Q26 (原题号30) - 判断题组合: 公允价值调整对商誉的影响
                    { id: 'ch17-q26-1', src: 'CH17 Q26', ctx: 'When a parent purchased a subsidiary, the subsidiary\'s land and buildings had a fair value higher than the carrying amount.', en: 'The carrying amount of land and buildings should be increased to reflect its fair value in the consolidated statement of financial position.', cn: '在合并财务状况表中，土地和建筑物的账面金额应增加以反映其公允价值。', ans: true, key: '合并报表中按公允价值调增', exp: '企业合并时，子公司的<b>可辨认资产(identifiable assets)</b>应按收购日的<b>公允价值(fair value)</b>计量。如果公允价值高于<b>账面价值(carrying amount)</b>，应<b>调增(increased)</b>至公允价值在合并报表中反映。' },
                    { id: 'ch17-q26-2', src: 'CH17 Q26', ctx: 'When a parent purchased a subsidiary, the subsidiary\'s land and buildings had a fair value higher than the carrying amount.', en: 'Goodwill will not be affected by the increase in fair value of land and buildings.', cn: '商誉不会受到土地和建筑物公允价值增加的影响。', ans: false, key: '公允价值调整直接影响商誉', exp: '土地和建筑物公允价值的增加会导致子公司可辨认<b>净资产的公允价值(FV of net assets)</b>增加。在投资成本不变的情况下，净资产公允价值的增加通常会导致<b>商誉(Goodwill)</b>的<b>减少(decrease)</b>。' },

                    // Q27 (原题号68) - 判断题组合: 商誉计算规则
                    { id: 'ch17-q27-1', src: 'CH17 Q27', en: 'The fair-value adjustment on non-current assets is only used when calculating goodwill. It does not affect the value of non-current assets in the consolidated SOFP.', cn: '非流动资产的公允价值调整仅在计算商誉时使用，不影响合并财务状况表中非流动资产的价值。', ans: false, key: '公允价值调整同时影响商誉和资产列报', exp: '<b>公允价值调整(Fair value adjustment)</b>不仅用于计算<b>商誉(goodwill)</b>时确定净资产的公允价值，同时调整后的公允价值也应作为这些<b>非流动资产(non-current assets)</b>在合并财务状况表中的<b>入账基础(initial basis)</b>。' },
                    { id: 'ch17-q27-2', src: 'CH17 Q27', en: 'If shares of the parent are used as payment for the subsidiary, the fair value of the shares used in the goodwill calculation is the market price of the shares at the date of acquisition.', cn: '如果母公司的股份被用作支付子公司的对价，商誉计算中使用的股份公允价值是收购日股份的市场价格。', ans: true, key: '以股换股按收购日市价计量', exp: '当以发行股份作为<b>购买对价(consideration)</b>时，应按<b>收购日(date of acquisition)</b>母公司股份的<b>公允价值(fair value)</b>（通常是<b>市场价格(market price)</b>）计量这部分对价。' },

                    // ===== 四、商誉组成概念 =====
                    // Q28 (原题号5) - 复合题: 商誉计算包含的项目
                    { id: 'ch17-q28-1', src: 'CH17 Q28', en: 'Fair value of NCI at the reporting date is included within the calculation of goodwill.', cn: '非控制性权益在报告日的公允价值包含在商誉的计算中。', ans: false, key: '商誉用收购日NCI而非报告日', exp: '<b>商誉(Goodwill)</b>计算使用的是<b>收购日(date of acquisition)</b>的非控制性权益公允价值，而非<b>报告日(reporting date)</b>的价值。商誉在收购日确定，此后不再因NCI价值变动而调整。' },
                    { id: 'ch17-q28-2', src: 'CH17 Q28', en: 'Fair value of the consideration given to purchase the subsidiary is included within the calculation of goodwill.', cn: '为购买子公司所支付对价的公允价值包含在商誉的计算中。', ans: true, key: '购买对价是商誉计算的核心组成', exp: '<b>购买对价的公允价值(Fair value of consideration)</b>是<b>商誉(Goodwill)</b>计算公式的核心组成部分：商誉 = 购买对价 + 收购日NCI公允价值 - 收购日子公司可辨认净资产公允价值。' },
                    { id: 'ch17-q28-3', src: 'CH17 Q28', en: 'Fair value of the net assets of the subsidiary at the date of acquisition is included within the calculation of goodwill.', cn: '子公司在收购日的净资产公允价值包含在商誉的计算中。', ans: true, key: '收购日净资产公允价值是被减项', exp: '<b>收购日子公司可辨认净资产的公允价值(FV of net assets at acquisition)</b>是商誉计算中的<b>被减项(deducted)</b>。它代表了投资者实际获得的可辨认资源的价值。' },
                    { id: 'ch17-q28-4', src: 'CH17 Q28', en: 'Carrying amount of the net assets of the subsidiary at the date of acquisition is included within the calculation of goodwill.', cn: '子公司在收购日的净资产账面金额包含在商誉的计算中。', ans: false, key: '必须用公允价值而非账面价值', exp: '计算<b>商誉(Goodwill)</b>时必须使用净资产的<b>公允价值(fair value)</b>，而非<b>账面价值(carrying amount)</b>。账面价值可能与公允价值存在差异，使用账面价值会导致商誉计算不准确。' },

                    // ===== 五、非控制性权益 (NCI) 概念 =====
                    // Q40 (原题号28) - 判断题组合: NCI的列报与计算
                    { id: 'ch17-q40-1', src: 'CH17 Q40', en: 'In the consolidated statement of financial position (CSFP), the non-controlling interest is reported as a non-current liability.', cn: '在合并财务状况表中，非控制性权益作为非流动负债列报。', ans: false, key: 'NCI是权益的组成部分', exp: '<b>非控制性权益(NCI)</b>代表其他所有者在子公司净资产中的权益，它是合并<b>权益(equity)</b>的自然延伸部分，不符合负债的定义，因此不得作为<b>非流动负债(non-current liability)</b>列报。' },
                    { id: 'ch17-q40-2', src: 'CH17 Q40', en: 'In the consolidated statement of profit or loss (CSPL), the non-controlling interest is deducted from the profit for the year to determine the profit attributable to the parent\'s shareholders.', cn: '在合并利润表中，从年度利润中减去非控制性权益，以确定归属于母公司股东的利润。', ans: false, key: 'NCI不是费用而是利润分配', exp: '根据最新的IFRS准则规定，合并利润表应显示整个集团的<b>年度利润(profit for the year)</b>，然后在报表底部将其<b>分配(allocated)</b>为"归属于母公司所有者"和"归属于非控制性权益"，而不是将其作为一项将其扣除的费用。' },

                    // Q41 (原题号55) - 判断题组合: 收购时与年末的NCI
                    { id: 'ch17-q41-1', src: 'CH17 Q41', en: 'Non-controlling interest at acquisition = Fair value of NCI at acquisition date.', cn: '收购时的非控制性权益 = 收购日NCI的公允价值。', ans: true, key: '收购日NCI按公允价值确认', exp: '根据<b>IFRS 3</b>规定，在<b>收购日(date of acquisition)</b>，归属于少数股东的<b>非控制性权益(NCI)</b>应当按照其在收购日的<b>公允价值(fair value)</b>进行初始计量。' },
                    { id: 'ch17-q41-2', src: 'CH17 Q41', en: 'Non-controlling interest at year end = Fair value of NCI at acquisition date + NCI% × Post-acquisition retained earnings of the subsidiary.', cn: '年末非控制性权益 = 收购日NCI公允价值 + NCI持股比例 × 子公司收购后留存收益。', ans: true, key: '年末NCI需加上收购后利润份额', exp: '<b>报告日(year-end)</b>的NCI余额等于<b>收购日的初始公允价值(initial fair value)</b>加上NCI按持股比例<b>(NCI%)</b>分享的子公司自收购以来的<b>收购后留存收益(post-acquisition retained earnings)</b>变动（如果存在未实现利润等需先行调整）。' },

                    // Q46 (原题号72) - 判断题组合: 合并留存收益基础
                    { id: 'ch17-q46-1', src: 'CH17 Q46', en: 'Consolidated retained earnings at year end includes 100% of the parent\'s retained earnings.', cn: '年末合并留存收益包括100%的母公司留存收益。', ans: true, key: '母公司留存收益全额计入合并留存收益', exp: '<b>合并留存收益(Consolidated retained earnings)</b>反映的是归属母公司股东的资金池，因此它首先包含了<b>全额(100%)</b>的<b>母公司自身留存收益(parent\'s retained earnings)</b>。' },
                    { id: 'ch17-q46-2', src: 'CH17 Q46', en: 'Consolidated retained earnings at year end includes 100% of the subsidiary\'s post-acquisition retained earnings.', cn: '年末合并留存收益包括100%的子公司收购后留存收益。', ans: false, key: '只按母公司持股比例计入', exp: '<b>合并留存收益(Consolidated retained earnings)</b>只包括母公司按<b>持股比例(parent\'s share)</b>享有的子公司<b>收购后(post-acquisition)</b>留存收益。剩余部分归属于非控制性权益。' },

                    // Q55 (原题号10) - 判断题组合: 并表的存货抵销原则
                    { id: 'ch17-q55-1', src: 'CH17 Q55', en: 'Goodwill is adjusted for the profit on intra-group sales in closing inventory.', cn: '对于期末存货中的内部集团销售利润，需要对商誉进行调整。', ans: false, key: '内部利润不调整商誉', exp: '集团内部销售产生的<b>未实现利润(PURP)</b>抵销发生在收购之后，它影响的是当期利润、存货账面价值和留存收益，但绝不会追溯调整或影响收购日已经确认的<b>商誉(goodwill)</b>金额。' },
                    { id: 'ch17-q55-2', src: 'CH17 Q55', en: 'Consolidated closing inventory is adjusted for the profit on intra-group sales in closing inventory.', cn: '合并期末存货中因集团内部销售利润而被调整。', ans: true, key: '存货需扣除未实现利润', exp: '从集团的单一实体视角来看，内部交易产生的利润只有当存货出售给集团外第三方时才算实现。留在期末存货中的部分含有<b>未实现利润(PURP)</b>，必须在合并报表时从<b>存货(closing inventory)</b>中扣除。' },

                    // Q57 (原题号18) - 判断题组合: 集团内部应收应付账款与资金在途
                    { id: 'ch17-q57-1', src: 'CH17 Q57', en: 'When cash is in transit between a parent and subsidiary, the cash should be added to the cash of the receiving company and deducted from the receivables of the receiving company.', cn: '当母公司和子公司之间存在资金在途时，应将现金加到接收公司的现金中，并从接收公司的应收款中扣除。', ans: true, key: '资金在途的处理', exp: '合并前，需要对<b>在途现金(cash in transit)</b>进行调整。假设款项已经收到，增加接收方的<b>现金(cash)</b>余额，同时冲减其对付款方的<b>应收账款(receivables)</b>，使双方内部往来账目对等，以便全额抵销。' },
                    { id: 'ch17-q57-2', src: 'CH17 Q57', en: 'Intra-group balances should be left in the consolidated statement of financial position as they represent legal obligations between the companies.', cn: '集团内部余额应留在合并财务状况表中，因为它们代表了公司之间的法律义务。', ans: false, key: '内部余额必须全额抵销', exp: '虽然在各自独立的法定报表中存在法律义务，但在编制合并报表时，由于母子公司被视为同一个经济实体，不能自己欠自己钱。所以所有的<b>集团内部余额(Intra-group balances)</b>必须<b>全额抵销(eliminated)</b>。' },

                    // ===== 六、联营企业及其核算 (Associates) =====
                    // Q61 (原题号42) - 判断题组合: 联营企业的核算规则
                    { id: 'ch17-q61-1', src: 'CH17 Q61', en: 'The assets and liabilities of the associate are consolidated on a line-by-line basis.', cn: '联营企业的资产和负债采用逐行合并的方式。', ans: false, key: '联营企业不能逐行合并', exp: '对于<b>联营企业(associate)</b>，由于没有控制权，不采用<b>逐行合并(line-by-line basis)</b>。逐行合并只适用于子公司。联营企业使用<b>权益法(equity method)</b>核算。' },
                    { id: 'ch17-q61-2', src: 'CH17 Q61', en: 'The investment in the associate is shown as a single line in the consolidated statement of financial position.', cn: '对联营企业的投资在合并财务状况表中作为单行项目列示。', ans: true, key: '权益法下呈现为单行项目', exp: '在<b>权益法(equity method)</b>下，对联营企业的净资产份额在合并财务状况表中显示为非流动资产下的一个<b>单行项目(single line)</b>，通常命名为"对联营企业的投资(Investment in associate)"。' },

                    // Q62 (原题号87) - 判断题组合: 联营企业的增值与抵销
                    { id: 'ch17-q62-1', src: 'CH17 Q62', en: 'The group share of an associate’s revaluation surplus is included in the consolidated statement of financial position.', cn: '联营企业重估盈余的集团份额包含在合并财务状况表中。', ans: true, key: '权益法也包含OCI份额', exp: '根据<b>权益法(equity method)</b>，投资不仅随利润增长而增加，也随联营企业的<b>其他综合收益(OCI)</b>（如<b>重估盈余/revaluation surplus</b>）的发生而同向增加。集团应在合并报表中体现其按持股比例享有的份额。' },
                    { id: 'ch17-q62-2', src: 'CH17 Q62', en: 'Intra-group receivables and payables between the parent and associate must be eliminated in full.', cn: '母公司和联营企业之间的集团内部应收和应付款项必须全额消除。', ans: false, key: '无需抵销与联营企业的往来', exp: '<b>集团内部抵销(Intra-group elimination)</b>仅适用于集团内的核心成员（即母公司和所有的子公司）。由于联营企业不属于集团严格定义的范围，母公司与联营企业间的<b>应收应付账款(receivables and payables)</b>不应被消除，作为常规往来保留即可。' },

                    // Q63 (原题号3) - 单选题: 联营企业股利的日记账处理 (合并级别)
                    { id: 'ch17-q63-1', src: 'CH17 Q63', en: 'When accounting for an associate in consolidated financial statements, dividends received from the associate are credited to the "Investment in associate" account.', cn: '在合并财务报表中核算联营企业时，从联营企业收到的股利贷记“对联营企业投资”账户。', ans: true, key: '分红减少联营企业的账面长期投资', exp: '在<b>权益法(equity method)</b>下，<b>股利(dividends)</b>视为投资回收资本，不是投资收益。分录为：借记Cash（增加现金），<b>贷记Investment in associate(减少由于确认收益而增加的投资账面余额)</b>。' },
                    { id: 'ch17-q63-2', src: 'CH17 Q63', en: 'When accounting for an associate in consolidated financial statements, dividends received from the associate are credited to the consolidated statement of profit or loss.', cn: '在合并财务报表中核算联营企业时，从联营企业收到的股利贷记到合并利润表中。', ans: false, key: '联营企业股利不进利润表', exp: '母公司独立报表的确认为分红收入，但在编制合并报表使用<b>权益法(equity method)</b>进行合并级别调整后，投资增值部分是按照"<b>利润的份额(share of profit)</b>"体现在利润表的。如果再把<b>股利(dividends)</b>按收益算进利润表就属于双重计算。' },

                    // ===== 七、合并利润表原则及其他 =====
                    // Q65 (原题号6) - 判断题组合: 合并利润表基础
                    { id: 'ch17-q65-1', src: 'CH17 Q65', en: 'The consolidated statement of profit or loss includes the subsidiary’s post-acquisition revenue and expenses.', cn: '合并利润表包含子公司的收购后收入和费用。', ans: true, key: '仅将收购之后部分并入', exp: '如果在财年内发生收购，合并利润表仅将子公司从<b>收购日(acquisition date)起算</b>到年末的<b>收入和费用(revenue and expenses)</b>按比例计入，收购前部分不纳入合并。' },
                    { id: 'ch17-q65-2', src: 'CH17 Q65', en: 'The non-controlling interests are deducted within the consolidated statement of profit or loss to arrive at consolidated profit for the year.', cn: '非控制性权益在合并利润表中被扣除，以得出合并年度利润。', ans: false, key: '利润是整个实体计算完后再下拨', exp: '合并利润表核算出的首先是企业整体的<b>年度利润(profit for the year)</b>，其中包含归属于<b>全体出资人</b>的利得。然后在表尾将该利润值<b>划分(allocate)</b>给控股母公司及<b>非控制性权益(NCI)</b>，而不是将 NCI 视作为成本减项扣除。' },

                    // Q72 (原题号34) - 单选题: 内部销售基础抵销分录
                    { id: 'ch17-q72-1', src: 'CH17 Q72', en: 'The required journal entry to eliminate intra-group sales comprises DR Consolidated sales and CR Consolidated cost of sales.', cn: '消除集团内部销售所需的日记账分录包括借记合并销售额，贷记合并销售成本。', ans: true, key: '冲减被重复计算的收入和成本', exp: '内部企业对内销售时，同时在账簿虚增了<b>销售收入(sales)</b>和购买方的<b>采购成本(cost of sales)</b>，但对于整个集团并未产生实际价值变化。因此必须通过<b>借记销售(减少营收)</b>和<b>贷记销售成本(减少成本)</b>全额冲销相关的金额。' },
                    { id: 'ch17-q72-2', src: 'CH17 Q72', en: 'The required journal entry to eliminate intra-group sales comprises DR Consolidated sales and CR Consolidated closing inventory.', cn: '消除集团内部销售所需的日记账分录包括借记合并销售额，贷记合并期末存货。', ans: false, key: '存货调整主要针对未实现利润', exp: '单纯消除<b>"交易量额(intra-group sales value)"</b>时，只冲减合并的营收和成本。只有当货物留存于期末并包含内部加价导致<b>存货(inventory)</b>虚高时，才会另外进行调整（即借销货成本，贷期末存货）剔除<b>未实现利润(PURP)</b>。两者不能混为一谈。' },

                    // Q74 (原题号38) - 多选题: 影响归属 NCI 利润的因素
                    { id: 'ch17-q74-1', src: 'CH17 Q74', en: 'Intra-group sales from subsidiary to parent with some inventory left at the year end will affect the calculation of a non-controlling interest’s share of attributable profit.', cn: '子公司向母公司进行的内部销售且在年末留有存货会影响非控制性权益应占利润份额的计算。', ans: true, key: '下级向上级卖货(上流交易)会导致子公司含有水份', exp: '当为<b>向上级销售(Upstream sales From Subsidiary to Parent)</b>时，内部虚增的<b>未实现利润(PURP)</b>全部被记录在<b>子公司(Subsidiary\'s)</b>的利润表里。所以当剥离这部分水分时，会导致子公司的净利润减少，随之其<b>非控制性权益(NCI)</b>能够拿到的分配份额也会变小。' },
                    { id: 'ch17-q74-2', src: 'CH17 Q74', en: 'Intra-group sales from parent to subsidiary with some inventory left at the year end will affect the calculation of a non-controlling interest’s share of attributable profit.', cn: '母公司向子公司进行的内部销售且在年末留有存货会影响非控制性权益应占利润份额的计算。', ans: false, key: '母往子卖不影响子的利润表', exp: '如果是由<b>母公司向子公司销售(Downstream sales From Parent to Sub)</b>，该笔<b>未实现利润(PURP)</b>留存在了母公司的利润账上。既然没有虚增子公司利润，就不需要再对子公司的净利进行核减，自然也不影响<b>NCI(基于子公司当期产生效益提成)</b>的计算。' },
                    
                    // Q76 (原题号40) - 判断题组合: 年中收购
                    { id: 'ch17-q76-1', src: 'CH17 Q76', en: 'Pre- and post-acquisition income and expenses are both included in the consolidated statement of profit or loss when an acquisition occurs mid-year.', cn: '当收购在年中发生时，收购前和收购后的收入与费用均包含在合并利润表中。', ans: false, key: '必须按实际控制期并表', exp: '如果在年度中旬实施并购，则只允许将合并完成日之后属于**被控制区间(post-acquisition period)**相关的子公司的<b>收入与各项费用</b>包含在合并财务报表中，绝对不会向前追溯包含那些不受自己控制的<b>并购前(pre-acquisition)</b>期间。' },
                    { id: 'ch17-q76-2', src: 'CH17 Q76', en: 'Trading that occurs after acquisition between group companies must be eliminated.', cn: '收购后集团公司之间发生的交易必须予以消除。', ans: true, key: '一旦变成集团成员即遵循消抵规则', exp: '当收购完成之日起，两者即成为不可分割的统一<b>汇报实体(reporting entity)</b>。在这个区间段之内产生的所有<b>内部交易(intra-group trading)</b>均不再属于对外业务，因此其收入与往来成本都必须<b>全部消除(eliminated)</b>。' },

                    // Q78 (原题号49) - 单选题: 针对 PURP(未实现利润) 账务如何做处理？
                    { id: 'ch17-q78-1', src: 'CH17 Q78', en: 'The accounting entry required to remove unrealised profit from the group financial statements is: DR Cost of sales, CR Closing inventory.', cn: '从集团财务报表中移除未实现利润所需的会计分录是：借记销售成本，贷记期末存货。', ans: true, key: '虚增货值的常规消水冲账', exp: '因内部流转时包含抬价且未售出给第三方形成的<b>未实现利润(PURP/unrealised profit)</b>使得报表账面积压水分。因此需<b>贷记期末存货(CR Closing inventory)</b>消去资产虚高，并调增当期的<b>借记销售成本(DR Cost of sales)</b>从而正确削减本期的总利润水平。' },

                    // Q79 (原题号57) - 单选题: 子公司收派股利
                    { id: 'ch17-q79-1', src: 'CH17 Q79', en: 'Dividends received by the parent company from a subsidiary are included in other income and added to other income of the subsidiary company.', cn: '母公司从子公司收到的股利包含在其他收入中，并与子公司的其他收入相加。', ans: false, key: '内部红包不可成为正式营业增收', exp: '母公司通过投资收到子公司的<b>股息(Dividends)</b>，在其个别的账本中记作投资回报。但放到合并报表的口径看，这只是"把钱从集团的一只口袋塞进另一只口袋"。将这些再当做收入会导致双重计算并虚构价值，由于这是<b>内部交易行为(intra-group transactions)</b>，应当予以注销剔除。' },

                    // Q80, Q81, Q82 涉及联营企业列报与处理
                    { id: 'ch17-q80-1', src: 'CH17 Q80', en: 'The investor\'s share of an associate\'s profit for the year is included immediately before profit before tax in the consolidated statement of profit or loss.', cn: '投资者应占的联营企业年度利润份额，紧接在合并利润表的税前利润项目之前列示。', ans: true, key: '联营收益在合并利润表的专有行项', exp: '为了简明提示外部投资给本集团带来的正面促进而不用像子公司那样细化科目合算，对<b>联营企业(associate)</b>应用权益法后其所分享的除税后<b>净利额度(share of profit for the year)</b>会在合并利润表中专门列出一行，置定在总汇<b>税前利润(Profit Before Tax)</b>结算行之前的位置。' },

                    { id: 'ch17-q81-1', src: 'CH17 Q81', en: 'An associate\'s gains on revaluation are not included in the consolidated statement of profit or loss.', cn: '联营企业的重估增值不包含在合并利润表中。', ans: true, key: '重估增值应该反映在 OCI 其他综合收益的独立范畴里', exp: '因为<b>重估增值(Gains on revaluation)</b>并不是经常性的销售或经营利得，它仅意味着持有资产增值的潜力释放并被计入为<b>其他综合收益(Other Comprehensive Income - OCI)</b>类目之下。这就表示它不参与结算到集团普通的当期<b>合并利润表(Profit or loss)</b>中去。' },

                    { id: 'ch17-q82-1', src: 'CH17 Q82', en: 'When an investor owns 30% of a company and exerts significant influence, 30% of the investee\'s results should be included on a line by line basis.', cn: '当投资者拥有某公司30%的股份并施加重大影响时，应将该被投资方30%的业绩逐行计入合并报表。', ans: false, key: '只有全资或控股子公司才要逐行合并', exp: '持股 30% 且具<b>重大影响(significant influence)</b>属于<b>联营企业(associate)</b>身份。对此类被投资公司不能<b>逐行(line by line)</b>摊派到报表的各个营业款项科目中，而是通过<b>权益法(equity method)</b>使用<b>单列项目(one-line entry)</b>的方式体现这一项外来投资的浮动总值。' }
                ]
            },
            {
                id: 'ch18',
                title: 'CH18 - Interpretation of Financial Statements (财务报表解读与比率分析)',
                label: 'CH18',
                items: [
                    // ===== 一、 基本概念与分析方法 =====
                    // Q1 (原题号3) - 使用主体的不同诉求
                    { id: 'ch18-q1-1', src: 'CH18 Q1', en: 'Accounting ratios are most useful when each calculation is analysed separately.', cn: '当每个计算被单独分析时，会计比率最有用。', ans: false, key: '比率的核心在于比较', exp: '单个的会计比率意义有限。比率分析最有用之处在于进行<b>比较(comparison)</b>，例如与公司历史数据、行业平均水平进行比较，从中发现趋势和问题。' },
                    { id: 'ch18-q1-2', src: 'CH18 Q1', en: 'Lenders are most concerned with gearing and liquidity ratios.', cn: '贷款人最关心的是杠杆比率和流动性比率。', ans: true, key: '贷款人看重长短期偿债能力', exp: '<b>贷款人(Lenders)</b>最关心企业偿还债务的能力。<b>杠杆比率(Gearing ratios)</b>反映长期偿债能力和财务风险，<b>流动性比率(Liquidity ratios)</b>反映短期偿债能力。' },
                    { id: 'ch18-q1-3', src: 'CH18 Q1', en: 'Investors can use ratios to compare businesses to assess their relative profitability and stability.', cn: '投资者可以使用比率来比较企业，以评估其相对盈利能力和稳定性。', ans: true, key: '投资者看重回报与风险', exp: '<b>投资者(Investors)</b>使用比率分析来评估企业的<b>盈利能力(profitability)</b>、财务稳定性和投资回报，以判断企业是否具备投资价值。' },
                    { id: 'ch18-q1-4', src: 'CH18 Q1', en: 'Management tend to use profitability ratios only.', cn: '管理层倾向于只使用盈利能力比率。', ans: false, key: '管理层需要全面数据', exp: '<b>管理层(Management)</b>需要全面了解企业的运营状况，因此他们会使用<b>所有类型(all types)</b>的比率，包括盈利、流动性、杠杆和效率比率，以进行决策和控制。' },

                    // Q2 (原题号11) - 分析的局限性
                    { id: 'ch18-q2-1', src: 'CH18 Q2', en: 'Management and shareholders use ratio analysis to assess a company at the end of each month.', cn: '管理层和股东在每个月末使用比率分析来评估公司。', ans: false, key: '股东无法获取月度数据', exp: '<b>管理层(Management)</b>可以获取及时的管理会计信息按月评估。但<b>股东(Shareholders)</b>通常只能接触到公司发布的年度或半年度财务报表，无法按月进行评估。' },
                    { id: 'ch18-q2-2', src: 'CH18 Q2', en: 'Ratio analysis by potential investors using information from the financial statements is limited to historical data.', cn: '潜在投资者使用财务报表信息进行的比率分析仅限于历史数据。', ans: true, key: '财报是历史的延后反映', exp: '<b>潜在投资者(Potential investors)</b>依赖于已发布的财务报表，这些报表记录的是已经发生的经济活动，因此这种分析本质上受限于<b>历史数据(historical data)</b>。' },

                    // ===== 二、 盈利能力比率 (Profitability Ratios) =====
                    // Q5 (原题号9) - 毛利率下降原因
                    { id: 'ch18-q5-1', src: 'CH18 Q5', en: 'A plausible reason to explain the fall in gross profit margin is that selling prices have been reduced to encourage more sales.', cn: '解释毛利率下降的一个合理理由是降低了售价以鼓励更多销售。', ans: true, key: '降价直接削减毛利率', exp: '降低<b>售价(Selling prices)</b>会直接减少每单位销售带来的收入，如果销货成本不变，毛利和<b>毛利率(gross profit margin)</b>都会随之下降。' },
                    { id: 'ch18-q5-2', src: 'CH18 Q5', en: 'A plausible reason to explain the fall in gross profit margin is that sales have fallen from last year.', cn: '解释毛利率下降的一个合理理由是销售额比去年下降了。', ans: false, key: '毛利率是相对百分比', exp: '销售额绝对值的下降不一定会导致毛利率(百分比)下降。如果<b>销货成本(cost of sales)</b>以更快的速度下降，毛利率甚至可能上升。' },

                    // Q6 (原题号10) - 盈利能力对比
                    { id: 'ch18-q6-1', src: 'CH18 Q6', ctx: 'Sunpreet\'s gross profit margin is 30% and net profit margin is 20%. His competitor\'s gross profit margin is 26% and net profit margin is 22%.', en: 'It is highly likely that Sunpreet\'s gross profit is definitely higher than his competitor\'s gross profit.', cn: 'Sunpreet的毛利绝对额极可能高于其竞争对手的毛利。', ans: false, key: '高比率不等于高绝对值', exp: '毛利率是一个<b>相对指标(relative metric)</b>。即使毛利率更高，但如果销售规模太小，其产生的<b>毛利绝对额(gross profit)</b>也可能低于竞争对手。' },
                    { id: 'ch18-q6-2', src: 'CH18 Q6', ctx: 'Sunpreet\'s gross profit margin is 30% and net profit margin is 20%. His competitor\'s gross profit margin is 26% and net profit margin is 22%.', en: 'It is highly likely that Sunpreet\'s competitor manages his expenses better than Sunpreet.', cn: 'Sunpreet的竞争对手在费用管理上极可能比Sunpreet做得更好。', ans: true, key: '毛利与净利的差额代表经营费用', exp: '从毛利到净利的利差反映了期间费用占收入的比率。竞争对手的费用比率是26%-22%=4%，而Sunpreet是30%-20%=10%。这表明竞争对手的<b>费用管理(expenses management)</b>可能更有效率。' },

                    // Q9 (原题号22) - 毛利率下降的影响因素
                    { id: 'ch18-q9-1', src: 'CH18 Q9', en: 'A company\'s gross profit percentage may have declined because it is taking longer to pay its suppliers.', cn: '一家公司的毛利率可能下降了，因为其花更长的时间支付供应商。', ans: false, key: '付款期长短不影响销售收入和销货成本', exp: '支付供应商时间的快慢影响的是<b>现金流(cash flows)</b>和应付账款天数，但并不影响已确认在利润表上的<b>销货成本(cost of sales)</b>和毛利率数字。' },
                    { id: 'ch18-q9-2', src: 'CH18 Q9', en: 'A company\'s gross profit percentage may have declined because it has been offering trade discounts to its customers.', cn: '一家公司的毛利率可能下降了，因为其向客户提供了商业折扣。', ans: true, key: '商业折扣减少净销售收入', exp: '向客户提供<b>商业折扣(trade discounts)</b>会直接降低净销售收入。在销货成本不变的情况下，收入减少必定导致毛利和<b>毛利率(gross profit percentage)</b>同步下降。' },

                    // Q10 (原题号23) - 杜邦分析公式识别
                    { id: 'ch18-q10-1', src: 'CH18 Q10', en: 'Asset turnover can be calculated by dividing ROCE by Operating profit margin.', cn: '资产周转率可以通过将ROCE除以营业利润率来计算。', ans: true, key: '杜邦分析核心公式推导', exp: '由标准公式 <b>ROCE = 营业利润率(Operating profit margin) × 资产周转率(Asset turnover)</b> 推导可得，资产周转率等于 ROCE 除以营业利润率（考试中有时也粗略用净利率替代）。' },

                    // Q12 (原题号31) - ROCE下降的原因
                    { id: 'ch18-q12-1', src: 'CH18 Q12', en: 'A fall in Return on Capital Employed (ROCE) could be due to higher finance costs adversely affecting profit for the year.', cn: 'ROCE的下降可能是由于较高的财务成本对年度利润产生不利影响。', ans: false, key: 'ROCE计算使用息前利润(PBIT)', exp: 'ROCE计算中使用的是<b>税前息前利润(PBIT)</b>，并不扣除利息。因此，<b>财务成本(finance costs)</b>增高不会对该比率产生任何影响。' },
                    { id: 'ch18-q12-2', src: 'CH18 Q12', en: 'A fall in Return on Capital Employed (ROCE) implies that asset turnover has risen.', cn: 'ROCE的下降意味着资产周转率已经上升。', ans: false, key: 'ROCE恶化意味着其它效率因子可能恶化', exp: '根据杜邦公式，ROCE的下降通常意味着营业利润率下降或者<b>资产周转率(asset turnover)</b>下降。不可能得出资产周转率上升的结论。' },
                    { id: 'ch18-q12-3', src: 'CH18 Q12', en: 'A fall in Return on Capital Employed (ROCE) may be explained by an increase in supplier prices.', cn: 'ROCE的下降可以用供应商价格上涨来解释。', ans: true, key: '成本抬高压低营业利润', exp: '供应商价格上涨会增加采购成本和<b>销货成本(cost of sales)</b>，导致营业利润下降。在已动用资本不变的情况下，这将直接导致<b>ROCE下降</b>。' },
                    { id: 'ch18-q12-4', src: 'CH18 Q12', en: 'A fall in Return on Capital Employed (ROCE) could be due to significant purchases of non-current assets.', cn: 'ROCE的下降可能是由于大量购买非流动资产。', ans: true, key: '巨额投资短期内扩大分母', exp: '大量购买<b>非流动资产(non-current assets)</b>会增加公式分母“<b>已动用资本(capital employed)</b>”。如果短期内利润没能相应增长，由于分母变大，ROCE自然就会下降。' },

                    // ===== 三、 长期偿付能力/杠杆比率 (Long-term Solvency / Gearing) =====
                    // Q15 (原题号14) / Q16 (原题号17) / Q18 (原题号33) / Q19 (原题号35)
                    { id: 'ch18-q15-1', src: 'CH18 Q14', en: 'If gearing has decreased and interest cover has increased, it would give lenders confidence that their debt will be repaid.', cn: '如果杠杆率下降且利息保障倍数上升，这将给予贷款人信心，相信他们的债务将得到偿还。', ans: true, key: '低杠杆与高覆盖代表低风险', exp: '<b>杠杆率(Gearing)</b>下降意味着公司的财务风险降低。<b>利息保障倍数(Interest cover)</b>上升意味着公司用利润偿还利息的能力增强。这对贷款人来说是极其积极的信号。' },
                    { id: 'ch18-q16-1', src: 'CH18 Q17', en: 'Assuming debt remains constant, a company\'s gearing decreases because its equity has increased.', cn: '假设债务保持不变，公司的杠杆率下降是因为其权益增加了。', ans: true, key: '股东注资或留存收益降低杠杆', exp: '在债务(分子)不变的情况下，要使杠杆率(债务/总资本)下降，分母必须增加，这意味着<b>权益(equity)</b>增加了（例如实现了利润留存或发行新股）。' },
                    { id: 'ch18-q18-1', src: 'CH18 Q33', en: 'A highly geared company is less able to survive a downturn in profit than an ungeared company.', cn: '与无杠杆公司相比，高杠杆公司在利润下滑时生存能力较差。', ans: true, key: '债务带来固定的利息负担', exp: '<b>高杠杆(highly geared)</b>的公司有固定的利息支付义务。在利润下滑时，这些支出会给公司带来巨大的压力，产生极高的<b>财务风险(financial risk)</b>。' },
                    { id: 'ch18-q18-2', src: 'CH18 Q33', en: 'An interest cover of less than 1 means that interest payments cannot be met out of current profits.', cn: '利息保障倍数小于1意味着当期利润无法支付利息。', ans: true, key: '利息覆盖低于倍率底线', exp: '<b>利息保障倍数(Interest cover)</b> = PBIT / 利息费用。如果该比率小于1，意味着当期的营业利润甚至还不够支付应当支付的利息，财务状况极度危险。' },
                    { id: 'ch18-q19-1', src: 'CH18 Q35', en: 'Paying dividends on equity shares is likely to increase a company\'s gearing.', cn: '支付权益股的股息可能会增加公司的杠杆率。', ans: true, key: '分红抽血导致杠杆上升', exp: '支付股息会减少公司的<b>留存收益(retained earnings)</b>，从而减少股东权益(equity)。在负债不变的情况下，自身的本钱变少了，对外部资金的依赖比(即杠杆率)自然也就<b>上升(increase)</b>了。' },

                    // ===== 四、 短期流动性比率 (Short-term Liquidity) =====
                    // Q20 (原题号8) / Q23 (原题号40)
                    { id: 'ch18-q20-1', src: 'CH18 Q8', ctx: 'Chas\'s current ratio drops from 2.2 last year to 0.9 this year.', en: 'A current ratio of 0.9 suggests that Chas may have more difficulty paying his debts as they fall due.', cn: '0.9的流动比率表明Chas在偿还到期债务时可能会有更多困难。', ans: true, key: '流动比率低于1', exp: '<b>流动比率(Current ratio)</b>降至1以下（此处为0.9），意味着流动资产的变现价值不足以完全覆盖即将到期的流动负债，短期<b>流动性(liquidity)</b>出现严重危机。' },
                    { id: 'ch18-q23-1', src: 'CH18 Q40', en: 'Negotiating trade discounts from suppliers could improve a company\'s current ratio.', cn: '与供应商谈判获得商业折扣可以改善公司的流动比率。', ans: true, key: '折扣直接减少负债', exp: '获得<b>商业折扣(trade discounts)</b>意味着未来的采购应付款减少。在流动资产不变的情况下，<b>流动负债(current liabilities)</b>降低会使得原大于1的流动比率得到提升改善。' },
                    { id: 'ch18-q23-2', src: 'CH18 Q40', en: 'Persuading customers to pay more quickly could improve a company\'s current ratio.', cn: '说服客户更快付款可以改善公司的流动比率。', ans: false, key: '内部结构转换不改总额', exp: '客户快速付款只是将应收账款(流动资产)转换为了现金(流动资产)。这是资产形态的变化，并没有增加<b>流动资产总额</b>，所以流动比率并未随之改善。' },

                    // Q39 (原题号25)
                    { id: 'ch18-q39-1', src: 'CH18 Q25', en: 'Reducing the value of closing inventory will lead to a decrease in the current ratio and an increase in gearing.', cn: '降低期末存货的价值将导致流动比率下降和杠杆率上升。', ans: true, key: '存货减值的连锁双重打击', exp: '降低<b>期末存货(closing inventory)</b>价值会直接使流动资产减少，导致流动比率下降；同时，存货减值的损失会导致<b>留存收益(retained earnings)</b>减少（权益变小），进而使得杠杆率被动上升。' },

                    // ===== 五、 运营效率比率 (Efficiency Ratios) =====
                    // Q29 (原题号29) / Q30 (原题号30)
                    { id: 'ch18-q29-1', src: 'CH18 Q29', ctx: 'Over the last year, the unit cost of items purchased has been falling.', en: 'A company using FIFO will have a shorter inventory holding period than a company using AVCO.', cn: '在采购成本下降时，使用FIFO（先进先出）的存货持有期将比使用AVCO（加权平均）更短。', ans: true, key: '期末存货价值拉低天数', exp: '由于成本在降价，FIFO法导致期末留存的是更便宜的新货，期末存货金额较低；AVCO法则是加权平均较高。既然分子存货较小，计算出的<b>存货持有期(inventory holding period)</b>也就更短。' },
                    { id: 'ch18-q30-1', src: 'CH18 Q30', en: 'A decision not to pay suppliers until the end of the credit period will lead to an increase in payables days.', cn: '决定一直拖延到信用期结束前才付款给供应商，将导致应付账款天数增加。', ans: true, key: '拖延付款增加账面滞留', exp: '从收到发票就算款改为拖到最后一天付款，公司欠钱的总体时间变长了，表现为计算出的<b>应付账款周转天数(Payables days)</b>增加。这虽然改善了现金流，但却容易伤害商业信誉。' },
                    
                    // Q31 (原题号32)
                    { id: 'ch18-q31-1', src: 'CH18 Q32', en: 'Receivables days may increase because staff have left the credit control department and were not replaced.', cn: '应收账款天数可能因信用控制部门员工离职且未被替换而增加。', ans: true, key: '催帐乏力导致坏账/迟账', exp: '<b>信用控制(credit control)</b>部门员工减少，催讨欠款的力度减弱，会导致客户的付款变得拖拉，从而使得<b>应收账款天数(Receivables days)</b>被动上升。' },
                    { id: 'ch18-q31-2', src: 'CH18 Q32', en: 'Receivables days may increase because a large customer paid a big invoice just before the year end.', cn: '应收账款天数可能因大客户在年底前支付了大额发票而增加。', ans: false, key: '付款会降低应收余额', exp: '客户在年结前结清账单，反而会大幅度<b>削减(reduce)</b>期末的应收账款余额。这会导致最终计算出来的应收天数变短，即收款效率提升。' },

                    // Q34 (原题号38)
                    { id: 'ch18-q34-1', src: 'CH18 Q38', en: 'A decrease in a company\'s inventory holding period could be accounted for by the fact that goods are becoming obsolete.', cn: '公司存货持有期缩短可能是因为商品变得陈旧过时。', ans: false, key: '商品滞销会延长周转期', exp: '商品变得<b>陈旧过时(obsolete)</b>意味着它们很难被卖出去，因此会产生库房堆积。这反而会导致<b>存货持有期(inventory holding period)</b>被严重拖慢。' },
                    { id: 'ch18-q34-2', src: 'CH18 Q38', en: 'A decrease in a company\'s inventory holding period could be accounted for by an increased demand for the product.', cn: '公司存货持有期缩短可能是由于产品需求增加。', ans: true, key: '需求猛增加速商品流转', exp: '产品<b>需求增加(Increased demand)</b>会导致库存的货物能以更快的速度被消耗变成销售。这必然极大降低<b>存货周转天数(inventory days)</b>，属于销售运营的好转。' },

                    // Q25 / Q27 / Q33 / Q37 - 营业周期与营运周期综合
                    { id: 'ch18-q33-1', src: 'CH18 Q37', en: 'Increasing the time taken to pay suppliers will reduce the length of a company\'s operating (cash) cycle.', cn: '增加支付供应商的时间会缩短公司的经营（现金）周期。', ans: true, key: '占用上游资金缩短缺口', exp: '<b>经营周期(Operating cycle - 当等同于现金转换周时)</b> = 存货天数 + 应收天数 - 应付天数。拖延支付<b>增加应付天数(Payables days)</b>，相当于占用供应商免息资金补充自身，在公式上会缩短整体现金周期。' },
                    { id: 'ch18-q25-1', src: 'CH18 Q6', en: 'An operating cycle is lengthening because the company bought a bulk load of inventory at a discount and has not sold it yet.', cn: '营业周期变长是因为公司以折扣价大量采购了存货但尚未售出。', ans: true, key: '大量囤货拉高存货系数', exp: '大量吃进商品会导致库存飙升。在没有快速转为销售前，<b>存货周转天数(Inventory days)</b>猛涨，作为周期的组成部分，势必拉长整体的<b>营业周期(Operating cycle)</b>。' },
                    { id: 'ch18-q27-1', src: 'CH18 Q19', en: 'A working capital cycle has decreased from 65 days to 41 days, which means cash stays in the bank for 41 days instead of 65 days.', cn: '营运资本周期从65天缩短至41天，意味着现金留存在银行的时间变成了41天而不是65天。', ans: false, key: '其实代表资金被压占的时间变短', exp: '<b>营运资本周期(Working capital cycle)</b>衡量的是现金脱离银行、垫付在供应链中被<b>占用(tied up)</b>的时间，而非呆在银行的时间。周期的缩短仅仅说明周转速度的提升。' },

                    // Q40 (原题号28) 财报极度高危征兆
                    { id: 'ch18-q40-1', src: 'CH18 Q28', ctx: 'Inventory increased significantly, Receivables increased significantly, but Cash was exhausted and turned into a Bank overdraft.', en: 'The business may be experiencing rapid growth which is causing it to run out of working capital.', cn: '业务可能正在经历快速增长，这导致其营运资本耗尽。', ans: true, key: '过度扩张致流动资金断裂', exp: '存货和应收的大幅激增（垫付外部占用了太多本金），直接导致手中的现金见底甚至变成<b>透支(overdraft)</b>。这种属于典型的<b>过度交易(Overtrading)</b>吞噬营运资本引发的大幅失血状态。' },

                    // ===== 六、 综合分析题 (Comprehensive Analysis) =====
                    // Q35 (原题号1) - 贷款人视角
                    { id: 'ch18-q35-1', src: 'CH18 Q1', en: 'When considering making a loan to a business, a lender should consider the amount of existing debt.', cn: '在考虑向企业提供贷款时，贷款人应考虑其现有债务的金额。', ans: true, key: '存量债务决定额外举债空间', exp: '如果企业已经有大量债务（高杠杆率），那么其继续偿还新贷款的能力就会下降，违约风险更高。因此，<b>现有债务(existing debt)</b>是新贷款人必须首要考察的指标。' },
                    { id: 'ch18-q35-2', src: 'CH18 Q1', en: 'When considering making a loan to a business, a lender should be more interested in the gross profit percentage than the net profit percentage.', cn: '在考虑向企业提供贷款时，贷款人应该比净利率更关注毛利率。', ans: false, key: '净利才是还本付息的真正源泉', exp: '毛利率(Gross profit)只涵盖了直接的销货成本，没有扣减期间费用，不能反映真实的最终造血能力；而<b>净利率(Net profit percentage)</b>反映了企业在扣除所有费用后的最终盈利能力，这是保证按时偿还贷款的底线。' },

                    // Q36 (原题号13) 
                    { id: 'ch18-q36-1', src: 'CH18 Q13', en: 'If gearing increases and profits decrease then interest cover will increase.', cn: '如果杠杆率上升且利润下降，那么利息保障倍数将会上升。', ans: false, key: '债务升高+利润下滑=保障能力单向下降', exp: '杠杆率上升意味着债务和<b>利息费用(interest charges，分母)</b>增加，利润(PBIT，分子)同时下降，这一上一下会导致计算出的<b>利息保障倍数(interest cover)</b>必然下降。' },
                    { id: 'ch18-q36-2', src: 'CH18 Q13', en: 'If asset turnover decreases and return on capital employed (ROCE) increases then operating profit margin must also decrease.', cn: '如果资产周转率下降且已动用资本回报率(ROCE)上升，那么营业利润率也必须下降。', ans: false, key: '用杜邦公式维持等式平衡', exp: '根据标准公式 <b>ROCE = 营业利润率 × 资产周转率</b>。如果资产周转率下降而整体乘积ROCE却上升，为了维持等式平衡，<b>营业利润率(operating profit margin)</b>必须是<b>上升(increase)</b>的。' },

                    // Q37 (原题号16)
                    { id: 'ch18-q37-1', src: 'CH18 Q16', ctx: 'Inventory period: 75 -> 60 days; Receivables days: 40 -> 55 days; Payables days: 30 -> 40 days.', en: 'Debt collection is bringing in cash faster because receivables days increased to 55 days.', cn: '由于应收账款天数增加至55天，债务催收正在更快地带来现金。', ans: false, key: '天数增加代表收款变慢', exp: '<b>应收账款天数(Receivables days)</b>从40天增加到55天，这直接表明收回欠款的速度<b>变慢(slower)</b>了，而不是更快。' },

                    // Q38 (原题号20)
                    { id: 'ch18-q38-1', src: 'CH18 Q20', ctx: 'Quick ratio dropped from 2.4 to 1.7.', en: 'The quick ratio could have declined because the company is holding more inventory.', cn: '速动比率可能下降了，因为公司持有了更多的存货。', ans: false, key: '速动比率早就剔除了存货', exp: '<b>速动比率(Quick ratio)</b>的计算公式是 (流动资产 - 存货) / 流动负债。因为计算中已经预先扣除了这部分金额，所以存货本身的数量变化根本不影响速动比率的值。' },
                    { id: 'ch18-q38-2', src: 'CH18 Q20', ctx: 'Trade receivables days decreased from 41 to 39 days.', en: 'Customers paying faster is the main reason why the quick ratio has significantly declined.', cn: '客户更快付款是速动比率明显下降的主要原因。', ans: false, key: '内部置换速动资产总额不变', exp: '客户快速结账只会把应收账款转换为现金。这两者都是构成速动比率分子的<b>速动资产</b>。这种内部转换不会改变总额，所以并不会导致速动比率陡降。' }
                ]
            }

        ];

        // ==================== 状态管理 ====================
        const STORAGE_KEY = 'sh01-tf-progress';
        const ANSWER_KEY = 'sh01-tf-answers';
        let cardProgress = {};
        let userAnswers = {}; // {itemId: true/false}
        let currentChapter = 'all';
        let currentFilter = 'all';

        function loadProgress() {
            try {
                const s1 = localStorage.getItem(STORAGE_KEY);
                if (s1) cardProgress = JSON.parse(s1);
                const s2 = localStorage.getItem(ANSWER_KEY);
                if (s2) userAnswers = JSON.parse(s2);
            } catch (e) { }
        }
        function saveProgress() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(cardProgress));
                localStorage.setItem(ANSWER_KEY, JSON.stringify(userAnswers));
            } catch (e) { }
        }

        // ==================== 数据查询 ====================
        function getAllItems() {
            let items = [];
            sections.forEach(sec => {
                sec.items.forEach(item => {
                    items.push({ ...item, sectionId: sec.id, sectionTitle: sec.title, sectionLabel: sec.label });
                });
            });
            return items;
        }

        function getFilteredItems() {
            let items = getAllItems();
            if (currentChapter !== 'all') {
                items = items.filter(i => i.sectionLabel === currentChapter);
            }
            if (currentFilter === 'mastered') {
                items = items.filter(i => cardProgress[i.id] === 'mastered');
            } else if (currentFilter === 'not-mastered') {
                items = items.filter(i => cardProgress[i.id] === 'not-mastered');
            } else if (currentFilter === 'unmarked') {
                items = items.filter(i => !cardProgress[i.id]);
            }
            return items;
        }

        // ==================== 渲染 ====================
        function initChapterButtons() {
            const grid = document.getElementById('chapterGrid');
            grid.innerHTML = '<button class="chapter-btn active" data-sec="all">全部 Chapters</button>';

            // 提取所有不重复的 Chapter 标签
            const uniqueLabels = [...new Set(sections.map(s => s.label))];
            uniqueLabels.forEach(label => {
                if (!label) return;
                const btn = document.createElement('button');
                btn.className = 'chapter-btn';
                btn.dataset.sec = label;
                btn.textContent = label;
                grid.appendChild(btn);
            });

            grid.querySelectorAll('.chapter-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    grid.querySelectorAll('.chapter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentChapter = this.dataset.sec;
                    renderCards();
                    updateStats();
                    updateExportButtons();
                });
            });
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            const items = getFilteredItems();

            if (items.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>暂无题目</h3><p>当前筛选条件下没有题目，请调整筛选条件</p></div>';
                return;
            }

            container.innerHTML = items.map((item, idx) => createCardHTML(item, idx + 1)).join('');
        }

        function createCardHTML(item, displayNum) {
            const status = cardProgress[item.id];
            const statusClass = status || '';
            const statusBadge = status === 'mastered'
                ? '<span class="card-status mastered">已掌握</span>'
                : status === 'not-mastered'
                    ? '<span class="card-status not-mastered">未掌握</span>'
                    : '';

            const userAns = userAnswers[item.id];
            const hasAnswered = userAns !== undefined;
            const isCorrect = hasAnswered && (userAns === item.ans);

            const contextHTML = item.ctx
                ? `<div class="card-context">${item.ctx}</div>`
                : '';

            // T/F 按钮状态
            let trueBtnClass = 'tf-btn btn-true';
            let falseBtnClass = 'tf-btn btn-false';
            let disabled = '';

            if (hasAnswered) {
                disabled = 'disabled';
                if (userAns === true) {
                    trueBtnClass += item.ans === true ? ' selected-correct' : ' selected-wrong';
                    if (item.ans === false) falseBtnClass += ' correct-highlight';
                } else {
                    falseBtnClass += item.ans === false ? ' selected-correct' : ' selected-wrong';
                    if (item.ans === true) trueBtnClass += ' correct-highlight';
                }
            }

            // 答错后的额外class
            let cardExtraClass = '';
            let resultLine = '';
            if (hasAnswered) {
                cardExtraClass = isCorrect ? 'answered-correct' : 'answered-wrong';
                resultLine = isCorrect
                    ? '<div class="answer-line" style="color:#166534;font-weight:bold;font-size:1.05em;border-bottom:1px solid #cbd5e1;padding-bottom:8px;margin-bottom:10px;">✅ 回答正确</div>'
                    : '<div class="answer-line" style="color:#991b1b;font-weight:bold;font-size:1.05em;border-bottom:1px solid #cbd5e1;padding-bottom:8px;margin-bottom:10px;">❌ 回答错误</div>';
            }

            // 考点只保留中文（取 | 后面的部分）
            const keyText = item.key.includes('|') ? item.key.split('|').pop().trim() : item.key;

            return `
        <div class="card ${statusClass} ${cardExtraClass}" data-id="${item.id}">
            <div class="card-header">
                <div class="card-tags">
                    <span class="card-section-tag">${item.sectionLabel}</span>
                    <span class="card-source">${item.src}</span>
                    ${statusBadge}
                </div>
                <span class="card-number">#${displayNum}</span>
            </div>
            ${contextHTML}
            <div class="card-statement">${item.en}</div>
            <div class="tf-buttons">
                <button class="${trueBtnClass}" ${disabled} onclick="submitAnswer('${item.id}', true)">T</button>
                <button class="${falseBtnClass}" ${disabled} onclick="submitAnswer('${item.id}', false)">F</button>
            </div>
            <div class="answer-panel ${hasAnswered ? 'show' : ''}" id="answer-${item.id}">
                ${resultLine}
                <div class="answer-line"><span class="answer-label">答案：</span><span class="${item.ans ? 'answer-correct' : 'answer-wrong'}">${item.ans ? '对 (T)' : '错 (F)'}</span></div>
                <div class="answer-line"><span class="answer-label">翻译：</span>${item.cn}</div>
                <div class="answer-line"><span class="answer-label">考点：</span><span class="answer-keypoint">${keyText}</span></div>
                <div class="answer-line"><span class="answer-label">解析：</span>${item.exp}</div>
            </div>
            <div class="mastery-buttons ${hasAnswered ? 'show' : ''}" id="mastery-${item.id}">
                <button class="btn btn-mastered ${status === 'mastered' ? 'is-mastered' : ''}" onclick="markCard('${item.id}', 'mastered')">
                    <span>${status === 'mastered' ? '✓' : '☐'}</span> 已掌握
                </button>
                <button class="btn btn-not-mastered ${status === 'not-mastered' ? 'is-not-mastered' : ''}" onclick="markCard('${item.id}', 'not-mastered')">
                    <span>${status === 'not-mastered' ? '!' : '☐'}</span> 未掌握
                </button>
                <button class="btn btn-retry" onclick="retryItem('${item.id}')">
                    <span>🔄</span> 重做
                </button>
            </div>
        </div>
    `;
        }

        function updateStats() {
            let baseItems = getAllItems();
            if (currentChapter !== 'all') {
                baseItems = baseItems.filter(i => i.sectionLabel === currentChapter);
            }

            const mastered = baseItems.filter(i => cardProgress[i.id] === 'mastered').length;
            const notMastered = baseItems.filter(i => cardProgress[i.id] === 'not-mastered').length;
            const unmarked = baseItems.filter(i => !cardProgress[i.id]).length;
            const showing = getFilteredItems().length;

            const correctCount = baseItems.filter(i => userAnswers[i.id] !== undefined && userAnswers[i.id] === i.ans).length;
            const wrongCount = baseItems.filter(i => userAnswers[i.id] !== undefined && userAnswers[i.id] !== i.ans).length;

            document.getElementById('masteredCount').textContent = mastered;
            document.getElementById('notMasteredCount').textContent = notMastered;
            document.getElementById('showingCount').textContent = showing;
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('wrongCount').textContent = wrongCount;

            document.getElementById('fAll').textContent = baseItems.length;
            document.getElementById('fMas').textContent = mastered;
            document.getElementById('fNot').textContent = notMastered;
            document.getElementById('fUnm').textContent = unmarked;

            const total = baseItems.length;
            const pct = total > 0 ? (mastered / total) * 100 : 0;
            document.getElementById('progressFill').style.width = pct + '%';

            document.getElementById('totalItemCount').textContent = getAllItems().length;
        }

        // ==================== 交互 ====================
        function submitAnswer(id, answer) {
            userAnswers[id] = answer;
            saveProgress();
            renderCards();
            updateStats();
            updateExportButtons();

            // 滚动到答案区域
            setTimeout(() => {
                const panel = document.getElementById('answer-' + id);
                if (panel) {
                    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }, 100);
        }

        function markCard(id, status) {
            if (cardProgress[id] === status) {
                delete cardProgress[id];
            } else {
                cardProgress[id] = status;
            }
            saveProgress();
            renderCards();
            updateStats();
        }

        function retryItem(id) {
            delete userAnswers[id];
            saveProgress();
            renderCards();
            updateStats();
            updateExportButtons();
        }

        function resetAllAnswers() {
            if (confirm('确定要重做所有题目吗？掌握状态不会被清除。')) {
                userAnswers = {};
                saveProgress();
                renderCards();
                updateStats();
                updateExportButtons();
            }
        }

        function resetProgress() {
            if (confirm('确定要重置所有掌握状态吗？此操作不可撤销。')) {
                cardProgress = {};
                userAnswers = {};
                saveProgress();
                renderCards();
                updateStats();
                updateExportButtons();
            }
        }

        let isExpandedAll = false;

        function toggleExpandAll() {
            isExpandedAll = !isExpandedAll;
            const btn = document.getElementById('expandAllBtn');

            if (isExpandedAll) {
                btn.textContent = '📕 一键收起';
                btn.style.background = 'linear-gradient(135deg,#ef4444,#dc2626)';
                // Reveal all answer panels and mastery buttons
                document.querySelectorAll('.answer-panel').forEach(p => p.classList.add('show'));
                document.querySelectorAll('.mastery-buttons').forEach(p => p.classList.add('show'));
                // Mark T/F buttons with correct answer highlight (without recording user answers)
                const items = getFilteredItems();
                items.forEach(item => {
                    if (userAnswers[item.id] === undefined) {
                        const card = document.querySelector(`.card[data-id="${item.id}"]`);
                        if (card) {
                            const trueBtn = card.querySelector('.btn-true');
                            const falseBtn = card.querySelector('.btn-false');
                            if (item.ans === true && trueBtn) trueBtn.classList.add('correct-highlight');
                            if (item.ans === false && falseBtn) falseBtn.classList.add('correct-highlight');
                        }
                    }
                });
            } else {
                btn.textContent = '📖 一键展开';
                btn.style.background = 'linear-gradient(135deg,#f59e0b,#d97706)';
                // Hide ALL answer panels and mastery buttons
                document.querySelectorAll('.answer-panel').forEach(p => p.classList.remove('show'));
                document.querySelectorAll('.mastery-buttons').forEach(p => p.classList.remove('show'));
                document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('correct-highlight'));
            }
        }

        // ==================== 导出错题 ====================
        function getWrongItems() {
            let items = getAllItems();
            // 如果选择了特定章节，则只导出该章节的错题
            if (currentChapter !== 'all') {
                items = items.filter(i => i.sectionLabel === currentChapter);
            }
            // 筛选出答错的题目
            return items.filter(i => userAnswers[i.id] !== undefined && userAnswers[i.id] !== i.ans);
        }

        function exportWrongQuestions(withAnswer) {
            const wrongItems = getWrongItems();
            if (wrongItems.length === 0) {
                alert('🎉 太棒了！当前' + (currentChapter === 'all' ? '全部章节' : currentChapter) + '没有错题。');
                return;
            }

            const overlay = document.getElementById('printOverlay');
            const chapterText = currentChapter === 'all' ? '全部章节' : currentChapter;
            const modeText = withAnswer ? '含答案' : '不含答案';
            const now = new Date();
            const dateStr = now.getFullYear() + '-' +
                String(now.getMonth() + 1).padStart(2, '0') + '-' +
                String(now.getDate()).padStart(2, '0');

            let html = `
                <div class="print-header">
                    <h1>ACCA FA 概念判断 · 错题集</h1>
                    <div class="print-meta">
                        范围：${chapterText} ｜ 模式：${modeText} ｜ 错题数：${wrongItems.length} ｜ 日期：${dateStr}
                    </div>
                </div>
            `;

            wrongItems.forEach((item, idx) => {
                const contextHTML = item.ctx
                    ? `<div class="print-item-context">${item.ctx}</div>`
                    : '';

                let answerHTML = '';
                if (withAnswer) {
                    const keyText = item.key.includes('|') ? item.key.split('|').pop().trim() : item.key;
                    answerHTML = `
                        <div class="print-answer-section">
                            <div><span class="print-answer-label">答案：</span><span class="${item.ans ? 'print-answer-correct' : 'print-answer-wrong'}">${item.ans ? '对 (T)' : '错 (F)'}</span></div>
                            <div><span class="print-answer-label">翻译：</span>${item.cn}</div>
                            <div><span class="print-answer-label">考点：</span><span class="print-answer-key">${keyText}</span></div>
                            <div><span class="print-answer-label">解析：</span>${item.exp}</div>
                        </div>
                    `;
                }

                html += `
                    <div class="print-item">
                        <div class="print-item-header">
                            <div class="print-item-tags">
                                <span class="print-tag">${item.sectionLabel}</span>
                                <span class="print-tag print-tag-src">${item.src}</span>
                            </div>
                            <span>#${idx + 1} / ${wrongItems.length}</span>
                        </div>
                        ${contextHTML}
                        <div class="print-statement">${item.en}</div>
                        <div class="print-tf-box">
                            <span class="print-tf-option">T</span>
                            <span class="print-tf-option">F</span>
                        </div>
                        ${answerHTML}
                    </div>
                `;
            });

            html += `
                <div class="print-footer">
                    ACCA FA 概念判断练习 · 错题集 · ${dateStr}
                </div>
            `;

            overlay.innerHTML = html;

            // 修改标题以便 PDF 文件名有意义
            const origTitle = document.title;
            document.title = `FA错题集_${chapterText}_${modeText}_${dateStr}`;

            // 延迟打印确保渲染完成
            setTimeout(() => {
                window.print();
                // 恢复标题
                setTimeout(() => { document.title = origTitle; }, 500);
            }, 200);
        }

        function updateExportButtons() {
            const wrongItems = getWrongItems();
            const count = wrongItems.length;
            const noAnsBtn = document.getElementById('exportNoAnswerBtn');
            const withAnsBtn = document.getElementById('exportWithAnswerBtn');
            if (noAnsBtn) {
                noAnsBtn.disabled = count === 0;
                noAnsBtn.textContent = count > 0
                    ? `📝 导出错题（不含答案）· ${count}题`
                    : '📝 导出错题（不含答案）· 无错题';
            }
            if (withAnsBtn) {
                withAnsBtn.disabled = count === 0;
                withAnsBtn.textContent = count > 0
                    ? `📋 导出错题（含答案）· ${count}题`
                    : '📋 导出错题（含答案）· 无错题';
            }
        }

        // ==================== 初始化 ====================
        function init() {
            loadProgress();
            initChapterButtons();
            renderCards();
            updateStats();
            updateExportButtons();

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    renderCards();
                    updateStats();
                });
            });
        }

        init();
    </script>
</body>

</html>
